<body>
  <div class="edge-hotspot" id="edgeHotspot" aria-hidden="true"></div>
  <div class="drawer-backdrop" id="drawerBackdrop" aria-hidden="true"></div>
  <div class="page-shell" id="pageShell">
    <header class="site-header">
      <div class="header-left">
        <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="显示或隐藏目录" aria-controls="sidebar" aria-expanded="true">
          <span></span><span></span><span></span>
        </button>
        <a class="brand" href="#tools-overview" data-nav-link>
          <span class="brand-mark" aria-hidden="true">S</span>
          <span>
            <strong>swordll80.github.io</strong>
            <em>个人工具与技术笔记</em>
          </span>
        </a>
      </div>
      <div class="header-right">
        <button class="hard-refresh-btn" id="hardRefreshBtn" type="button" title="清理本站本地缓存并强制刷新当前页面" aria-label="强制刷新当前页面">
          <span class="refresh-icon" aria-hidden="true">⟳</span>
          <span class="refresh-text">强制刷新</span>
        </button>
        <span class="desktop-status"><span class="status-dot" aria-hidden="true"></span>Simple · Elegant · Consistent</span>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar" aria-label="站点目录">
        <div class="sidebar-head">
          <strong>目录</strong>
          <small>Navigation</small>
        </div>
        <nav class="nav-tree" id="navTree"></nav>

      <main class="content" id="content" tabindex="-1">
        <section class="hero content-section active" id="tools-overview" data-title="工具">
          <p class="eyebrow">Tools</p>

          <div class="plain-card mt-24">

            <p>KML 轨迹文件合并、查看和编辑工具。</p>
            <div class="card-actions">
              <a class="button primary" href="outdoors/YFxGeoStudio/YFxGeoStudio.html" data-cache-bust-link>YFxGeoStudio</a>
              <a class="button" href="outdoors/YFxGeoStudio/YFxGeoStudio_beta.html" data-cache-bust-link>内测版</a>

      <span>轻量静态站点 · 原生 HTML/CSS/JS</span>
    </footer>
  </div>
  <script src="script.js"></script>

  <script>
    (function(){
      function withFreshParam(url){
        var u;
        try{
          u = new URL(url, window.location.href);
          u.searchParams.set('v', Date.now().toString());
          return u.href;
        }catch(e){
          var sep = url.indexOf('?') >= 0 ? '&' : '?';
          return url + sep + 'v=' + Date.now();
        }
      }

      function clearLocalSiteCache(){
        try{
          if(window.caches && caches.keys){
            caches.keys().then(function(keys){
              keys.forEach(function(k){ caches.delete(k); });
            });
          }
        }catch(e){}
        try{
          if(navigator.serviceWorker && navigator.serviceWorker.getRegistrations){
            navigator.serviceWorker.getRegistrations().then(function(regs){
              regs.forEach(function(reg){ reg.unregister(); });
            });
          }
        }catch(e){}
      }

      document.addEventListener('DOMContentLoaded', function(){
        var links = document.querySelectorAll('[data-cache-bust-link]');
        links.forEach(function(a){
          a.addEventListener('click', function(ev){
            ev.preventDefault();
            window.location.href = withFreshParam(a.getAttribute('href') || a.href);
          });
        });

        var refreshBtn = document.getElementById('hardRefreshBtn');
        if(refreshBtn){
          refreshBtn.addEventListener('click', function(ev){
            ev.preventDefault();
            clearLocalSiteCache();
            window.location.replace(withFreshParam(window.location.pathname));
          }, true);
        }
      });
    })();
  </script>
</body>
</html>
