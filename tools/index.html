<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="开发、编码、格式化、加密、图片等在线工具导航">
  <title>在线工具导航 · swordll80</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: rgba(255, 255, 255, 0.88);
      --text: #172033;
      --muted: #667085;
      --line: #dfe6ef;
      --accent: #356ae6;
      --accent-soft: #eaf0ff;
      --shadow: 0 18px 50px rgba(40, 56, 85, 0.11);
    }
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 12%, #dce8ff 0, transparent 28rem),
        radial-gradient(circle at 95% 90%, #e4f6ef 0, transparent 30rem),
        var(--bg);
      font: 16px/1.7 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Microsoft YaHei", sans-serif;
    }

    .site-header {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(22px, 5vw, 72px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 750;
      letter-spacing: .02em;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      color: white;
      border-radius: 10px;
      background: linear-gradient(135deg, #356ae6, #6c4ce3);
      box-shadow: 0 8px 22px rgba(53, 106, 230, .28);
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .layout {
      width: min(1180px, calc(100% - 40px));
      min-height: calc(100vh - 96px);
      margin: 12px auto;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .9);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    /* ---- Sidebar ---- */
    .sidebar {
      padding: 20px 12px;
      border-right: 1px solid var(--line);
      background: rgba(248, 250, 253, .74);
      display: flex;
      flex-direction: column;
    }

    .sidebar-title {
      margin: 0 10px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .sidebar-search {
      width: 100%;
      margin: 0 0 12px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font: inherit;
      font-size: 13px;
      outline: none;
    }
    .sidebar-search:focus { border-color: var(--accent); }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .tree, .tree ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .tree ul {
      position: relative;
      margin-left: 16px;
      padding-left: 12px;
    }

    .tree ul::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 0;
      bottom: 12px;
      width: 1px;
      background: var(--line);
    }

    .tree-button {
      width: 100%;
      margin: 2px 0;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 0;
      border-radius: 10px;
      color: #344054;
      background: transparent;
      font: inherit;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: .18s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-button:hover {
      color: var(--accent);
      background: #f0f4fb;
    }

    .tree-button.active {
      color: var(--accent);
      font-weight: 650;
      background: var(--accent-soft);
    }

    .tree-button .arrow {
      font-size: 10px;
      color: var(--muted);
      transition: transform .2s;
      min-width: 14px;
      text-align: center;
      flex-shrink: 0;
    }

    .tree-button .arrow.open { transform: rotate(90deg); }

    .tree-button .name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .tree-button .count {
      color: var(--muted);
      font-size: 12px;
      flex-shrink: 0;
    }

    /* ---- Content / iframe ---- */
    .content {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .content-header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.6);
      flex-shrink: 0;
    }

    .content-title {
      font-weight: 650;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .content-title .open-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      margin-left: 4px;
    }
    .content-title .open-link:hover { color: var(--accent); }

    .iframe-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
      background: #fff;
    }

    .iframe-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 8px;
    }
    .welcome .icon { font-size: 52px; opacity: .3; }
    .welcome p { font-size: 15px; }

    .source {
      padding: 10px 28px 12px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }
    .source a { color: var(--accent); text-decoration: none; }
    .source a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .status { display: none; }
      .layout {
        width: min(100% - 22px, 600px);
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: calc(100vh - 96px);
      }
      .sidebar {
        padding: 12px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: 260px;
      }
      .sidebar-nav { max-height: 140px; }
      .content-header { padding: 12px 16px; }
      .source { padding: 8px 16px; }
    }
  </style>
</head>

    <section class="content">
      <div class="content-header">
        <span class="content-title" id="contentTitle">
          ← 从左侧选择一个工具
        </span>
        <a class="open-link" id="openLink" href="#" target="_blank" rel="noopener noreferrer" hidden>在新窗口打开 ↗</a>
      </div>
      <div class="iframe-wrap" id="iframeWrap">
        <div class="welcome" id="welcome">
          <span class="icon">🛠️</span>
          <p>从左侧树中选择一个工具，将在此处嵌入打开</p>
        </div>
        <iframe id="toolFrame" hidden sandbox="allow-scripts allow-same-origin allow-forms allow-popups" allow="camera;microphone;clipboard-read;clipboard-write" loading="lazy"></iframe>
      </div>
      <div class="source">
        工具来源于 <a href="https://www.toolhelper.cn/" target="_blank" rel="noopener noreferrer">锤子在线工具网 ToolHelper</a>。本站仅提供导航，不复制其页面、代码、数据或服务。
      </div>

  </main>

  <script>
    const tree = document.getElementById('tree');
    const search = document.getElementById('search');
    const toolFrame = document.getElementById('toolFrame');
    const welcome = document.getElementById('welcome');
    const contentTitle = document.getElementById('contentTitle');
    const openLink = document.getElementById('openLink');

    let currentToolBtn = null;
    let currentUrl = '';

    function setTool(url, title, btn) {
      currentUrl = url;
      contentTitle.innerHTML = `${title} <span style="font-weight:400;color:var(--muted);font-size:13px;">— ToolHelper</span>`;
      openLink.href = url;
      openLink.hidden = false;
      welcome.hidden = true;
      toolFrame.hidden = false;
      toolFrame.src = url;

      if (currentToolBtn) currentToolBtn.classList.remove('active');
      currentToolBtn = btn;
      if (btn) btn.classList.add('active');
    }

    // Toggle category
    tree.addEventListener('click', (e) => {
      const toggleBtn = e.target.closest('[data-toggle]');
      const toolBtn = e.target.closest('[data-tool]');

      if (toolBtn) {
        const url = toolBtn.dataset.url;
        const title = toolBtn.dataset.title;
        setTool(url, title, toolBtn);
        return;
      }

      if (toggleBtn) {
        const id = toggleBtn.dataset.toggle;
        const ul = document.getElementById(id);
        const arrow = toggleBtn.querySelector('.arrow');
        const open = ul.hidden;
        ul.hidden = !open;
        if (arrow) arrow.classList.toggle('open', open);
      }
    });

    // Search
    search.addEventListener('input', () => {
      const q = search.value.trim().toLowerCase();
      document.querySelectorAll('#tree > li').forEach(li => {
        const tools = li.querySelectorAll('[data-tool]');
        let anyVisible = false;
        tools.forEach(btn => {
          const name = (btn.dataset.title || btn.textContent.trim()).toLowerCase();
          const match = !q || name.includes(q);
          btn.closest('li').hidden = !match;
          if (match) anyVisible = true;
        });
        const ul = li.querySelector('ul');
        if (q) {
          ul.hidden = !anyVisible;
          const arrow = li.querySelector('.arrow');
          if (arrow) arrow.classList.toggle('open', anyVisible);
        }
        li.hidden = q && !anyVisible;
      });
    });
  </script>
