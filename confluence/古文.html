<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>古文</title>
  <style>
    :root { --bg:#f5f6fa; --card:#fff; --accent:#356ae6; --muted:#7d8599; --line:#e2e5ee; --text:#1a1a2e; --radius:12px; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); line-height:1.7; min-height:100vh; }
    .topbar { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--line); padding:10px 16px; display:flex; align-items:center; gap:10px; }
    .topbar h1 { font-size:17px; white-space:nowrap; background:linear-gradient(135deg,#356ae6,#5a4de0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .search-wrap { flex:1; position:relative; max-width:400px; }
    .search-wrap input { width:100%; height:36px; padding:0 36px 0 14px; border:1px solid var(--line); border-radius:20px; font-size:14px; background:var(--bg); outline:none; transition:border-color .2s,box-shadow .2s; }
    .search-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(53,106,230,.12); }
    .search-clear { position:absolute; right:8px; top:50%; transform:translateY(-50%); width:26px; height:26px; border-radius:50%; border:0; background:transparent; font-size:16px; color:var(--muted); cursor:pointer; display:none; align-items:center; justify-content:center; }
    .search-clear.visible { display:flex; }
    .search-clear:hover { background:var(--line); color:var(--text); }
    .result-count { font-size:13px; color:var(--muted); white-space:nowrap; }
    .container { max-width:900px; margin:0 auto; padding:14px; }
    .section { margin-bottom:14px; border-radius:var(--radius); background:var(--card); box-shadow:0 2px 12px rgba(0,0,0,.04); overflow:hidden; }
    .section-head { display:flex; align-items:center; gap:10px; padding:13px 16px; cursor:pointer; user-select:none; -webkit-tap-highlight-color:transparent; transition:background .15s; border:0; width:100%; text-align:left; font:inherit; color:inherit; background:none; }
    .section-head:hover { background:#f8f9fd; }
    .section-head .icon { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; background:linear-gradient(135deg,#356ae6,#5a4de0); color:#fff; font-weight:700; }
    .section-head .title { flex:1; font-size:15px; font-weight:700; }
    .section-head .count { font-size:12px; color:var(--muted); background:var(--bg); padding:2px 10px; border-radius:10px; }
    .section-head .arrow { font-size:12px; color:var(--muted); transition:transform .25s; }
    .section.open .section-head .arrow { transform:rotate(180deg); }
    .section-body { display:none; border-top:1px solid var(--line); }
    .section.open .section-body { display:block; }
    .card { padding:12px 16px; border-bottom:1px solid var(--line); transition:background .15s; }
    .card:last-child { border-bottom:0; }
    .card.hidden { display:none; }
    .card-head { display:flex; align-items:flex-start; gap:10px; margin-bottom:5px; }
    .card-num { font-size:11px; color:var(--muted); font-weight:700; min-width:26px; text-align:right; padding-top:2px; }
    .card-title { flex:1; font-weight:700; font-size:14px; }
    .card-ver { font-size:10px; color:var(--accent); background:rgba(53,106,230,.08); padding:1px 7px; border-radius:5px; white-space:nowrap; }
    .card-code { margin-top:6px; background:#f8f9fc; border:1px solid var(--line); border-radius:8px; padding:10px 13px; font-family:"Cascadia Code","Fira Code","Consolas","Courier New",monospace; font-size:12px; line-height:1.65; white-space:pre-wrap; word-break:break-all; overflow-x:auto; color:#2d3436; }
    .card-code span { color:#8b3fc7; }
    .card-title mark, .card-code mark { background:#fef08a; color:inherit; border-radius:2px; padding:0 1px; }
    .back-top { position:fixed; bottom:20px; right:20px; width:42px; height:42px; border-radius:50%; background:var(--accent); color:#fff; border:0; font-size:18px; cursor:pointer; box-shadow:0 4px 16px rgba(53,106,230,.35); display:none; align-items:center; justify-content:center; z-index:10; transition:transform .2s; }
    .back-top.visible { display:flex; }
    .back-top:active { transform:scale(.92); }
    .no-result { text-align:center; padding:40px 20px; color:var(--muted); font-size:15px; }
    @media (max-width:600px) { .topbar { padding:8px 10px; gap:6px; flex-wrap:wrap; } .topbar h1 { font-size:15px; } .search-wrap { max-width:none; flex:1 1 160px; } .search-wrap input { height:32px; font-size:13px; } .result-count { font-size:11px; } .container { padding:8px; } .section { margin-bottom:10px; border-radius:10px; } .section-head { padding:10px 12px; } .section-head .icon { width:28px; height:28px; font-size:14px; border-radius:7px; } .section-head .title { font-size:13px; } .card { padding:10px 12px; } .card-title { font-size:13px; } .card-code { padding:8px 10px; font-size:11px; border-radius:6px; } .back-top { bottom:14px; right:14px; width:36px; height:36px; font-size:16px; } }
  </style>
</head>
<body>
<div class="topbar"><h1>古文</h1><div class="search-wrap"><input type="text" id="searchInput" placeholder="搜索知识点..."><button class="search-clear" id="searchClear" title="清除">✕</button></div><span class="result-count" id="resultCount">1 条</span></div>
<div class="container" id="cardContainer">
<div class="section" id="sect-1"><button class="section-head" onclick="this.parentElement.classList.toggle('open')"><span class="icon">1</span><span class="title">古文</span><span class="count">1 条</span><span class="arrow">▼</span></button><div class="section-body"><div class="card" id="card-1-1" data-keywords=" # 古文

开始编写内容…"><p># 古文<br><br>开始编写内容…</p></div></div></div>
</div>
<button class="back-top" id="backTop" title="回到顶部">↑</button>
<script>
(function(){var q=document.getElementById("searchInput"),c=document.getElementById("searchClear"),r=document.getElementById("resultCount"),cards=document.querySelectorAll(".card"),sections=document.querySelectorAll(".section"),back=document.getElementById("backTop");function search(){var v=q.value.trim().toLowerCase(),count=0;cards.forEach(function(card){if(!v){card.classList.remove("hidden");count++;return;}var kw=(card.getAttribute("data-keywords")||"").toLowerCase();var ok=kw.indexOf(v)>=0;card.classList.toggle("hidden",!ok);if(ok)count++;});r.textContent=(v?count+"/":"")+cards.length+" 条";c.classList.toggle("visible",!!v);sections.forEach(function(s){var vis=s.querySelectorAll(".card:not(.hidden)");if(v)s.classList.add("open");else s.classList.remove("open");});}q.addEventListener("input",search);c.addEventListener("click",function(){q.value="";search();q.focus();});window.addEventListener("scroll",function(){back.classList.toggle("visible",window.scrollY>300);});back.addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"});});sections.forEach(function(s){var btn=s.querySelector(".section-head");if(btn)btn.addEventListener("click",function(){s.classList.toggle("open");});});var first=sections[0];if(first&&!q.value)first.classList.add("open");})();
</script>
</body>
</html>
