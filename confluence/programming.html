<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>编程语言手册</title>
  <style>
    :root { --bg:#f5f6fa; --card:#fff; --accent:#356ae6; --muted:#7d8599; --line:#e2e5ee; --text:#1a1a2e; --radius:12px; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); line-height:1.7; min-height:100vh; }
    .topbar { position:sticky; top:0; z-index:10; background:var(--card); border-bottom:1px solid var(--line); padding:10px 18px; display:flex; align-items:center; gap:12px; box-shadow:0 1px 6px rgba(0,0,0,.04); }
    .topbar h1 { font-size:18px; color:var(--accent); }
    .container { max-width:960px; margin:0 auto; padding:28px 20px 60px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:18px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:20px 22px; text-decoration:none; color:inherit; display:block; transition:box-shadow .2s, transform .15s; }
    .card:hover { box-shadow:0 6px 22px rgba(0,0,0,.08); transform:translateY(-2px); }
    .card .icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:700; color:#fff; margin-bottom:12px; }
    .card h3 { font-size:16px; margin-bottom:4px; }
    .card p { font-size:13px; color:var(--muted); }
    .ic-c   { background:#283593; }
    .ic-cpp { background:#00599c; }
    .ic-py  { background:#3776ab; }
    .ic-js  { background:#f7df1e; color:#1a1a2e; }
    .ic-json{ background:#5b5b5b; }
    .ic-xml { background:#f26522; }
    @media (max-width:600px) { .container { padding:18px 12px 40px; } .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="topbar"><h1>编程语言手册</h1></div>
  <div class="container">
    <div class="grid">
      <a class="card" href="c.html"><div class="icon ic-c">C</div><h3>C 语言速查</h3><p>标准库、指针、内存管理、预处理器</p></a>
      <a class="card" href="cpp.html"><div class="icon ic-cpp">++</div><h3>C++ 速查</h3><p>STL、面向对象、模板、智能指针</p></a>
      <a class="card" href="python.html"><div class="icon ic-py">Py</div><h3>Python 速查</h3><p>内置函数、数据类型、装饰器</p></a>
      <a class="card" href="js.html"><div class="icon ic-js">JS</div><h3>JavaScript 速查</h3><p>ES6+、DOM、异步、数组方法</p></a>
      <a class="card" href="json.html"><div class="icon ic-json">{ }</div><h3>JSON 速查</h3><p>语法规则、数据类型、Schema</p></a>
      <a class="card" href="xml.html"><div class="icon ic-xml">&lt;/&gt;</div><h3>XML 速查</h3><p>DTD、XPath、命名空间、Schema</p></a>
    </div>
  </div>
</body>
</html>
