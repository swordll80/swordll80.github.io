<h1>衢州三怪</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>张握仲从戎衢州，云衢州夜静时，人莫敢独行。钟楼上有鬼，头上一角，象貌狞恶，闻人行声即下。人骇奔，鬼亦遂去，而见之辄病，多死者。又城中一塘，夜出白布一疋，如匹练，横地上，过者拾之，即捲入水。又有鸭鬼，夜既定，塘边寂无一物，若闻鸣声，即病。</p></article>
