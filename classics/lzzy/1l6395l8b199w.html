<h1>大蝎</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>明彭将军宏，征寇入蜀，至深山中，有大禅院，云已百年无僧。询之土人，则谓寺中有妖，入者辄死。彭恐伏寇，率兵斩茅而入，前殿中有皂雕夺门，飞去中殿无异。又进之，则佛阁，周视亦无所见，而入者皆头痛不能禁。彭亲入，亦然。少顷，有蝎如琵琶，自板上蠢蠢而下，一军惊走，彭遂火其寺。</p></article>
