<h1>某甲</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>某甲私其仆妇，因杀仆纳妇，生二子一女。阅十九年，巨寇破城，劫掠一空。一少年贼持刀入甲家。甲视之，酷类死仆，自叹曰：吾合休矣！倾囊赎命，迄不愿，亦不一言，但搜人而杀，共杀一家男妇二十七口而去。甲头未断。寇去少苏，犹能言之，三日寻毙。呜呼！果报之不爽，可畏也哉！</p></article>
