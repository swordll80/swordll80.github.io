<h1>岳神</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>扬州提同知，夜梦岳神召之，词色愤怒，仰见一人侍神侧，少为缓颊，醒而恶之。早诣岳庙，默作祈禳。既出，见药肆一人，绝肖所见，问之，知为医生。既归暴病，特遣人聘之。既至，出方为剂，暮服之，中夜而卒。或言阎罗与东岳天子日遣使者，男女十万八千众，分布天下，作巫医，名勾魂使者。用药者不可不察也。</p></article>
