<h1>鞫药如</h1><p class="meta">聊斋志异卷十二 · [清] 蒲松龄</p>
<article class="story"><p>鞫药如，青州人，妻死，弃家而去。后数年，道服荷蒲团至，经宿欲去，戚族强留其衣，杖鞫托，閒步至村外，室中服具，皆冉冉飞出，随之而去。</p></article>
