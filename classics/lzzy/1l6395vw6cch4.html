<h1>蒋太史</h1><p class="meta">聊斋志异卷十六 · [清] 蒲松龄</p>
<article class="story"><p>蒋太史超记，前世为峨眉僧，数梦到故居庵前潭边濯足。为人笃嗜内典，一意台宗，虽早登禁林，尝有出世之想。假归江南，抵秦邮，不欲归。子哭挽之，弗听，遂入蜀，居成都金沙寺。久之，又之峨眉，居伏虎寺。示疾怛化，自书偈云：</p>
<p>翛然猿鹤自来亲，老衲无端堕业尘。妄向镬汤求避热，那从大海去翻身。</p>
<p>功名傀儡场中物，妻子骷髅队里人。只有君亲无报答，生生常自祝能仁。</p></article>
