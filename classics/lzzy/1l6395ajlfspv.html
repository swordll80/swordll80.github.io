<h1>红毛毡</h1><p class="meta">聊斋志异卷十二 · [清] 蒲松龄</p>
<article class="story"><p>红毛国旧许与中国相贸易，边帅见其人众，不听登岸。红毛人固请，但赐一毡地足矣。帅思一毡所容无几，许之。其人置毡岸上，仅容二人，扯之，容四五人，且扯且登，顷刻毡大亩许，已数百人矣。短刀并发，出于不意，被掠数里而去。</p></article>
