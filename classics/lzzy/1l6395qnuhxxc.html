<h1>真定女</h1><p class="meta">聊斋志异卷十五 · [清] 蒲松龄</p>
<article class="story"><p>真定界有孤女，方六七岁，收养于夫家，相居一二年，夫诱与交而孕，腹膨膨而以为病也，告之母，母曰：动否？</p>
<p>曰：动。又益异之，然以其齿太稚，不敢决。未几，生男，母叹曰：不图拳母，竟生锥儿。</p></article>
