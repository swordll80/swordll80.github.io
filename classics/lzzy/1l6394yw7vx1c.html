<h1>役鬼</h1><p class="meta">聊斋志异卷十 · [清] 蒲松龄</p>
<article class="story"><p>山西杨医，善针灸之术，又能役鬼。一出门，则捉驴操鞭者，皆鬼物也。尝夜自他归，与友人同行，途中见二人来，修伟异常，友人大骇，杨便问：何人？答云：长脚王、大头李，敬迓主人。杨曰：为前驱。二人旋踵而行，蹇缓则立候之，若奴隶然。</p></article>
