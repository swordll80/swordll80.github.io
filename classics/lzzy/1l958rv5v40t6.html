<h1>小人</h1><p class="meta">聊斋志异卷二 · [清] 蒲松龄</p>
<article class="story"><p>康熙间，有术人携一榼，榼中藏小人，长尺许，投以钱，则启榼令出，唱曲而退。至掖，掖宰索榼入署，细审小人出处，初不敢言，固诘之，始自述其乡族。盖读书童子，自塾中归，为术人所迷，复投以药，四体暴缩，彼遂携之，以为戏具。宰怒，杀术人，留童子，欲医之，尚未得其方也。</p></article>
