<h1>山神</h1><p class="meta">聊斋志异卷十一 · [清] 蒲松龄</p>
<article class="story"><p>益都李会斗，偶山行，值数人籍地饮，见李至，𬤰然并起，曳入座，竞觞之。</p>
<p>视其杯盘杂陈，珍错移时，饮甚欢，但酒味薄𬈧。忽迳有一人来，面狭长，可二三尺许，冠之高细称是。众惊曰：山神至矣。即都纷纷四去，李亦伏匿坎窞。既而起视则肴酒一无所有，惟有破陶器贮溲渤，瓦片上盛蜥蜴数枚而己。</p></article>
