<h1>鹰虎神</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>郡城东岳庙，在南郭大门左右。神高丈余，俗名鹰虎神，狰狞可畏。庙中道士任姓，每鸡鸣辄起焚诵。有偷儿预匿廊间，伺道士起，潜入寝室，搜括财物。奈室无长物，惟于荐底得钱三百，纳腰中，拔关而去。将登千佛山，南窜许时，方至山下，见一巨丈夫自山上来，左臂苍鹰，适与相遇，近视之，面铜青色，依稀似庙门中所习见者。大恐，蹲伏而战。神诧曰：盗钱安往？偷儿益惧，叩不已。神揪令还入庙，使倾所盗钱跪守之。道士课毕，回顾骇愕。盗历历自述。道士收其钱而遣之。</p></article>
