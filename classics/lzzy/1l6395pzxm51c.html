<h1>单父宰</h1><p class="meta">聊斋志异卷十五 · [清] 蒲松龄</p>
<article class="story"><p>青州民某，五旬余，继娶少妇，二子恐其复育，乘父醉，潜割𠬤丸而药糁之。父觉，托病不言。久之，创渐平，忽入室，刀缝绽裂，血溢不止，寻毙。妻知其故，讼于官。官械其子，果伏，骇曰：余今为单父宰矣。并诛之。邑有王生者，娶月余而出其妻，妻父讼之。时辛公宰淄，问：王何故出妻？答云：不可说。固诘之，曰：以其不能产育耳。公曰：妄哉！月余，新妇，何知不产？忸怩久之，告曰：其阴甚偏。公笑曰：是则偏之为害而家之所以不齐也。此可与单父宰并传一笑也。</p></article>
