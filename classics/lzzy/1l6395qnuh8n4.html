<h1>狐入瓶</h1><p class="meta">聊斋志异卷十五 · [清] 蒲松龄</p>
<article class="story"><p>万村石氏之妇，祟于狐，患之而不能遣。扉后有瓶，每闻妇翁来，狐辄遁匿其中。妇窥之熟，暗计而不言。一日窜入，妇急以絮塞其口，置釜中，燂汤而沸之。瓶热，狐呼曰：热甚，勿恶作剧。妇不语，号益急，久之无声，拔塞而验之，毛一堆，血数点而已。</p></article>
