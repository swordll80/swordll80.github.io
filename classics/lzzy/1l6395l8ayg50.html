<h1>快刀</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>明末，济属多盗，邑各置兵，捕得辄杀之。章邱盗多，有一兵佩刀甚利，杀辄导窾。一日，捕盗十余名，押赴市曹。</p>
<p>内一盗识兵，逡巡告曰：闻君刀甚快，斩首无二割，求杀我。兵曰：诺，其谨依我，勿离也。盗从至刑所，出刀挥之，豁然头落，数步之外，犹圆转而大。赞曰：好快刀！</p></article>
