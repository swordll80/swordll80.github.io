<h1>龙肉</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>姜太史玉璇言：龙堆之下，掘地数尺，有龙肉充牣其中，任人割取，但勿言龙字。或言此龙肉也，则霹雳震作，击人而死。太史曾食其肉，实不谬也。</p>
<p>聊斋志异卷十四终</p></article>
