<h1>小官人</h1><p class="meta">聊斋志异卷二 · [清] 蒲松龄</p>
<article class="story"><p>太史某公，忘其姓氏，昼卧斋中，忽有小卤簿出自堂陬，马大如蛙，人细如蚁，小仪仗以数十队，一官冠皂纱，著绣幞，乘肩舆，纷纷出门而去。公心异之，窃疑睡眼之讹，顿见一小人返入舍，携一毡包，大如拳，径造床下，白言：家主人有不腆之仪，敬献太史。言已对立，即又不陈其物。少间，又自笑曰：戋戋微物，想太史亦当无所用，不如赐小人。太史颔之，欣然携之而去。后不复见。惜太史中馁，不曾诘所自来。</p></article>
