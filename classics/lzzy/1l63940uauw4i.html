<h1>蛰龙</h1><p class="meta">聊斋志异卷四 · [清] 蒲松龄</p>
<article class="story"><p>于陆曲银台公读书楼上，值阴雨晦冥，见一小物，有光如萤，蠕蠕登几，过处辄黑如蛐迹，渐盘卷上，卷亦焦，意为龙，乃捧送之，至门外，持立良久，蠖曲不少动。公曰：将无谓我不恭？执卷返，仍置案上，冠带长揖，而后送之。方至檐下，但见昂首乍伸，离卷横飞，其声嗤然，光一道如缕。</p>
<p>数步外，回首向公，则头大于瓮，身数十围矣。又一折反，霹雳震惊，腾霄而去。回视所行处，盖曲曲自书笥中出焉。</p></article>
