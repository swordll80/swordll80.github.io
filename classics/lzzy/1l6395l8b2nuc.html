<h1>头滚</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>苏孝廉贞下封公，昼卧，见一人头从地中出，其大如斛，在床下旋转不已，惊而中疾，遂以不起。后其次公就荡妇宿，罹杀身之祸，其兆于此耶！</p></article>
