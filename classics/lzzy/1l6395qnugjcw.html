<h1>斫蟒</h1><p class="meta">聊斋志异卷十五 · [清] 蒲松龄</p>
<article class="story"><p>胡田村胡姓者，兄弟采樵，深入幽谷，遇巨蟒，兄在前为所吞。弟初骇欲奔，见兄被噬，遂奋怒出樵斧斫蟒首，首伤而吞不已。</p>
<p>然头虽已没而肩际不能下。弟急极无计，乃两手持兄足，力与蟒争，竟曳兄出，蟒亦负痛去。视兄则鼻耳俱化，奄将气尽，肩负以行，途中凡十余息，始至家医养，半年方愈，至今面目皆瘢痕，鼻耳处惟孔存焉。噫！农人中乃有弟弟如此者哉！或言蟒不为害，乃德义所感，信然。</p></article>
