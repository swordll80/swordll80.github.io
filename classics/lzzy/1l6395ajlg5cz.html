<h1>负尸</h1><p class="meta">聊斋志异卷十二 · [清] 蒲松龄</p>
<article class="story"><p>有樵人赴市，荷杖而归，忽觉杖头如有重负，回顾，见一无头人悬系其上，大惊，脱杖乱击之，即不复见。骇奔至一村，时已昏暮，有数人𦶟火照地，似有所寻。近讯之，盖众适坐，忽空中堕一人头，须发蓬松，倏忽已渺。樵人亦言所见，合之适成一人，而究不解其何来。后有人荷篮而行，或见其中有人头焉，讶而诘之，反顾始惊，倾诸地上，宛转而没。</p></article>
