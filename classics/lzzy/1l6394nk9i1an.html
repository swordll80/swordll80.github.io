<h1>禄数</h1><p class="meta">聊斋志异卷八 · [清] 蒲松龄</p>
<article class="story"><p>某显者，多为不道，夫人每以果报劝谏之，殊不听信。适有方士能知人禄数，诣之，方士熟视曰：君再食米二十石，面二十石，天禄乃终。归语夫人，计一人终年仅食面二石，尚有二十余年，天禄岂不善所能绝耶？横如故。逾年，忽病除，中食甚多而旋饥，一昼夜十余餐，未及周岁死矣。</p>
<p>聊斋志异卷八终</p></article>
