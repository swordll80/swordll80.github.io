<h1>彭二挣</h1><p class="meta">聊斋志异卷十一 · [清] 蒲松龄</p>
<article class="story"><p>禹城韩公甫，自言与邑人彭二挣并行于途，忽回首不见之，唯空蹇随行，但闻号甚急，细听则在被囊中。近视囊内累然，虽则偏重亦不得堕。欲出之则囊口缝纫甚密，以刀断线，始见彭犬卧其中。既出，问何以入亦茫不自知。盖其家有狐为祟，事如此类甚多云。</p></article>
