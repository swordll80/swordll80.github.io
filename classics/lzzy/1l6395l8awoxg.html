<h1>龁石</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>新城王钦文太翁家，有圉人王姓，幼入劳山学道，久之不火食，惟啖松子及白石，徧体生毛。既数年，念母老归里，渐复火食，犹啖石如故。向日视之，即知石之甘苦酸咸，如啖芋然。母死，复入山，今又十七八年矣。</p></article>
