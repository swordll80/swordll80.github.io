<h1>黑鬼</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>胶州李总镇，买二黑鬼，其黑如漆，足革粗厚，立刃为途，往来其上，毫无所损。总镇配以娼，生子而白。僚仆戏之，谓非其种。黑鬼亦自疑，因杀子，骨则尽黑，始悔之。公每令两鬼对舞，神情亦可观也。</p></article>
