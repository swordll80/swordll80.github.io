    .site-header {

      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(22px, 5vw, 72px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(16px);
    }
    .layout {
      width: min(1180px, calc(100% - 40px));
      min-height: calc(100vh - 96px);
      margin: 12px auto;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, .9);
      border-radius: 22px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .sidebar {
      padding: 20px 12px;
      border-right: 1px solid var(--line);
      background: rgba(248, 250, 253, .74);
      display: flex;
      flex-direction: column;
    }
    .sidebar-title {
      margin: 0 10px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .tree, .tree ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .tree ul {
      position: relative;
      margin-left: 16px;
      padding-left: 12px;
    }
    .tree ul::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 0;
      bottom: 12px;
      width: 1px;
      background: var(--line);
    }
    .tree-button {
      width: 100%;
      margin: 2px 0;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 0;
      border-radius: 10px;
      color: #344054;
      background: transparent;
      font: inherit;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: .18s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-button:hover { color: var(--accent); background: #f0f4fb; }
    .tree-button.active {
      color: var(--accent);
      font-weight: 650;
      background: var(--accent-soft, #eaf0ff);
    }
    .tree-button .arrow {
      font-size: 10px;
      color: var(--muted);
      transition: transform .2s;
      min-width: 14px;
      text-align: center;
      flex-shrink: 0;
    }
    .tree-button .arrow.open { transform: rotate(90deg); }
    .tree-button .name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .tree-button .count { color: var(--muted); font-size: 12px; flex-shrink: 0; }
    .content {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .content-header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.6);
      flex-shrink: 0;
    }
    .content-title { font-weight: 650; font-size: 15px; }
    .content-title .open-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      margin-left: 8px;
    }
    .content-title .open-link:hover { color: var(--accent); }
    .iframe-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
      background: var(--paper);
    }
    .iframe-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 8px;
    }
    .welcome .icon { font-size: 52px; opacity: .3; }
    .welcome p { font-size: 15px; }
    .source-bar {
      padding: 10px 28px 12px;
      color: var(--muted);
      font-size: 12px;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }
    .source-bar a { color: var(--accent); text-decoration: none; }
    .source-bar a:hover { text-decoration: underline; }
    @media (max-width: 768px) {
      .layout {
        width: min(100% - 22px, 600px);
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: calc(100vh - 96px);
      }
      .sidebar {
        padding: 12px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: 260px;
      }
      .sidebar-nav { max-height: 140px; }
      .content-header { padding: 12px 16px; }
      .source-bar { padding: 8px 16px; }
    }

  <script>
    const tree = document.getElementById('tree');
    const toolFrame = document.getElementById('toolFrame');
    const welcome = document.getElementById('welcome');
    const contentTitle = document.getElementById('contentTitle');
    const openLink = document.getElementById('openLink');
    let currentToolBtn = null;

    function setTool(url, title, btn) {
      contentTitle.innerHTML = title;
      openLink.href = url;
      openLink.hidden = false;
      welcome.hidden = true;
      toolFrame.hidden = false;
      toolFrame.src = url;
      if (currentToolBtn) currentToolBtn.classList.remove('active');
      currentToolBtn = btn;
      if (btn) btn.classList.add('active');
    }

    tree.addEventListener('click', (e) => {
      const toggleBtn = e.target.closest('[data-toggle]');
      const toolBtn = e.target.closest('[data-tool]');
      if (toolBtn) {
        setTool(toolBtn.dataset.url, toolBtn.dataset.title, toolBtn);
        return;
      }
      if (toggleBtn) {
        const id = toggleBtn.dataset.toggle;
        const ul = document.getElementById(id);
        const arrow = toggleBtn.querySelector('.arrow');
        const open = ul.hidden;
        ul.hidden = !open;
        if (arrow) arrow.classList.toggle('open', open);
      }
    });
  </script>
