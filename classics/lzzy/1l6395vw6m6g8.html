<h1>博兴女</h1><p class="meta">聊斋志异卷十六 · [清] 蒲松龄</p>
<article class="story"><p>博兴民王某有女及笄，势豪某窥其姿，伺女出掠去，无知者，至家逼淫，女号嘶撑拒，某缢杀之。门外故有深渊，遂以石系尸，沉诸其中。王觅女不得，计无所施。天忽雨，雷电绕其家，霹雳大作，龙下攫某首而去。未几，天晴，渊中女尸浮出，一手捉人头，审之则豪某也。官知，鞫其家人，始得其情。龙其女之所化与？何以能然也？奇哉！</p></article>
