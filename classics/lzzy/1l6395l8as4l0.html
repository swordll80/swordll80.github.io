<h1>沂水秀才</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>沂水某秀才，课业山中，夜有二美人入舍，笑不语，各以长袖拂榻，相将坐，衣软无声。</p>
<p>少间，一美人起，以白绫巾展几上，上有草书三四行，亦未审其何辞。一美人置白金铤，可三四两许，秀才掇内袖中。美人取巾，握手笑出，曰：俗不可耐。秀才扪金，则乌有矣。丽人在坐，投以芳泽。置不顾，而金是取，是乞儿相也，尚可耐哉！狐子可儿，雅态可想。</p></article>
