<h1>戏缢</h1><p class="meta">聊斋志异卷三 · [清] 蒲松龄</p>
<article class="story"><p>邑人某，佻达无赖，偶游村外，见少妇乘马来，谓同游者：我能令其一笑。众未深信，约赌作筵，某遽奔去，出马前，连声哗曰：我要死。因于墙头抽粱秸一本，横尺许，解带挂其上，引颈作缢状。</p>
<p>妇果过而哂之，众亦粲然。妇去既远，某犹不动，众益笑之，近视则舌出目暝，而气真绝矣。粱本自经，岂不奇哉！是可以为儇薄之戒。</p>
<p>聊斋志异卷三终</p></article>
