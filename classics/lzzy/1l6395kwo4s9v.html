<h1>五羖大夫</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>河津畅体元，字汝玉，为诸生时，梦人呼为五羖大夫，喜为佳兆。及遇流寇之乱，尽剥其衣，闭置空室。时冬月寒甚，暗中摸索，得数皮护体，仅不至死。质明视之，恰符五数。哑然自笑神之戏己也。后以明经授雒南知县。</p></article>
