<h1>铁布衫法</h1><p class="meta">聊斋志异卷十一 · [清] 蒲松龄</p>
<article class="story"><p>沙回子得铁布衫，大力法，骈其指，力斫之，可断牛项，横槊之，可洞牛腹。曾在仇公子、彭三家，悬木于空，遣两健仆极力撑去，猛反之，沙裸腹受木，碎然一声，木去远矣。又出其势，即石上以木椎力击之，无少损，但畏刀耳。</p></article>
