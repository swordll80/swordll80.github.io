<h1>孙必振</h1><p class="meta">聊斋志异卷十二 · [清] 蒲松龄</p>
<article class="story"><p>孙必振渡江，值大风雷，舟船荡摇，同舟大恐，忽见金甲神立云中，手持金字牌下示。诸人共仰视之，上书孙必振三字，甚真。众谓孙必振：汝有犯天谴，请自为一舟，勿相累。孙尚无言，众不待其肯可，视旁有小舟，共推置其上。孙既登舟，回视，则前舟覆矣。</p></article>
