<h1>三朝元老</h1><p class="meta">聊斋志异卷十 · [清] 蒲松龄</p>
<article class="story"><p>某中堂者，故明相也，曾降流寇，士论非之。老归林下，享堂落成，数人直宿其中。天明，见堂上一扁云：三朝元老。一联云：一二三四五六七，孝弟忠信礼义廉。不知何时所悬。怪之，不解其义。或测之云：首句隐忘八，次句隐无耻也。似之。</p>
<p>洪经略南征凯旋，至金陵，醮荐阵亡将士。有旧门人谒见拜己，即呈文艺。洪久厌文事，辞以昏眊。其人云：但烦坐听，容某颂达上闻。遂探袖出文，抗声朗读，乃故明思宗御制祭洪辽阳死难文也。读毕，大哭而去。</p></article>
