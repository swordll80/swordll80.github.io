<h1>张不量</h1><p class="meta">聊斋志异卷十二 · [清] 蒲松龄</p>
<article class="story"><p>贾人某，至直隶界，忽大雨雹，伏禾中，闻空中云：此张不量田，勿伤其稼。贾私念张氏何人？既云不良，何反祐护？既而雹止。贾行入村访之，果有其人，因告所见，且问取名之义。</p>
<p>盖张素封，积粟甚富，每春间，贫民皆就贷焉，偿时多寡不校，悉内之，未尝执概取盈，故乡人名之不量。众趋田中，见柄穗摧折如麻，独张氏诸田无恙。</p></article>
