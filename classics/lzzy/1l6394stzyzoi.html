<h1>梓潼令</h1><p class="meta">聊斋志异卷九 · [清] 蒲松龄</p>
<article class="story"><p>常进士大忠，太原人，候选在都。前一夜，梦文昌投刺拔签，得梓潼令，奇之。后丁艰归，服阕候补，又梦如前，默思：岂复任梓潼乎？已而果然。</p>
<p>聊斋志异卷九终</p></article>
