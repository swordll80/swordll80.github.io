<h1>钱流</h1><p class="meta">聊斋志异卷十 · [清] 蒲松龄</p>
<article class="story"><p>沂水刘宗玉，其仆杜和，偶在园中，见钱流如水，深广二三尺许。杜惊喜，以两手满掬，复偃卧其上。既而起视，则钱已尽去，惟握于手者尚存。</p></article>
