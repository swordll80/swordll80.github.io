<h1>车夫</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>有车夫载重登坡，方极力时，一狼来啮其臀，欲释手，则货敝身压，忍痛推之，既上，则狼已龁片肉而去，乘其不能为力之际，而窃尝一脔，亦黠而可笑也。</p></article>
