<h1>牛飞</h1><p class="meta">聊斋志异卷十四 · [清] 蒲松龄</p>
<article class="story"><p>邑人某，购一牛，颇健，夜梦牛生两翼飞去，以为不祥，疑有丧失，牵市口，损价售之，以巾裹金缠臂上。归至半途，见有鹰食残兔，近之甚驯，遂以巾头絷股臂之。鹰屡摆扑，把捉稍懈，带金腾去。某每谓定数不可逃，而不知不疑梦、不贪拾遗走者，何遽能飞哉？</p></article>
