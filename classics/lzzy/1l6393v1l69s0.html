<h1>李司鉴</h1><p class="meta">聊斋志异卷三 · [清] 蒲松龄</p>
<article class="story"><p>李司鉴，永年举人也，于康熙四年九月二十八日，打死其妻李氏，地方报官，上宪行县查审。司鉴在府前，忽于肉架下携一屠刀，奔入城隍庙，登戏台上，对神而跪。自言：神责我不当听信奸人，在乡党颠倒是非，著我割耳。</p>
<p>遂将左耳割落，抛台下。又言：神责我不应骗人银钱，著我刴指。遂将左指刴去。又言：神责我不当奸淫妇女，使我割肾。遂自阉，昏迷僵仆。时总督未云门题参，革褫究拟，已奉谕旨，而司鉴已伏冥诛矣。见邸抄。</p></article>
