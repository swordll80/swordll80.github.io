<h1>邑人</h1><p class="meta">聊斋志异卷十六 · [清] 蒲松龄</p>
<article class="story"><p>邑有乡人，素行无赖，一日晨起，有二人摄之去。至市头，见屠人以半猪悬架上，二人便极力推挤之，忽觉身与肉合，二人亦迳去。少间，屠人卖肉，操刀断割，遂觉一刀一痛，彻于骨髓。后有邻翁来市肉，苦争低昂，添脂搭肉，片片碎割，其苦更惨。肉尽，方寻途归。归时日已向辰，家人谓其晏起，乃细述所遭，呼邻问之则市肉方归，言其片数、斤数，毫发不爽，崇朝之间，已受凌迟一度，不亦奇哉！</p></article>
