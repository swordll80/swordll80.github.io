<h1>夜明</h1><p class="meta">聊斋志异卷十 · [清] 蒲松龄</p>
<article class="story"><p>有贾客泛于南海，三更时，舟中大亮似晓。起视，见一巨物，半身出水上，俨若山岳，目如两日初升，光四射，大地皆明。骇问舟人，并无知者，共伏瞻之，移时，渐缩入水，乃复晦。后至闽中，俱言某夜明而复昏，相传为异。计其时，则舟中见怪之夜也。</p></article>
