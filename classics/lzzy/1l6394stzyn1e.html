<h1>狮子</h1><p class="meta">聊斋志异卷九 · [清] 蒲松龄</p>
<article class="story"><p>暹逻贡狮，每止处，观者如堵，其形状与世传绣画者迥异。毛黑黄色，长数寸，或投以鸡，先以爪搏而吹之，一吹则毛尽落如扫，亦理之奇也。</p></article>
