<h1>美人首</h1><p class="meta">聊斋志异卷十一 · [清] 蒲松龄</p>
<article class="story"><p>诸商寓居京舍，舍与邻屋相连，中隔板壁，板有杉节，脱处，穴如盏。忽女子探首入，挽凤髻，绝美，旋伸一臂，洁白如玉。众骇其妖，欲捉，己缩去。少顷，又至，但隔壁不见其身，奔之则又去之。一商操刀伏壁下，俄首出，暴决之，应手而落，血溅尘土。众惊告主人，主人惧，以其首首焉。逮诸商鞫之，殊荒唐，淹系半年，迄无情词亦未有以人命讼者，乃释商。瘗女首。</p></article>
