<h1>张贡士</h1><p class="meta">聊斋志异卷十五 · [清] 蒲松龄</p>
<article class="story"><p>安邱张贡士，寝疾，仰卧床头，忽见心头有小人出，长仅半尺，儒冠儒服，作俳优状，唱昆山曲，音清彻，说白自道，名贯，一与己同。所唱节末皆其生平所遭。四折既毕，吟诗而没。张犹记其梗槪为人述之。高西园晤耜园先生，曾细询之，犹述其曲文，惜不能全忆。</p></article>
