<h1>诸城某甲</h1><p class="meta">聊斋志异卷三 · [清] 蒲松龄</p>
<article class="story"><p>学师孙景夏先生，言，其邑中某甲者，值流寇乱，被杀，首堕胸前。寇退，家人得尸，将舁瘗之，闻其气缕缕然，审视之，咽不断者盈指，遂扶其头，荷之以归，经一昼夜始呻，以七箸稍稍哺饮食，半年竟愈。又十余年，与二三人聚谈，或作一解颐语，众为𬮢堂，甲亦鼓掌。一俯仰间，刀痕暴裂，头坠血流，共视之，气已绝矣。父讼笑者，众，敛金赂之，又葬，甲乃解。异史氏曰：一笑头落，此千古第一大笑也。颈连一线而不死，直待十年后，成一笑狱，岂非二三邻人负债前生者耶？</p></article>
