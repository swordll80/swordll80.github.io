    /* ===== 日志窗口：错误自动弹出，不自动关闭，便于用户复制报错 ===== */

<body>
  <div id="map"></div>
  <div id="toolbar" class="panel">
    <button id="btnImport" onclick="openImport()" data-tip="importKml" >📂</button><button id="btnExport" onclick="exportKml()" data-tip="exportMergedKml">💾</button><button id="btnTrack" onclick="toggleTrackMode()" data-tip="drawTrack">✏️</button><button class="danger" onclick="clearAll()" data-role="clear" data-tip="clear">🗑️</button><button id="btnLocate" onclick="locateMe()" data-tip="locate"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/></svg></button>
	<button id="btnMapLock" onclick="toggleMapTouchLock()" data-tip="mapTouchLock">🔒</button><button id="btnHelp" onclick="showHelp()" data-tip="help">❓</button>
	<button id="btnDonate" class="donate-toolbar-btn" onclick="showDonate()" data-tip="donate">❤️</button><button onclick="undo()" id="btnUndo" data-tip="undo">↩️</button>
	<button onclick="redo()" id="btnRedo" data-tip="redo">↪️</button><button id="btnLang" class="lang-btn" onclick="toggleLang()" title="切换语言">中</button>
  </div>
  <div id="side" class="panel"><button id="sideToggle" type="button" onclick="toggleSidePanel(event)" title="显示/隐藏轨迹列表">◀</button><h1><span id="trackListTitleIcon" data-i18n="trackListLabel">🛤️...🛤️</span><span id="sideFileName" class="side-file-name"></span></h1><div id="stats"></div></div>

        var ib=(b.pointIndex!=null&&isFinite(Number(b.pointIndex)))?Number(b.pointIndex):999999;
        if(ia!==ib)return ia-ib;
        var qa=map.latLngToContainerPoint(a.marker.getLatLng());
        var qb=map.latLngToContainerPoint(b.marker.getLatLng());
        return (qa.y-qb.y)||(qa.x-qb.x);
      });

      var markerBoxes=[];
      var iconVisible={};
      var showAllIcons=isAtMaxMarkerZoom();
      for(var i=0;i<arr.length;i++){
        var cur=arr[i];
        var ok=true;
        var forceShow=isLineEndPointMarker(cur);
        if(!showAllIcons&&!forceShow){
          var box=estimateMarkerBox(cur);
          for(var j=0;j<markerBoxes.length;j++){
            if(boxesOverlap(box,markerBoxes[j])){ok=false;break;}
          }
          if(ok)markerBoxes.push(box);
        }else if(forceShow){
          // 轨迹首尾点用于定位线路边界，禁止被抽稀隐藏；
          // 同时把它们加入碰撞盒，避免普通采样点覆盖首尾点。
          var endBox=estimateMarkerBox(cur);
          if(endBox)markerBoxes.push(endBox);
        }
        if(ok||forceShow)iconVisible[cur.id]=true;
      }
      for(var m=0;m<objects.length;m++)setMarkerIconVisible(objects[m],!!iconVisible[objects[m].id]);

      if(map.getZoom()<LABEL_MIN_ZOOM){
        for(var h=0;h<objects.length;h++)setMarkerLabelVisible(objects[h],false);
        return;
      }
      var labelBoxes=[];
      var labelVisible={};
      for(var k=0;k<arr.length;k++){
        var o=arr[k];
        if(!iconVisible[o.id])continue;
        var lb=estimateLabelBox(o);
        var labelOk=true;
        for(var n=0;n<labelBoxes.length;n++){
          if(boxesOverlap(lb,labelBoxes[n])){labelOk=false;break;}
        }
        if(labelOk){labelBoxes.push(lb);labelVisible[o.id]=true;}
      }
      for(var t=0;t<objects.length;t++)setMarkerLabelVisible(objects[t],!!labelVisible[objects[t].id]);
    }

    function showDonate(){finishAndExitTrackMode(true);var m=document.getElementById('donateMask');document.getElementById('qrImg').src=_ensureDonateQr();m.style.display='flex';}
    function closeDonate(){document.getElementById('donateMask').style.display='none';}

    // -- map events --
    map.on('mousemove',function(e){setCoordStatus(e.latlng);checkSpiderfyCollapse(e);});
    map.on('zoomend',function(){setZoomStatus();updateAllMarkerLabels();});
    map.on('moveend resize',function(){setScaleStatus();updateAllMarkerLabels();});
    setScaleStatus();
    map.on('click',function(e){
      // 点击轨迹线时，Leaflet 有时仍会触发 map.click。这里识别轨迹线点击标记，避免清掉高亮。
      if(e&&e.originalEvent&&e.originalEvent._yfxLineClicked)return;
      if(mode==='track'){
        L.DomEvent.preventDefault(e.originalEvent);
        if(clickTimer)clearTimeout(clickTimer);
        clickTimer=setTimeout(function(){clickTimer=null;if(drawingLine.length===0)pushHistory();drawingLine.push({lat:e.latlng.lat,lng:e.latlng.lng});redrawDrawingLine();},280);
        return;
      }
      deselectLine();
    });
    map.on('dblclick',function(e){if(mode==='track'){if(e&&e.originalEvent){L.DomEvent.preventDefault(e.originalEvent);L.DomEvent.stopPropagation(e.originalEvent);}if(clickTimer){clearTimeout(clickTimer);clickTimer=null;}return;}});
    map.on('contextmenu',function(e){if(mode==='track'){L.DomEvent.preventDefault(e.originalEvent);if(clickTimer){clearTimeout(clickTimer);clickTimer=null;}finishAndExitTrackMode(true);}});

    function normalizeLinePointTypes(line,objStartIdx){var lineObjs=[];objStartIdx=objStartIdx||0;for(var i=objStartIdx;i<objects.length;i++){var o=objects[i];if(o.lineId!=null&&o.lineId!==line.id)continue;var p=o.marker.getLatLng();for(var j=0;j<line.points.length;j++){if(Math.abs(p.lat-line.points[j].lat)<.00001&&Math.abs(p.lng-line.points[j].lng)<.00001){lineObjs.push(o);break;}}}if(lineObjs.length===0)return;for(var x=0;x<lineObjs.length;x++)lineObjs[x].lineId=line.id;var minObj=null,maxObj=null;for(var k=0;k<lineObjs.length;k++){var ok=lineObjs[k];if(ok.time==null)continue;if(minObj==null||ok.time<minObj.time)minObj=ok;if(maxObj==null||ok.time>maxObj.time)maxObj=ok;}if(minObj==null||maxObj==null)return;var minT=minObj.time,maxT=maxObj.time,changed=false;for(var m=0;m<lineObjs.length;m++){var om=lineObjs[m],nt;if(om===minObj)nt='ptStart';else if(om===maxObj)nt='ptEnd';else{nt='ptMiddle';if(om.time!=null&&(om.time<minT||om.time>maxT)){om.time=null;changed=true;}}if(om.ptype!==nt){om.ptype=nt;changed=true;}}if(changed){for(var n=0;n<lineObjs.length;n++){updatePopup(lineObjs[n]);updateMarkerLabel(lineObjs[n]);}updateStats();}}
    function fmtDuration(sec){return fmtDurationHHMM(sec);}
    function fmtDurationHHMM(sec){if(sec<=0)return'-';var h=Math.floor(sec/3600),m=Math.floor(sec/60)%60;function z(n){return n<10?'0'+n:String(n);}return z(h)+':'+z(m);}

    function autoSegmentName(segmentNo){return (lang==='en'?'Segment ':'分段')+(segmentNo||1);}
    function displayLineName(line){if(line&&line.autoLineName&&line.autoSegmentNo)return autoSegmentName(line.autoSegmentNo);return (line&&line.name)||'';}
    function localizeAutoLineNames(){for(var i=0;i<lines.length;i++){var ln=lines[i];if(ln&&ln.autoLineName&&ln.autoSegmentNo){ln.name=autoSegmentName(ln.autoSegmentNo);bindLinePopup(ln);}}}

    function setLineVisualSelected(line,selected){
      if(!line||!line.polyline)return;
      if(selected){
        // 先把透明粗命中线提到前面，再把真实可见轨迹线提到最前面。
        // 这样既保留较宽的鼠标选中范围，又不会让透明线遮住高亮显示。
        if(line.hitPolyline&&line.hitPolyline.bringToFront)line.hitPolyline.bringToFront();
        line.polyline.setStyle({color:'#4aa3ff',weight:7,opacity:1,className:'track-line selected'});
        if(line.polyline.bringToFront)line.polyline.bringToFront();
        if(line.polyline._path){
          line.polyline._path.classList.add('selected');
          line.polyline._path.style.stroke='#4aa3ff';
          line.polyline._path.style.strokeWidth='7';
          line.polyline._path.style.opacity='1';
        }
      }else{
        line.polyline.setStyle({color:line.color,weight:4,opacity:.9,className:'track-line'});
        if(line.polyline._path){
          line.polyline._path.classList.remove('selected');
          line.polyline._path.style.stroke=line.color;
          line.polyline._path.style.strokeWidth='4';
          line.polyline._path.style.opacity='.9';
        }
        if(line.hitPolyline)line.hitPolyline.setStyle({weight:18,opacity:0});
      }
    }

    // 列表选中轨迹时，如果整条轨迹完全不在当前可见范围内，才移动地图。
    // 注意：只平移中心点，不改变缩放级别；地图上鼠标点击轨迹时不调用此逻辑。
    function isLineCompletelyOutsideView(line){
      if(!line||!line.polyline)return false;
      try{
        var lb=line.polyline.getBounds();
        var mb=map.getBounds();
        if(!lb||!lb.isValid||!lb.isValid())return false;
        if(!mb||!mb.isValid||!mb.isValid())return false;
        return !mb.intersects(lb);
      }catch(e){
        return false;
      }
    }
    function getLineMiddleLatLng(line){
      var pts=(line&&line.points)||[];
      if(pts.length>0){
        var mid=pts[Math.floor(pts.length/2)];
        if(mid&&isFinite(+mid.lat)&&isFinite(+mid.lng))return L.latLng(+mid.lat,+mid.lng);
      }
      try{
        var b=line.polyline.getBounds();
        if(b&&b.isValid&&b.isValid())return b.getCenter();
      }catch(e){}
      return null;
    }
    function panToLineMiddleIfOutside(line){
      if(!isLineCompletelyOutsideView(line))return;
      var c=getLineMiddleLatLng(line);
      if(!c)return;
      map.panTo(c,{animate:false});
      if(typeof logInfo==='function')logInfo('列表选中轨迹不在可见范围内，地图平移到轨迹中点：'+line.name);
    }

    function selectLine(line,latlng,multi,source){
      if(multi){
        if(selectedLines.has(line)){
          selectedLines.delete(line);
          setLineVisualSelected(line,false);
          line.polyline.closePopup();
        }else{
          selectedLines.add(line);
          setLineVisualSelected(line,true);
          bindLinePopup(line);
          if(latlng)line.polyline.openPopup(latlng);else line.polyline.openPopup();
        }
        highlightSelectedRows();
        return;
      }

      selectedLines.forEach(function(sl){
        if(sl!==line)setLineVisualSelected(sl,false);
        if(sl!==line)sl.polyline.closePopup();
      });
      selectedLines.clear();
      selectedLines.add(line);
      setLineVisualSelected(line,true);
      line.polyline.closePopup();
      highlightSelectedRows();
      // V16：只有从左侧轨迹列表选中，且轨迹完全不在可见范围内时，才平移地图。
      // 鼠标在地图上点选轨迹时 source 为 map，不移动地图、不改变缩放。
      // V8：轨迹列表单击只选中并显示信息框，不再自动移动地图；双击时再飞到轨迹。
      showLineInfoDialog(line);
    }

    // 历史兼容函数：V13 起选中轨迹不再自动调整地图视图。
    function fitLineUpperHalf(line,done){
      if(!line||!line.polyline){if(done)done();return;}
      try{
        var b=line.polyline.getBounds();
        if(!b||!b.isValid||!b.isValid()){if(done)done();return;}
        var size=map.getSize();
        var bottomPad=Math.max(240,Math.floor(size.y*0.52));
        var called=false;
        var finish=function(){
          if(called)return;
          called=true;
          if(done)done();
        };
        map.once('moveend',finish);
        map.fitBounds(b,{
          paddingTopLeft:[60,40],
          paddingBottomRight:[60,bottomPad],
          maxZoom:16,
          animate:false
        });
        setTimeout(finish,80);
      }catch(e){
        if(done)done();
      }
    }

    function getLineInfoLayout(){
      var vw=window.innerWidth||document.documentElement.clientWidth||800;
      var vh=window.innerHeight||document.documentElement.clientHeight||600;
      var portrait=vh>=vw;
      var mobile=vw<=760 || ('ontouchstart' in window && vw<=900);
      var layout={width:520,maxWidth:'calc(100vw - 24px)',maxHeight:Math.max(210,Math.round(vh*0.50)),chartHeight:170,mode:'desktop'};
      if(mobile&&portrait){
        // 手机竖屏：右侧紧凑显示，减少遮挡地图和左下轨迹列表。
        layout.width=Math.max(220,Math.min(300,Math.round(vw*0.64)));
        layout.maxWidth='calc(100vw - 64px)';
        layout.maxHeight=Math.max(175,Math.round(vh*0.36));
        layout.chartHeight=Math.max(76,Math.min(108,Math.round(vh*0.12)));
        layout.mode='mobile-portrait';
      }else if(mobile){
        // 手机横屏：右中紧凑显示，保留更多地图区域。
        layout.width=Math.max(300,Math.min(390,Math.round(vw*0.38)));
        layout.maxWidth='calc(100vw - 24px)';
        layout.maxHeight=Math.max(175,Math.round(vh*0.56));
        layout.chartHeight=Math.max(76,Math.min(120,Math.round(vh*0.18)));
        layout.mode='mobile-landscape';
      }else if(vw<1100){
        layout.width=Math.max(390,Math.min(500,Math.round(vw*0.40)));
        layout.maxHeight=Math.max(220,Math.round(vh*0.50));
        layout.chartHeight=150;
        layout.mode='narrow-desktop';
      }else{
        layout.width=Math.min(520,Math.round(vw*0.32));
        layout.maxHeight=Math.max(250,Math.round(vh*0.52));
        layout.chartHeight=170;
      }
      return layout;
    }

    function applyLineInfoLayout(){

    function clampLineInfoPos(left,top,dlgW,dlgH){
      var vw=window.innerWidth||document.documentElement.clientWidth||800;
      var vh=window.innerHeight||document.documentElement.clientHeight||600;
      var margin=10;
      return {
        left:Math.round(Math.max(margin,Math.min(left,vw-dlgW-margin))),
        top:Math.round(Math.max(margin,Math.min(top,vh-dlgH-36)))
      };
    }

    function defaultLineInfoPos(dlgW,dlgH){
      var vw=window.innerWidth||document.documentElement.clientWidth||800;
      var vh=window.innerHeight||document.documentElement.clientHeight||600;
      var margin=10,gap=8;
      var left=vw-dlgW-margin;
      var layer=document.getElementById('layerBox');
      var top;
      if(layer){
        var lr=layer.getBoundingClientRect();
        // V8：默认让轨迹信息框下边沿尽量贴近右下角地图切换框上边沿。
        top=lr.top-dlgH-gap;
      }else{
        top=Math.round((vh-dlgH)/2);
      }
      // 如果窗口太矮导致放不下，再回退到右侧中部。
      if(top<margin)top=Math.round((vh-dlgH)/2);
      return clampLineInfoPos(left,top,dlgW,dlgH);
    }

    function placeLineInfoDialog(line,keepLastPos){

    function enableLineInfoDialogDrag(){
      var dlg=document.getElementById('dialog');
      var header=document.getElementById('lineInfoTitle');
      if(!dlg||!header)return;
      header.style.cursor='move';
      header.style.touchAction='none';
      header.style.userSelect='none';
      header.style.webkitUserSelect='none';
      var dragging=false,startX=0,startY=0,startLeft=0,startTop=0;
      function pointFromEvent(e){
        if(e&&e.touches&&e.touches.length)return {x:e.touches[0].clientX,y:e.touches[0].clientY};
        if(e&&e.changedTouches&&e.changedTouches.length)return {x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
        return {x:e.clientX,y:e.clientY};
      }
      function beginDrag(e){
        if(e&&e.type==='mousedown'&&e.button!==0)return;
        if(e&&e.preventDefault)e.preventDefault();
        dragging=true;
        var p=pointFromEvent(e);
        startX=p.x;startY=p.y;
        var r=dlg.getBoundingClientRect();
        startLeft=r.left;startTop=r.top;
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp,{once:true});
        document.addEventListener('touchmove',onMove,{passive:false});
        document.addEventListener('touchend',onUp,{once:true});
        document.addEventListener('touchcancel',onUp,{once:true});
      }
      function onMove(e){
        if(!dragging)return;
        if(e&&e.preventDefault)e.preventDefault();
        var p=pointFromEvent(e);
        var r=dlg.getBoundingClientRect();
        var left=startLeft+(p.x-startX);
        var top=startTop+(p.y-startY);
        left=Math.max(0,Math.min(left,window.innerWidth-r.width));
        top=Math.max(0,Math.min(top,window.innerHeight-r.height));
        dlg.style.left=Math.round(left)+'px';
        dlg.style.top=Math.round(top)+'px';
      }
      function onUp(e){
        if(!dragging)return;
        dragging=false;
        var r=dlg.getBoundingClientRect();
        lineInfoDialogLastPos={left:Math.round(r.left),top:Math.round(r.top)};
        lineInfoDialogUserMoved=true;
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('touchmove',onMove);
      }
      header.onmousedown=beginDrag;
      header.ontouchstart=beginDrag;
    }

    function altitudeRangeSummary(line){
      if(!line||!line.points)return '';
      var minAlt=null,maxAlt=null;
      for(var i=0;i<line.points.length;i++){
        var a=line.points[i].alt;
        if(a==null)continue;
        a=+a;
        if(!isFinite(a))continue;
        if(minAlt===null||a<minAlt)minAlt=a;
        if(maxAlt===null||a>maxAlt)maxAlt=a;
      }
      if(minAlt===null||maxAlt===null)return '';
      if(Math.round(minAlt)===Math.round(maxAlt))return Math.round(minAlt)+' m';
      return Math.round(minAlt)+'-'+Math.round(maxAlt)+' m';
    }

    function buildLineDistanceTable(line){
      var pts=[];
      if(!line||!line.points)return pts;
      var total=0;
      for(var i=0;i<line.points.length;i++){
        var p=line.points[i];
        if(!p||!isFinite(Number(p.lat))||!isFinite(Number(p.lng)))continue;
        var item={lat:Number(p.lat),lng:Number(p.lng),dist:total};
        if(pts.length){
          var prev=pts[pts.length-1];
          total+=distanceMeters(prev.lat,prev.lng,item.lat,item.lng);
          item.dist=total;
        }
        pts.push(item);
      }
      return pts;
    }

    function pointOnDistanceTable(pts,targetDist){
      if(!pts.length)return null;
      if(pts.length===1)return L.latLng(pts[0].lat,pts[0].lng);
      if(targetDist<=0)return L.latLng(pts[0].lat,pts[0].lng);
      var total=pts[pts.length-1].dist;
      if(targetDist>=total)return L.latLng(pts[pts.length-1].lat,pts[pts.length-1].lng);
      for(var i=1;i<pts.length;i++){
        if(pts[i].dist>=targetDist){
          var a=pts[i-1],b=pts[i];
          var span=b.dist-a.dist;
          var t=span>0?(targetDist-a.dist)/span:0;
          return L.latLng(a.lat+(b.lat-a.lat)*t,a.lng+(b.lng-a.lng)*t);
        }
      }
      return L.latLng(pts[pts.length-1].lat,pts[pts.length-1].lng);
    }

        stopRunner();
        return;
      }
      playRunnerOnLine(dlgLineTarget,speedMps,label||'🏃');
    }

    function calcRunnerDurationMs(totalMeters,speedMps){
      var total=Number(totalMeters)||0;
      var speed=Number(speedMps)||1000;
      if(total<=0)return 1000;
      if(speed<=0)speed=1000;
      // 固定速度播放：单人 1 km/s，双人 2 km/s；任何线路至少播放 1 秒。
      var ms=total/speed*1000;
      if(ms<1000)ms=1000;
      return Math.round(ms);
    }

    function getDistanceTableBounds(pts){
      if(!pts||!pts.length)return null;
      var arr=[];
      for(var i=0;i<pts.length;i++)arr.push([pts[i].lat,pts[i].lng]);
      try{return L.latLngBounds(arr);}catch(e){return null;}
    }

    function shouldRunnerFollowLine(pts){
      if(!map||!pts||pts.length<2)return false;
      var b=getDistanceTableBounds(pts);
      if(!b||!b.isValid||!b.isValid())return false;
      try{
        // 只判断当前地图实际可视经纬度范围，不改变缩放比例。
        // 轨迹已经完整显示时，小人只移动；轨迹没有完整显示时，地图跟随小人平移。
        return !map.getBounds().contains(b);
      }catch(e){
        return false;
      }
    }

    function followRunnerPosition(pos,force){
      if(!runnerFollowMap||!pos||!map)return;
      var now=Date.now();
      if(!force&&runnerLastPanTime&&now-runnerLastPanTime<90)return;
      runnerLastPanTime=now;
      try{
        map.panTo(pos,{animate:false,noMoveStart:true});
      }catch(e){
        try{map.setView(pos,map.getZoom(),{animate:false});}catch(_e){}
      }
    }

    function playRunnerOnLine(line,speedMps,label){
      stopRunner();
      var pts=buildLineDistanceTable(line);
      if(pts.length<2){
        toast(lang==='en'?'Not enough track points':'轨迹点不足，无法播放');
        return;
      }
      var total=pts[pts.length-1].dist;
      if(total<=0){
        toast(lang==='en'?'Track distance is too short':'轨迹距离太短，无法播放');
        return;
      }
      runnerSpeedMps=Number(speedMps)||1000;
      runnerDurationMs=calcRunnerDurationMs(total,runnerSpeedMps);
      runnerActiveLine=line;
      runnerFollowMap=shouldRunnerFollowLine(pts);
      runnerLastPanTime=0;
      runnerMarker=L.marker([pts[0].lat,pts[0].lng],{icon:runnerIcon(label||'🏃'),interactive:false,zIndexOffset:1200}).addTo(map);
      runnerStartTime=performance&&performance.now?performance.now():Date.now();
      if(runnerFollowMap)followRunnerPosition(L.latLng(pts[0].lat,pts[0].lng),true);
      function step(now){
        if(runnerActiveLine!==line||!runnerMarker)return;
        now=now||(performance&&performance.now?performance.now():Date.now());
        var ratio=(now-runnerStartTime)/runnerDurationMs;
        if(ratio<0)ratio=0;
        if(ratio>1)ratio=1;
        var pos=pointOnDistanceTable(pts,total*ratio);
        if(pos){
          runnerMarker.setLatLng(pos);
          followRunnerPosition(pos,ratio>=1);
        }
        if(ratio<1){
          runnerAnimFrame=requestAnimationFrame(step);
        }else{
          runnerAnimFrame=0;
          setTimeout(function(){
            if(runnerActiveLine===line)stopRunner();
          },450);
        }
      }
      runnerAnimFrame=requestAnimationFrame(step);
    }

    function drawElevationChart(line){
      var canvas=document.getElementById('elevationCanvas');
      var hint=document.getElementById('elevationHint');
      if(!canvas)return;
      var ctx=canvas.getContext('2d');
      var w=canvas.width,h=canvas.height;
      ctx.clearRect(0,0,w,h);
      ctx.fillStyle='#101820';
      ctx.fillRect(0,0,w,h);

      var pts=[];
      for(var i=0;i<line.points.length;i++){
        var a=line.points[i].alt;
        if(a==null)continue;
        a=+a;
        if(isFinite(a))pts.push({idx:i+1,alt:a});
      }
      if(pts.length<2){
        ctx.fillStyle='#9aa8b5';
        ctx.font='14px Consolas, Microsoft YaHei, sans-serif';
        ctx.fillText(tr('notEnoughAltitude'),24,42);
        if(hint)hint.textContent='';
        return;
      }

      var left=54,right=16,top=18,bottom=36;
      var minAlt=pts[0].alt,maxAlt=pts[0].alt;
      for(var j=1;j<pts.length;j++){if(pts[j].alt<minAlt)minAlt=pts[j].alt;if(pts[j].alt>maxAlt)maxAlt=pts[j].alt;}
      if(maxAlt===minAlt){maxAlt+=1;minAlt-=1;}
      var pad=(maxAlt-minAlt)*0.08;
      minAlt-=pad;maxAlt+=pad;
      var minIdx=1,maxIdx=line.points.length;
      function xOf(idx){return left+(idx-minIdx)/(maxIdx-minIdx||1)*(w-left-right);}
      function yOf(alt){return top+(maxAlt-alt)/(maxAlt-minAlt)*(h-top-bottom);}

      ctx.strokeStyle='rgba(255,255,255,.18)';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(left,top);ctx.lineTo(left,h-bottom);ctx.lineTo(w-right,h-bottom);ctx.stroke();

      ctx.fillStyle='#9aa8b5';
      ctx.font='11px Consolas, Microsoft YaHei, sans-serif';
      for(var gy=0;gy<=4;gy++){
        var alt=minAlt+(maxAlt-minAlt)*gy/4;
        var y=yOf(alt);
        ctx.strokeStyle='rgba(255,255,255,.08)';
        ctx.beginPath();ctx.moveTo(left,y);ctx.lineTo(w-right,y);ctx.stroke();
        ctx.fillText(Math.round(alt)+'m',6,y+4);
      }
      for(var gx=0;gx<=4;gx++){
        var idx=Math.round(minIdx+(maxIdx-minIdx)*gx/4);
        var x=xOf(idx);
        ctx.strokeStyle='rgba(255,255,255,.06)';
        ctx.beginPath();ctx.moveTo(x,top);ctx.lineTo(x,h-bottom);ctx.stroke();
        ctx.fillText(String(idx),x-10,h-12);
      }

      ctx.strokeStyle='#ffd23f';
      ctx.lineWidth=2;
      ctx.beginPath();
      for(var k=0;k<pts.length;k++){
        var px=xOf(pts[k].idx),py=yOf(pts[k].alt);
        if(k===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.stroke();

      ctx.fillStyle='#c9d3dc';
      ctx.fillText('X: '+tr('linePts')+' / Y: '+tr('altitude'),left,12);
      // 海拔范围已移到轨迹信息摘要行显示；这里不再显示有效海拔点数量，减少信息框占用。
      if(hint)hint.textContent='';
    }

    function isKmlFile(f){return !!(f&&f.name&&/\.kml$/i.test(f.name));}
    function handleFiles(files){if(!files||!files.length)return;var arr=[];for(var fi=0;fi<files.length;fi++){if(isKmlFile(files[fi]))arr.push(files[fi]);else logWarn('非 KML 文件已跳过：'+(files[fi]&&files[fi].name?files[fi].name:'unknown'));}if(!arr.length){toast('请选择 .kml 文件');return;}logInfo('开始导入 KML 文件，数量：'+arr.length);pushHistory();importKmlDuplicateLineSkipped=0;var totalAdded=0,skipped=0,i=0,names=[];function next(){if(i>=arr.length){var old=document.getElementById('fileInput');if(old)old.value='';setFileStatusText(names);updateSideFileTitle();var msg=tr('imported')+'：'+totalAdded;if(skipped>0)msg+='，'+tr('skipped')+' '+tr('duplicate')+'：'+skipped;toast(msg);fitData();return;}var f=arr[i++];var r=new FileReader();r.onload=function(e){try{var beforeSkip=importKmlDuplicateLineSkipped;var added=importKmlText(e.target.result,f.name);var newSkipped=importKmlDuplicateLineSkipped-beforeSkip;if(newSkipped>0){skipped+=newSkipped;logWarn('跳过重复轨迹段：'+f.name+'，数量：'+newSkipped);}logInfo('导入完成：'+f.name+'，新增对象/轨迹数量：'+added);totalAdded+=added;if(names.indexOf(f.name)<0)names.push(f.name);if(importedFilePaths.indexOf(f.name)<0)importedFilePaths.push(f.name);}catch(err){console.error('KML 导入失败：'+f.name, err);toast(tr('importFailed')+'：'+f.name);}next();};r.onerror=function(){logError('读取文件失败：'+f.name);toast('读取文件失败：'+f.name);next();};r.readAsText(f,'utf-8');}next();}
    /*
     * KML 兼容导入/导出层
     * ------------------------------------------------------------
     * 对 C/C++ 开发人员可以这样理解：
     *   1. DOMParser 负责把 XML 解析成树；
     *   2. importKmlText() 是“反序列化入口”；
     *   3. buildKmlString() 是“序列化入口”；
     *   4. 内部统一使用本程序的数据模型：
     *        line.points[] = { lat, lng, alt?, time? }
     *        object.marker = Leaflet Marker，附带 alt/time/lineId 等元数据。
     *
     * 兼容的 KML 写法：
     *   - <LineString><coordinates>lng,lat,alt ...</coordinates></LineString>
     *   - <gx:Track><when>...</when><gx:coord>lng lat alt</gx:coord></gx:Track>
     *   - <Placemark id="realPoint"><ExtendedData>...</ExtendedData><Point>...</Point></Placemark>
     *   - 普通 <Placemark><Point>...</Point></Placemark>
     *   - 经纬度/海拔/时间也会从 description 的中文字段中兜底提取。
     */
    function importKmlText(text, source) {
      var doc = new DOMParser().parseFromString(text, 'application/xml');
      if (doc.getElementsByTagName('parsererror').length) {
        throw new Error('KML XML parse error');
      }

      var fileBase = baseName(source) || 'KML';
      // Tbulu 等 KML 的路线总名存放在 /kml/Document/name。
      // 本工具导入时优先使用 Document/name 作为总路线名，无名称轨迹分段统一命名为：分段1、分段2...；已有分段名称则保留
      var documentRouteName = getKmlDocumentName(doc) || fileBase;
      var segmentCounter = { value: 0 };
      var prevLineCount = lines.length;
      var prevObjCount = objects.length;
      var addedObjects = 0;
      var importedPathLines = [];
      var placemarks = toArray(doc.getElementsByTagName('Placemark'));

      // 先把所有 realPoint 的时间做成坐标索引，用于给 LineString 补时间。
      var timeIndex = collectRealPointTimeIndex(placemarks);
      // 记录首尾 realPoint，用于过滤与真实采样点完全重合的 startPoint/endPoint。
      var realEndpoints = collectRealPointEndpoints(placemarks);

      // 第一阶段：导入所有轨迹线。轨迹线是主数据，标记点再挂到最近的轨迹线上。
      for (var i = 0; i < placemarks.length; i++) {
        importPlacemarkLines(placemarks[i], documentRouteName, source, timeIndex, importedPathLines, segmentCounter);
      }

      // v0.36：不再把单分段轨迹自动改成文件/路线名前缀；无名称时按当前语言显示自动分段名。

      // 第二阶段：导入标记点/轨迹采样点。
      for (var j = 0; j < placemarks.length; j++) {
        addedObjects += importPlacemarkPoint(placemarks[j], source, importedPathLines, fileBase, realEndpoints);
      }

      // 兜底：有些 KML 只有裸 coordinates，没有标准 Placemark/LineString 包装。
      if (importedPathLines.length === 0 && addedObjects === 0) {
        var allCoords = parseCoordList(textOf(doc, 'coordinates'));
        if (allCoords.length >= 2) {
          var fallbackSegNo = segmentCounter.value + 1;
          var line = addImportedLine(documentRouteName || fileBase || 'KML Line', fallbackSegNo, allCoords, source, importedPathLines, '');
          if (line) segmentCounter.value = fallbackSegNo;
        }
      }

      // 如果只有轨迹线没有标记点，不强行给每个 GPS 点生成 Marker，避免大轨迹文件导入后卡顿。
      for (var ln = prevLineCount; ln < lines.length; ln++) {
        normalizeLinePointTypes(lines[ln], prevObjCount);
      }
      updateStats();
      updateAllMarkerLabels();

      // 返回“新增实体数量”：轨迹线 + 标记点。
      return (lines.length - prevLineCount) + addedObjects;
    }

    function importPlacemarkLines(pm, routeName, source, timeIndex, importedPathLines, segmentCounter) {
      var lineStrings = descendantsByLocalName(pm, 'LineString');
      var gxTracks = descendantsByLocalName(pm, 'Track');
      var pmName = cleanImportedSegmentName(textOf(pm, 'name'));

      for (var i = 0; i < lineStrings.length; i++) {
        var pts = parseCoordList(textOf(lineStrings[i], 'coordinates'));
        if (pts.length < 2) continue;
        applyIndexedTimes(pts, timeIndex);
        var nextSegNo = segmentCounter.value + 1;
        if (addImportedLine(routeName, nextSegNo, pts, source, importedPathLines, pmName)) segmentCounter.value = nextSegNo;
      }

      for (var j = 0; j < gxTracks.length; j++) {
        var trackPts = parseGxTrack(gxTracks[j]);
        if (trackPts.length < 2) continue;
        applyIndexedTimes(trackPts, timeIndex);
        var nextTrackSegNo = segmentCounter.value + 1;
        if (addImportedLine(routeName, nextTrackSegNo, trackPts, source, importedPathLines, pmName)) segmentCounter.value = nextTrackSegNo;
      }
    }

    function addImportedLine(base, segmentNo, pts, source, importedPathLines, explicitName) {
      var dupLine = findDuplicateTrackLine(pts);
      if (dupLine) {
        importKmlDuplicateLineSkipped++;
        importedPathLines.push({ id: dupLine.id, points: dupLine.points, duplicate: true });
        logWarn('跳过重复轨迹段：' + (explicitName || autoSegmentName(segmentNo || 1) || source || 'track'));
        return null;
      }
      var finalName = explicitName ? uniqueLineNameWithoutSuffix(explicitName, null) : uniqueImportedSegmentName(base || 'KML Line', segmentNo);
      var line = addLine({
        name: finalName,
        color: '#ffd23f',
        points: pts,
        startIcon: '',
        endIcon: '',
        autoLineName: !explicitName,
        autoSegmentNo: explicitName ? 0 : segmentNo
      }, true);
      line._importedFile = source;
      importedPathLines.push({ id: line.id, points: line.points });
      return line;
    }

    function importPlacemarkPoint(pm, source, importedPathLines, fileBase, realEndpoints) {
      var pointNode = descendantsByLocalName(pm, 'Point')[0];
      if (!pointNode) return 0;

      var ext = readExtendedData(pm);
      var descInfo = parseDescriptionInfo(textOf(pm, 'description'));
      var coord = parseFirstCoordinate(textOf(pointNode, 'coordinates'));

      // 优先级：ExtendedData > Point 坐标 > description 兜底。
      var lat = firstFinite(ext.lat, coord ? coord.lat : null, descInfo.lat);
      var lng = firstFinite(ext.lng, coord ? coord.lng : null, descInfo.lng);
      if (!isFinite(lat) || !isFinite(lng)) return 0;

      var alt = firstFinite(ext.alt, coord ? coord.alt : null, descInfo.alt);
      var pmId = pm.getAttribute('id') || '';
      // startPoint/endPoint 如果与首尾 realPoint 的经纬度和海拔完全一致，就跳过，避免同一点重复显示。
      if ((pmId === 'startPoint' || pmId === 'endPoint') && shouldSkipEndpointPoint(pmId, {lat:lat,lng:lng,alt:alt}, realEndpoints)) {
        logInfo('跳过与 realPoint 重合的 '+pmId+'：'+(textOf(pm,'name')||''));
        return 0;
      }

      var whenText = textOf(pm, 'when') || ext.timeText || descInfo.timeText;
      var time = firstFinite(ext.time, parseTimeValue(whenText), descInfo.time);
      var name = textOf(pm, 'name') || fileBase || 'Point';
      var lineMatch = findNearestLinePoint(lat, lng, importedPathLines, 80);
      if (lineMatch && lineMatch.duplicate && (pmId === 'realPoint' || pmId === 'startPoint' || pmId === 'endPoint')) {
        logInfo('跳过重复轨迹段关联采样点：' + (textOf(pm, 'name') || pmId || 'point'));
        return 0;
      }
      var ptype = lineMatch ? pointTypeByIndex(lineMatch.index, lineMatch.count) : '';

      addObject({
        kind: 'track',
        name: uniqueImportedName(name, 0),
        icon: iconFromStyle(textOf(pm, 'styleUrl')),
        lat: lat,
        lng: lng,
        alt: isFinite(alt) ? alt : null,
        ptype: ptype,
        time: isFinite(time) ? time : null,
        comment: descInfo.comment || name,
        source: source,
        sourceType: pmId || 'point',
        lineId: lineMatch ? lineMatch.lineId : null,
        pointIndex: lineMatch ? lineMatch.index : null
      }, true);
      return 1;
    }

    function collectRealPointEndpoints(placemarks) {
      var arr=[];
      for(var i=0;i<placemarks.length;i++){
        if((placemarks[i].getAttribute('id')||'')!=='realPoint')continue;
        var pointNode=descendantsByLocalName(placemarks[i],'Point')[0];
        var coord=pointNode?parseFirstCoordinate(textOf(pointNode,'coordinates')):null;
        var ext=readExtendedData(placemarks[i]);
        var descInfo=parseDescriptionInfo(textOf(placemarks[i],'description'));
        var lat=firstFinite(ext.lat,coord?coord.lat:null,descInfo.lat);
        var lng=firstFinite(ext.lng,coord?coord.lng:null,descInfo.lng);
        var alt=firstFinite(ext.alt,coord?coord.alt:null,descInfo.alt);
        if(isFinite(lat)&&isFinite(lng))arr.push({lat:lat,lng:lng,alt:alt});
      }
      return {first:arr.length?arr[0]:null,last:arr.length?arr[arr.length-1]:null};
    }

    function shouldSkipEndpointPoint(pmId, pt, endpoints) {
      if(!endpoints)return false;
      if(pmId==='startPoint')return sameLatLngAlt(pt,endpoints.first);
      if(pmId==='endPoint')return sameLatLngAlt(pt,endpoints.last);
      return false;
    }

    function sameLatLngAlt(a,b) {
      if(!a||!b)return false;
      if(Math.abs(Number(a.lat)-Number(b.lat))>1e-7)return false;
      if(Math.abs(Number(a.lng)-Number(b.lng))>1e-7)return false;
      if(!isFinite(Number(a.alt))||!isFinite(Number(b.alt)))return false;
      return Math.abs(Number(a.alt)-Number(b.alt))<=1e-3;
    }

    function collectRealPointTimeIndex(placemarks) {
      var index = {};
      for (var i = 0; i < placemarks.length; i++) {
        if ((placemarks[i].getAttribute('id') || '') !== 'realPoint') continue;
        var ext = readExtendedData(placemarks[i]);
        var pointNode = descendantsByLocalName(placemarks[i], 'Point')[0];
        var coord = pointNode ? parseFirstCoordinate(textOf(pointNode, 'coordinates')) : null;
        var lat = firstFinite(ext.lat, coord ? coord.lat : null);
        var lng = firstFinite(ext.lng, coord ? coord.lng : null);
        var time = firstFinite(ext.time, parseTimeValue(ext.timeText), parseTimeValue(textOf(placemarks[i], 'when')));
        if (isFinite(lat) && isFinite(lng) && isFinite(time)) {
          index[coordKey(lat, lng)] = time;
        }
      }
      return index;
    }

    function applyIndexedTimes(points, timeIndex) {
      for (var i = 0; i < points.length; i++) {
        var t = timeIndex[coordKey(points[i].lat, points[i].lng)];
        if (isFinite(t)) points[i].time = t;
      }
    }

    function readExtendedData(pm) {
      var out = { lat: NaN, lng: NaN, alt: NaN, time: NaN, timeText: '' };
      var datas = descendantsByLocalName(pm, 'Data');
      for (var i = 0; i < datas.length; i++) {
        var key = String(datas[i].getAttribute('name') || '').toLowerCase();
        var val = textOf(datas[i], 'value');
        if (!val) continue;
        if (key === 'latitude' || key === 'lat' || key === '纬度') out.lat = parseFloat(val);
        else if (key === 'longitude' || key === 'longtitude' || key === 'lng' || key === 'lon' || key === '经度') out.lng = parseFloat(val);
        else if (key === 'altitude' || key === 'alt' || key === 'ele' || key === '海拔') out.alt = parseFloat(val);
        else if (key === 'time' || key === 'timestamp' || key === '时间') {
          out.time = parseTimeValue(val);
          out.timeText = val;
        }
      }
      return out;
    }

    function parseDescriptionInfo(desc) {
      // description 经常是 CDATA HTML，例如：<div>经度：114...</div>
      var txt = htmlToPlainText(desc || '');
      return {
        lng: parseLabelNumber(txt, ['经度', 'lng', 'lon', 'longitude', 'longtitude']),
        lat: parseLabelNumber(txt, ['纬度', 'lat', 'latitude']),
        alt: parseLabelNumber(txt, ['海拔', '高度', 'alt', 'altitude', 'ele']),
        time: parseTimeValue(parseLabelText(txt, ['时间', 'time', 'timestamp'])),
        timeText: parseLabelText(txt, ['时间', 'time', 'timestamp']),
        comment: txt
      };
    }

    function parseCoordList(text) {
      var out = [];
      if (!text) return out;
      var tokens = String(text).replace(/[;\r\n\t]+/g, ' ').trim().split(/\s+/);
      for (var i = 0; i < tokens.length; i++) {
        var pt = parseCoordinateToken(tokens[i]);
        if (pt) out.push(pt);
      }
      return out;
    }

    function parseFirstCoordinate(text) {
      var list = parseCoordList(text);
      return list.length ? list[0] : null;
    }

    function parseCoordinateToken(token) {
      var parts = String(token || '').split(',');
      if (parts.length < 2) return null;
      var lng = parseFloat(parts[0]);
      var lat = parseFloat(parts[1]);
      var alt = parts.length >= 3 ? parseFloat(parts[2]) : NaN;
      if (!isFinite(lat) || !isFinite(lng)) return null;
      var pt = { lat: lat, lng: lng };
      if (isFinite(alt)) pt.alt = alt;
      return pt;
    }

    function parseGxTrack(trackEl) {
      var coords = descendantsByLocalName(trackEl, 'coord');
      var whens = descendantsByLocalName(trackEl, 'when');
      var out = [];
      for (var i = 0; i < coords.length; i++) {
        var raw = (coords[i].textContent || '').replace(/\s+/g, ' ').trim();
        var parts = raw.split(' ');
        var lng = parseFloat(parts[0]);
        var lat = parseFloat(parts[1]);
        var alt = parseFloat(parts[2]);
        if (!isFinite(lat) || !isFinite(lng)) continue;
        var pt = { lat: lat, lng: lng };
        if (isFinite(alt)) pt.alt = alt;
        if (whens[i]) {
          var t = parseTimeValue(whens[i].textContent);
          if (isFinite(t)) pt.time = t;
        }
        out.push(pt);
      }
      return out;
    }

    function lineDistanceMeters(line){
      var d=0;
      if(!line||!line.points)return 0;
      for(var i=1;i<line.points.length;i++)d+=distanceMeters(line.points[i-1].lat,line.points[i-1].lng,line.points[i].lat,line.points[i].lng);
      return d;
    }
    function longestExportLine(exportLines){
      var best=null,bestD=-1;
      for(var i=0;i<exportLines.length;i++){var d=lineDistanceMeters(exportLines[i]);if(d>bestD){bestD=d;best=exportLines[i];}}
      return best;
    }
    function makeEndpointObjectFromLine(line,index,ptype){
      if(!line||!line.points||!line.points.length)return null;
      var pt=line.points[index];
      if(!pt)return null;
      return {name:(ptype==='ptStart'?tr('ptStart'):tr('ptEnd'))+'-'+(line.name||tr('line')),lat:pt.lat,lng:pt.lng,alt:pt.alt,time:pt.time,comment:'',ptype:ptype,marker:{getLatLng:function(){return {lat:pt.lat,lng:pt.lng};}}};
    }
    function objectMatchesPoint(o,pt){
      if(!o||!o.marker||!pt)return false;
      var ll=o.marker.getLatLng();
      return Math.abs(Number(ll.lat)-Number(pt.lat))<0.00001&&Math.abs(Number(ll.lng)-Number(pt.lng))<0.00001;
    }
    function hasEndpointObjectForPoint(pt,lineIdSet){
      for(var i=0;i<objects.length;i++){
        var o=objects[i];
        if(o.lineId!=null&&!lineIdSet.has(o.lineId))continue;
        if((o.ptype==='ptStart'||o.ptype==='ptEnd')&&objectMatchesPoint(o,pt))return true;
      }
      return false;
    }
    function buildKmlString(exportLines, mergeAll, documentName) {
      var lineIdSet = new Set();
      for (var i = 0; i < exportLines.length; i++) lineIdSet.add(exportLines[i].id);

      var p = [
        '<?xml version="1.0" encoding="UTF-8"?>',
        '<kml xmlns="http://www.opengis.net/kml/2.2">',
        '<Document>',
        '  <name><![CDATA[' + cdataSafe(documentName || 'YFxGeoStudio') + ']]></name>',
        '  <Style id="drawLine"><LineStyle><color>ff3fd2ff</color><width>4</width></LineStyle></Style>',
        '  <Style id="MarkerStyleText"><IconStyle><scale>1.0</scale></IconStyle></Style>'
      ];

      var longest=longestExportLine(exportLines);
      if(longest&&longest.points&&longest.points.length){
        var first=longest.points[0],last=longest.points[longest.points.length-1];
        if(!hasEndpointObjectForPoint(first,lineIdSet))p.push(buildPointPlacemarkKml(makeEndpointObjectFromLine(longest,0,'ptStart'),-1));
        if(!hasEndpointObjectForPoint(last,lineIdSet))p.push(buildPointPlacemarkKml(makeEndpointObjectFromLine(longest,longest.points.length-1,'ptEnd'),-2));
      }

      for (var objIndex = 0; objIndex < objects.length; objIndex++) {
        var o = objects[objIndex];
        if (o.lineId != null && !lineIdSet.has(o.lineId)) continue;
        var pointKml = buildPointPlacemarkKml(o, objIndex);
        if (pointKml) p.push(pointKml);
      }

      if (mergeAll && exportLines.length > 1) {
        p.push(buildMultiGeometryKml(exportLines, documentName));
      } else {
        for (var lineIndex = 0; lineIndex < exportLines.length; lineIndex++) {
          p.push(buildLinePlacemarkKml(exportLines[lineIndex]));
        }
      }

      p.push('</Document>', '</kml>');
      return p.join('\n');
    }

    // 安全数值格式化：KML 来源复杂，海拔/时间/经纬度可能是 null、undefined、空字符串或字符串数字。
    // 统一先转 Number，再判断 isFinite，避免 null.toFixed() 这类导出崩溃。
    function finiteNumber(v, defaultValue) {
      var n = Number(v);
      return isFinite(n) ? n : defaultValue;
    }

    function fixedNumber(v, digits, defaultValue) {
      return finiteNumber(v, defaultValue == null ? 0 : defaultValue).toFixed(digits);
    }

    function safeLatLngFromObject(o) {
      if (!o || !o.marker || typeof o.marker.getLatLng !== 'function') return null;
      var ll = o.marker.getLatLng();
      var lat = finiteNumber(ll && ll.lat, NaN);
      var lng = finiteNumber(ll && ll.lng, NaN);
      if (!isFinite(lat) || !isFinite(lng)) return null;
      return { lat: lat, lng: lng };
    }

    function buildPointPlacemarkKml(o, objIndex) {
      var ll = safeLatLngFromObject(o);
      if (!ll) {
        logWarn('导出时跳过非法标记点：index=' + objIndex + ', name=' + ((o && o.name) || ''));
        return '';
      }

      var alt = finiteNumber(o.alt, 0);
      var time = finiteNumber(o.time, NaN);
      if (!isFinite(time)) time = null;

      var lngText = fixedNumber(ll.lng, 7, 0);
      var latText = fixedNumber(ll.lat, 7, 0);
      var altText = fixedNumber(alt, 1, 0);

      var desc = '<div>经度：' + lngText + '</div>' +
                 '<div>纬度：' + latText + '</div>' +
                 '<div>海拔：' + altText + '</div>' +
                 (time != null ? '<div>时间：' + formatLocalDateTime(time) + '</div>' : '') +
                 (o.comment ? '<div>备注：' + escapeHtml(o.comment) + '</div>' : '');

      var ext = [
        '    <ExtendedData>',
        '      <Data name="Latitude"><value>' + latText + '</value></Data>',
        '      <Data name="Longitude"><value>' + lngText + '</value></Data>',
        // Longtitude 是旧版本拼写错误，保留它是为了兼容历史文件。
        '      <Data name="Longtitude"><value>' + lngText + '</value></Data>',
        '      <Data name="Altitude"><value>' + altText + '</value></Data>'
      ];
      if (time != null) {
        ext.push('      <Data name="Time"><value>' + time + '</value></Data>');
        ext.push('      <Data name="TimeText"><value>' + xmlEscape(formatLocalDateTime(time)) + '</value></Data>');
      }
      ext.push('    </ExtendedData>');

      var out = [
        '  <Placemark id="realPoint">',
        '    <name><![CDATA[' + cdataSafe(o.name || 'Point') + ']]></name>',
        '    <description><![CDATA[' + cdataSafe(desc) + ']]></description>',
        '    <styleUrl>#MarkerStyleText</styleUrl>',
        ext.join('\n')
      ];
      if (time != null) out.push('    <TimeStamp><when>' + new Date(time).toISOString() + '</when></TimeStamp>');
      out.push('    <Point><coordinates>' + lngText + ',' + latText + ',' + altText + '</coordinates></Point>');
      out.push('  </Placemark>');
      return out.join('\n');
    }

    function buildLinePlacemarkKml(line) {
      var coords = coordListToKml(line.points);
      var span = lineTimeSpan(line);
      var out = [
        '  <Placemark>',
        '    <name><![CDATA[' + cdataSafe(line.name || 'Line') + ']]></name>',
        '    <styleUrl>#drawLine</styleUrl>'
      ];
      if (span) out.push('    <TimeSpan><begin>' + span.begin + '</begin><end>' + span.end + '</end></TimeSpan>');
      out.push('    <LineString><tessellate>1</tessellate><coordinates>' + coords + '</coordinates></LineString>');
      out.push('  </Placemark>');
      return out.join('\n');
    }

    function buildMultiGeometryKml(exportLines, documentName) {
      var out = [
        '  <Placemark>',
        '    <name><![CDATA[' + cdataSafe(documentName || tr('exportMergedKml')) + ']]></name>',
        '    <styleUrl>#drawLine</styleUrl>',
        '    <MultiGeometry>'
      ];
      for (var i = 0; i < exportLines.length; i++) {
        var coords=coordListToKml(exportLines[i].points||[]);
        if(!coords)continue;
        out.push('      <LineString><tessellate>1</tessellate><coordinates>' + coords + '</coordinates></LineString>');
      }
      out.push('    </MultiGeometry>');
      out.push('  </Placemark>');
      return out.join('\n');
    }

    function coordListToKml(points) {
      var out = [];
      for (var i = 0; i < points.length; i++) {
        var coord = pointToKmlCoord(points[i]);
        if (coord) out.push(coord);
      }
      return out.join(' ');
    }

    function pointToKmlCoord(pt) {
      var lat = finiteNumber(pt && pt.lat, NaN);
      var lng = finiteNumber(pt && pt.lng, NaN);
      if (!isFinite(lat) || !isFinite(lng)) return '';
      var alt = finiteNumber(pt && pt.alt, 0);
      return fixedNumber(lng, 7, 0) + ',' + fixedNumber(lat, 7, 0) + ',' + fixedNumber(alt, 1, 0);
    }

    function pointToGxCoord(pt) {
      var lat = finiteNumber(pt && pt.lat, NaN);
      var lng = finiteNumber(pt && pt.lng, NaN);
      if (!isFinite(lat) || !isFinite(lng)) return '';
      var alt = finiteNumber(pt && pt.alt, 0);
      return fixedNumber(lng, 7, 0) + ' ' + fixedNumber(lat, 7, 0) + ' ' + fixedNumber(alt, 1, 0);
    }

    function lineTimeSpan(line) {
      var minT = null, maxT = null;
      for (var i = 0; i < line.points.length; i++) {
        var t = line.points[i].time;
        if (!isFinite(t)) continue;
        if (minT == null || t < minT) minT = t;
        if (maxT == null || t > maxT) maxT = t;
      }
      for (var j = 0; j < objects.length; j++) {
        if (objects[j].lineId !== line.id || !isFinite(objects[j].time)) continue;
        if (minT == null || objects[j].time < minT) minT = objects[j].time;
        if (maxT == null || objects[j].time > maxT) maxT = objects[j].time;
      }
      if (minT == null || maxT == null || maxT <= minT) return null;
      return { begin: new Date(minT).toISOString(), end: new Date(maxT).toISOString() };
    }

    function findNearestLinePoint(lat, lng, pathLines, maxMeters) {
      var best = null;
      var bestD = Infinity;
      for (var i = 0; i < pathLines.length; i++) {
        var pts = pathLines[i].points;
        for (var j = 0; j < pts.length; j++) {
          var d = distanceMeters(lat, lng, pts[j].lat, pts[j].lng);
          if (d < bestD) {
            bestD = d;
            best = { lineId: pathLines[i].id, index: j, count: pts.length, duplicate: !!pathLines[i].duplicate };
          }
        }
      }
      return bestD <= (maxMeters || 80) ? best : null;
    }

    function pointTypeByIndex(index, count) {
      if (index <= 0) return 'ptStart';
      if (index >= count - 1) return 'ptEnd';
      return 'ptMiddle';
    }

    function descendantsByLocalName(node, localName) {
      var out = [];
      var all = node.getElementsByTagName('*');
      for (var i = 0; i < all.length; i++) {
        if ((all[i].localName || all[i].nodeName).replace(/^.*:/, '') === localName) out.push(all[i]);
      }
      return out;
    }

    function toArray(list) {
      var out = [];
      for (var i = 0; i < list.length; i++) out.push(list[i]);
      return out;
    }

    function textOf(node, tag) {
      if (!node) return '';
      var list = node.getElementsByTagName(tag);
      if ((!list || !list.length) && tag.indexOf(':') < 0) list = descendantsByLocalName(node, tag);
      return list && list[0] && list[0].textContent ? list[0].textContent.trim() : '';
    }

    function firstFinite() {
      for (var i = 0; i < arguments.length; i++) {
        var v = typeof arguments[i] === 'string' ? parseFloat(arguments[i]) : arguments[i];
        if (isFinite(v)) return +v;
      }
      return NaN;
    }

    function parseTimeValue(v) {
      if (v == null || v === '') return NaN;
      if (typeof v === 'number') return v;
      var s = String(v).trim();
      if (/^\d+$/.test(s)) {
        var n = parseInt(s, 10);
        return n < 10000000000 ? n * 1000 : n;
      }
      // 兼容“2025-08-24 14:40:02”这种没有 T 的本地时间。
      var t = Date.parse(s.replace(' ', 'T'));
      return isFinite(t) ? t : NaN;
    }

    function parseLabelText(text, labels) {
      for (var i = 0; i < labels.length; i++) {
        var re = new RegExp(labels[i] + '\\s*[：:]\\s*([^\\n;，,]+)', 'i');
        var m = re.exec(text || '');
        if (m) return m[1].trim();
      }
      return '';
    }

    function parseLabelNumber(text, labels) {
      var s = parseLabelText(text, labels);
      var m = /[-+]?\d+(?:\.\d+)?/.exec(s);
      return m ? parseFloat(m[0]) : NaN;
    }

    function htmlToPlainText(html) {
      return String(html || '')
        .replace(/<\s*br\s*\/?\s*>/gi, '\n')
        .replace(/<\s*\/\s*div\s*>/gi, '\n')
        .replace(/<[^>]+>/g, '')
        .replace(/&nbsp;/g, ' ')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&amp;/g, '&')
        .replace(/\r/g, '')
        .trim();
    }

    function iconFromStyle(styleUrl) {
      var s = String(styleUrl || '').toLowerCase();
      if (s.indexOf('blue') >= 0) return 'bluePin';
      if (s.indexOf('green') >= 0) return 'greenPin';
      if (s.indexOf('orange') >= 0) return 'orangePin';
      if (s.indexOf('purple') >= 0) return 'purplePin';
      if (s.indexOf('yellow') >= 0) return 'yellowPin';
      return 'redPin';
    }

    function coordKey(lat, lng) {
      return Number(lng).toFixed(6) + ',' + Number(lat).toFixed(6);
    }

    function formatLocalDateTime(t) {
      var d = new Date(t);
      function z(n) { return n < 10 ? '0' + n : String(n); }
      return d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate()) + ' ' +
             z(d.getHours()) + ':' + z(d.getMinutes()) + ':' + z(d.getSeconds());
    }

    function cdataSafe(s) {
      return String(s || '').replace(/\]\]>/g, ']]]]><![CDATA[>');

    function getKmlDocumentName(doc) {
      var docs = descendantsByLocalName(doc, 'Document');
      if (docs.length) {
        var n = textOf(docs[0], 'name');
        if (n) return n;
      }
      return textOf(doc, 'name');
    }

    function normalizeSingleImportedSegmentName(prevLineCount, base) {
      var added = lines.length - prevLineCount;
      if (added !== 1) return;
      var line = lines[prevLineCount];
      if (!line) return;
      var desired = uniqueLineNameWithoutSuffix(base || 'KML', line);
      line.name = desired;
      if (line.polyline) {
        bindLinePopup(line);
      }
    }

    function uniqueLineNameWithoutSuffix(base, selfLine) {
      var n = base || 'KML';
      var exists = function(name){
        for(var i=0;i<objects.length;i++)if(objects[i].name===name)return true;
        for(var j=0;j<lines.length;j++)if(lines[j]!==selfLine && lines[j].name===name)return true;
        return false;
      };
      if(!exists(n))return n;
      var i=2;
      while(exists(n+'-'+i))i++;
      return n+'-'+i;
    }

    
    // v0.44：导入任意 KML 时，逐段判断完全重复的轨迹段。
    // 判断规则按用户要求严格执行：点数相等，并且每个点的经纬度坐标都相等；不比较名称、时间、海拔。
    // 因此单个文件内部重复分段、多个文件之间重复分段、重复导入同一文件，都会只跳过重复轨迹段，继续导入不重复轨迹段。
    function coordEqualForDuplicate(a, b) {
      if (!a || !b) return false;
      var alat = Number(a.lat), alng = Number(a.lng);
      var blat = Number(b.lat), blng = Number(b.lng);
      return isFinite(alat) && isFinite(alng) && isFinite(blat) && isFinite(blng) && alat === blat && alng === blng;
    }

    function isSameTrackByCoords(aPts, bPts) {
      if (!aPts || !bPts || aPts.length !== bPts.length || aPts.length < 2) return false;
      for (var i = 0; i < aPts.length; i++) {
        if (!coordEqualForDuplicate(aPts[i], bPts[i])) return false;
      }
      return true;
    }

    function findDuplicateTrackLine(pts) {
      if (!pts || pts.length < 2) return null;
      for (var i = 0; i < lines.length; i++) {
        if (isSameTrackByCoords(pts, lines[i].points)) return lines[i];
      }
      return null;
    }

function cleanImportedSegmentName(name) {
      var s = String(name || '').trim();
      if (!s) return '';
      return s.replace(/[\r\n\t]+/g, ' ').replace(/\s{2,}/g, ' ');
    }

    function uniqueImportedSegmentName(base, segmentNo) {
      var n = autoSegmentName(segmentNo || 1);
      if (!nameExists(n) && !lineNameExists(n)) return n;
      var i = 2;
      while (nameExists(n + '-' + i) || lineNameExists(n + '-' + i)) i++;
      return n + '-' + i;
    }

    function normalizeExportFileName(name) {
      var s = String(name || '').trim();
      s = s.replace(/[\/:*?"<>|]+/g, '_');
      s = s.replace(/\.kml$/i, '');
      return s || ('YFxGeoStudio_' + dateStamp());
    }

    function askExportBaseName(defaultBase) {
      var v = prompt('请输入导出的 KML 文件名：', defaultBase || ('YFxGeoStudio_' + dateStamp()));
      if (v == null) return null;
      return normalizeExportFileName(v);
    }

    function uniqueImportedName(base, index) {
      var n = base || 'KML';
      if (index > 0) n += '-' + (index + 1);
      if (!nameExists(n) && !lineNameExists(n)) return n;
      var i = 2;
      while (nameExists(n + '-' + i) || lineNameExists(n + '-' + i)) i++;
      return n + '-' + i;
    }

    var OFFICIAL_EXPORT_URL='https://swordll80.github.io/outdoors/YFxGeoStudio/YFxGeoStudio.html';

    function exportKml(){
      finishAndExitTrackMode(true);
      if(!assertOfficialExportPage())return false;
      logInfo('执行合并导出 KML：lines='+lines.length+', objects='+objects.length);
      if(!objects.length&&!lines.length){toast(tr('noData'));return false;}
      try{
        // 顶部按钮固定执行“合并导出”：有多条轨迹时写标准 MultiGeometry；只有一条时写普通 LineString。
        var merge=lines.length>1;
        var exportBase=askExportBaseName((tr('exportMergedKml')+'_'+dateStamp()));
        if(exportBase==null){logInfo('用户取消 KML 导出');return false;}
        var fname=exportBase+'.kml';
        var xml=buildKmlString(lines,merge,exportBase);
        downloadText(xml,fname,'application/vnd.google-earth.kml+xml;charset=utf-8');
        logInfo('KML 导出完成：'+fname+'，字节数：'+xml.length);
        toast(tr('exported'));
      }catch(e){
        _rawConsoleError('KML 导出失败', e);
        logError('KML 导出失败：' + (e && (e.stack || e.message) ? (e.stack || e.message) : e));
        toast('KML 导出失败：'+(e&&e.message?e.message:e));
      }
      return false;
    }
    function exportSelectedKml(){
      finishAndExitTrackMode(true);
      if(!assertOfficialExportPage())return false;

      if(!arr.length){toast(tr('noData'));return false;}
      try{
        var merge=arr.length>1;
        var defaultBase=merge?(tr('exportMergedKml')+'_'+dateStamp()):((arr[0].name||'line')+'_'+dateStamp());
        var exportBase=askExportBaseName(defaultBase);
        if(exportBase==null){logInfo('用户取消选中轨迹 KML 导出');return false;}
        var fname=exportBase+'.kml';
        var xml=buildKmlString(arr,merge,exportBase);
        downloadText(xml,fname,'application/vnd.google-earth.kml+xml;charset=utf-8');
        toast(tr('exported'));
      }catch(e){
        _rawConsoleError('KML 选中轨迹导出失败', e);
        logError('KML 选中轨迹导出失败：' + (e && (e.stack || e.message) ? (e.stack || e.message) : e));
        toast('KML 导出失败：'+(e&&e.message?e.message:e));
      }
      return false;
    }

    // -- clear --
    function clearAll(){finishAndExitTrackMode(true);if(!confirm(tr('confirmClear')))return;pushHistory();closeLineInfoDialog();closeMarkerInfoDialog();clearRuntime();setFileStatusText(tr('none'));updateStats();}
    function fitData(){if(!objects.length&&!lines.length)return;try{var g=L.featureGroup();itemLayer.eachLayer(function(l){g.addLayer(l);});lineLayer.eachLayer(function(l){g.addLayer(l);});map.fitBounds(g.getBounds(),{padding:[36,36],maxZoom:16});}catch(e){}}
    function updateStats(){updateSideFileTitle();if(!lines.length){document.getElementById('stats').innerHTML='<div class="no-data">'+tr('noData')+'</div>';selectedLines.clear();refreshExportBtnLabel();return;}var h='<table><thead><tr><th class="ico-th" title="'+escapeHtml(tr('line'))+'">🛤️</th><th class="num ico-th" title="'+escapeHtml(tr('distance'))+'">↔</th><th class="num ico-th" title="'+escapeHtml(tr('duration'))+'">🕒</th><th class="num ico-th" title="'+escapeHtml(tr('ascent'))+'">↑</th><th class="num ico-th" title="'+escapeHtml(tr('descent'))+'">↓</th><th class="num ico-th" title="'+escapeHtml(tr('markPoints'))+'">📍</th></tr></thead><tbody>';var totalKm=0,totalUp=0,totalDown=0,totalElapsed=0,totalMark=0;for(var i=0;i<lines.length;i++){var st=lineStats(lines[i]),mk=countMarkPoints(lines[i]);totalKm+=st.distance;totalUp+=st.ascent;totalDown+=st.descent;totalElapsed+=st.elapsed;totalMark+=mk;h+='<tr data-lid="'+lines[i].id+'" oncontextmenu="showLineRowMenu(event,\''+lines[i].id+'\')"><td class="line-name" title="'+escapeHtml(displayLineName(lines[i]))+'">'+escapeHtml(displayLineName(lines[i]))+'</td><td class="num">'+(st.distance/1000).toFixed(2)+' km</td><td class="num">'+(st.elapsed>0?fmtDurationHHMM(st.elapsed):'-')+'</td><td class="num">'+st.ascent.toFixed(0)+' m</td><td class="num">'+st.descent.toFixed(0)+' m</td><td class="num">'+mk+'</td></tr>';}h+='</tbody><tfoot><tr style="border-top:1px solid rgba(255,255,255,.15);font-weight:600;color:#fff"><td>'+tr('total')+'</td><td class="num">'+(totalKm/1000).toFixed(2)+' km</td><td class="num">'+(totalElapsed>0?fmtDurationHHMM(totalElapsed):'-')+'</td><td class="num">'+totalUp.toFixed(0)+' m</td><td class="num">'+totalDown.toFixed(0)+' m</td><td class="num">'+totalMark+'</td></tr></tfoot></table>';document.getElementById('stats').innerHTML=h;bindStatsRows();if(selectedLines.size>0)highlightSelectedRows();refreshExportBtnLabel();}

    function bindStatsRows(){
      var rows=document.querySelectorAll('#stats tr[data-lid]');
      for(var i=0;i<rows.length;i++){
        rows[i].onclick=function(ev){
          var id=this.getAttribute('data-lid');
          selectLineById(id,ev&& (ev.ctrlKey||ev.metaKey));
        };
        rows[i].ondblclick=function(ev){
          if(ev){ev.preventDefault();ev.stopPropagation();}
          var id=this.getAttribute('data-lid');
          selectLineById(id,ev&& (ev.ctrlKey||ev.metaKey));
          flyToLineById(id);
        };
      }
    }
    function selectLineById(id,multi){for(var i=0;i<lines.length;i++){if(lines[i].id===id){selectLine(lines[i],null,!!multi,'list');return;}}}
    function flyToLineById(id){for(var i=0;i<lines.length;i++){if(lines[i].id===id){fitLineVisibleForPanels(lines[i]);return;}}}
    function fitLineVisibleForPanels(line){
      if(!line||!line.polyline)return;
      try{
        var b=line.polyline.getBounds();
        if(!b||!b.isValid||!b.isValid())return;
        var vw=window.innerWidth||document.documentElement.clientWidth||800;
        var vh=window.innerHeight||document.documentElement.clientHeight||600;
        var leftPad=36, topPad=70, rightPad=36, bottomPad=54;
        var side=document.getElementById('side');
        if(side&&side.offsetParent!==null&&!side.classList.contains('side-collapsed')){
          var sr=side.getBoundingClientRect();
          if(sr.left<vw&&sr.right>0)leftPad=Math.max(leftPad,Math.min(Math.round(sr.width)+24,Math.round(vw*0.42)));
          if(sr.bottom>vh*0.55)bottomPad=Math.max(bottomPad,Math.min(Math.round(vh-sr.top)+24,Math.round(vh*0.42)));
        }
        var layer=document.getElementById('layerBox');
        if(layer&&layer.offsetParent!==null&&!layer.classList.contains('layer-collapsed')){
          var lr=layer.getBoundingClientRect();
          rightPad=Math.max(rightPad,Math.min(Math.round(vw-lr.left)+24,Math.round(vw*0.35)));
          bottomPad=Math.max(bottomPad,Math.min(Math.round(vh-lr.top)+24,Math.round(vh*0.35)));
        }
        var dlg=document.getElementById('dialog');
        if(dlgLineTarget&&dlg&&document.getElementById('dialogMask').style.display!=='none'){
          var dr=dlg.getBoundingClientRect();
          if(dr.left>vw*0.48)rightPad=Math.max(rightPad,Math.min(Math.round(vw-dr.left)+24,Math.round(vw*0.48)));
          if(dr.top<vh*0.35)topPad=Math.max(topPad,Math.min(Math.round(dr.bottom)+24,Math.round(vh*0.45)));
          else bottomPad=Math.max(bottomPad,Math.min(Math.round(vh-dr.top)+24,Math.round(vh*0.45)));
        }
        map.fitBounds(b,{paddingTopLeft:[leftPad,topPad],paddingBottomRight:[rightPad,bottomPad],maxZoom:16,animate:true});
      }catch(e){logWarn('飞到轨迹失败：'+(e&&e.message?e.message:e));}
    }

    function showLineRowMenu(e,lineId){e.preventDefault();e.stopPropagation();var menu=document.getElementById('rowMenu');var line=null;for(var i=0;i<lines.length;i++){if(lines[i].id===lineId){line=lines[i];break;}}if(!line)return;if(!selectedLines.has(line)){selectLine(line,null,false,'list');}var selCount=selectedLines.size;var exportLabel=selCount>1?tr('exportMergedKml'):tr('exportKml');menu.innerHTML='<div class="row-menu-item" data-act="export">'+exportLabel+'</div><div class="row-menu-item danger" data-act="delete">'+tr('delete')+'</div>';var rect=menu.getBoundingClientRect();menu.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';menu.style.top=Math.min(e.clientY,window.innerHeight-rect.height-8)+'px';menu.style.display='block';menu._lineId=lineId;var onClick=function(ev){var t=ev.target;if(!t||!t.classList.contains('row-menu-item'))return;var act=t.getAttribute('data-act');hideLineRowMenu();if(act==='export'){exportSelectedKml();}else if(act==='delete'){var toDel=Array.from(selectedLines);if(!toDel.length)toDel=[line];if(!confirm(tr('confirmDeleteLine')||'确定删除此线路？'))return;pushHistory();for(var di=toDel.length-1;di>=0;di--)removeLine(toDel[di]);}};menu.onclick=onClick;var onDoc=function(ev){if(menu.contains(ev.target))return;hideLineRowMenu();};setTimeout(function(){document.addEventListener('mousedown',onDoc,{once:true});},0);}
    function hideLineRowMenu(){var menu=document.getElementById('rowMenu');if(menu)menu.style.display='none';menu.onclick=null;menu._lineId=null;}
    function highlightSelectedRows(){var t=document.querySelectorAll('#stats tr');for(var i=0;i<t.length;i++){var lid=t[i].getAttribute('data-lid');var hit=false;selectedLines.forEach(function(sl){if(sl.id===lid)hit=true;});t[i].classList.toggle('active',hit);}}
    function distToPointOnLine(o,line){var p=o.marker.getLatLng(),closestIdx=-1,closestDist=1e99,sum=0;if(!line||!line.points||!line.points.length)return{lineDist:0,ptDist:0};for(var i=1;i<line.points.length;i++)sum+=distanceMeters(line.points[i-1].lat,line.points[i-1].lng,line.points[i].lat,line.points[i].lng);if(o.pointIndex!=null&&line.points[o.pointIndex]){closestIdx=o.pointIndex;}else{for(var k=0;k<line.points.length;k++){var d=Math.abs(p.lat-line.points[k].lat)+Math.abs(p.lng-line.points[k].lng);if(d<closestDist){closestDist=d;closestIdx=k;}}}if(closestIdx<=0)return{lineDist:sum,ptDist:0};var ptDist=0;for(var j=1;j<=closestIdx;j++)ptDist+=distanceMeters(line.points[j-1].lat,line.points[j-1].lng,line.points[j].lat,line.points[j].lng);return{lineDist:sum,ptDist:ptDist};}
    function distanceMeters(a,b,c,d){var r=6371008.8,p1=a*Math.PI/180,p2=c*Math.PI/180,dp=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180,x=Math.sin(dp/2)*Math.sin(dp/2)+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);return r*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
    function downloadText(text,name,type){var blob=new Blob([text],{type:type||'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);document.body.removeChild(a);},0);}
    function toast(msg,ms){
      var el=document.getElementById('toast');
      el.textContent=msg;
      el.style.display='block';
      clearTimeout(toast._timer);
      toast._timer=setTimeout(function(){el.style.display='none';},ms||2600);
      // toast 只负责短提示；错误详情由 catch / console / window.onerror 写日志，避免同一错误重复记录。
    }
    function baseName(path){if(!path)return'';return String(path).replace(/\\/g,'/').split('/').pop().replace(/\.[^.]+$/,'');}
    function dateStamp(){var d=new Date();function z(n){return n<10?'0'+n:String(n);}return d.getFullYear()+z(d.getMonth()+1)+z(d.getDate())+'_'+z(d.getHours())+z(d.getMinutes())+z(d.getSeconds());}
    function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
    function xmlEscape(s){return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c];});}

    // 兼容某些浏览器/打包环境：既保留 HTML onclick，也显式绑定按钮事件。

    // 注意：btnExport 已经在 HTML 中使用 onclick="exportKml()"，这里不要再 addEventListener，避免一次点击导出两次。


    // V11：工具栏中除“手绘轨迹”按钮外，任何按钮/语言选择动作都会先结束手绘状态。

    loadSettings();applyLang();updateStats();updateHistoryButtons();setFileStatusText(tr('none'));setModeStatus();
    document.getElementById('dialogMask').addEventListener('click',function(e){if(e.target===this){if(dlgLineTarget){closeLineInfoDialog();}else if(document.getElementById('helpDialogTitle')){closeHelpDialog();}else{closeDialog();}}});
