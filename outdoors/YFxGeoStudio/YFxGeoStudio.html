<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YFxGeoStudio</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ccircle cx='12' cy='12' r='10' fill='none' stroke='%231677d2' stroke-width='2'/%3E%3Ccircle cx='12' cy='12' r='6' fill='none' stroke='%231677d2' stroke-width='2'/%3E%3Ccircle cx='12' cy='12' r='2' fill='%231677d2'/%3E%3C/svg%3E">
<link rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; margin: 0; padding: 0; }
    body { font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; background: #101418; color: #eef3f7; overflow: hidden; }
    #map { position: absolute; inset: 0; }
    .panel { position: absolute; z-index: 1000; background: rgba(18,24,30,.88); border: 1px solid rgba(255,255,255,.14); box-shadow: 0 10px 34px rgba(0,0,0,.28); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    #toolbar { top: 12px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 7px; padding: 8px 10px; border-radius: 8px; white-space: nowrap; cursor: grab; user-select: none; }
    #toolbar:active { cursor: grabbing; }
    #toolbar.dragging * { pointer-events: none; }
    #toolbar button { padding: 6px 8px; font-size: 16px; min-width: 32px; text-align: center; }
    button, select, input { font: inherit; color: inherit; }
    button { border: 1px solid rgba(255,255,255,.15); border-radius: 6px; background: rgba(255,255,255,.08); padding: 6px 10px; cursor: pointer; transition: background .15s, border-color .15s; position: relative; }
    button:hover { background: rgba(80,160,230,.22); border-color: rgba(90,170,240,.55); }
    button.active { background: #1677d2; border-color: #4aa3ff; }
    button:disabled { opacity: .45; cursor: default; }
    button.danger:hover { background: rgba(210,60,60,.28); border-color: rgba(255,90,90,.6); }
    button[data-tip]:after { content: attr(data-tip-text); position: absolute; top: 110%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.85); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 2000; }
    button[data-tip]:hover:after { opacity: 1; }
    .ico-btn { padding: 6px 8px; font-size: 16px; min-width: 32px; text-align: center; }
    .sep { width: 1px; height: 22px; background: rgba(255,255,255,.16); margin: 0 2px; }
    .primary-action { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px !important; min-width: 0 !important; font-size: 14px !important; font-weight: 600; color: #ffd966; border: 1px solid rgba(255,217,102,.55) !important; background: linear-gradient(135deg, rgba(255,170,40,.18), rgba(255,217,102,.12)) !important; box-shadow: 0 1px 4px rgba(255,200,80,.18); transition: background .15s, box-shadow .15s, transform .12s; }
    .primary-action:hover { background: linear-gradient(135deg, rgba(255,170,40,.32), rgba(255,217,102,.22)) !important; border-color: rgba(255,217,102,.85) !important; box-shadow: 0 2px 8px rgba(255,200,80,.32); transform: translateY(-1px); }
    .primary-action:active { transform: translateY(0); }
    .primary-action .ico { font-size: 16px; line-height: 1; }
    .primary-action .lbl { white-space: nowrap; }
    #side { top: 12px; left: 46px; width: auto; min-width: 320px; max-width: calc(100vw - 24px); border-radius: 8px; padding: 12px; cursor: grab; user-select: none; }
    #side:active { cursor: grabbing; }
    #side.dragging * { pointer-events: none; }
    #side h1 { margin: 0 0 8px; font-size: 15px; font-weight: 650; letter-spacing: 0; cursor: grab; line-height: 1.35; white-space: pre-line; }
    #side .list-head { margin: 0 0 8px; font-size: 12px; font-weight: 600; color: #b7c1ca; letter-spacing: .2px; }
    #stats { margin-top: 6px; padding-top: 9px; border-top: 1px solid rgba(255,255,255,.12); color: #c9d3dc; font-size: 11px; }
    #stats table { width: 100%; border-collapse: collapse; table-layout: auto; }
    #stats th { text-align: left; color: #8899aa; font-weight: 500; padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,.08); white-space: nowrap; }
    #stats td { padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,.05); white-space: nowrap; color: #c9d3dc; }
    #stats tr:hover td { background: rgba(255,255,255,.04); }
    #stats tr.active td { background: rgba(74,163,255,.15); }
    #stats .line-name { max-width: 80px; overflow: hidden; text-overflow: ellipsis; cursor: pointer; color: #ffd23f; }
    #stats .line-name:hover { text-decoration: underline; }
    #stats .num { text-align: right; }
    #stats .no-data { color: #667788; font-style: italic; padding: 6px 4px; }
    #layerBox { right: 12px; bottom: 42px; border-radius: 8px; overflow: hidden; width: 158px; }
    #layerBox .title { padding: 8px 10px; color: #b7c1ca; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.05); }
    #layerBox button { width: 100%; border: 0; border-bottom: 1px solid rgba(255,255,255,.1); border-radius: 0; text-align: left; padding: 10px 12px; background: transparent; }
    #layerBox button.active { background: #1677d2; border-color: #4aa3ff; }
    #layerBox button:hover { background: rgba(80,160,230,.22); }
    #layerBox button:last-child { border-bottom: 0; }
    #status { left: 0; right: 0; bottom: 0; height: 28px; line-height: 28px; padding: 0 14px; border-left: 0; border-right: 0; border-bottom: 0; font-size: 12px; color: #c5ced6; display: flex; gap: 18px; overflow: hidden; }
    #toast { position: absolute; left: 50%; bottom: 48px; transform: translateX(-50%); z-index: 1400; max-width: calc(100vw - 24px); padding: 9px 14px; border-radius: 8px; background: rgba(10,15,20,.92); border: 1px solid rgba(255,255,255,.16); color: #fff; display: none; box-shadow: 0 8px 26px rgba(0,0,0,.3); font-size: 13px; }
    #dialogMask { position: absolute; inset: 0; z-index: 1600; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.28); }
    #dialog { width: 372px; max-width: calc(100vw - 28px); border-radius: 8px; padding: 14px; background: #17202a; border: 1px solid rgba(255,255,255,.16); box-shadow: 0 18px 50px rgba(0,0,0,.4); }
    #dialog h2 { margin: 0 0 12px; font-size: 16px; }
    #dialog .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
    .hint { color: #99a9b6; font-size: 12px; line-height: 1.6; margin: 8px 0 0; }
    .pin { position: relative; width: 28px; height: 28px; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); border: 2px solid #fff; box-shadow: 0 2px 7px rgba(0,0,0,.38); }
    .pin:after { content: ""; position: absolute; width: 8px; height: 8px; left: 8px; top: 8px; border-radius: 50%; background: #fff; }
    .pin-red { background: #e53935; }
    .pin-blue { background: #1e88e5; }
    .pin-green { background: #43a047; }
    .pin-orange { background: #fb8c00; }
    .pin-purple { background: #8e24aa; }
    .pin-yellow { background: #fdd835; }
    .dlg-icon-opt { width: 36px; height: 36px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,.06); transition: border-color .15s; }
    .dlg-icon-opt:hover { border-color: rgba(255,255,255,.3); }
    .dlg-icon-opt.selected { border-color: #4aa3ff; background: rgba(74,163,255,.15); }
    .dlg-icon-opt .pin { transform: rotate(-45deg) scale(.7); }
    select { border: 1px solid rgba(255,255,255,.15); border-radius: 6px; background: rgba(255,255,255,.08); padding: 6px 8px; font-size: 13px; color: #eef3f7; }
    select option { background: #1a242f; color: #eef3f7; }
    #helpContent { font-size: 13px; line-height: 1.8; color: #c9d3dc; }
    #helpContent b { color: #fff; }
    .track-line { cursor: pointer; }
    /* V15：透明粗线只负责鼠标命中，解决细轨迹线难以点中的问题。 */
    .track-hit-line { cursor: pointer; }
    .track-line:hover { stroke-width: 6; }
    .track-line.selected { stroke: #4aa3ff; stroke-width: 6; }
    .row-menu-item { padding: 6px 12px; cursor: pointer; color: #c9d3dc; }
    .row-menu-item:hover { background: rgba(74,163,255,.18); color: #fff; }
    .row-menu-item.danger { color: #ff8a8a; }
    .row-menu-item.danger:hover { background: rgba(229,57,53,.22); }

    .marker-label { background: rgba(18,24,30,.82); border: 1px solid rgba(255,255,255,.22); color: #fff; border-radius: 4px; padding: 2px 5px; font-size: 11px; line-height: 1.25; box-shadow: 0 2px 8px rgba(0,0,0,.28); white-space: nowrap; }
    .marker-label:before { display: none; }
    @media (max-width: 760px) { #toolbar { left: 8px; right: 8px; transform: none; justify-content: flex-start; } #side { top: 58px; width: calc(100vw - 24px); } #layerBox { bottom: 36px; } }
  

    /* ===== 日志窗口：错误自动弹出，不自动关闭，便于用户复制报错 ===== */
    #logPanel {
      position: absolute;
      left: 16px;
      bottom: 42px;
      width: min(760px, calc(100vw - 32px));
      height: 260px;
      z-index: 1550;
      display: none;
      border-radius: 8px;
      overflow: hidden;
      cursor: default;
    }
    #logPanel .log-head {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 10px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.05);
      color: #e7edf3;
      font-size: 13px;
      font-weight: 600;
      user-select: none;
    }
    #logPanel .log-actions { display: flex; align-items: center; gap: 6px; }
    #logPanel .log-actions button { padding: 4px 8px; font-size: 12px; min-width: 0; }
    #logText {
      width: 100%;
      height: calc(100% - 34px);
      display: block;
      resize: none;
      border: 0;
      outline: none;
      padding: 10px;
      background: rgba(5,8,12,.96);
      color: #d8e0e8;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre;
    }
    #logPanel.has-error { border-color: rgba(255,90,90,.65); box-shadow: 0 10px 34px rgba(120,0,0,.38); }

  </style>
</head>
<body>
  <div id="map"></div>
  <div id="toolbar" class="panel">
    <button id="btnImport" onclick="openImport()" data-tip="importKml" >📂</button><span class="sep"></span>
	<button id="btnExport" onclick="exportKml()" data-tip="exportMergedKml">💾</button><span class="sep"></span>
	<button id="btnTrack" onclick="toggleTrackMode()" data-tip="drawTrack">✏️</button><button class="danger" onclick="clearAll()" data-role="clear" data-tip="clear">🗑️</button><span class="sep"></span>
	<button id="btnLocate" onclick="locateMe()" data-tip="locate"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/></svg></button>
	<button id="btnHelp" onclick="showHelp()" data-tip="help">❓</button>
	<button id="btnDonate" onclick="showDonate()" data-tip="donate" style="color:#ff7676">❤️</button><span class="sep"></span>
	<button onclick="undo()" id="btnUndo" data-tip="undo">↩️</button>
	<button onclick="redo()" id="btnRedo" data-tip="redo">↪️</button><span class="sep"></span>
	<select id="langSelect" onchange="setLang(this.value)"><option value="zh">中文</option><option value="en">English</option></select>
  </div>
  <div id="side" class="panel"><h1><span data-i18n="appTitle">KML轨迹文件合并编辑工具by御风@户外</span>
<span data-i18n="trackListLabel">轨迹列表:</span></h1><div id="stats"></div></div>
  <div id="layerBox" class="panel"><div class="title" data-i18n="mapLayer">地图</div><button id="layerGaode" class="active" onclick="switchLayer('gaode')">高德地形</button><button id="layerGoogle" onclick="switchLayer('google')">Google 地形</button></div>
  <div id="status" class="panel"><span id="modeText">模式：浏览</span><span id="coordText">坐标：-</span><span id="zoomText">缩放：12</span><span id="fileText">文件：-</span></div><input id="fileInput" type="file" accept=".kml,application/vnd.google-earth.kml+xml" multiple style="display:none" onchange="handleFiles(this.files)"><div id="toast"></div>
  <div id="dialogMask"><div id="dialog"><h2 id="dlgTitle">编辑</h2><div class="row" style="display:flex;align-items:center;gap:8px;margin:8px 0"><label data-i18n="name" style="min-width:96px;color:#b9c4cf;font-size:12px">名称</label><input id="dlgName" style="min-width:0;flex:1;border:1px solid rgba(255,255,255,.16);border-radius:6px;background:rgba(255,255,255,.08);padding:6px 8px"></div><div class="row" style="display:flex;align-items:center;gap:8px;margin:8px 0"><label data-i18n="comment" style="min-width:96px;color:#b9c4cf;font-size:12px">备注</label><input id="dlgComment" style="min-width:0;flex:1;border:1px solid rgba(255,255,255,.16);border-radius:6px;background:rgba(255,255,255,.08);padding:6px 8px"></div><div class="row" style="display:flex;align-items:center;gap:8px;margin:8px 0"><label data-i18n="iconStyle" style="min-width:96px;color:#b9c4cf;font-size:12px">图标</label><div id="dlgIcons" style="display:flex;gap:6px;flex-wrap:wrap"></div></div><div class="row" style="display:flex;align-items:center;gap:8px;margin:8px 0"><label style="min-width:96px;color:#b9c4cf;font-size:12px">Lat</label><span id="dlgLat" style="min-width:0;flex:1;color:#8899aa;font-size:13px;padding:6px 8px">-</span></div><div class="row" style="display:flex;align-items:center;gap:8px;margin:8px 0"><label style="min-width:96px;color:#b9c4cf;font-size:12px">Lng</label><span id="dlgLng" style="min-width:0;flex:1;color:#8899aa;font-size:13px;padding:6px 8px">-</span></div><div class="row" id="dlgAltRow" style="display:flex;align-items:center;gap:8px;margin:8px 0"><label data-i18n="altitude" style="min-width:96px;color:#b9c4cf;font-size:12px">海拔</label><input id="dlgAlt" type="number" step="0.1" placeholder="m" style="min-width:0;flex:1;border:1px solid rgba(255,255,255,.16);border-radius:6px;background:rgba(255,255,255,.08);padding:6px 8px;color:#e0e6ed"></div><div class="row" id="dlgTimeRow" style="display:flex;align-items:center;gap:8px;margin:8px 0"><label data-i18n="time" style="min-width:96px;color:#b9c4cf;font-size:12px">时间</label><input id="dlgTime" type="datetime-local" style="min-width:0;flex:1;border:1px solid rgba(255,255,255,.16);border-radius:6px;background:rgba(255,255,255,.08);padding:6px 8px;color:#e0e6ed"></div><div class="actions"><button class="danger" onclick="deleteDialogTarget()" data-i18n="delete">删除</button><button onclick="closeDialog()" data-i18n="cancel">取消</button><button class="active" onclick="saveDialog()" data-i18n="save">保存</button></div></div></div>
  <div id="rowMenu" style="position:absolute;z-index:1500;display:none;min-width:140px;background:#17202a;border:1px solid rgba(255,255,255,.18);border-radius:6px;padding:4px 0;box-shadow:0 8px 24px rgba(0,0,0,.4);font-size:13px"></div>

  <!-- 日志窗口：INFO/WARN 默认只记录；ERROR 自动打开窗口，不自动关闭。 -->
  <div id="logPanel" class="panel" aria-label="log panel">
    <div class="log-head">
      <span id="logTitle">日志输出</span>
      <div class="log-actions">
        <button type="button" onclick="copyLog()" id="btnCopyLog">复制</button>
        <button type="button" onclick="saveLog()" id="btnSaveLog">保存</button>
        <button type="button" onclick="clearLog()" id="btnClearLog">清空</button>
        <button type="button" onclick="hideLogPanel()" id="btnHideLog">隐藏</button>
      </div>
    </div>
    <textarea id="logText" readonly spellcheck="false"></textarea>
  </div>
  <script>
    if (!window.L) { document.body.innerHTML = '<div style="padding:24px;color:#fff;background:#111">Leaflet 加载失败，请确认 leaflet1.9.4.js 和 leaflet1.9.4.css 在当前目录。</div>'; throw new Error('Leaflet missing'); }

    /*
     * 简易日志系统
     * ------------------------------------------------------------
     * 设计目标：
     *   1. 普通信息写入日志，但不打扰用户；
     *   2. ERROR 自动打开日志窗口，并且不会自动关闭；
     *   3. 用户可以复制/保存日志，便于反馈 KML 解析、导出、JS 异常。
     */
    var LOG_LEVEL_INFO  = 'INFO ';
    var LOG_LEVEL_WARN  = 'WARN ';
    var LOG_LEVEL_ERROR = 'ERROR';
    var _rawConsoleError = console.error ? console.error.bind(console) : function(){};
    var _rawConsoleWarn  = console.warn  ? console.warn.bind(console)  : function(){};
    var _rawConsoleLog   = console.log   ? console.log.bind(console)   : function(){};

    function logTimeStamp(){
      var d = new Date();
      function z(n){ return n < 10 ? '0' + n : String(n); }
      return d.getFullYear() + '-' + z(d.getMonth()+1) + '-' + z(d.getDate()) + ' ' +
             z(d.getHours()) + ':' + z(d.getMinutes()) + ':' + z(d.getSeconds());
    }
    function logToString(v){
      if(v instanceof Error) return v.stack || v.message || String(v);
      if(typeof v === 'string') return v;
      try { return JSON.stringify(v, null, 2); } catch(e) { return String(v); }
    }
    function appendLog(level, msg, autoOpen){
      var txt = document.getElementById('logText');
      if(!txt) return;
      var line = '[' + logTimeStamp() + '] [' + level + '] ' + logToString(msg);
      txt.value += line + '\n';
      txt.scrollTop = txt.scrollHeight;
      if(autoOpen) showLogPanel(level === LOG_LEVEL_ERROR);
    }
    function logInfo(msg){ appendLog(LOG_LEVEL_INFO, msg, false); }
    function logWarn(msg){ appendLog(LOG_LEVEL_WARN, msg, false); }
    function logError(msg){ appendLog(LOG_LEVEL_ERROR, msg, true); }
    function showLogPanel(hasError){
      var p = document.getElementById('logPanel');
      if(!p) return;
      p.style.display = 'block';
      if(hasError) p.classList.add('has-error');
    }
    function hideLogPanel(){ var p=document.getElementById('logPanel'); if(p) p.style.display='none'; }
    function clearLog(){
      var txt=document.getElementById('logText');
      if(txt) txt.value='';
      var p=document.getElementById('logPanel');
      if(p) p.classList.remove('has-error');
    }
    function copyLog(){
      var txt=document.getElementById('logText');
      if(!txt) return;
      txt.focus(); txt.select();
      try{
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(txt.value).then(function(){ toast('日志已复制'); });
        }else{
          document.execCommand('copy');
          toast('日志已复制');
        }
      }catch(e){ logError('复制日志失败：' + (e && e.message ? e.message : e)); }
    }
    function saveLog(){
      var text=(document.getElementById('logText')||{}).value || '';
      try{
        var blob=new Blob([text],{type:'text/plain;charset=utf-8'});
        var a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='YFxGeoStudio_'+logTimeStamp().replace(/[-: ]/g,'')+'.log';
        document.body.appendChild(a);
        a.click();
        setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},0);
      }catch(e){ logError('保存日志失败：' + (e && e.message ? e.message : e)); }
    }

    // 接管 console.error / console.warn：旧代码中的 console.error(err) 也能自动进入日志窗口。
    console.error = function(){
      _rawConsoleError.apply(console, arguments);
      var parts=[]; for(var i=0;i<arguments.length;i++) parts.push(logToString(arguments[i]));
      logError(parts.join('\n'));
    };
    console.warn = function(){
      _rawConsoleWarn.apply(console, arguments);
      var parts=[]; for(var i=0;i<arguments.length;i++) parts.push(logToString(arguments[i]));
      logWarn(parts.join('\n'));
    };

    // 全局 JS 错误兜底：按钮点击、KML 解析、导出等未捕获异常都会进入日志窗口。
    window.onerror = function(msg, source, line, col, error){
      logError('JS异常：' + msg + '\n文件：' + source + '\n行：' + line + '，列：' + col + '\n' + (error && error.stack ? error.stack : ''));
      return false;
    };
    window.addEventListener('unhandledrejection', function(e){
      logError('Promise异常：\n' + logToString(e.reason));

    function redrawDrawingLine(){drawLayer.clearLayers();for(var i=0;i<drawingLine.length;i++){L.circleMarker([drawingLine[i].lat,drawingLine[i].lng],{radius:6,color:'#ffd23f',weight:2,fillColor:'#ffd23f',fillOpacity:.65}).addTo(drawLayer);}if(drawingLine.length>1)L.polyline(drawingLine,{color:'#ffd23f',weight:4,dashArray:'7 5'}).addTo(drawLayer);}
    function resetDrawingLine(){if(clickTimer){clearTimeout(clickTimer);clickTimer=null;}drawingLine=[];drawLayer.clearLayers();}
    function finishDrawingLine(){if(drawingLine.length<2){resetDrawingLine();toast(tr('need2'));return;}var name=nextName('line');var pts=simplifyPoints(drawingLine,10);var newLine=addLine({name:name,color:'#ffd23f',points:pts},false);for(var i=0;i<pts.length;i++){addObject({kind:'track',name:name+'-'+(i+1),icon:'redPin',lat:pts[i].lat,lng:pts[i].lng,source:'manual',draggable:true,pointIndex:i,lineId:newLine.id},true);}normalizeLinePointTypes(newLine);updateStats();updateAllMarkerLabels();resetDrawingLine();toast(tr('lineSaved')+pts.length+tr('points'));}

    // -- simplify points (remove points closer than threshold) --
    function simplifyPoints(pts,threshold){if(!pts.length)return[];var out=[pts[0]];for(var i=1;i<pts.length;i++){var last=out[out.length-1];if(distanceMeters(last.lat,last.lng,pts[i].lat,pts[i].lng)>=threshold)out.push(pts[i]);}if(out.length<2&&pts.length>=2)out.push(pts[pts.length-1]);return out;}

    // -- naming --
    function nextName(k){var p=k==='line'?'L':'T',n=1;while(nameExists(p+n)||lineNameExists(p+n))n++;return p+n;}
    function nameExists(n){for(var i=0;i<objects.length;i++)if(objects[i].name===n)return true;return false;}
    function lineNameExists(n){for(var i=0;i<lines.length;i++)if(lines[i].name===n)return true;return false;}

    // -- objects (track points) --
    function addObject(d,silent){var iconKey=d.icon||'redPin',cssClass=ICON_PINS[iconKey]||'pin-red';var o={id:d.id||('o'+Date.now()+'_'+Math.floor(Math.random()*100000)),kind:'track',name:d.name||nextName('track'),icon:iconKey,description:d.description||'',sources:d.sources||(d.source?[d.source]:[]),marker:null,alt:d.alt!=null?+d.alt:null,ptype:d.ptype||'',comment:d.comment||'',time:d.time!=null?+d.time:null,sourceType:d.sourceType||'manual',lineId:d.lineId||null,draggable:!!d.draggable,pointIndex:d.pointIndex!=null?d.pointIndex:null};o.marker=L.marker([d.lat,d.lng],{icon:pinIcon(cssClass),draggable:!!d.draggable,bubblingMouseEvents:false});o.marker._yfx=o;o.marker.bindPopup('');o.marker.on('click',function(e){if(e&&e.originalEvent){L.DomEvent.stop(e.originalEvent);}updatePopup(o);o.marker.openPopup();});o.marker.on('contextmenu',function(e){if(e&&e.originalEvent)L.DomEvent.preventDefault(e.originalEvent);openDialog(o);});o.marker.on('mouseover',function(){if(spiderfyActive)return;handleMarkerHover(o.marker);});o.marker.on('mouseout',function(){handleMarkerOut();});if(o.draggable){o.marker.on('dragstart',function(){pushHistory();});o.marker.on('drag',function(){onTrackMarkerDrag(o);});o.marker.on('dragend',function(){onTrackMarkerDragEnd(o);});}itemLayer.addLayer(o.marker);objects.push(o);updateMarkerLabel(o);if(!silent){updatePopup(o);updateStats();}return o;}
    // 构造节点弹窗。
    // 设计原则：
    //   1. 轨迹采样点已经在 description/comment 中有经纬度/海拔/时间时，不再重复显示顶部坐标、海拔、时间；
    //   2. 已用耗时和总耗时合并到一行，便于阅读；
    //   3. 普通手工标记点仍保留名称、坐标、备注等信息。
    function updatePopup(o){
      var p=o.marker.getLatLng();
      var ld=findLineForObject(o);
      var linesHtml=[];

      if(ld){
        if(o.name)linesHtml.push('名称：'+escapeHtml(o.name));
        linesHtml.push(tr('line')+'：'+escapeHtml(ld.name));
        var delta=distToPointOnLine(o,ld);
        linesHtml.push(tr('distFromStart')+'：'+(delta.ptDist/1000).toFixed(2)+' km / '+tr('lineTotalDist')+'：'+(delta.lineDist/1000).toFixed(2)+' km');

        var tm=lineTimeRange(ld);
        if(tm.min!=null&&tm.max!=null&&tm.max>tm.min){
          var dtTotal=((tm.max-tm.min)/1000);
          var timeParts=[];
          if(o.time!=null){
            var dtElapsed=((o.time-tm.min)/1000);
            if(dtElapsed>=0)timeParts.push(tr('timeFromStart')+'：'+fmtDuration(dtElapsed));
          }
          if(dtTotal>0)timeParts.push(tr('totalDuration')+'：'+fmtDuration(dtTotal));
          if(timeParts.length)linesHtml.push(timeParts.join(' / '));
        }

        linesHtml.push(buildPointInfoLine(o,p));
      }else{
        linesHtml.push('<b>'+escapeHtml(o.name)+'</b>');
        linesHtml.push(p.lat.toFixed(6)+', '+p.lng.toFixed(6));
        if(o.alt!=null)linesHtml.push(tr('altitude')+'：'+Number(o.alt).toFixed(0)+' m');
        if(o.ptype&&o.ptype!=='ptMiddle')linesHtml.push(tr(o.ptype));
        if(o.time!=null)linesHtml.push((new Date(o.time)).toLocaleString());
        if(o.comment)linesHtml.push(tr('comment')+'：'+escapeHtml(o.comment));
      }

      o.marker.bindPopup(linesHtml.join('<br>'));
    }

    function showMarkerInfoDialog(o){
      var panel=ensureMarkerInfoDialog();
      var title=document.getElementById('markerInfoTitle');
      var content=document.getElementById('markerInfoContent');
      if(title)title.textContent=o.name||tr('track');
      if(content){
        var html='';
        try{
          var pop=o.marker.getPopup&&o.marker.getPopup();
          html=pop&&pop.getContent?pop.getContent():'';
        }catch(e){html='';}
        content.innerHTML=html||escapeHtml(o.name||'');
      }
      panel.style.display='block';
      placeMarkerInfoDialog(o);
      enableMarkerInfoDialogDrag();
    }

    function placeMarkerInfoDialog(o){
      var panel=document.getElementById('markerInfoPanel');
      if(!panel||!o||!o.marker)return;
      var r=panel.getBoundingClientRect();
      var w=r.width||420,h=r.height||180;
      if(markerInfoDialogLastPos&&isFinite(markerInfoDialogLastPos.left)&&isFinite(markerInfoDialogLastPos.top)){
        var l=Math.max(8,Math.min(markerInfoDialogLastPos.left,window.innerWidth-w-8));
        var t=Math.max(8,Math.min(markerInfoDialogLastPos.top,window.innerHeight-h-36));
        panel.style.left=Math.round(l)+'px';
        panel.style.top=Math.round(t)+'px';
        markerInfoDialogLastPos={left:Math.round(l),top:Math.round(t)};
        return;
      }
      var pt=map.latLngToContainerPoint(o.marker.getLatLng());
      var left=Math.round(pt.x+18),top=Math.round(pt.y+18);
      left=Math.max(8,Math.min(left,window.innerWidth-w-8));
      top=Math.max(8,Math.min(top,window.innerHeight-h-36));
      panel.style.left=left+'px';
      panel.style.top=top+'px';
      markerInfoDialogLastPos={left:left,top:top};
    }

    function enableMarkerInfoDialogDrag(){
      var panel=document.getElementById('markerInfoPanel');
      var header=document.getElementById('markerInfoTitle');
      if(!panel||!header||header._dragBound)return;
      header._dragBound=true;
      var dragging=false,startX=0,startY=0,startLeft=0,startTop=0;
      header.onmousedown=function(e){
        if(e.button!==0)return;
        e.preventDefault();
        dragging=true;
        startX=e.clientX;startY=e.clientY;
        var r=panel.getBoundingClientRect();
        startLeft=r.left;startTop=r.top;
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp,{once:true});
      };
      function onMove(e){
        if(!dragging)return;
        var r=panel.getBoundingClientRect();
        var left=startLeft+(e.clientX-startX);
        var top=startTop+(e.clientY-startY);
        left=Math.max(0,Math.min(left,window.innerWidth-r.width));
        top=Math.max(0,Math.min(top,window.innerHeight-r.height));
        panel.style.left=Math.round(left)+'px';
        panel.style.top=Math.round(top)+'px';
      }
      function onUp(){
        dragging=false;
        var r=panel.getBoundingClientRect();
        markerInfoDialogLastPos={left:Math.round(r.left),top:Math.round(r.top)};
        document.removeEventListener('mousemove',onMove);
      }
    }

    function closeMarkerInfoDialog(){
      var panel=document.getElementById('markerInfoPanel');
      if(panel)panel.style.display='none';
    }
    function buildPointInfoLine(o,p){
      var parsed=parseDescriptionInfo(o.comment || o.description || '');

    function drawElevationChart(line){
      var canvas=document.getElementById('elevationCanvas');
      var hint=document.getElementById('elevationHint');
      if(!canvas)return;
      var ctx=canvas.getContext('2d');
      var w=canvas.width,h=canvas.height;
      ctx.clearRect(0,0,w,h);
      ctx.fillStyle='#101820';
      ctx.fillRect(0,0,w,h);

      var pts=[];
      for(var i=0;i<line.points.length;i++){
        var a=line.points[i].alt;
        if(a==null)continue;
        a=+a;
        if(isFinite(a))pts.push({idx:i+1,alt:a});
      }
      if(pts.length<2){
        ctx.fillStyle='#9aa8b5';
        ctx.font='14px Consolas, Microsoft YaHei, sans-serif';
        ctx.fillText(tr('notEnoughAltitude'),24,42);
        if(hint)hint.textContent='';
        return;
      }

      var left=54,right=16,top=18,bottom=36;
      var minAlt=pts[0].alt,maxAlt=pts[0].alt;
      for(var j=1;j<pts.length;j++){if(pts[j].alt<minAlt)minAlt=pts[j].alt;if(pts[j].alt>maxAlt)maxAlt=pts[j].alt;}
      if(maxAlt===minAlt){maxAlt+=1;minAlt-=1;}
      var pad=(maxAlt-minAlt)*0.08;
      minAlt-=pad;maxAlt+=pad;
      var minIdx=1,maxIdx=line.points.length;
      function xOf(idx){return left+(idx-minIdx)/(maxIdx-minIdx||1)*(w-left-right);}
      function yOf(alt){return top+(maxAlt-alt)/(maxAlt-minAlt)*(h-top-bottom);}

      ctx.strokeStyle='rgba(255,255,255,.18)';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(left,top);ctx.lineTo(left,h-bottom);ctx.lineTo(w-right,h-bottom);ctx.stroke();

      ctx.fillStyle='#9aa8b5';
      ctx.font='11px Consolas, Microsoft YaHei, sans-serif';
      for(var gy=0;gy<=4;gy++){
        var alt=minAlt+(maxAlt-minAlt)*gy/4;
        var y=yOf(alt);
        ctx.strokeStyle='rgba(255,255,255,.08)';
        ctx.beginPath();ctx.moveTo(left,y);ctx.lineTo(w-right,y);ctx.stroke();
        ctx.fillText(Math.round(alt)+'m',6,y+4);
      }
      for(var gx=0;gx<=4;gx++){
        var idx=Math.round(minIdx+(maxIdx-minIdx)*gx/4);
        var x=xOf(idx);
        ctx.strokeStyle='rgba(255,255,255,.06)';
        ctx.beginPath();ctx.moveTo(x,top);ctx.lineTo(x,h-bottom);ctx.stroke();
        ctx.fillText(String(idx),x-10,h-12);
      }

      ctx.strokeStyle='#ffd23f';
      ctx.lineWidth=2;
      ctx.beginPath();
      for(var k=0;k<pts.length;k++){
        var px=xOf(pts[k].idx),py=yOf(pts[k].alt);
        if(k===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.stroke();

      ctx.fillStyle='#c9d3dc';
      ctx.fillText('X: '+tr('linePts')+' / Y: '+tr('altitude'),left,12);
      if(hint)hint.textContent=tr('altitudeRange')+'：'+Math.round(minAlt)+' m - '+Math.round(maxAlt)+' m；'+tr('validAltitudePoints')+'：'+pts.length+' / '+line.points.length;
    }

    /*
     * KML 兼容导入/导出层
     * ------------------------------------------------------------
     * 对 C/C++ 开发人员可以这样理解：
     *   1. DOMParser 负责把 XML 解析成树；
     *   2. importKmlText() 是“反序列化入口”；
     *   3. buildKmlString() 是“序列化入口”；
     *   4. 内部统一使用本程序的数据模型：
     *        line.points[] = { lat, lng, alt?, time? }
     *        object.marker = Leaflet Marker，附带 alt/time/lineId 等元数据。
     *
     * 兼容的 KML 写法：
     *   - <LineString><coordinates>lng,lat,alt ...</coordinates></LineString>
     *   - <gx:Track><when>...</when><gx:coord>lng lat alt</gx:coord></gx:Track>
     *   - <gx:MultiTrack> 下的多个 <gx:Track>
     *   - <Placemark id="realPoint"><ExtendedData>...</ExtendedData><Point>...</Point></Placemark>
     *   - 普通 <Placemark><Point>...</Point></Placemark>
     *   - 经纬度/海拔/时间也会从 description 的中文字段中兜底提取。
     */
    function importKmlText(text, source) {
      var doc = new DOMParser().parseFromString(text, 'application/xml');
      if (doc.getElementsByTagName('parsererror').length) {
        throw new Error('KML XML parse error');
      }

      var fileBase = baseName(source) || 'KML';
      // Tbulu 等 KML 的路线总名存放在 /kml/Document/name。
      // 本工具导入时优先使用 Document/name 作为总路线名，轨迹分段统一命名为：路线名-分段1、路线名-分段2...
      var documentRouteName = getKmlDocumentName(doc) || fileBase;
      var segmentCounter = { value: 0 };
      var prevLineCount = lines.length;
      var prevObjCount = objects.length;
      var addedObjects = 0;
      var importedPathLines = [];
      var placemarks = toArray(doc.getElementsByTagName('Placemark'));

      // 先把所有 realPoint 的时间做成坐标索引，用于给 LineString 补时间。
      var timeIndex = collectRealPointTimeIndex(placemarks);
      // 记录首尾 realPoint，用于过滤与真实采样点完全重合的 startPoint/endPoint。
      var realEndpoints = collectRealPointEndpoints(placemarks);

      // 第一阶段：导入所有轨迹线。轨迹线是主数据，标记点再挂到最近的轨迹线上。
      for (var i = 0; i < placemarks.length; i++) {
        importPlacemarkLines(placemarks[i], documentRouteName, source, timeIndex, importedPathLines, segmentCounter);
      }

      // 如果只有一个轨迹分段，直接使用路线总名，不追加“-分段1”。
      normalizeSingleImportedSegmentName(prevLineCount, documentRouteName || fileBase || 'KML');

      // 第二阶段：导入标记点/轨迹采样点。
      for (var j = 0; j < placemarks.length; j++) {
        addedObjects += importPlacemarkPoint(placemarks[j], source, importedPathLines, fileBase, realEndpoints);
      }

      // 兜底：有些 KML 只有裸 coordinates，没有标准 Placemark/LineString 包装。
      if (importedPathLines.length === 0 && addedObjects === 0) {
        var allCoords = parseCoordList(textOf(doc, 'coordinates'));
        if (allCoords.length >= 2) {
          var line = addLine({
            name: uniqueImportedSegmentName(documentRouteName || fileBase || 'KML Line', ++segmentCounter.value),
            color: '#ffd23f',
            points: allCoords
          }, true);
          line._importedFile = source;
          importedPathLines.push({ id: line.id, points: line.points });
        }
      }

      // 如果只有轨迹线没有标记点，不强行给每个 GPS 点生成 Marker，避免大轨迹文件导入后卡顿。
      for (var ln = prevLineCount; ln < lines.length; ln++) {
        normalizeLinePointTypes(lines[ln], prevObjCount);
      }
      updateStats();
      updateAllMarkerLabels();

      // 返回“新增实体数量”：轨迹线 + 标记点。
      return (lines.length - prevLineCount) + addedObjects;
    }

    function importPlacemarkLines(pm, routeName, source, timeIndex, importedPathLines, segmentCounter) {
      var lineStrings = descendantsByLocalName(pm, 'LineString');
      var gxTracks = descendantsByLocalName(pm, 'Track');

      for (var i = 0; i < lineStrings.length; i++) {
        var pts = parseCoordList(textOf(lineStrings[i], 'coordinates'));
        if (pts.length < 2) continue;
        applyIndexedTimes(pts, timeIndex);
        addImportedLine(routeName, ++segmentCounter.value, pts, source, importedPathLines);
      }

      for (var j = 0; j < gxTracks.length; j++) {
        var trackPts = parseGxTrack(gxTracks[j]);
        if (trackPts.length < 2) continue;
        applyIndexedTimes(trackPts, timeIndex);
        addImportedLine(routeName, ++segmentCounter.value, trackPts, source, importedPathLines);
      }
    }

    function addImportedLine(base, segmentNo, pts, source, importedPathLines) {
      var line = addLine({
        name: uniqueImportedSegmentName(base || 'KML Line', segmentNo),
        color: '#ffd23f',
        points: pts,
        startIcon: '',
        endIcon: ''
      }, true);
      line._importedFile = source;
      importedPathLines.push({ id: line.id, points: line.points });
      return line;
    }

    function importPlacemarkPoint(pm, source, importedPathLines, fileBase, realEndpoints) {
      var pointNode = descendantsByLocalName(pm, 'Point')[0];
      if (!pointNode) return 0;

      var ext = readExtendedData(pm);
      var descInfo = parseDescriptionInfo(textOf(pm, 'description'));
      var coord = parseFirstCoordinate(textOf(pointNode, 'coordinates'));

      // 优先级：ExtendedData > Point 坐标 > description 兜底。
      var lat = firstFinite(ext.lat, coord ? coord.lat : null, descInfo.lat);
      var lng = firstFinite(ext.lng, coord ? coord.lng : null, descInfo.lng);
      if (!isFinite(lat) || !isFinite(lng)) return 0;

      var alt = firstFinite(ext.alt, coord ? coord.alt : null, descInfo.alt);
      var pmId = pm.getAttribute('id') || '';
      // startPoint/endPoint 如果与首尾 realPoint 的经纬度和海拔完全一致，就跳过，避免同一点重复显示。
      if ((pmId === 'startPoint' || pmId === 'endPoint') && shouldSkipEndpointPoint(pmId, {lat:lat,lng:lng,alt:alt}, realEndpoints)) {
        logInfo('跳过与 realPoint 重合的 '+pmId+'：'+(textOf(pm,'name')||''));
        return 0;
      }

      var whenText = textOf(pm, 'when') || ext.timeText || descInfo.timeText;
      var time = firstFinite(ext.time, parseTimeValue(whenText), descInfo.time);
      var name = textOf(pm, 'name') || fileBase || 'Point';
      var lineMatch = findNearestLinePoint(lat, lng, importedPathLines, 80);
      var ptype = lineMatch ? pointTypeByIndex(lineMatch.index, lineMatch.count) : '';

      addObject({
        kind: 'track',
        name: uniqueImportedName(name, 0),
        icon: iconFromStyle(textOf(pm, 'styleUrl')),
        lat: lat,
        lng: lng,
        alt: isFinite(alt) ? alt : null,
        ptype: ptype,
        time: isFinite(time) ? time : null,
        comment: descInfo.comment || name,
        source: source,
        sourceType: pmId || 'point',
        lineId: lineMatch ? lineMatch.lineId : null,
        pointIndex: lineMatch ? lineMatch.index : null
      }, true);
      return 1;
    }

    function collectRealPointEndpoints(placemarks) {
      var arr=[];
      for(var i=0;i<placemarks.length;i++){
        if((placemarks[i].getAttribute('id')||'')!=='realPoint')continue;
        var pointNode=descendantsByLocalName(placemarks[i],'Point')[0];
        var coord=pointNode?parseFirstCoordinate(textOf(pointNode,'coordinates')):null;
        var ext=readExtendedData(placemarks[i]);
        var descInfo=parseDescriptionInfo(textOf(placemarks[i],'description'));
        var lat=firstFinite(ext.lat,coord?coord.lat:null,descInfo.lat);
        var lng=firstFinite(ext.lng,coord?coord.lng:null,descInfo.lng);
        var alt=firstFinite(ext.alt,coord?coord.alt:null,descInfo.alt);
        if(isFinite(lat)&&isFinite(lng))arr.push({lat:lat,lng:lng,alt:alt});
      }
      return {first:arr.length?arr[0]:null,last:arr.length?arr[arr.length-1]:null};
    }

    function shouldSkipEndpointPoint(pmId, pt, endpoints) {
      if(!endpoints)return false;
      if(pmId==='startPoint')return sameLatLngAlt(pt,endpoints.first);
      if(pmId==='endPoint')return sameLatLngAlt(pt,endpoints.last);
      return false;
    }

    function sameLatLngAlt(a,b) {
      if(!a||!b)return false;
      if(Math.abs(Number(a.lat)-Number(b.lat))>1e-7)return false;
      if(Math.abs(Number(a.lng)-Number(b.lng))>1e-7)return false;
      if(!isFinite(Number(a.alt))||!isFinite(Number(b.alt)))return false;
      return Math.abs(Number(a.alt)-Number(b.alt))<=1e-3;
    }

    function collectRealPointTimeIndex(placemarks) {
      var index = {};
      for (var i = 0; i < placemarks.length; i++) {
        if ((placemarks[i].getAttribute('id') || '') !== 'realPoint') continue;
        var ext = readExtendedData(placemarks[i]);
        var pointNode = descendantsByLocalName(placemarks[i], 'Point')[0];
        var coord = pointNode ? parseFirstCoordinate(textOf(pointNode, 'coordinates')) : null;
        var lat = firstFinite(ext.lat, coord ? coord.lat : null);
        var lng = firstFinite(ext.lng, coord ? coord.lng : null);
        var time = firstFinite(ext.time, parseTimeValue(ext.timeText), parseTimeValue(textOf(placemarks[i], 'when')));
        if (isFinite(lat) && isFinite(lng) && isFinite(time)) {
          index[coordKey(lat, lng)] = time;
        }
      }
      return index;
    }

    function applyIndexedTimes(points, timeIndex) {
      for (var i = 0; i < points.length; i++) {
        var t = timeIndex[coordKey(points[i].lat, points[i].lng)];
        if (isFinite(t)) points[i].time = t;
      }
    }

    function readExtendedData(pm) {
      var out = { lat: NaN, lng: NaN, alt: NaN, time: NaN, timeText: '' };
      var datas = descendantsByLocalName(pm, 'Data');
      for (var i = 0; i < datas.length; i++) {
        var key = String(datas[i].getAttribute('name') || '').toLowerCase();
        var val = textOf(datas[i], 'value');
        if (!val) continue;
        if (key === 'latitude' || key === 'lat' || key === '纬度') out.lat = parseFloat(val);
        else if (key === 'longitude' || key === 'longtitude' || key === 'lng' || key === 'lon' || key === '经度') out.lng = parseFloat(val);
        else if (key === 'altitude' || key === 'alt' || key === 'ele' || key === '海拔') out.alt = parseFloat(val);
        else if (key === 'time' || key === 'timestamp' || key === '时间') {
          out.time = parseTimeValue(val);
          out.timeText = val;
        }
      }
      return out;
    }

    function parseDescriptionInfo(desc) {
      // description 经常是 CDATA HTML，例如：<div>经度：114...</div>
      var txt = htmlToPlainText(desc || '');
      return {
        lng: parseLabelNumber(txt, ['经度', 'lng', 'lon', 'longitude', 'longtitude']),
        lat: parseLabelNumber(txt, ['纬度', 'lat', 'latitude']),
        alt: parseLabelNumber(txt, ['海拔', '高度', 'alt', 'altitude', 'ele']),
        time: parseTimeValue(parseLabelText(txt, ['时间', 'time', 'timestamp'])),
        timeText: parseLabelText(txt, ['时间', 'time', 'timestamp']),
        comment: txt
      };
    }

    function parseCoordList(text) {
      var out = [];
      if (!text) return out;
      var tokens = String(text).replace(/[;\r\n\t]+/g, ' ').trim().split(/\s+/);
      for (var i = 0; i < tokens.length; i++) {
        var pt = parseCoordinateToken(tokens[i]);
        if (pt) out.push(pt);
      }
      return out;
    }

    function parseFirstCoordinate(text) {
      var list = parseCoordList(text);
      return list.length ? list[0] : null;
    }

    function parseCoordinateToken(token) {
      var parts = String(token || '').split(',');
      if (parts.length < 2) return null;
      var lng = parseFloat(parts[0]);
      var lat = parseFloat(parts[1]);
      var alt = parts.length >= 3 ? parseFloat(parts[2]) : NaN;
      if (!isFinite(lat) || !isFinite(lng)) return null;
      var pt = { lat: lat, lng: lng };
      if (isFinite(alt)) pt.alt = alt;
      return pt;
    }

    function parseGxTrack(trackEl) {
      var coords = descendantsByLocalName(trackEl, 'coord');
      var whens = descendantsByLocalName(trackEl, 'when');
      var out = [];
      for (var i = 0; i < coords.length; i++) {
        var raw = (coords[i].textContent || '').replace(/\s+/g, ' ').trim();
        var parts = raw.split(' ');
        var lng = parseFloat(parts[0]);
        var lat = parseFloat(parts[1]);
        var alt = parseFloat(parts[2]);
        if (!isFinite(lat) || !isFinite(lng)) continue;
        var pt = { lat: lat, lng: lng };
        if (isFinite(alt)) pt.alt = alt;
        if (whens[i]) {
          var t = parseTimeValue(whens[i].textContent);
          if (isFinite(t)) pt.time = t;
        }
        out.push(pt);
      }
      return out;
    }

    function buildKmlString(exportLines, mergeAll, documentName) {
      var lineIdSet = new Set();
      for (var i = 0; i < exportLines.length; i++) lineIdSet.add(exportLines[i].id);

      var p = [
        '<?xml version="1.0" encoding="UTF-8"?>',
        '<kml xmlns="http://www.opengis.net/kml/2.2" xmlns:gx="http://www.google.com/kml/ext/2.2">',
        '<Document>',
        '  <name><![CDATA[' + cdataSafe(documentName || 'YFxGeoStudio') + ']]></name>',
        '  <Style id="drawLine"><LineStyle><color>ff3fd2ff</color><width>4</width></LineStyle></Style>',
        '  <Style id="MarkerStyleText"><IconStyle><scale>1.0</scale></IconStyle></Style>'
      ];

      // 标记点独立导出，便于其它软件识别采样点/备注/时间。
      for (var objIndex = 0; objIndex < objects.length; objIndex++) {
        var o = objects[objIndex];
        if (o.lineId != null && !lineIdSet.has(o.lineId)) continue;
        var pointKml = buildPointPlacemarkKml(o, objIndex);
        if (pointKml) p.push(pointKml);
      }

      if (mergeAll && exportLines.length > 1) {
        p.push(buildMultiTrackKml(exportLines, documentName));
      } else {
        for (var lineIndex = 0; lineIndex < exportLines.length; lineIndex++) {
          p.push(buildLinePlacemarkKml(exportLines[lineIndex]));
        }
      }

      p.push('</Document>', '</kml>');
      return p.join('\n');
    }

    // 安全数值格式化：KML 来源复杂，海拔/时间/经纬度可能是 null、undefined、空字符串或字符串数字。
    // 统一先转 Number，再判断 isFinite，避免 null.toFixed() 这类导出崩溃。
    function finiteNumber(v, defaultValue) {
      var n = Number(v);
      return isFinite(n) ? n : defaultValue;
    }

    function fixedNumber(v, digits, defaultValue) {
      return finiteNumber(v, defaultValue == null ? 0 : defaultValue).toFixed(digits);
    }

    function safeLatLngFromObject(o) {
      if (!o || !o.marker || typeof o.marker.getLatLng !== 'function') return null;
      var ll = o.marker.getLatLng();
      var lat = finiteNumber(ll && ll.lat, NaN);
      var lng = finiteNumber(ll && ll.lng, NaN);
      if (!isFinite(lat) || !isFinite(lng)) return null;
      return { lat: lat, lng: lng };
    }

    function buildPointPlacemarkKml(o, objIndex) {
      var ll = safeLatLngFromObject(o);
      if (!ll) {
        logWarn('导出时跳过非法标记点：index=' + objIndex + ', name=' + ((o && o.name) || ''));
        return '';
      }

      var alt = finiteNumber(o.alt, 0);
      var time = finiteNumber(o.time, NaN);
      if (!isFinite(time)) time = null;

      var lngText = fixedNumber(ll.lng, 7, 0);
      var latText = fixedNumber(ll.lat, 7, 0);
      var altText = fixedNumber(alt, 1, 0);

      var desc = '<div>经度：' + lngText + '</div>' +
                 '<div>纬度：' + latText + '</div>' +
                 '<div>海拔：' + altText + '</div>' +
                 (time != null ? '<div>时间：' + formatLocalDateTime(time) + '</div>' : '') +
                 (o.comment ? '<div>备注：' + escapeHtml(o.comment) + '</div>' : '');

      var ext = [
        '    <ExtendedData>',
        '      <Data name="Latitude"><value>' + latText + '</value></Data>',
        '      <Data name="Longitude"><value>' + lngText + '</value></Data>',
        // Longtitude 是旧版本拼写错误，保留它是为了兼容历史文件。
        '      <Data name="Longtitude"><value>' + lngText + '</value></Data>',
        '      <Data name="Altitude"><value>' + altText + '</value></Data>'
      ];
      if (time != null) {
        ext.push('      <Data name="Time"><value>' + time + '</value></Data>');
        ext.push('      <Data name="TimeText"><value>' + xmlEscape(formatLocalDateTime(time)) + '</value></Data>');
      }
      ext.push('    </ExtendedData>');

      var out = [
        '  <Placemark id="realPoint">',
        '    <name><![CDATA[' + cdataSafe(o.name || 'Point') + ']]></name>',
        '    <description><![CDATA[' + cdataSafe(desc) + ']]></description>',
        '    <styleUrl>#MarkerStyleText</styleUrl>',
        ext.join('\n')
      ];
      if (time != null) out.push('    <TimeStamp><when>' + new Date(time).toISOString() + '</when></TimeStamp>');
      out.push('    <Point><coordinates>' + lngText + ',' + latText + ',' + altText + '</coordinates></Point>');
      out.push('  </Placemark>');
      return out.join('\n');
    }

    function buildLinePlacemarkKml(line) {
      var coords = coordListToKml(line.points);
      var span = lineTimeSpan(line);
      var out = [
        '  <Placemark>',
        '    <name><![CDATA[' + cdataSafe(line.name || 'Line') + ']]></name>',
        '    <styleUrl>#drawLine</styleUrl>'
      ];
      if (span) out.push('    <TimeSpan><begin>' + span.begin + '</begin><end>' + span.end + '</end></TimeSpan>');
      out.push('    <LineString><tessellate>1</tessellate><coordinates>' + coords + '</coordinates></LineString>');
      out.push('  </Placemark>');
      return out.join('\n');
    }

    function buildMultiTrackKml(exportLines, documentName) {
      var out = [
        '  <Placemark>',
        '    <name><![CDATA[' + cdataSafe(documentName || tr('exportMergedKml')) + ']]></name>',
        '    <styleUrl>#drawLine</styleUrl>',
        '    <gx:MultiTrack><interpolate>0</interpolate>'
      ];
      for (var i = 0; i < exportLines.length; i++) {
        out.push('      <gx:Track>');
        out.push('        <name><![CDATA[' + cdataSafe(exportLines[i].name || ('Line ' + (i + 1))) + ']]></name>');
        for (var j = 0; j < exportLines[i].points.length; j++) {
          var pt = exportLines[i].points[j];
          var gxCoord = pointToGxCoord(pt);
          if (!gxCoord) {
            logWarn('导出 gx:Track 时跳过非法轨迹点：line=' + (exportLines[i].name || exportLines[i].id) + ', index=' + j);
            continue;
          }
          if (isFinite(pt.time)) out.push('        <when>' + new Date(pt.time).toISOString() + '</when>');
          out.push('        <gx:coord>' + gxCoord + '</gx:coord>');
        }
        out.push('      </gx:Track>');
      }
      out.push('    </gx:MultiTrack>');
      out.push('  </Placemark>');
      return out.join('\n');
    }

    function coordListToKml(points) {
      var out = [];
      for (var i = 0; i < points.length; i++) {
        var coord = pointToKmlCoord(points[i]);
        if (coord) out.push(coord);
      }
      return out.join(' ');
    }

    function pointToKmlCoord(pt) {
      var lat = finiteNumber(pt && pt.lat, NaN);
      var lng = finiteNumber(pt && pt.lng, NaN);
      if (!isFinite(lat) || !isFinite(lng)) return '';
      var alt = finiteNumber(pt && pt.alt, 0);
      return fixedNumber(lng, 7, 0) + ',' + fixedNumber(lat, 7, 0) + ',' + fixedNumber(alt, 1, 0);
    }

    function pointToGxCoord(pt) {
      var lat = finiteNumber(pt && pt.lat, NaN);
      var lng = finiteNumber(pt && pt.lng, NaN);
      if (!isFinite(lat) || !isFinite(lng)) return '';
      var alt = finiteNumber(pt && pt.alt, 0);
      return fixedNumber(lng, 7, 0) + ' ' + fixedNumber(lat, 7, 0) + ' ' + fixedNumber(alt, 1, 0);
    }

    function lineTimeSpan(line) {
      var minT = null, maxT = null;
      for (var i = 0; i < line.points.length; i++) {
        var t = line.points[i].time;
        if (!isFinite(t)) continue;
        if (minT == null || t < minT) minT = t;
        if (maxT == null || t > maxT) maxT = t;
      }
      for (var j = 0; j < objects.length; j++) {
        if (objects[j].lineId !== line.id || !isFinite(objects[j].time)) continue;
        if (minT == null || objects[j].time < minT) minT = objects[j].time;
        if (maxT == null || objects[j].time > maxT) maxT = objects[j].time;
      }
      if (minT == null || maxT == null || maxT <= minT) return null;
      return { begin: new Date(minT).toISOString(), end: new Date(maxT).toISOString() };
    }

    function findNearestLinePoint(lat, lng, pathLines, maxMeters) {
      var best = null;
      var bestD = Infinity;
      for (var i = 0; i < pathLines.length; i++) {
        var pts = pathLines[i].points;
        for (var j = 0; j < pts.length; j++) {
          var d = distanceMeters(lat, lng, pts[j].lat, pts[j].lng);
          if (d < bestD) {
            bestD = d;
            best = { lineId: pathLines[i].id, index: j, count: pts.length };
          }
        }
      }
      return bestD <= (maxMeters || 80) ? best : null;
    }

    function pointTypeByIndex(index, count) {
      if (index <= 0) return 'ptStart';
      if (index >= count - 1) return 'ptEnd';
      return 'ptMiddle';
    }

    function descendantsByLocalName(node, localName) {
      var out = [];
      var all = node.getElementsByTagName('*');
      for (var i = 0; i < all.length; i++) {
        if ((all[i].localName || all[i].nodeName).replace(/^.*:/, '') === localName) out.push(all[i]);
      }
      return out;
    }

    function toArray(list) {
      var out = [];
      for (var i = 0; i < list.length; i++) out.push(list[i]);
      return out;
    }

    function textOf(node, tag) {
      if (!node) return '';
      var list = node.getElementsByTagName(tag);
      if ((!list || !list.length) && tag.indexOf(':') < 0) list = descendantsByLocalName(node, tag);
      return list && list[0] && list[0].textContent ? list[0].textContent.trim() : '';
    }

    function firstFinite() {
      for (var i = 0; i < arguments.length; i++) {
        var v = typeof arguments[i] === 'string' ? parseFloat(arguments[i]) : arguments[i];
        if (isFinite(v)) return +v;
      }
      return NaN;
    }

    function parseTimeValue(v) {
      if (v == null || v === '') return NaN;
      if (typeof v === 'number') return v;
      var s = String(v).trim();
      if (/^\d+$/.test(s)) {
        var n = parseInt(s, 10);
        return n < 10000000000 ? n * 1000 : n;
      }
      // 兼容“2025-08-24 14:40:02”这种没有 T 的本地时间。
      var t = Date.parse(s.replace(' ', 'T'));
      return isFinite(t) ? t : NaN;
    }

    function parseLabelText(text, labels) {
      for (var i = 0; i < labels.length; i++) {
        var re = new RegExp(labels[i] + '\\s*[：:]\\s*([^\\n;，,]+)', 'i');
        var m = re.exec(text || '');
        if (m) return m[1].trim();
      }
      return '';
    }

    function parseLabelNumber(text, labels) {
      var s = parseLabelText(text, labels);
      var m = /[-+]?\d+(?:\.\d+)?/.exec(s);
      return m ? parseFloat(m[0]) : NaN;
    }

    function htmlToPlainText(html) {
      return String(html || '')
        .replace(/<\s*br\s*\/?\s*>/gi, '\n')
        .replace(/<\s*\/\s*div\s*>/gi, '\n')
        .replace(/<[^>]+>/g, '')
        .replace(/&nbsp;/g, ' ')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&amp;/g, '&')
        .replace(/\r/g, '')
        .trim();
    }

    function iconFromStyle(styleUrl) {
      var s = String(styleUrl || '').toLowerCase();
      if (s.indexOf('blue') >= 0) return 'bluePin';
      if (s.indexOf('green') >= 0) return 'greenPin';
      if (s.indexOf('orange') >= 0) return 'orangePin';
      if (s.indexOf('purple') >= 0) return 'purplePin';
      if (s.indexOf('yellow') >= 0) return 'yellowPin';
      return 'redPin';
    }

    function coordKey(lat, lng) {
      return Number(lng).toFixed(6) + ',' + Number(lat).toFixed(6);
    }

    function formatLocalDateTime(t) {
      var d = new Date(t);
      function z(n) { return n < 10 ? '0' + n : String(n); }
      return d.getFullYear() + '-' + z(d.getMonth() + 1) + '-' + z(d.getDate()) + ' ' +
             z(d.getHours()) + ':' + z(d.getMinutes()) + ':' + z(d.getSeconds());
    }

    function cdataSafe(s) {
      return String(s || '').replace(/\]\]>/g, ']]]]><![CDATA[>');
    }


    function getKmlDocumentName(doc) {
      var docs = descendantsByLocalName(doc, 'Document');
      if (docs.length) {
        var n = textOf(docs[0], 'name');
        if (n) return n;
      }
      return textOf(doc, 'name');
    }

    function normalizeSingleImportedSegmentName(prevLineCount, base) {
      var added = lines.length - prevLineCount;
      if (added !== 1) return;
      var line = lines[prevLineCount];
      if (!line) return;
      var desired = uniqueLineNameWithoutSuffix(base || 'KML', line);
      line.name = desired;
      if (line.polyline) {
        bindLinePopup(line);
      }
    }

    function uniqueLineNameWithoutSuffix(base, selfLine) {
      var n = base || 'KML';
      var exists = function(name){
        for(var i=0;i<objects.length;i++)if(objects[i].name===name)return true;
        for(var j=0;j<lines.length;j++)if(lines[j]!==selfLine && lines[j].name===name)return true;
        return false;
      };
      if(!exists(n))return n;
      var i=2;
      while(exists(n+'-'+i))i++;
      return n+'-'+i;
    }

    function uniqueImportedSegmentName(base, segmentNo) {
      var n = (base || 'KML') + '-分段' + (segmentNo || 1);
      if (!nameExists(n) && !lineNameExists(n)) return n;
      var i = 2;
      while (nameExists(n + '-' + i) || lineNameExists(n + '-' + i)) i++;
      return n + '-' + i;
    }

    function normalizeExportFileName(name) {
      var s = String(name || '').trim();
      s = s.replace(/[\/:*?"<>|]+/g, '_');
      s = s.replace(/\.kml$/i, '');
      return s || ('YFxGeoStudio_' + dateStamp());
    }

    function askExportBaseName(defaultBase) {
      var v = prompt('请输入导出的 KML 文件名：', defaultBase || ('YFxGeoStudio_' + dateStamp()));
      if (v == null) return null;
      return normalizeExportFileName(v);
    }

    function uniqueImportedName(base, index) {
      var n = base || 'KML';
      if (index > 0) n += '-' + (index + 1);
      if (!nameExists(n) && !lineNameExists(n)) return n;
      var i = 2;
      while (nameExists(n + '-' + i) || lineNameExists(n + '-' + i)) i++;
      return n + '-' + i;
    }

    function exportKml(){
      finishAndExitTrackMode(true);
      logInfo('执行合并导出 KML：lines='+lines.length+', objects='+objects.length);
      if(!objects.length&&!lines.length){toast(tr('noData'));return false;}
      try{
        // 顶部按钮固定执行“合并导出”：有多条轨迹时写 gx:MultiTrack；只有一条时写普通 LineString。
        var merge=lines.length>1;
        var exportBase=askExportBaseName((tr('exportMergedKml')+'_'+dateStamp()));
        if(exportBase==null){logInfo('用户取消 KML 导出');return false;}
        var fname=exportBase+'.kml';
        var xml=buildKmlString(lines,merge,exportBase);
        downloadText(xml,fname,'application/vnd.google-earth.kml+xml;charset=utf-8');
        logInfo('KML 导出完成：'+fname+'，字节数：'+xml.length);
        toast(tr('exported'));
      }catch(e){
        _rawConsoleError('KML 导出失败', e);
        logError('KML 导出失败：' + (e && (e.stack || e.message) ? (e.stack || e.message) : e));
        toast('KML 导出失败：'+(e&&e.message?e.message:e));
      }
      return false;
    }
    function exportSelectedKml(){
      finishAndExitTrackMode(true);
      var arr=Array.from(selectedLines);
      if(!arr.length){toast(tr('noData'));return false;}
      try{
        var merge=arr.length>1;
        var defaultBase=merge?(tr('exportMergedKml')+'_'+dateStamp()):((arr[0].name||'line')+'_'+dateStamp());
        var exportBase=askExportBaseName(defaultBase);
        if(exportBase==null){logInfo('用户取消选中轨迹 KML 导出');return false;}
        var fname=exportBase+'.kml';
        var xml=buildKmlString(arr,merge,exportBase);
        downloadText(xml,fname,'application/vnd.google-earth.kml+xml;charset=utf-8');
        toast(tr('exported'));
      }catch(e){
        _rawConsoleError('KML 选中轨迹导出失败', e);
        logError('KML 选中轨迹导出失败：' + (e && (e.stack || e.message) ? (e.stack || e.message) : e));
        toast('KML 导出失败：'+(e&&e.message?e.message:e));
      }
      return false;
    }
    function refreshExportBtnLabel(){
      var b=document.getElementById('btnExport');
      if(!b)return;
      // data-tip 始终保存翻译 key；按钮可见文字单独更新，避免中英文反转。
      b.setAttribute('data-tip','exportMergedKml');
      b.setAttribute('data-tip-text',tr('exportMergedKml'));
      b.title=tr('exportMergedKml');
      var lbl=b.querySelector('.lbl');
      if(lbl)lbl.textContent=tr('exportMergedKml');
    }

    // -- clear --
    function clearAll(){finishAndExitTrackMode(true);if(!confirm(tr('confirmClear')))return;pushHistory();closeLineInfoDialog();closeMarkerInfoDialog();clearRuntime();document.getElementById('fileText').textContent=tr('file')+'：'+tr('none');updateStats();}
    function fitData(){if(!objects.length&&!lines.length)return;try{var g=L.featureGroup();itemLayer.eachLayer(function(l){g.addLayer(l);});lineLayer.eachLayer(function(l){g.addLayer(l);});map.fitBounds(g.getBounds(),{padding:[36,36],maxZoom:16});}catch(e){}}
    function updateStats(){if(!lines.length){document.getElementById('stats').innerHTML='<div class="no-data">'+tr('noData')+'</div>';selectedLines.clear();refreshExportBtnLabel();return;}var h='<table><thead><tr><th>'+tr('line')+'</th><th class="num">'+tr('markPoints')+'</th><th class="num">'+tr('distance')+'</th><th class="num">'+tr('ascent')+'</th><th class="num">'+tr('descent')+'</th><th class="num">'+tr('duration')+'</th></tr></thead><tbody>';var totalKm=0,totalUp=0,totalDown=0,totalElapsed=0,totalMark=0;for(var i=0;i<lines.length;i++){var st=lineStats(lines[i]),mk=countMarkPoints(lines[i]);totalKm+=st.distance;totalUp+=st.ascent;totalDown+=st.descent;totalElapsed+=st.elapsed;totalMark+=mk;h+='<tr data-lid="'+lines[i].id+'" onclick="selectLineById(\''+lines[i].id+'\',event.ctrlKey||event.metaKey)" oncontextmenu="showLineRowMenu(event,\''+lines[i].id+'\')"><td class="line-name" title="'+escapeHtml(lines[i].name)+'">'+escapeHtml(lines[i].name)+'</td><td class="num">'+mk+'</td><td class="num">'+(st.distance/1000).toFixed(2)+' km</td><td class="num">'+st.ascent.toFixed(0)+' m</td><td class="num">'+st.descent.toFixed(0)+' m</td><td class="num">'+(st.elapsed>0?fmtDuration(st.elapsed):'-')+'</td></tr>';}h+='</tbody><tfoot><tr style="border-top:1px solid rgba(255,255,255,.15);font-weight:600;color:#fff"><td>'+tr('total')+'</td><td class="num">'+totalMark+'</td><td class="num">'+(totalKm/1000).toFixed(2)+' km</td><td class="num">'+totalUp.toFixed(0)+' m</td><td class="num">'+totalDown.toFixed(0)+' m</td><td class="num">'+(totalElapsed>0?fmtDuration(totalElapsed):'-')+'</td></tr></tfoot></table>';document.getElementById('stats').innerHTML=h;if(selectedLines.size>0)highlightSelectedRows();refreshExportBtnLabel();}
    function selectLineById(id,multi){for(var i=0;i<lines.length;i++){if(lines[i].id===id){selectLine(lines[i],null,!!multi,'list');return;}}}
    function showLineRowMenu(e,lineId){e.preventDefault();e.stopPropagation();var menu=document.getElementById('rowMenu');var line=null;for(var i=0;i<lines.length;i++){if(lines[i].id===lineId){line=lines[i];break;}}if(!line)return;if(!selectedLines.has(line)){selectLine(line,null,false,'list');}var selCount=selectedLines.size;var exportLabel=selCount>1?tr('exportMergedKml'):tr('exportKml');menu.innerHTML='<div class="row-menu-item" data-act="export">'+exportLabel+'</div><div class="row-menu-item danger" data-act="delete">'+tr('delete')+'</div>';var rect=menu.getBoundingClientRect();menu.style.left=Math.min(e.clientX,window.innerWidth-160)+'px';menu.style.top=Math.min(e.clientY,window.innerHeight-rect.height-8)+'px';menu.style.display='block';menu._lineId=lineId;var onClick=function(ev){var t=ev.target;if(!t||!t.classList.contains('row-menu-item'))return;var act=t.getAttribute('data-act');hideLineRowMenu();if(act==='export'){exportSelectedKml();}else if(act==='delete'){var toDel=Array.from(selectedLines);if(!toDel.length)toDel=[line];if(!confirm(tr('confirmDeleteLine')||'确定删除此线路？'))return;pushHistory();for(var di=toDel.length-1;di>=0;di--)removeLine(toDel[di]);}};menu.onclick=onClick;var onDoc=function(ev){if(menu.contains(ev.target))return;hideLineRowMenu();};setTimeout(function(){document.addEventListener('mousedown',onDoc,{once:true});},0);}
    function hideLineRowMenu(){var menu=document.getElementById('rowMenu');if(menu)menu.style.display='none';menu.onclick=null;menu._lineId=null;}
    function highlightSelectedRows(){var t=document.querySelectorAll('#stats tr');for(var i=0;i<t.length;i++){var lid=t[i].getAttribute('data-lid');var hit=false;selectedLines.forEach(function(sl){if(sl.id===lid)hit=true;});t[i].classList.toggle('active',hit);}}
    function distToPointOnLine(o,line){var p=o.marker.getLatLng(),closestIdx=-1,closestDist=1e9,sum=0;for(var i=1;i<line.points.length;i++){sum+=distanceMeters(line.points[i-1].lat,line.points[i-1].lng,line.points[i].lat,line.points[i].lng);var d=Math.abs(p.lat-line.points[i].lat)+Math.abs(p.lng-line.points[i].lng);if(d<closestDist){closestDist=d;closestIdx=i;}}if(closestIdx<0)return{lineDist:0,ptDist:0};var ptDist=0;for(var j=1;j<=closestIdx;j++)ptDist+=distanceMeters(line.points[j-1].lat,line.points[j-1].lng,line.points[j].lat,line.points[j].lng);return{lineDist:sum,ptDist:ptDist};}
    function distanceMeters(a,b,c,d){var r=6371008.8,p1=a*Math.PI/180,p2=c*Math.PI/180,dp=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180,x=Math.sin(dp/2)*Math.sin(dp/2)+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)*Math.sin(dl/2);return r*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
    function downloadText(text,name,type){var blob=new Blob([text],{type:type||'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);document.body.removeChild(a);},0);}
    function toast(msg,ms){
      var el=document.getElementById('toast');
      el.textContent=msg;
      el.style.display='block';
      clearTimeout(toast._timer);
      toast._timer=setTimeout(function(){el.style.display='none';},ms||2600);
      // toast 只负责短提示；错误详情由 catch / console / window.onerror 写日志，避免同一错误重复记录。
    }
    function baseName(path){if(!path)return'';return String(path).replace(/\\/g,'/').split('/').pop().replace(/\.[^.]+$/,'');}
    function dateStamp(){var d=new Date();function z(n){return n<10?'0'+n:String(n);}return d.getFullYear()+z(d.getMonth()+1)+z(d.getDate())+'_'+z(d.getHours())+z(d.getMinutes())+z(d.getSeconds());}
    function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
    function xmlEscape(s){return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&apos;'}[c];});}

    // 兼容某些浏览器/打包环境：既保留 HTML onclick，也显式绑定按钮事件。
    window.exportKml=exportKml;
    window.exportSelectedKml=exportSelectedKml;
    // 注意：btnExport 已经在 HTML 中使用 onclick="exportKml()"，这里不要再 addEventListener，避免一次点击导出两次。


    // V11：工具栏中除“手绘轨迹”按钮外，任何按钮/语言选择动作都会先结束手绘状态。
    (function(){
      var tb=document.getElementById('toolbar');
      if(!tb)return;
      tb.addEventListener('click',function(e){
        var ctl=e.target&&e.target.closest?e.target.closest('button,select'):null;
        if(!ctl||ctl.id==='btnTrack')return;
        finishAndExitTrackMode(true);
      },true);
      tb.addEventListener('change',function(e){
        var ctl=e.target;
        if(!ctl||ctl.id==='btnTrack')return;
        finishAndExitTrackMode(true);
      },true);
    })();

    loadSettings();applyLang();updateStats();updateHistoryButtons();document.getElementById('fileText').textContent=tr('file')+'：'+tr('none');document.getElementById('modeText').textContent=tr('mode')+'：'+tr('browse');
    document.getElementById('dialogMask').addEventListener('click',function(e){if(e.target===this){if(dlgLineTarget){closeLineInfoDialog();}else if(document.getElementById('helpDialogTitle')){closeHelpDialog();}else{closeDialog();}}});
  </script>
