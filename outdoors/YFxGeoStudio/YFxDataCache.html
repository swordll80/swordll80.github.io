<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>YFxDataCache v0.2</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>
  <style>
    :root{
      --bg:rgba(18,24,30,.88);
      --bd:rgba(255,255,255,.16);
      --txt:#eef3f7;
      --muted:#aebdcc;
      --accent:#1677d2;
      --warn:#ffcf66;
      --ok:#55d48b;
      --danger:#ff6b6b;
    }
    *{box-sizing:border-box}
    html,body,#map{width:100%;height:100%;min-width:320px;min-height:380px;margin:0;padding:0;overflow:hidden}
    body{font-family:"Microsoft YaHei","Segoe UI",Arial,sans-serif;background:#101418;color:var(--txt);-webkit-text-size-adjust:100%}
    #map{position:fixed;inset:0;background:#121820}
    .panel{position:fixed;z-index:1000;background:var(--bg);border:1px solid var(--bd);border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.28);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
    button{font:inherit;color:inherit;border:1px solid rgba(255,255,255,.16);border-radius:8px;background:rgba(255,255,255,.08);min-width:40px;height:38px;padding:0 10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:4px;user-select:none}
    button:hover{background:rgba(80,160,230,.22);border-color:rgba(90,170,240,.55)}
    button.active{background:var(--accent);border-color:#4aa3ff;color:#fff}
    button:disabled{opacity:.42;cursor:not-allowed}
    button[data-tip]{position:relative}
    button[data-tip]:after{content:attr(data-tip-text);position:absolute;top:110%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:2000}
    button[data-tip]:hover:after{opacity:1}
    #toolbar{top:calc(env(safe-area-inset-top,0px) + 8px);left:50%;transform:translateX(-50%);display:flex;gap:6px;align-items:center;padding:6px;width:max-content;max-width:calc(100vw - 12px);overflow-x:auto;overflow-y:hidden;scrollbar-width:none}
    #toolbar::-webkit-scrollbar{display:none}
    #toolbar button{font-size:18px;width:42px;min-width:42px;height:40px;padding:0}
    #toolbar .lang-btn{font-size:13px!important;font-weight:700}
    #cacheBar{top:calc(env(safe-area-inset-top,0px) + 62px);left:50%;transform:translateX(-50%);display:none;align-items:center;gap:7px;padding:6px 8px;font-size:13px;white-space:nowrap;max-width:calc(100vw - 12px)}
    #cacheBar .layer-label{min-width:86px;text-align:center;color:#fff;font-weight:700}
    #cacheBar .hint{color:var(--muted);font-size:12px;max-width:42vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    #sourceBox{right:8px;bottom:calc(env(safe-area-inset-bottom,0px) + 38px);width:100px;padding:6px;display:flex;flex-direction:column;gap:5px}
    #sourceBox .title{font-size:12px;color:var(--muted);text-align:center;margin:0 0 2px}
    #sourceBox button{width:100%;height:30px;min-width:0;font-size:12px;padding:0 4px}
    #overview{left:8px;bottom:calc(env(safe-area-inset-bottom,0px) + 38px);display:none;padding:8px;width:198px}
    #overviewTitle{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
    #overviewCanvas{display:block;width:180px;height:136px;border-radius:7px;background:rgba(4,7,10,.72);border:1px solid rgba(255,255,255,.12);cursor:crosshair;touch-action:manipulation}
    #overviewStats{font-size:11px;color:#c9d3dc;line-height:1.45;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    #status{left:0;right:0;bottom:0;height:28px;line-height:28px;border-radius:0;border-left:0;border-right:0;border-bottom:0;padding:0 10px;font-size:12px;color:#c5ced6;display:flex;gap:12px;align-items:center;white-space:nowrap;overflow:hidden}
    #status span{min-width:0;overflow:hidden;text-overflow:ellipsis}
    #statusTiles{flex:0 0 auto;color:#e7edf3;font-weight:700}
    #statusFile{flex:1 1 auto}
    #statusSource{flex:0 1 auto}
    #statusZoom{flex:0 0 auto;margin-left:auto;color:#fff;font-weight:700}
    #toast{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom,0px) + 78px);transform:translateX(-50%);z-index:2000;max-width:calc(100vw - 24px);padding:9px 13px;border-radius:9px;background:rgba(10,15,20,.94);border:1px solid rgba(255,255,255,.18);box-shadow:0 8px 26px rgba(0,0,0,.3);font-size:13px;color:#fff;display:none;line-height:1.45}
    #helpMask{position:fixed;inset:0;z-index:2100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.32);padding:14px}
    #helpDialog{width:min(560px,calc(100vw - 28px));max-height:min(680px,calc(100vh - 28px));overflow:auto;border-radius:8px;background:#17202a;color:#c9d3dc;border:1px solid rgba(255,255,255,.16);box-shadow:0 18px 50px rgba(0,0,0,.4)}
    #helpHead{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 12px;background:#17202a;border-bottom:1px solid rgba(255,255,255,.12)}
    #helpTitle{margin:0;color:#fff;font-size:16px}
    #helpClose{min-width:28px;width:28px;height:28px;padding:0;border:0;background:transparent;color:#9aa6b3;font-size:20px}
    #helpContent{padding:12px;font-size:13px;line-height:1.8}
    #helpContent b{color:#fff}
    #helpContent .help-section{margin:0 0 10px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.10)}
    #classicKmlDialog{position:fixed;inset:0;z-index:2150;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.42);padding:14px}
    #classicKmlDialog .classic-box{width:min(560px,calc(100vw - 28px));max-height:min(700px,calc(100vh - 28px));display:flex;flex-direction:column;border-radius:8px;background:#17202a;color:#e7edf3;border:1px solid rgba(255,255,255,.16);box-shadow:0 18px 50px rgba(0,0,0,.4);overflow:hidden}
    #classicKmlDialog .classic-head{height:42px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 12px;border-bottom:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05)}
    #classicKmlDialog .classic-title{font-size:15px;font-weight:700;white-space:nowrap}
    #classicKmlDialog .classic-search{flex:1;min-width:90px;max-width:220px;height:28px;padding:3px 8px;border-radius:7px;border:1px solid rgba(255,255,255,.18);background:#101820;color:#fff;font:inherit;font-size:12px}
    #classicKmlDialog .classic-actions{display:flex;align-items:center;gap:6px}
    #classicKmlDialog .classic-actions button{min-width:30px;height:28px;padding:0 8px;font-size:12px}
    #classicKmlDialog .classic-hint{padding:8px 12px;color:#aebdcc;font-size:12px;border-bottom:1px solid rgba(255,255,255,.08)}
    #classicKmlTree{padding:8px 10px 12px;overflow:auto;flex:1;font-size:13px;line-height:1.5}
    #classicKmlTree details{margin:2px 0 2px 10px}
    #classicKmlTree details.root{margin-left:0}
    #classicKmlTree summary{cursor:pointer;user-select:none;padding:4px 6px;border-radius:5px;color:#dce6ef}
    #classicKmlTree summary:hover{background:rgba(74,163,255,.15)}
    #classicKmlTree .classic-file{display:block;width:100%;height:auto;min-height:32px;text-align:left;margin:2px 0 2px 24px;padding:6px 8px;border:0;border-radius:5px;background:transparent;color:#ffd966;cursor:pointer;font-size:13px;justify-content:flex-start;white-space:normal}
    #classicKmlTree .classic-file:hover{background:rgba(255,217,102,.14)}
    #classicKmlTree .classic-empty,#classicKmlTree .classic-error{padding:10px 8px;color:#aebdcc}
    #classicKmlTree .classic-error{color:#ff9b9b}
    #fileInput{display:none}
    .track-line{filter:drop-shadow(0 2px 3px rgba(0,0,0,.35))}
    html.yfx-map-touch-locked,body.yfx-map-touch-locked{touch-action:auto!important;overscroll-behavior:auto!important}
    html.yfx-map-touch-locked #map,html.yfx-map-touch-locked .leaflet-container{touch-action:auto!important;-ms-touch-action:auto!important}
    @media(max-width:760px){
      #toolbar{left:6px;right:6px;transform:none;width:auto;justify-content:center}
      #toolbar button{width:44px;min-width:44px;height:42px;font-size:19px}
      #cacheBar{top:calc(env(safe-area-inset-top,0px) + 64px);left:6px;right:6px;transform:none;justify-content:center}
      #cacheBar .hint{display:none}
      #sourceBox{width:92px;right:6px}
      #overview{left:6px;width:174px;padding:7px}
      #overviewCanvas{width:158px;height:120px}
      #status{font-size:11px;gap:7px;padding:0 8px}
      #statusSource{display:none}
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="toolbar" class="panel">
    <button id="btnLoad" data-tip="load">📂</button>
    <button id="btnClassic" data-tip="classicKml">🛤️</button>
    <button id="btnCache" data-tip="cache">▶️</button>
    <button id="btnSave" data-tip="save">💾</button>
    <button id="btnMapLock" data-tip="mapTouchLock">🔒</button>
    <button id="btnHelp" data-tip="help">❓</button>
    <button id="btnLang" class="lang-btn">中</button>
  </div>
  <div id="cacheBar" class="panel">
    <button id="btnZoomOut" data-tip="zoomOut">−</button>
    <span id="layerLabel" class="layer-label">Z -</span>
    <button id="btnZoomIn" data-tip="zoomIn">＋</button>
    <span id="cacheHint" class="hint">浏览当前图层，看到的瓦片会被缓存；可以只浏览需要的区域。</span>
  </div>
  <div id="sourceBox" class="panel">
    <div id="sourceTitle" class="title">地图源</div>
    <button id="srcGaode" class="active">高德地形</button>
    <button id="srcGoogle">Google地形</button>
  </div>
  <div id="overview" class="panel">
    <div id="overviewTitle"><span id="overviewTitleText">鸟瞰缓存</span><span id="overviewLayer">Z -</span></div>
    <canvas id="overviewCanvas" width="180" height="136"></canvas>
    <div id="overviewStats">已缓存：0 瓦片</div>
  </div>
  <div id="status" class="panel">
    <span id="statusTiles">瓦片 0</span>
    <span id="statusFile">未加载轨迹</span>
    <span id="statusSource">高德地形</span>
    <span id="statusZoom">Z -</span>
  </div>
  <input id="fileInput" type="file">
  <div id="helpMask">
    <div id="helpDialog" role="dialog" aria-modal="true">
      <div id="helpHead">
        <h2 id="helpTitle">YFxDataCache</h2>
        <button id="helpClose" type="button" aria-label="close">×</button>
      </div>
      <div id="helpContent"></div>
    </div>
  </div>
  <div id="classicKmlDialog">
    <div class="classic-box">
      <div class="classic-head">
        <div id="classicKmlTitle" class="classic-title">经典轨迹</div>
        <input id="classicKmlSearch" class="classic-search" placeholder="搜索经典轨迹...">
        <div class="classic-actions">
          <button id="classicKmlRefreshBtn" type="button">刷新</button>
          <button id="classicKmlCloseBtn" type="button" title="关闭">×</button>
        </div>
      </div>
      <div id="classicKmlHint" class="classic-hint">选择一个 KML 轨迹或 .yfxcache.zip 离线缓存包载入。</div>
      <div id="classicKmlTree"></div>
    </div>
  </div>
  <div id="toast"></div>

        helpHtml:'<div class="help-section"><b>Purpose</b>: create a standalone .yfxcache.zip offline cache package for one KML track, and reopen cache packages to inspect them.</div><div class="help-section"><b>Steps</b>: tap 📂 to load a local KML, or tap 🛤️ to choose a destination from the online classic track catalog; tap ▶️ to start caching; browse the needed layers and areas inside the allowed range; tap 💾 to save the package.</div><div class="help-section"><b>Inspect a package</b>: tap 📂 and open a .yfxcache.zip. The map shows only tiles successfully written to the zip. In the overview, black means not browsed, yellow means browsed but failed, and green means successfully cached.</div><div class="help-section"><b>Continue caching</b>: after opening a .yfxcache.zip, tap ▶️ again to switch back to online maps and retry caching. Saving again merges existing success and failure records.</div><div class="help-section"><b>Mobile</b>: tap 🔒 to lock map touch so the map stops intercepting gestures and the browser can zoom the page; tap 🔓 to restore map pan and zoom.</div><div class="help-section"><b>Layers</b>: in cache mode, use − / ＋ to switch the current layer. The overview shows cached tiles for that layer.</div><div class="help-section"><b>Note</b>: if a map service blocks cross-origin reads, some tiles may be listed in the manifest only. The save result reports the missing count.</div>'

      el.zoomIn.addEventListener('click', function(){ stepZoom(1); });

        },120);
      });
      el.canvas.addEventListener('click', jumpToOverviewPoint);
      el.canvas.addEventListener('touchend', function(e){
        if(e.changedTouches && e.changedTouches.length){
          jumpToOverviewPoint(e.changedTouches[0]);
          e.preventDefault();

      map.on('zoomend moveend', function(){

          currentZoom=map.getZoom();

          updateOverview();
        }
        updateStatus();
      });
      map.getContainer().addEventListener('mousedown', showMapTouchLockedHint);
      map.getContainer().addEventListener('touchstart', showMapTouchLockedHint, {passive:true});
      map.getContainer().addEventListener('wheel', showMapTouchLockedHint, {passive:true});

      applyLang();
      toast(t('intro',{version:APP_VERSION}));

    function t(key, data){
      var s=(I18N[lang]&&I18N[lang][key]) || I18N.zh[key] || key;
      data=data||{};
      return String(s).replace(/\{(\w+)\}/g,function(_,k){return data[k] == null ? '' : data[k];});
    }

    function toggleLang(){ setLang(lang==='zh'?'en':'zh'); }
    function setLang(next){
      lang=next==='en'?'en':'zh';
      try{ localStorage.setItem('yfx_lang',lang); }catch(e){}
      applyLang();

      document.documentElement.lang=lang==='en'?'en':'zh-CN';
      document.title=t('appTitle');
      el.lang.textContent=lang==='zh'?'中':'En';

    function showHelp(){
      el.helpTitle.textContent=t('helpTitle');
      el.helpContent.innerHTML=t('helpHtml');
      el.helpClose.title=t('close');
      el.helpClose.setAttribute('aria-label',t('close'));
      el.helpMask.style.display='flex';
    }

    function closeHelp(){
      el.helpMask.style.display='none';
    }

    function viewportMeta(){
      var metas=document.getElementsByTagName('meta');
      for(var i=0;i<metas.length;i++){
        if((metas[i].getAttribute('name')||'').toLowerCase()==='viewport') return metas[i];
      }
      return null;
    }

    function setPageScaleAllowed(allowed){
      var meta=viewportMeta();
      if(!meta) return;
      if(originalViewportContent==null) originalViewportContent=meta.getAttribute('content') || '';
      if(allowed){
        meta.setAttribute('content','width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover');
      }else{
        meta.setAttribute('content',originalViewportContent || 'width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover');
      }
    }

    function setMapTouchLocked(locked){
      mapTouchLocked=!!locked;
      var methods=['dragging','touchZoom','tap','doubleClickZoom','scrollWheelZoom','boxZoom','keyboard'];
      for(var i=0;i<methods.length;i++){
        var h=map[methods[i]];
        if(h){
          if(mapTouchLocked && h.disable) h.disable();
          else if(!mapTouchLocked && h.enable) h.enable();
        }
      }
      document.documentElement.classList.toggle('yfx-map-touch-locked',mapTouchLocked);
      document.body.classList.toggle('yfx-map-touch-locked',mapTouchLocked);
      var c=map.getContainer();
      c.style.pointerEvents=mapTouchLocked?'none':'';
      c.style.touchAction=mapTouchLocked?'auto':'';
      c.style.msTouchAction=mapTouchLocked?'auto':'';
      setPageScaleAllowed(mapTouchLocked);
      updateMapTouchLockButton();
      if(!mapTouchLocked) setTimeout(function(){ map.invalidateSize(false); },60);
      toast(mapTouchLocked?t('mapLocked'):t('mapUnlocked'));
    }

    function toggleMapTouchLock(){
      setMapTouchLocked(!mapTouchLocked);
    }

    var mapTouchLockLastHint=0;
    function showMapTouchLockedHint(){
      if(!mapTouchLocked) return;
      var now=Date.now();
      if(now-mapTouchLockLastHint<1200) return;
      mapTouchLockLastHint=now;
      toast(t('mapLockedHint'));
    }

    function updateMapTouchLockButton(){
      if(!el.mapLock) return;
      var key=mapTouchLocked?'mapTouchUnlock':'mapTouchLock';
      el.mapLock.textContent=mapTouchLocked?'🔓':'🔒';
      el.mapLock.classList.toggle('active',mapTouchLocked);
      el.mapLock.setAttribute('data-tip-text',t(key));
      el.mapLock.setAttribute('title',t(key));
      el.mapLock.setAttribute('aria-label',t(key));
    }

    function switchSource(key, silent){
      if(!sourceDefs[key]) key='gaode';
      activeSource=key;
      for(var i=0;i<activeLayers.length;i++) map.removeLayer(activeLayers[i]);
      activeLayers=[];
      var def=sourceDefs[key];
      if(cachePreviewMode){
        addPreviewLayers(key);
      }else{
        def.layers.forEach(function(ld){
          var opts=Object.assign({}, ld.opts || {});
          var layer=L.tileLayer(ld.url, opts);
          layer.__providerId=ld.id;
          layer.on('tileload', function(e){ onTileLoaded(layer.__providerId, e); });
          layer.addTo(map);
          activeLayers.push(layer);
        });
      }
      el.srcGaode.classList.toggle('active', key==='gaode');
      el.srcGoogle.classList.toggle('active', key==='google');
      if(sourceDefs[key].maxZoom) map.setMaxZoom(sourceDefs[key].maxZoom);
      if(currentZoom && currentZoom>sourceDefs[key].maxZoom) map.setZoom(sourceDefs[key].maxZoom);
      updateStatus();
      updateOverview();
      if(!silent) toast(t('switched',{label:def.label}));
    }

    function loadInputFile(file){
      var name=(file&&file.name)||'';
      if(/\.kml$/i.test(name)) loadKmlFile(file);
      else if(/\.yfxcache\.zip$/i.test(name) || /\.zip$/i.test(name)) loadCacheZipFile(file);
      else toast(t('chooseKml'));
    }

    function loadKmlFile(file){
      if(!file || !/\.kml$/i.test(file.name||'')){ toast(t('chooseKml')); return; }
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var text=String(ev.target.result||'');
          loadKmlText(text,file.name || 'track.kml',{name:file.name||'',size:file.size||0,lastModified:file.lastModified||0});
          toast(t('loadOk',{name:trackName}));
        }catch(err){
          console.error(err);
          toast(t('parseFailed',{error:(err&&err.message?err.message:err)}));
        }
      };
      reader.onerror=function(){ toast(t('readFailed')); };
      reader.readAsText(file,'utf-8');
    }

    function loadKmlText(text, name, meta){
      var parsed=parseKml(text);
      if(!parsed.lines.length && !parsed.points.length) throw new Error(t('emptyKml'));
      clearCurrentTrack();
      routeLines=parsed.lines;
      trackText=String(text||'');
      trackName=name || 'track.kml';
      trackFileMeta=meta || {name:trackName,size:trackText.length,lastModified:0};
      drawTrack(parsed);
      applyTrackBounds();
      clearPreviewCache();
      cachePreviewMode=false;
      previewManifest=null;
      switchSource(activeSource, true);
      tileRecords.clear(); cellRecords.clear(); failedTileRecords.clear(); failedCellRecords.clear(); pendingCacheUrls.clear();
      cacheMode=false;
      updateCacheButton();
      el.cacheBar.style.display='none';
      el.overview.style.display='none';
      updateStatus();
      updateOverview();
    }

    function loadCacheZipFile(file){
      loadCacheZipBlob(file, (file&&file.name)||'cache.yfxcache.zip');
    }

    function classicKmlIsCachePackage(file){
      return /\.yfxcache\.zip$/i.test(String(file||''));
    }

    function classicKmlIsKml(file){
      return /\.kml$/i.test(String(file||''));
    }

    function classicKmlIcon(item){
      return classicKmlIsCachePackage(item&&item.file) ? '🗺️' : '🛤️';
    }

    function classicKmlDisplayName(item){
      if(!item) return '';
      var text=(lang==='en'&&item.en)?item.en:(item.zh||item.name||item.file||'KML');
      text=String(text||'');
      if(item.file&&(classicKmlIsKml(item.file)||classicKmlIsCachePackage(item.file))){
        var suffix=classicKmlIsCachePackage(item.file)?'.yfxcache.zip':'.kml';
        if(text===item.file) text=text.split('/').pop();
        if(text.toLowerCase().slice(-suffix.length)!==suffix) text+=suffix;
      }
      return text;
    }

    function normalizeClassicKmlEntry(line){
      line=(line||'').trim();
      if(!line || line.charAt(0)==='#' || line.indexOf('//')===0) return null;
      var parts=line.split('|').map(function(s){return s.trim();});
      var file=(parts[0]||'').replace(/\\/g,'/');
      if(!file) return null;
      if(!classicKmlIsKml(file) && !classicKmlIsCachePackage(file)) file+='.kml';
      return {file:file,name:parts[1]||file,zh:parts[1]||file,en:parts[2]||''};
    }

    function parseClassicKmlList(text){
      var arr=[];
      var rows=String(text||'').replace(/^\uFEFF/,'').split(/\r?\n/);
      for(var i=0;i<rows.length;i++){
        var item=normalizeClassicKmlEntry(rows[i]);
        if(item) arr.push(item);
      }
      return arr;
    }

    function classicKmlUrl(file){
      var raw=String(file||'').trim().replace(/^\/+/, '');
      raw=raw.replace(/^https?:\/\/[^\/]+\/outdoors\/kml\//i,'');
      var parts=raw.split('/');
      for(var i=0;i<parts.length;i++) parts[i]=encodeURIComponent(parts[i]);
      return CLASSIC_KML_BASE_URL+parts.join('/');
    }

    function ensureClassicKmlList(cb){
      if(classicKmlCache){ cb(null,classicKmlCache); return; }
      fetch(CLASSIC_KML_LIST_URL,{cache:'no-store'})
        .then(function(resp){ if(!resp.ok) throw new Error('HTTP '+resp.status); return resp.text(); })
        .then(function(text){ classicKmlCache=parseClassicKmlList(text); cb(null,classicKmlCache); })
        .catch(function(err){ cb(err,null); });
    }

    function showClassicKmlMenu(e){
      if(e){ e.preventDefault(); e.stopPropagation(); }
      el.classicDialog.style.display='flex';
      el.classicTitle.textContent=t('classicKmlTitle');
      el.classicHint.textContent=t('classicKmlChoose');
      el.classicSearch.placeholder=t('classicKmlSearch');
      setClassicKmlTreeHtml('<div class="classic-empty">'+escapeHtml(t('classicKmlLoading'))+'</div>');
      ensureClassicKmlList(function(err,list){
        if(err){
          console.error(err);
          setClassicKmlTreeHtml('<div class="classic-error">'+escapeHtml(t('classicKmlLoadFailed'))+'</div>');
          return;
        }
        renderClassicKmlCurrentView(list);
      });
    }

    function closeClassicKmlDialog(){
      el.classicDialog.style.display='none';
    }

    function reloadClassicKmlTree(){
      classicKmlCache=null;
      setClassicKmlTreeHtml('<div class="classic-empty">'+escapeHtml(t('classicKmlLoading'))+'</div>');
      ensureClassicKmlList(function(err,list){
        if(err){
          console.error(err);
          setClassicKmlTreeHtml('<div class="classic-error">'+escapeHtml(t('classicKmlLoadFailed'))+'</div>');
          return;
        }
        renderClassicKmlCurrentView(list);
      });
    }

    function setClassicKmlTreeHtml(html){
      el.classicTree.innerHTML=html;
    }

    function classicKmlDirName(name){
      name=String(name||'').trim();
      return name || t('classicKmlRoot');
    }

    function buildClassicKmlTree(list){
      var root={dirs:{},files:[]};
      for(var i=0;i<(list||[]).length;i++){
        var item=list[i];
        var raw=String(item.file||'').replace(/\\/g,'/').replace(/^\/+/, '');
        var parts=raw.split('/').filter(function(x){return x!=='';});
        if(!parts.length) continue;
        var node=root;
        for(var j=0;j<parts.length-1;j++){
          var dir=parts[j];
          if(!node.dirs[dir]) node.dirs[dir]={dirs:{},files:[]};
          node=node.dirs[dir];
        }
        node.files.push({idx:(item&&item.__classicIndex!=null?item.__classicIndex:i),item:item});
      }
      return root;
    }

    function buildClassicNode(node,label,forceOpen){
      var details=document.createElement('details');
      details.open=!!forceOpen;
      var summary=document.createElement('summary');
      summary.textContent='📁 '+classicKmlDirName(label);
      details.appendChild(summary);
      function loadChildren(){
        if(node._loaded) return;
        node._loaded=true;
        var dirs=Object.keys(node.dirs||{}).sort(function(a,b){return a.localeCompare(b,'zh-Hans-CN');});
        for(var i=0;i<dirs.length;i++) details.appendChild(buildClassicNode(node.dirs[dirs[i]],dirs[i],forceOpen));
        appendClassicFiles(details,node.files||[]);
      }
      summary.addEventListener('click',function(e){ e.stopPropagation(); loadChildren(); });
      if(forceOpen) loadChildren();
      return details;
    }

    function appendClassicFiles(container, files){
      files.sort(function(a,b){return classicKmlDisplayName(a.item).localeCompare(classicKmlDisplayName(b.item),'zh-Hans-CN');});
      for(var i=0;i<files.length;i++){
        var f=files[i];
        var btn=document.createElement('button');
        btn.type='button';
        btn.className='classic-file';
        btn.textContent=classicKmlIcon(f.item)+' '+classicKmlDisplayName(f.item);
        btn.title=f.item.file;
        btn.addEventListener('click',(function(idx){return function(){ loadClassicKml(idx); };})(f.idx));
        container.appendChild(btn);
      }
    }

    function renderClassicKmlTree(list){
      if(!list || !list.length){
        setClassicKmlTreeHtml('<div class="classic-empty">'+escapeHtml(t('classicKmlEmpty'))+'</div>');
        return;
      }
      var root=buildClassicKmlTree(list);
      var dirs=Object.keys(root.dirs||{}).sort(function(a,b){return a.localeCompare(b,'zh-Hans-CN');});
      el.classicTree.innerHTML='';
      if(!dirs.length && (!root.files || !root.files.length)){
        setClassicKmlTreeHtml('<div class="classic-empty">'+escapeHtml(t('classicKmlNoKml'))+'</div>');
        return;
      }
      for(var i=0;i<dirs.length;i++) el.classicTree.appendChild(buildClassicNode(root.dirs[dirs[i]],dirs[i],false));
      appendClassicFiles(el.classicTree,root.files||[]);
    }

    function classicKmlSearchText(item){
      return (classicKmlDisplayName(item)+' '+(item&&item.file||'')).toLowerCase();
    }

    function renderClassicKmlSearchTree(list, keyword){
      keyword=String(keyword||'').trim().toLowerCase();
      if(!keyword){ renderClassicKmlTree(list); return; }
      var filtered=[];
      for(var i=0;i<(list||[]).length;i++){
        if(classicKmlSearchText(list[i]).indexOf(keyword)>=0){
          var copy=Object.assign({},list[i]);
          copy.__classicIndex=i;
          filtered.push(copy);
        }
      }
      if(!filtered.length){
        setClassicKmlTreeHtml('<div class="classic-empty">'+escapeHtml(t('classicKmlNoMatch'))+'</div>');
        return;
      }
      var root=buildClassicKmlTree(filtered);
      el.classicTree.innerHTML='';
      var dirs=Object.keys(root.dirs||{}).sort(function(a,b){return a.localeCompare(b,'zh-Hans-CN');});
      for(var j=0;j<dirs.length;j++) el.classicTree.appendChild(buildClassicNode(root.dirs[dirs[j]],dirs[j],true));
      appendClassicFiles(el.classicTree,root.files||[]);
    }

    function renderClassicKmlCurrentView(list){
      renderClassicKmlSearchTree(list, el.classicSearch ? el.classicSearch.value : '');
    }

    function loadClassicKml(idx){
      var item=classicKmlCache && classicKmlCache[idx];
      if(!item) return;
      closeClassicKmlDialog();
      var url=classicKmlUrl(item.file);
      var display=classicKmlDisplayName(item);
      if(classicKmlIsCachePackage(item.file)){
        toast(t('classicKmlLoading'));
        fetch(url,{cache:'no-store'})
          .then(function(resp){ if(!resp.ok) throw new Error('HTTP '+resp.status); return resp.blob(); })
          .then(function(blob){
            loadCacheZipBlob(blob, String(item.file||display).split('/').pop() || 'cache.yfxcache.zip');
            toast(t('classicKmlZipImported')+'：'+display);
          })
          .catch(function(err){
            console.error(err);
            toast(t('cacheZipFailed',{error:(err&&err.message?err.message:err)}));
          });
        return;
      }
      fetch(url,{cache:'no-store'})
        .then(function(resp){ if(!resp.ok) throw new Error('HTTP '+resp.status); return resp.text(); })
        .then(function(text){
          loadKmlText(text, String(item.file||display).split('/').pop() || display, {name:item.file,size:text.length,lastModified:0});
          toast(t('classicKmlImported')+'：'+display);
        })
        .catch(function(err){
          console.error(err);
          toast(t('parseFailed',{error:(err&&err.message?err.message:err)}));
        });
    }

    function loadCacheZipBlob(blob, fileName){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var entries=parseStoredZipEntries(ev.target.result);
          var manifestEntry=getZipEntry(entries,'manifest.json');
          if(!manifestEntry) throw new Error('manifest.json not found');
          var manifest=JSON.parse(bytesToText(manifestEntry.data));
          var routePath=(manifest.files&&manifest.files.route)||'route.kml';
          var routeEntry=getZipEntry(entries,routePath) || getZipEntry(entries,'route.kml');
          if(!routeEntry) throw new Error('route.kml not found');
          var routeText=bytesToText(routeEntry.data);
          var parsed=parseKml(routeText);
          if(!parsed.lines.length && !parsed.points.length) throw new Error(t('emptyKml'));

          clearCurrentTrack();
          clearPreviewCache();
          routeLines=parsed.lines;
          trackText=routeText;
          trackName=(manifest.trackFile&&manifest.trackFile.name) || routePath || fileName || 'route.kml';
          trackFileMeta=manifest.trackFile || {name:trackName,size:routeEntry.data.length,lastModified:0};
          drawTrack(parsed);
          applyTrackBounds();

          tileRecords.clear();
          cellRecords.clear();
          failedTileRecords.clear();
          failedCellRecords.clear();
          pendingCacheUrls.clear();
          previewManifest=manifest;
          cachePreviewMode=true;
          activeSource=sourceDefs[manifest.source] ? manifest.source : activeSource;
          loadPreviewTilesFromManifest(manifest, entries);
          loadFailedTilesFromManifest(manifest);
          cacheMode=false;
          updateCacheButton();
          el.cacheBar.style.display='flex';
          el.overview.style.display='block';
          switchSource(activeSource, true);
          updateLayerUi();
          updateStatus();
          updateOverview();
          if(tileRecords.size){
            toast(t('cacheZipOk',{name:fileName||trackName,count:tileRecords.size}));
          }else{
            toast(t('cacheZipNoTiles'));
          }
        }catch(err){
          console.error(err);
          toast(t('cacheZipFailed',{error:(err&&err.message?err.message:err)}));
        }
      };
      reader.onerror=function(){ toast(t('readFailed')); };
      reader.readAsArrayBuffer(blob);
    }

    function loadPreviewTilesFromManifest(manifest, entries){
      var tiles=Array.isArray(manifest.tiles) ? manifest.tiles : [];
      previewProvidersBySource={};
      for(var i=0;i<tiles.length;i++){
        var tile=tiles[i];
        if(!tile || !tile.file) continue;
        var entry=getZipEntry(entries,tile.file);
        if(!entry || !entry.data || !entry.data.length) continue;
        var source=tile.source || manifest.source || activeSource;
        var provider=tile.provider || 'tile';
        var z=Number(tile.z), x=Number(tile.x), y=Number(tile.y);
        if(!isFinite(z)||!isFinite(x)||!isFinite(y)) continue;
        var blob=new Blob([entry.data],{type:tile.mime||'application/octet-stream'});
        var objectUrl=URL.createObjectURL(blob);
        previewObjectUrls.push(objectUrl);
        var key=source+'|'+provider+'|'+z+'|'+x+'|'+y;
        previewTileUrls.set(key,objectUrl);
        if(!previewProvidersBySource[source]) previewProvidersBySource[source]=[];
        if(previewProvidersBySource[source].indexOf(provider)<0) previewProvidersBySource[source].push(provider);
        tileRecords.set(key,{source:source,provider:provider,z:z,x:x,y:y,url:objectUrl,file:tile.file,cachedAt:tile.cachedAt||manifest.savedAt||''});
        var cellKey=source+'|'+z+'|'+x+'|'+y;
        if(!cellRecords.has(cellKey)) cellRecords.set(cellKey,{source:source,z:z,x:x,y:y});
      }
    }

    function loadFailedTilesFromManifest(manifest){
      var tiles=Array.isArray(manifest.missingTiles) ? manifest.missingTiles : [];
      for(var i=0;i<tiles.length;i++){
        var tile=tiles[i];
        if(!tile) continue;
        var source=tile.source || manifest.source || activeSource;
        var provider=tile.provider || 'tile';
        var z=Number(tile.z), x=Number(tile.x), y=Number(tile.y);
        if(!isFinite(z)||!isFinite(x)||!isFinite(y)) continue;
        setFailedTile(Object.assign({},tile,{source:source,provider:provider,z:z,x:x,y:y}));
      }
    }

    function tileKey(source, provider, z, x, y){
      return source+'|'+provider+'|'+z+'|'+x+'|'+y;
    }

    function cellKey(source, z, x, y){
      return source+'|'+z+'|'+x+'|'+y;
    }

    function setFailedTile(tile){
      var source=tile.source || activeSource;
      var provider=tile.provider || 'tile';
      var z=Number(tile.z), x=Number(tile.x), y=Number(tile.y);
      if(!isFinite(z)||!isFinite(x)||!isFinite(y)) return;
      var key=tileKey(source,provider,z,x,y);
      if(tileRecords.has(key)) return;
      failedTileRecords.set(key,Object.assign({},tile,{source:source,provider:provider,z:z,x:x,y:y}));
      var ck=cellKey(source,z,x,y);
      if(!failedCellRecords.has(ck)) failedCellRecords.set(ck,{source:source,z:z,x:x,y:y});
    }

    function markTileFailure(tile){
      var source=tile.source || activeSource;
      var provider=tile.provider || 'tile';
      var z=Number(tile.z), x=Number(tile.x), y=Number(tile.y);
      if(!isFinite(z)||!isFinite(x)||!isFinite(y)) return;
      tileRecords.delete(tileKey(source,provider,z,x,y));
      var ck=cellKey(source,z,x,y);
      var hasSuccess=false;
      tileRecords.forEach(function(t){
        if(t.source===source && t.z===z && t.x===x && t.y===y) hasSuccess=true;
      });
      if(!hasSuccess) cellRecords.delete(ck);
      setFailedTile(Object.assign({},tile,{source:source,provider:provider,z:z,x:x,y:y}));
    }

    function clearFailedTile(source, provider, z, x, y){
      failedTileRecords.delete(tileKey(source,provider,z,x,y));
      failedCellRecords.delete(cellKey(source,z,x,y));
    }

    function addPreviewLayers(source){
      var providers=previewProvidersBySource[source] || [];
      providers.forEach(function(provider){
        var layer=L.gridLayer({
          tileSize:256,
          maxZoom:sourceDefs[source] ? sourceDefs[source].maxZoom : 20,
          attribution:previewManifest&&previewManifest.sourceLabel ? previewManifest.sourceLabel : 'YFxDataCache'
        });
        layer.createTile=function(coords){
          var key=source+'|'+provider+'|'+coords.z+'|'+coords.x+'|'+coords.y;
          var url=previewTileUrls.get(key);
          if(url){
            var img=document.createElement('img');
            img.width=256;
            img.height=256;
            img.alt='';
            img.decoding='async';
            img.src=url;
            return img;
          }
          var empty=document.createElement('div');
          empty.style.width='256px';
          empty.style.height='256px';
          return empty;
        };
        layer.addTo(map);
        activeLayers.push(layer);
      });
    }

    function clearPreviewCache(){
      for(var i=0;i<previewObjectUrls.length;i++){
        try{ URL.revokeObjectURL(previewObjectUrls[i]); }catch(e){}
      }
      previewTileUrls.clear();
      previewObjectUrls=[];
      previewProvidersBySource={};
      previewManifest=null;
    }

    function getZipEntry(entries, name){
      if(!entries || !name) return null;
      return entries.get(name) || entries.get(String(name).replace(/\\/g,'/')) || null;
    }

    function parseStoredZipEntries(buffer){
      var bytes=new Uint8Array(buffer);
      var view=new DataView(buffer);
      var entries=new Map();
      var off=0;
      while(off+30<=bytes.length){
        if(view.getUint32(off,true)!==0x04034b50){
          off++;
          continue;
        }
        var method=view.getUint16(off+8,true);
        var compSize=view.getUint32(off+18,true);
        var nameLen=view.getUint16(off+26,true);
        var extraLen=view.getUint16(off+28,true);
        var nameStart=off+30;
        var dataStart=nameStart+nameLen+extraLen;
        var dataEnd=dataStart+compSize;
        if(nameStart>bytes.length || dataEnd>bytes.length) break;
        var name=bytesToText(bytes.slice(nameStart,nameStart+nameLen));
        if(method===0 && name && name.charAt(name.length-1)!=='/'){
          entries.set(name.replace(/\\/g,'/'),{name:name,data:bytes.slice(dataStart,dataEnd)});
        }
        off=dataEnd;
      }
      return entries;
    }

    function bytesToText(bytes){
      return new TextDecoder('utf-8').decode(bytes);
    }

    function clearCurrentTrack(){
      if(routeFeature){ map.removeLayer(routeFeature); routeFeature=null; }
      routeLines=[]; routeBounds=null; allowedBounds=null; trackName=''; trackText=''; trackFileMeta=null;
      map.setMaxBounds(null);
      map.setMinZoom(0);
    }

    function parseKml(text){
      var xml=new DOMParser().parseFromString(text,'application/xml');
      if(xml.getElementsByTagName('parsererror').length) throw new Error('XML 格式错误');
      var lines=[];
      var points=[];
      var lineNodes=xml.getElementsByTagName('LineString');
      for(var i=0;i<lineNodes.length;i++){
        var cnode=lineNodes[i].getElementsByTagName('coordinates')[0];
        if(!cnode) continue;
        var pts=parseCoordText(cnode.textContent||'');
        if(pts.length>=2) lines.push(pts);
        else if(pts.length===1) points.push(pts[0]);
      }
      var pointNodes=xml.getElementsByTagName('Point');
      for(var j=0;j<pointNodes.length;j++){
        var pc=pointNodes[j].getElementsByTagName('coordinates')[0];
        if(!pc) continue;
        var p=parseCoordText(pc.textContent||'');
        if(p.length) points.push(p[0]);
      }
      return {lines:lines,points:points};
    }

    function parseCoordText(s){
      var arr=[];
      s.trim().split(/\s+/).forEach(function(item){
        var a=item.split(',');
        if(a.length<2) return;
        var lng=parseFloat(a[0]);
        var lat=parseFloat(a[1]);
        var alt=a.length>2?parseFloat(a[2]):null;
        if(isFinite(lat)&&isFinite(lng)) arr.push({lat:lat,lng:lng,alt:isFinite(alt)?alt:null});
      });
      return arr;
    }

    function drawTrack(parsed){
      var group=[];
      parsed.lines.forEach(function(line){
        var latlngs=line.map(function(p){return [p.lat,p.lng];});
        group.push(L.polyline(latlngs,{color:'#ff4d4f',weight:4,opacity:.95,className:'track-line'}));
      });
      parsed.points.forEach(function(p){
        group.push(L.circleMarker([p.lat,p.lng],{radius:5,color:'#ffcf66',weight:2,fillColor:'#ffcf66',fillOpacity:.85}));
      });
      routeFeature=L.featureGroup(group).addTo(map);
      routeBounds=routeFeature.getBounds();
    }

    function applyTrackBounds(){
      if(!routeBounds || !routeBounds.isValid()) return;
      allowedBounds=makeAllowedBounds(routeBounds);
      map.setMaxBounds(allowedBounds);
      map.fitBounds(allowedBounds,{padding:[8,8],animate:false});
      setTimeout(function(){
        fullViewZoom=map.getZoom();
        currentZoom=fullViewZoom;
        map.setMinZoom(fullViewZoom);
        updateLayerUi();
        updateStatus();
      },80);
    }

    function makeAllowedBounds(b){
      var south=b.getSouth(), north=b.getNorth(), west=b.getWest(), east=b.getEast();
      var midLat=(south+north)/2;
      var latRange=Math.max(0, north-south);
      var lngRange=Math.max(0, east-west);
      var lat5=5/111.32;
      var lng5=5/(111.32*Math.max(0.18, Math.cos(midLat*Math.PI/180)));
      var latPad=latRange>0?Math.min(latRange*.10, lat5):Math.min(0.0045, lat5);
      var lngPad=lngRange>0?Math.min(lngRange*.10, lng5):Math.min(0.0045, lng5);
      return L.latLngBounds([south-latPad, west-lngPad],[north+latPad, east+lngPad]);
    }

    function toggleCacheMode(){
      if(cacheMode){
        stopCacheMode();
      }else{
        startCacheMode();
      }
    }

    function startCacheMode(){
      if(!allowedBounds){ toast(t('needLoad')); return; }
      if(cachePreviewMode){
        cachePreviewMode=false;
        pendingCacheUrls.clear();
        switchSource(activeSource, true);
      }
      cacheMode=true;
      updateCacheButton();
      el.cacheBar.style.display='flex';
      el.overview.style.display='block';
      currentZoom=map.getZoom();
      syncVisibleTiles();
      updateLayerUi();
      updateOverview();
      setTimeout(function(){ syncVisibleTiles(); updateStatus(); updateOverview(); },120);
      toast(t('cacheStarted'));
    }

    function stopCacheMode(){
      cacheMode=false;
      updateCacheButton();
      el.cacheBar.style.display='none';
      if(tileRecords.size===0 && !cachePreviewMode){
        el.overview.style.display='none';
      }else{
        el.overview.style.display='block';
        updateOverview();
      }
      updateStatus();
      toast(t('cacheStopped'));
    }

    function updateCacheButton(){
      var key=cacheMode?'cacheStop':'cache';
      el.cache.textContent=cacheMode?'⏹':'▶️';
      el.cache.classList.toggle('active',cacheMode);
      el.cache.setAttribute('data-tip-text',t(key));
      el.cache.setAttribute('title',t(key));
      el.cache.setAttribute('aria-label',t(key));
    }

    function stepZoom(delta){
      if(!allowedBounds){ toast(t('needLoadShort')); return; }
      var z=map.getZoom()+delta;
      z=Math.max(map.getMinZoom(), Math.min(map.getMaxZoom(), z));
      map.setZoom(z);
    }

    function updateLayerUi(){
      var z=map.getZoom();
      el.layerLabel.textContent=t('currentLayer')+z;
      el.overviewLayer.textContent='Z '+z;
      el.zoomOut.disabled=(z<=map.getMinZoom());
      el.zoomIn.disabled=(z>=map.getMaxZoom());
    }

    function onTileLoaded(providerId, e){
      if(!cacheMode || !e || !e.coords || !e.tile) return;
      recordTile(providerId, e.coords, e.tile);
      updateStatus();
      updateOverview();
    }

    function syncVisibleTiles(){
      if(!cacheMode || !activeLayers || !activeLayers.length) return;
      activeLayers.forEach(function(layer){
        var tiles=layer && layer._tiles;
        if(!tiles) return;
        Object.keys(tiles).forEach(function(key){
          var item=tiles[key];
          if(!item || !item.coords || !item.el) return;
          if(item.current===false || item.loaded===false) return;
          recordTile(layer.__providerId, item.coords, item.el);
        });
      });
    }

    function recordTile(providerId, coords, tile){
      var z=coords.z, x=coords.x, y=coords.y;
      if(z == null || x == null || y == null) return;
      var url=tile.currentSrc || tile.src || '';
      if(!url) return;
      var provider=providerId || 'tile';
      var item={source:activeSource,provider:provider,z:z,x:x,y:y,url:url,cachedAt:new Date().toISOString()};
      var key=tileKey(item.source,item.provider,item.z,item.x,item.y);
      if(tileRecords.has(key)) return;
      if(!failedTileRecords.has(key)){
        item.reason='正在验证瓦片是否可写入 zip';
        setFailedTile(item);
      }
      verifyAndCacheTile(item);
    }

    function markTileSuccess(tile){
      var key=tileKey(tile.source,tile.provider,tile.z,tile.x,tile.y);
      if(!tileRecords.has(key)){
        tileRecords.set(key,Object.assign({},tile,{cachedAt:tile.cachedAt||new Date().toISOString()}));
      }
      clearFailedTile(tile.source,tile.provider,tile.z,tile.x,tile.y);
      var ck=cellKey(tile.source,tile.z,tile.x,tile.y);
      if(!cellRecords.has(ck)) cellRecords.set(ck,{source:tile.source,z:tile.z,x:tile.x,y:tile.y});
    }

    function verifyAndCacheTile(tile){
      if(!tile || !tile.url || pendingCacheUrls.has(tile.url)) return;
      pendingCacheUrls.add(tile.url);
      verifyAndCacheTileAsync(tile).then(function(result){
        if(result && result.ok){
          markTileSuccess(tile);
        }else{
          markTileFailure(Object.assign({},tile,{reason:(result&&result.reason)||'瓦片响应不可读取，可能是跨域 opaque 响应'}));
        }
      }).catch(function(err){
        markTileFailure(Object.assign({},tile,{reason:(err&&err.message)?err.message:String(err)}));
      }).finally(function(){
        pendingCacheUrls.delete(tile.url);
        updateStatus();
        updateOverview();
      });
    }

    async function verifyAndCacheTileAsync(tile){
      if(!('caches' in window)) return {ok:false,reason:'浏览器不支持 CacheStorage'};
      var cache=await caches.open(GEO_TILE_CACHE_NAME);
      var hit=await cache.match(tile.url);
      if(hit){
        var cached=await responseToBlobIfReadable(hit);
        if(cached.blob && cached.blob.size>0) return {ok:true,reason:''};
      }
      var res=null;
      try{
        res=await fetch(tile.url,{mode:'cors',cache:'force-cache'});
      }catch(err){
        try{
          var opaque=await fetch(tile.url,{mode:'no-cors',cache:'force-cache'});
          if(opaque) await cache.put(tile.url,opaque.clone());
        }catch(e){}
        return {ok:false,reason:'跨域限制，无法读取瓦片数据'};
      }
      if(!res) return {ok:false,reason:'在线读取失败'};
      var readable=await responseToBlobIfReadable(res);
      if(readable.blob && readable.blob.size>0){
        await cache.put(tile.url,res.clone());
        return {ok:true,reason:''};
      }
      return {ok:false,reason:readable.reason||'瓦片响应不可读取'};
    }

    async function saveCacheManifest(){
      if(!trackName || !allowedBounds){ toast(t('needBrowse')); return; }
      if(tileRecords.size===0 && failedTileRecords.size===0){
        if(!confirm(t('confirmEmpty'))) return;
      }
      var saveBtn=el.save;
      var oldText=saveBtn.textContent;
      saveBtn.disabled=true;
      saveBtn.textContent='⏳';
      try{
        toast(t('packaging'));
        var base=(trackName||'track').replace(/\.kml$/i,'').replace(/[\\/:*?"<>|\s]+/g,'_').slice(0,80) || 'track';
        var savedAt=new Date().toISOString();
        var rawTiles=Array.from(tileRecords.values());
        var totalAttempts=tileRecords.size+failedTileRecords.size;
        var manifest={
          format:'YFxGeoStudio.DataCacheZip.v1',
          app:'YFxDataCache',
          version:APP_VERSION,
          savedAt:savedAt,
          target:'YFxGeoStudio',
          packageType:'independent-yfxcache-zip',
          note:'本 zip 尽量包含轨迹 KML、缓存清单和可读取的地图瓦片文件。若地图服务跨域禁止读取，相关瓦片会记录在 missingTiles 中。',
          source:activeSource,
          sourceLabel:sourceDefs[activeSource].label,
          trackFile:trackFileMeta,
          routeBounds:boundsToObj(routeBounds),
          allowedBounds:boundsToObj(allowedBounds),
          fullViewZoom:fullViewZoom,
          tileCount:totalAttempts,
          cellCount:cellRecords.size+failedCellRecords.size,
          packagedTileCount:0,
          missingTileCount:0,
          files:{route:'route.kml',tilesRoot:'tiles/'},
          tiles:[],
          missingTiles:[]
        };
        var zipFiles=[];
        zipFiles.push({name:'route.kml', data:utf8Bytes(trackText || ''), type:'application/vnd.google-earth.kml+xml'});
        zipFiles.push({name:'README.txt', data:utf8Bytes(makePackageReadme(manifest)), type:'text/plain'});
        var cache=('caches' in window) ? await caches.open(GEO_TILE_CACHE_NAME) : null;
        for(var i=0;i<rawTiles.length;i++){
          var tile=rawTiles[i];
          var progress=t('packProgress',{done:i+1,total:rawTiles.length,ok:manifest.packagedTileCount});
          if(i%8===0) toast(progress);
          var item=Object.assign({},tile);
          var blob=null, reason='';
          try{
            var res=cache ? await cache.match(tile.url) : null;
            if(!res){
              res=await fetch(tile.url,{mode:'cors',cache:'force-cache'}).catch(function(){return null;});
            }
            if(res){
              var rb=await responseToBlobIfReadable(res);
              blob=rb.blob;
              reason=rb.reason || '';
            }else{
              reason='缓存中未找到瓦片，且在线读取失败';
            }
          }catch(err){
            reason=(err&&err.message)?err.message:String(err);
          }
          if(blob && blob.size>0){
            var ext=guessTileExt(blob.type, tile.url);
            var path='tiles/'+safePathPart(tile.source)+'/'+safePathPart(tile.provider)+'/'+tile.z+'/'+tile.x+'/'+tile.y+ext;
            var ab=await blobToArrayBuffer(blob);
            zipFiles.push({name:path, data:new Uint8Array(ab), type:blob.type||'application/octet-stream'});
            item.file=path;
            item.mime=blob.type||'';
            item.bytes=blob.size;
            manifest.packagedTileCount++;
            manifest.tiles.push(item);
            clearFailedTile(tile.source,tile.provider,tile.z,tile.x,tile.y);
          }else{
            item.reason=reason || '瓦片响应不可读取，可能是跨域 opaque 响应';
            markTileFailure(item);
          }
          if(i%12===0) await idleTick();
        }
        manifest.tileCount=manifest.packagedTileCount+failedTileRecords.size;
        manifest.missingTiles=Array.from(failedTileRecords.values());
        manifest.missingTileCount=manifest.missingTiles.length;
        // manifest 放在最后生成，确保包含打包结果统计和文件路径。
        zipFiles.push({name:'manifest.json', data:utf8Bytes(JSON.stringify(manifest,null,2)), type:'application/json'});
        var zipBlob=createZipBlob(zipFiles);
        var name=base+'_YFxDataCache_'+timeStamp()+'.yfxcache.zip';
        downloadBlob(name, zipBlob);
        updateStatus();
        updateOverview();
        var msg=t('saveOk',{ok:manifest.packagedTileCount,total:manifest.tileCount});
        if(manifest.missingTileCount>0) msg+=t('missing',{count:manifest.missingTileCount});
        toast(msg);
      }catch(err){
        console.error(err);
        toast(t('saveFailed',{error:((err&&err.message)?err.message:err)}));
      }finally{
        saveBtn.disabled=false;
        saveBtn.textContent=oldText;
      }
    }

    function makePackageReadme(manifest){
      return [
        'YFxDataCache 离线缓存包',
        '',
        '格式：'+manifest.format,
        '生成时间：'+manifest.savedAt,
        '地图源：'+manifest.sourceLabel,
        '轨迹文件：'+((manifest.trackFile&&manifest.trackFile.name)||trackName||''),
        '',
        '说明：',
        '1. route.kml 为原始轨迹文件。',
        '2. manifest.json 为缓存清单。',
        '3. tiles/ 目录下为成功打包的地图瓦片。',
        '4. 如果 manifest.json 中 missingTiles 不为空，说明部分瓦片因地图服务跨域限制或读取失败，未能写入 zip。',
        '5. 后续 YFxGeoStudio 增加 .yfxcache.zip 导入功能后，可读取本缓存包。',
        ''
      ].join('\n');
    }

    async function responseToBlobIfReadable(res){
      if(!res) return {blob:null,reason:'无响应'};
      if(res.type==='opaque'){
        // opaque 响应通常无法读取正文；仍尝试一次，以兼容个别浏览器实现。
        try{
          var ob=await res.clone().blob();
          if(ob && ob.size>0) return {blob:ob,reason:''};
        }catch(e){}
        return {blob:null,reason:'跨域 opaque 响应不可读取'};
      }
      if(!res.ok && res.status!==0) return {blob:null,reason:'HTTP '+res.status};
      var b=await res.clone().blob();
      if(!b || b.size===0) return {blob:null,reason:'瓦片数据为空'};
      return {blob:b,reason:''};
    }

    function guessTileExt(mime, url){
      mime=(mime||'').toLowerCase();
      if(mime.indexOf('png')>=0) return '.png';
      if(mime.indexOf('jpeg')>=0 || mime.indexOf('jpg')>=0) return '.jpg';
      if(mime.indexOf('webp')>=0) return '.webp';
      var m=String(url||'').split('?')[0].match(/\.(png|jpg|jpeg|webp)$/i);
      if(m) return '.'+m[1].toLowerCase().replace('jpeg','jpg');
      return '.tile';
    }

    function safePathPart(s){
      return String(s||'x').replace(/[^a-zA-Z0-9_\-\.]+/g,'_') || 'x';
    }

    function idleTick(){
      return new Promise(function(resolve){ setTimeout(resolve,0); });
    }

    function blobToArrayBuffer(blob){
      if(blob.arrayBuffer) return blob.arrayBuffer();
      return new Promise(function(resolve,reject){
        var r=new FileReader();
        r.onload=function(){ resolve(r.result); };
        r.onerror=function(){ reject(r.error||new Error('读取 Blob 失败')); };
        r.readAsArrayBuffer(blob);
      });
    }

    function boundsToObj(b){
      if(!b) return null;
      return {south:b.getSouth(),west:b.getWest(),north:b.getNorth(),east:b.getEast()};
    }

    function downloadText(filename, text, type){
      var blob=new Blob([text],{type:type||'text/plain;charset=utf-8'});
      downloadBlob(filename, blob);
    }

    function downloadBlob(filename, blob){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download=filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },0);
    }

    function timeStamp(){
      var d=new Date();
      function z(n){return n<10?'0'+n:String(n);}
      return d.getFullYear()+z(d.getMonth()+1)+z(d.getDate())+'_'+z(d.getHours())+z(d.getMinutes())+z(d.getSeconds());
    }

    function escapeHtml(s){
      return String(s||'').replace(/[&<>"']/g,function(c){
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
      });
    }

    function updateStatus(){
      var z=map.getZoom();
      el.statusFile.textContent=trackName?(t('trackPrefix')+trackName):t('noTrack');
      el.statusSource.textContent=sourceDefs[activeSource].label;
      el.statusZoom.textContent='Z '+z;
      el.statusTiles.textContent=t('tilePrefix',{ok:tileRecords.size,failed:failedTileRecords.size});
    }

    function updateOverview(){
      if(!allowedBounds || el.overview.style.display==='none') return;
      var canvas=el.canvas;
      var ctx=canvas.getContext('2d');
      var w=canvas.width, h=canvas.height;
      ctx.clearRect(0,0,w,h);
      ctx.fillStyle='rgba(4,7,10,.85)'; ctx.fillRect(0,0,w,h);
      ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=1; ctx.strokeRect(.5,.5,w-1,h-1);
      var z=map.getZoom();
      var count=0;
      var failedCount=0;
      ctx.fillStyle='rgba(255,207,102,.50)';
      failedCellRecords.forEach(function(c){
        if(c.source!==activeSource || c.z!==z) return;
        if(cellRecords.has(cellKey(c.source,c.z,c.x,c.y))) return;
        var tb=tileBounds(c.x,c.y,c.z);
        var inter=intersectBounds(tb, allowedBounds);
        if(!inter) return;
        var p1=toCanvas(inter.west, inter.north, w, h);
        var p2=toCanvas(inter.east, inter.south, w, h);
        var x=Math.max(0, Math.min(p1.x,p2.x));
        var y=Math.max(0, Math.min(p1.y,p2.y));
        var rw=Math.min(w, Math.max(p1.x,p2.x))-x;
        var rh=Math.min(h, Math.max(p1.y,p2.y))-y;
        if(rw>0&&rh>0){ ctx.fillRect(x,y,rw,rh); failedCount++; }
      });
      ctx.fillStyle='rgba(85,212,139,.42)';
      cellRecords.forEach(function(c){
        if(c.source!==activeSource || c.z!==z) return;
        var tb=tileBounds(c.x,c.y,c.z);
        var inter=intersectBounds(tb, allowedBounds);
        if(!inter) return;
        var p1=toCanvas(inter.west, inter.north, w, h);
        var p2=toCanvas(inter.east, inter.south, w, h);
        var x=Math.max(0, Math.min(p1.x,p2.x));
        var y=Math.max(0, Math.min(p1.y,p2.y));
        var rw=Math.min(w, Math.max(p1.x,p2.x))-x;
        var rh=Math.min(h, Math.max(p1.y,p2.y))-y;
        if(rw>0&&rh>0){ ctx.fillRect(x,y,rw,rh); count++; }
      });
      ctx.strokeStyle='rgba(85,212,139,.86)'; ctx.lineWidth=1;
      cellRecords.forEach(function(c){
        if(c.source!==activeSource || c.z!==z) return;
        var tb=tileBounds(c.x,c.y,c.z);
        var inter=intersectBounds(tb, allowedBounds);
        if(!inter) return;
        var p1=toCanvas(inter.west, inter.north, w, h);
        var p2=toCanvas(inter.east, inter.south, w, h);
        ctx.strokeRect(Math.min(p1.x,p2.x),Math.min(p1.y,p2.y),Math.abs(p2.x-p1.x),Math.abs(p2.y-p1.y));
      });
      ctx.strokeStyle='rgba(255,207,102,.90)'; ctx.lineWidth=1;
      failedCellRecords.forEach(function(c){
        if(c.source!==activeSource || c.z!==z) return;
        if(cellRecords.has(cellKey(c.source,c.z,c.x,c.y))) return;
        var tb=tileBounds(c.x,c.y,c.z);
        var inter=intersectBounds(tb, allowedBounds);
        if(!inter) return;
        var p1=toCanvas(inter.west, inter.north, w, h);
        var p2=toCanvas(inter.east, inter.south, w, h);
        ctx.strokeRect(Math.min(p1.x,p2.x),Math.min(p1.y,p2.y),Math.abs(p2.x-p1.x),Math.abs(p2.y-p1.y));
      });
      drawOverviewRoute(ctx,w,h);
      drawOverviewViewport(ctx,w,h);
      el.overviewLayer.textContent='Z '+z;
      el.overviewStats.textContent=t('overviewStats',{count:count,failed:failedCount,total:count+failedCount});
    }

    function drawOverviewRoute(ctx,w,h){
      if(!routeLines || !routeLines.length) return;
      ctx.save();
      ctx.strokeStyle='#ff6666'; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.lineCap='round';
      routeLines.forEach(function(line){
        if(!line.length) return;
        ctx.beginPath();
        line.forEach(function(p,i){
          var q=toCanvas(p.lng,p.lat,w,h);
          if(i===0) ctx.moveTo(q.x,q.y); else ctx.lineTo(q.x,q.y);
        });
        ctx.stroke();
      });
      ctx.restore();
    }

    function drawOverviewViewport(ctx,w,h){
      if(!map || !allowedBounds) return;
      var mb=map.getBounds();
      if(!mb || !mb.isValid || !mb.isValid()) return;
      var inter=intersectBounds({
        west:mb.getWest(),
        east:mb.getEast(),
        south:mb.getSouth(),
        north:mb.getNorth()
      }, allowedBounds);
      if(!inter) return;
      var p1=toCanvas(inter.west, inter.north, w, h);
      var p2=toCanvas(inter.east, inter.south, w, h);
      var x=Math.max(0,Math.min(p1.x,p2.x));
      var y=Math.max(0,Math.min(p1.y,p2.y));
      var rw=Math.min(w,Math.max(p1.x,p2.x))-x;
      var rh=Math.min(h,Math.max(p1.y,p2.y))-y;
      if(rw<=0 || rh<=0) return;
      ctx.save();
      ctx.fillStyle='rgba(74,163,255,.13)';
      ctx.strokeStyle='rgba(124,196,255,.96)';
      ctx.lineWidth=2;
      ctx.setLineDash([5,3]);
      ctx.fillRect(x,y,rw,rh);
      ctx.strokeRect(x+.5,y+.5,Math.max(0,rw-1),Math.max(0,rh-1));
      ctx.restore();
    }

    function jumpToOverviewPoint(e){
      if(!allowedBounds || !e) return;
      var rect=el.canvas.getBoundingClientRect();
      if(!rect.width || !rect.height) return;
      var px=(e.clientX-rect.left)/rect.width;
      var py=(e.clientY-rect.top)/rect.height;
      px=Math.max(0,Math.min(1,px));
      py=Math.max(0,Math.min(1,py));
      var west=allowedBounds.getWest(), east=allowedBounds.getEast();
      var south=allowedBounds.getSouth(), north=allowedBounds.getNorth();
      var lng=west+(east-west)*px;
      var lat=north-(north-south)*py;
      map.panTo([lat,lng],{animate:true});
    }

    function toCanvas(lng, lat, w, h){
      var west=allowedBounds.getWest(), east=allowedBounds.getEast(), south=allowedBounds.getSouth(), north=allowedBounds.getNorth();
      var x=(lng-west)/(east-west)*w;
      var y=(north-lat)/(north-south)*h;
      return {x:x,y:y};
    }

    function tileBounds(x,y,z){
      return {west:tile2lng(x,z),east:tile2lng(x+1,z),north:tile2lat(y,z),south:tile2lat(y+1,z)};
    }
    function tile2lng(x,z){ return x/Math.pow(2,z)*360-180; }
    function tile2lat(y,z){
      var n=Math.PI-2*Math.PI*y/Math.pow(2,z);
      return 180/Math.PI*Math.atan(0.5*(Math.exp(n)-Math.exp(-n)));
    }
    function intersectBounds(tb, lb){
      var west=Math.max(tb.west, lb.getWest());
      var east=Math.min(tb.east, lb.getEast());
      var south=Math.max(tb.south, lb.getSouth());
      var north=Math.min(tb.north, lb.getNorth());
      if(west>=east || south>=north) return null;
      return {west:west,east:east,south:south,north:north};
    }

    var _crcTable=null;
    function makeCrcTable(){
      var table=new Uint32Array(256);
      for(var n=0;n<256;n++){
        var c=n;
        for(var k=0;k<8;k++) c=(c&1)?(0xedb88320^(c>>>1)):(c>>>1);
        table[n]=c>>>0;
      }
      return table;
    }
    function crc32(data){
      if(!_crcTable) _crcTable=makeCrcTable();
      var c=0xffffffff;
      for(var i=0;i<data.length;i++) c=_crcTable[(c^data[i])&0xff]^(c>>>8);
      return (c^0xffffffff)>>>0;
    }
    function utf8Bytes(s){ return new TextEncoder().encode(String(s==null?'':s)); }
    function u16(arr,v){ arr.push(v&255,(v>>>8)&255); }
    function u32(arr,v){ arr.push(v&255,(v>>>8)&255,(v>>>16)&255,(v>>>24)&255); }
    function dosTimeDate(d){
      d=d||new Date();
      var time=((d.getHours()&31)<<11)|((d.getMinutes()&63)<<5)|((Math.floor(d.getSeconds()/2))&31);
      var date=(((d.getFullYear()-1980)&127)<<9)|(((d.getMonth()+1)&15)<<5)|(d.getDate()&31);
      return {time:time,date:date};
    }
    function createZipBlob(files){
      var localParts=[];
      var centralParts=[];
      var offset=0;
      var dt=dosTimeDate(new Date());
      files.forEach(function(f){
        var nameBytes=utf8Bytes(f.name);
        var data=f.data instanceof Uint8Array ? f.data : new Uint8Array(f.data||[]);
        var crc=crc32(data);
        var local=[];
        u32(local,0x04034b50); u16(local,20); u16(local,0x0800); u16(local,0); u16(local,dt.time); u16(local,dt.date);
        u32(local,crc); u32(local,data.length>>>0); u32(local,data.length>>>0); u16(local,nameBytes.length); u16(local,0);
        localParts.push(new Uint8Array(local), nameBytes, data);
        var central=[];
        u32(central,0x02014b50); u16(central,20); u16(central,20); u16(central,0x0800); u16(central,0); u16(central,dt.time); u16(central,dt.date);
        u32(central,crc); u32(central,data.length>>>0); u32(central,data.length>>>0); u16(central,nameBytes.length); u16(central,0); u16(central,0);
        u16(central,0); u16(central,0); u32(central,0); u32(central,offset>>>0);
        centralParts.push(new Uint8Array(central), nameBytes);
        offset += 30 + nameBytes.length + data.length;
      });
      var centralSize=0;
      centralParts.forEach(function(p){ centralSize += p.length; });
      var end=[];
      u32(end,0x06054b50); u16(end,0); u16(end,0); u16(end,files.length); u16(end,files.length);
      u32(end,centralSize>>>0); u32(end,offset>>>0); u16(end,0);
      var all=localParts.concat(centralParts,[new Uint8Array(end)]);
      return new Blob(all,{type:'application/zip'});
    }

    function toast(msg){
      clearTimeout(toastTimer);
      el.toast.textContent=msg;
      el.toast.style.display='block';
      toastTimer=setTimeout(function(){ el.toast.style.display='none'; },3600);
    }

    window.addEventListener('error', function(e){
      var msg=e.message||'未知错误';
      console.error(e.error||msg);
      toast('错误：'+msg);
    });
  })();
  </script>
</body>
