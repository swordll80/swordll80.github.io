  <script>
    if (!window.L) { document.body.innerHTML = '<div style="padding:24px;color:#fff;background:#111">Leaflet 加载失败，请确认 leaflet1.9.4.js 和 leaflet1.9.4.css 在当前目录。</div>'; throw new Error('Leaflet missing'); }

    /*
     * 简易日志系统
     * ------------------------------------------------------------
     * 设计目标：
     *   1. 普通信息写入日志，但不打扰用户；
     *   2. ERROR 自动打开日志窗口，并且不会自动关闭；
     *   3. 用户可以复制/保存日志，便于反馈 KML 解析、导出、JS 异常。
     */
    var LOG_LEVEL_INFO  = 'INFO ';
    var LOG_LEVEL_WARN  = 'WARN ';
    var LOG_LEVEL_ERROR = 'ERROR';
    var _rawConsoleError = console.error ? console.error.bind(console) : function(){};
    var _rawConsoleWarn  = console.warn  ? console.warn.bind(console)  : function(){};
    var _rawConsoleLog   = console.log   ? console.log.bind(console)   : function(){};

    function logTimeStamp(){
      var d = new Date();
      function z(n){ return n < 10 ? '0' + n : String(n); }
      return d.getFullYear() + '-' + z(d.getMonth()+1) + '-' + z(d.getDate()) + ' ' +
             z(d.getHours()) + ':' + z(d.getMinutes()) + ':' + z(d.getSeconds());
    }
    function logToString(v){
      if(v instanceof Error) return v.stack || v.message || String(v);
      if(typeof v === 'string') return v;
      try { return JSON.stringify(v, null, 2); } catch(e) { return String(v); }
    }
    function appendLog(level, msg, autoOpen){
      var txt = document.getElementById('logText');
      if(!txt) return;
      var line = '[' + logTimeStamp() + '] [' + level + '] ' + logToString(msg);
      txt.value += line + '\n';
      txt.scrollTop = txt.scrollHeight;
      if(autoOpen) showLogPanel(level === LOG_LEVEL_ERROR);
    }
    function logInfo(msg){ appendLog(LOG_LEVEL_INFO, msg, false); }
    function logWarn(msg){ appendLog(LOG_LEVEL_WARN, msg, false); }
    function logError(msg){ appendLog(LOG_LEVEL_ERROR, msg, true); }
    function showLogPanel(hasError){
      var p = document.getElementById('logPanel');
      if(!p) return;
      p.style.display = 'block';
      if(hasError) p.classList.add('has-error');
    }
    function hideLogPanel(){ var p=document.getElementById('logPanel'); if(p) p.style.display='none'; }
    function clearLog(){
      var txt=document.getElementById('logText');
      if(txt) txt.value='';
      var p=document.getElementById('logPanel');
      if(p) p.classList.remove('has-error');
    }
    function copyLog(){
      var txt=document.getElementById('logText');
      if(!txt) return;
      txt.focus(); txt.select();
      try{
        if(navigator.clipboard && navigator.clipboard.writeText){
          navigator.clipboard.writeText(txt.value).then(function(){ toast('日志已复制'); });
        }else{
          document.execCommand('copy');
          toast('日志已复制');
        }
      }catch(e){ logError('复制日志失败：' + (e && e.message ? e.message : e)); }
    }
    function saveLog(){
      var text=(document.getElementById('logText')||{}).value || '';
      try{
        var blob=new Blob([text],{type:'text/plain;charset=utf-8'});
        var a=document.createElement('a');
        a.href=URL.createObjectURL(blob);
        a.download='YFxGeoStudio_'+logTimeStamp().replace(/[-: ]/g,'')+'.log';
        document.body.appendChild(a);
        a.click();
        setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},0);
      }catch(e){ logError('保存日志失败：' + (e && e.message ? e.message : e)); }
    }

    // 接管 console.error / console.warn：旧代码中的 console.error(err) 也能自动进入日志窗口。
    console.error = function(){
      _rawConsoleError.apply(console, arguments);
      var parts=[]; for(var i=0;i<arguments.length;i++) parts.push(logToString(arguments[i]));
      logError(parts.join('\n'));
    };
    console.warn = function(){
      _rawConsoleWarn.apply(console, arguments);
      var parts=[]; for(var i=0;i<arguments.length;i++) parts.push(logToString(arguments[i]));
      logWarn(parts.join('\n'));
    };

    // 全局 JS 错误兜底：按钮点击、KML 解析、导出等未捕获异常都会进入日志窗口。
    window.onerror = function(msg, source, line, col, error){
      logError('JS异常：' + msg + '\n文件：' + source + '\n行：' + line + '，列：' + col + '\n' + (error && error.stack ? error.stack : ''));
      return false;
    };
    window.addEventListener('unhandledrejection', function(e){
      logError('Promise异常：\n' + logToString(e.reason));

    function toolbarNaturalWidth(tb){

      var padR=cs?parseFloat(cs.paddingRight)||0:0;

      var total=padL+padR;
      var count=0;
      for(var i=0;i<tb.children.length;i++){

        if(!el||el.nodeType!==1)continue;
        var est=el.style&&el.style.display;

        var mr=ec?parseFloat(ec.marginRight)||0:0;

        count++;

      if(count>1)total+=gap*(count-1);
      return Math.ceil(total+2);

    function normalizeHeading(angle){
      angle = Number(angle);
      if(!isFinite(angle)) return null;
      angle = angle % 360;
      if(angle < 0) angle += 360;
      return angle;
    }

    function headingDelta(fromAngle, toAngle){
      var from = normalizeHeading(fromAngle);
      var to = normalizeHeading(toAngle);
      if(from == null || to == null) return 0;
      var d = to - from;
      if(d > 180) d -= 360;
      if(d < -180) d += 360;
      return d;
    }

    function smoothUserHeading(nextHeading){
      nextHeading = normalizeHeading(nextHeading);
      if(nextHeading == null) return null;
      if(userHeading == null){
        userHeading = nextHeading;
      }else{
        // 轻微平滑，避免手机罗盘抖动；跨 0/360 度时仍走最短角度。
        userHeading = normalizeHeading(userHeading + headingDelta(userHeading, nextHeading) * 0.35);
      }
      userHeadingLastTime = Date.now();
      return userHeading;
    }

    function getScreenOrientationAngle(){
      var so = window.screen && window.screen.orientation;
      if(so && typeof so.angle === 'number') return so.angle;
      if(typeof window.orientation === 'number') return window.orientation;
      return 0;
    }

    function headingFromDeviceOrientation(e){
      if(!e) return null;
      // iOS Safari 提供的是罗盘角：0 表示屏幕顶部朝北，最适合当前位置箭头。
      if(typeof e.webkitCompassHeading === 'number' && isFinite(e.webkitCompassHeading)){
        return normalizeHeading(e.webkitCompassHeading);
      }
      if(typeof e.compassHeading === 'number' && isFinite(e.compassHeading)){
        return normalizeHeading(e.compassHeading);
      }
      // Android/部分浏览器只能拿到 alpha；这里换算成近似罗盘角。
      if(typeof e.alpha === 'number' && isFinite(e.alpha)){
        var heading = 360 - e.alpha;
        var screenAngle = getScreenOrientationAngle();
        if(screenAngle) heading += screenAngle;
        return normalizeHeading(heading);
      }
      return null;
    }

    function currentLocateHeading(geoHeading){
      // 优先使用手机朝向；5 秒内没有罗盘数据时，才退回 GPS 行进方向。
      if(userHeading != null && Date.now() - userHeadingLastTime < 5000) return userHeading;
      var gh = normalizeHeading(geoHeading);
      return gh == null ? 0 : gh;
    }

    function updateUserLocationIcon(geoHeading){
      var marker = window._userMarker || userLocationMarker;
      if(!marker) return;
      marker.setIcon(userArrowIcon(currentLocateHeading(geoHeading)));
    }

    function onUserDeviceOrientation(e){
      var h = headingFromDeviceOrientation(e);
      if(h == null) return;
      smoothUserHeading(h);
      updateUserLocationIcon();
    }

    function startUserHeadingWatch(){
      if(userHeadingWatchStarted) return Promise.resolve(true);
      if(!window.DeviceOrientationEvent) return Promise.resolve(false);
      function attachHeadingEvents(){
        if(userHeadingWatchStarted) return true;
        window.addEventListener('deviceorientation', onUserDeviceOrientation, true);
        window.addEventListener('deviceorientationabsolute', onUserDeviceOrientation, true);
        userHeadingWatchStarted = true;
        return true;
      }
      try{
        if(typeof DeviceOrientationEvent.requestPermission === 'function'){
          return DeviceOrientationEvent.requestPermission().then(function(state){
            if(state === 'granted') return attachHeadingEvents();
            toast(lang==='en'?'Compass permission denied; using GPS track direction.':'未授权手机朝向，改用 GPS 行进方向。');
            return false;
          }).catch(function(err){
            logWarn('请求手机朝向权限失败：' + (err && err.message ? err.message : err));
            return false;
          });
        }
      }catch(e){
        logWarn('启动手机朝向监听失败：' + (e && e.message ? e.message : e));
        return Promise.resolve(false);
      }
      return Promise.resolve(attachHeadingEvents());
    }

    function userArrowIcon(angle){
      angle = normalizeHeading(angle);
      if(angle == null) angle = 0;

      return L.divIcon({
        className: '',
        iconSize: [42, 42],
        iconAnchor: [21, 21],
        html: '<div class="user-arrow-icon" style="transform:rotate(' + angle + 'deg);">' +
              '<svg viewBox="0 0 48 48" width="42" height="42" aria-hidden="true">' +
              // SVG 默认尖头朝上；罗盘角 0=北 时无需再补偿 90/180 度。
              '<path d="M24 4 L39 42 L24 34 L9 42 Z" fill="#ffd23f" stroke="#111" stroke-width="2.2" stroke-linejoin="round"/>' +
              '<path d="M24 11 L31 31 L24 27 L17 31 Z" fill="rgba(255,255,255,.25)" stroke="none"/>' +
              '</svg>' +
              '</div>'
      });
    }

function gpsRecordFormatTime(ms){
  var d=new Date(ms||Date.now());
  function z(n){return n<10?'0'+n:String(n);}
  return d.getFullYear()+z(d.getMonth()+1)+z(d.getDate())+'_'+z(d.getHours())+z(d.getMinutes());
}
function gpsRecordDefaultName(){
  return (lang==='en'?'Record_':'记录_')+gpsRecordFormatTime(gpsRecordStartTime)+'-'+gpsRecordFormatTime(gpsRecordEndTime||Date.now());
}
function sanitizeFileBaseName(name){
  return String(name||'YFxGeoStudio').replace(/[\\/:*?"<>|]/g,'_').replace(/\s+/g,'_').replace(/^_+|_+$/g,'').slice(0,80)||'YFxGeoStudio';
}
function gpsRecordIntervalMs(speed){
  speed=Number(speed);
  if(!isFinite(speed)||speed<0)return 4000;
  if(speed<0.5)return 8000;
  if(speed<2.0)return 5000;
  if(speed<6.0)return 3000;
  return 1500;
}
function gpsRecordMinDistance(speed){
  speed=Number(speed);
  if(!isFinite(speed)||speed<0.5)return 4;
  if(speed<2.0)return 6;
  if(speed<6.0)return 10;
  return 15;
}
function gpsRecordPointFromPosition(pos){
  var c=pos&&pos.coords?pos.coords:null;
  if(!c)return null;
  var lat=Number(c.latitude),lng=Number(c.longitude);
  if(!isFinite(lat)||!isFinite(lng))return null;
  var pt={lat:lat,lng:lng,time:(pos.timestamp||Date.now())};
  if(c.altitude!=null&&isFinite(Number(c.altitude)))pt.alt=Number(c.altitude);
  return pt;
}
function cloneGpsRecordPoint(pt){
  if(!pt)return null;
  var r={lat:Number(pt.lat),lng:Number(pt.lng),time:pt.time!=null?+pt.time:Date.now()};
  if(pt.alt!=null&&isFinite(Number(pt.alt)))r.alt=Number(pt.alt);
  return r;
}
function gpsRecordPointSameCoord(a,b){
  if(!a||!b)return false;
  return Math.abs(Number(a.lat)-Number(b.lat))<1e-8&&Math.abs(Number(a.lng)-Number(b.lng))<1e-8;
}
function rememberGpsRecordEndpoint(pt,coords){
  if(!pt)return;
  var cp=cloneGpsRecordPoint(pt);
  if(!gpsRecordStartPoint)gpsRecordStartPoint=cloneGpsRecordPoint(cp);
  var accuracy=coords&&coords.accuracy!=null?Number(coords.accuracy):NaN;
  // 起止点不再受距离/时间筛选限制；但有可用精度时，避免用明显过差的定位覆盖终点。
  if(!gpsRecordLastRawPoint||!isFinite(accuracy)||accuracy<=120)gpsRecordLastRawPoint=cloneGpsRecordPoint(cp);
}
function buildGpsRecordFinalPoints(){
  var pts=copyPoints(gpsRecordPoints||[]);
  var start=cloneGpsRecordPoint(gpsRecordStartPoint);
  var end=cloneGpsRecordPoint(gpsRecordLastRawPoint);
  if(start){
    if(!pts.length){
      pts.push(start);
    }else if(!gpsRecordPointSameCoord(pts[0],start)){
      pts.unshift(start);
    }else if(start.time!=null){
      pts[0].time=start.time;
    }
  }
  if(end){
    if(!pts.length){
      pts.push(end);
    }else{
      var last=pts[pts.length-1];
      var sameCoord=gpsRecordPointSameCoord(last,end);
      var lastTime=last&&last.time!=null?+last.time:0;
      var endTime=end&&end.time!=null?+end.time:0;
      if(!sameCoord||Math.abs(endTime-lastTime)>1000||pts.length<2){
        pts.push(end);
      }
    }
  }
  if(pts.length===1){
    var dup=cloneGpsRecordPoint(pts[0]);
    dup.time=gpsRecordEndTime||Date.now();
    pts.push(dup);
  }
  return pts;
}
function seedGpsRecordFromCurrentLocation(){
  if(!userLocationPos||!userLocationPos.length)return;
  var seed={lat:Number(userLocationPos[0]),lng:Number(userLocationPos[1]),time:gpsRecordStartTime||Date.now()};
  if(!isFinite(seed.lat)||!isFinite(seed.lng))return;
  gpsRecordStartPoint=cloneGpsRecordPoint(seed);
  gpsRecordLastRawPoint=cloneGpsRecordPoint(seed);
  gpsRecordPoints.push(cloneGpsRecordPoint(seed));
  gpsRecordEndTime=seed.time;
  redrawGpsRecordPolyline();
}
function handleGpsRecordPosition(pos,centerOnce){
  updateUserLocationFromPosition(pos,centerOnce);
  var pt=gpsRecordPointFromPosition(pos);
  rememberGpsRecordEndpoint(pt,pos&&pos.coords?pos.coords:null);
  if(shouldAcceptGpsRecordPoint(pt,pos&&pos.coords?pos.coords:null)){
    gpsRecordPoints.push(pt);
    gpsRecordEndTime=pt.time;
    redrawGpsRecordPolyline();
  }
}
function shouldAcceptGpsRecordPoint(pt,coords){
  if(!pt)return false;
  gpsRecordRawCount++;
  var accuracy=coords&&coords.accuracy!=null?Number(coords.accuracy):NaN;
  if(gpsRecordPoints.length>0&&isFinite(accuracy)&&accuracy>120)return false;
  if(!gpsRecordPoints.length)return true;
  var last=gpsRecordPoints[gpsRecordPoints.length-1];
  var dt=pt.time-last.time;
  var speed=coords&&coords.speed!=null?Number(coords.speed):NaN;
  var minDt=gpsRecordIntervalMs(speed);
  var minDist=gpsRecordMinDistance(speed);
  var dist=distanceMeters(last.lat,last.lng,pt.lat,pt.lng);
  return dt>=minDt||dist>=minDist;
}
function redrawGpsRecordPolyline(){
  if(!gpsRecording)return;
  var mapPts=linePointsToMapLatLngs(gpsRecordPoints);
  if(!gpsRecordPolyline){
    gpsRecordPolyline=L.polyline(mapPts,{color:'#ff3030',weight:5,opacity:.95,dashArray:'8 6'}).addTo(drawLayer);
  }else{
    gpsRecordPolyline.setLatLngs(mapPts);
  }
}
function updateUserLocationFromPosition(pos,centerOnce){
  var lat=pos.coords.latitude,lng=pos.coords.longitude;
  userLocationPos=[lat,lng];
  var displayLl=dataLatLngToMap({lat:lat,lng:lng});
  var heading=currentLocateHeading(pos.coords.heading);
  if(!window._userMarker){
    window._userMarker=L.marker(displayLl,{icon:userArrowIcon(heading),interactive:false,zIndexOffset:2000}).addTo(map);
    userLocationMarker=window._userMarker;
  }else{
    window._userMarker.setLatLng(displayLl);
    window._userMarker.setIcon(userArrowIcon(heading));
    userLocationMarker=window._userMarker;
  }
  if(centerOnce)map.setView(displayLl);
}
function startGpsTrackRecording(){
  if(gpsRecording)return;
  if(!navigator.geolocation){toast(lang==='en'?'Geolocation is not supported.':'当前浏览器不支持定位。');return;}
  finishAndExitTrackMode(true);
  gpsRecording=true;
  gpsRecordPoints=[];
  gpsRecordRawCount=0;
  gpsRecordStartTime=Date.now();
  gpsRecordEndTime=0;
  gpsRecordStartPoint=null;
  gpsRecordLastRawPoint=null;
  if(gpsRecordPolyline){try{drawLayer.removeLayer(gpsRecordPolyline);}catch(e){}gpsRecordPolyline=null;}
  updateLocateButtonRecordingUI(true);

  // 轨迹记录只需要 GPS，不再主动请求手机朝向权限，降低二次权限弹窗概率。
  // 如果普通定位已经启动，直接复用同一个 watchPosition，避免重新注册持续定位。
  if(window._watchId){
    seedGpsRecordFromCurrentLocation();
    toast(lang==='en'?'Track recording started. Click the red dot to stop.':'开始记录轨迹。单击红球结束。');
    return;
  }

  var firstFix=true;
  gpsRecordWatchId=navigator.geolocation.watchPosition(function(pos){
    handleGpsRecordPosition(pos,firstFix);
    firstFix=false;
  },function(err){
    logWarn('轨迹记录定位失败：'+(err&&err.message?err.message:err));
    toast(lang==='en'?'Track recording location failed.':'轨迹记录定位失败。');
  },{enableHighAccuracy:true,maximumAge:1000,timeout:15000});
  toast(lang==='en'?'Track recording started. Click the red dot to stop.':'开始记录轨迹。单击红球结束。');
}
function buildRecordedLineKml(line,documentName){
  var p=['<?xml version="1.0" encoding="UTF-8"?>','<kml xmlns="http://www.opengis.net/kml/2.2">','<Document>','  <name><![CDATA['+cdataSafe(documentName||line.name||'Track')+']]></name>','  <Style id="drawLine"><LineStyle><color>ff3fd2ff</color><width>4</width></LineStyle></Style>','  <Style id="MarkerStyleText"><IconStyle><scale>1.0</scale></IconStyle></Style>'];
  if(line&&line.points&&line.points.length){
    p.push(buildPointPlacemarkKml(makeEndpointObjectFromLine(line,0,'ptStart'),-1));
    p.push(buildPointPlacemarkKml(makeEndpointObjectFromLine(line,line.points.length-1,'ptEnd'),-2));
  }
  p.push(buildLinePlacemarkKml(line));
  p.push('</Document>','</kml>');
  return p.join('\n');
}
function addRecordedTrackEndpointMarkers(line,pts){
  if(!line||!pts||pts.length<2)return;
  var first=pts[0],last=pts[pts.length-1];
  addObject({name:tr('ptStart')+'-'+(line.name||tr('line')),lat:first.lat,lng:first.lng,alt:first.alt,time:first.time,ptype:'ptStart',lineId:line.id,icon:'greenPin',sourceType:'gps-record'},true);
  addObject({name:tr('ptEnd')+'-'+(line.name||tr('line')),lat:last.lat,lng:last.lng,alt:last.alt,time:last.time,ptype:'ptEnd',lineId:line.id,icon:'redPin',sourceType:'gps-record'},true);
}
function stopGpsTrackRecording(saveTrack){
  if(!gpsRecording)return;
  gpsRecording=false;
  gpsRecordEndTime=gpsRecordEndTime||Date.now();
  if(gpsRecordWatchId!=null){try{navigator.geolocation.clearWatch(gpsRecordWatchId);}catch(e){}gpsRecordWatchId=null;}
  updateLocateButtonRecordingUI(false);
  if(gpsRecordPolyline){try{drawLayer.removeLayer(gpsRecordPolyline);}catch(e){}gpsRecordPolyline=null;}
  if(!saveTrack){gpsRecordPoints=[];gpsRecordStartPoint=null;gpsRecordLastRawPoint=null;return;}
  var pts=buildGpsRecordFinalPoints();
  if(pts.length<2){
    toast(lang==='en'?'Not enough valid GPS points. Track not saved.':'有效 GPS 点不足，未保存轨迹。');
    gpsRecordPoints=[];
    gpsRecordStartPoint=null;
    gpsRecordLastRawPoint=null;
    return;
  }
  var defaultName=gpsRecordDefaultName();
  var name=window.prompt(lang==='en'?'Track name':'轨迹名称',defaultName);
  if(name==null||String(name).trim()==='')name=defaultName;
  name=String(name).trim();
  pushHistory();
  var line=addLine({name:name,points:pts,color:'#e53935'},false);
  addRecordedTrackEndpointMarkers(line,pts);
  updateStats();
  var fname=sanitizeFileBaseName(name)+'.kml';
  if(importedFilePaths.indexOf(fname)<0)importedFilePaths.push(fname);
  setFileStatusText(importedFilePaths);
  updateSideFileTitle();
  selectLine(line,null,false,'list');
  setTimeout(function(){fitLineVisibleForPanels(line);},40);
  try{
    var xml=buildRecordedLineKml(line,name);
    downloadText(xml,fname,'application/vnd.google-earth.kml+xml;charset=utf-8');
    toast((lang==='en'?'Track saved and exported: ':'轨迹已保存并导出：')+name,3200);
  }catch(e){
    logError('记录轨迹导出失败：'+(e&&(e.stack||e.message)?(e.stack||e.message):e));
    toast(lang==='en'?'Track saved, export failed.':'轨迹已保存，导出失败。');
  }
  scheduleWorkspaceAutosave();
  gpsRecordPoints=[];
  gpsRecordStartPoint=null;
  gpsRecordLastRawPoint=null;
}

function locateMe(){
  if(gpsRecording){stopGpsTrackRecording(true);return;}
  if(!navigator.geolocation){
    toast(lang==='en'?'Geolocation is not supported.':'当前浏览器不支持定位。');
    return;
  }

  // 由用户点击定位按钮触发，满足 iOS Safari 请求罗盘权限的手势要求。
  startUserHeadingWatch();

  if(window._watchId){
    navigator.geolocation.clearWatch(window._watchId);
  }

  var firstFix = true;

  window._watchId = navigator.geolocation.watchPosition(function(pos){
    if(gpsRecording){
      handleGpsRecordPosition(pos,firstFix);
    }else{
      updateUserLocationFromPosition(pos,firstFix);
    }
    firstFix = false;
  }, function(err){
    logWarn('定位失败：' + (err && err.message ? err.message : err));
    toast(lang==='en'?'Location failed.':'定位失败。');
  },{
    enableHighAccuracy:true,
    maximumAge:1000,
    timeout:12000
  });
}

function yfxViewportMeta(){
      var metas=document.getElementsByTagName('meta');
      for(var i=0;i<metas.length;i++){
        if((metas[i].getAttribute('name')||'').toLowerCase()==='viewport')return metas[i];
      }
      return null;
    }
    function yfxSetPageScaleAllowed(allowed){
      var meta=yfxViewportMeta();
      if(!meta)return;
      if(yfxOriginalViewportContent==null)yfxOriginalViewportContent=meta.getAttribute('content')||'';
      if(allowed){
        meta.setAttribute('content','width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover');
      }else{
        meta.setAttribute('content',yfxOriginalViewportContent || 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
      }
    }
    function yfxSetMapTouchPassthrough(enabled){
      var html=document.documentElement;
      var body=document.body;
      if(html)html.classList.toggle('yfx-map-touch-locked',!!enabled);
      if(body)body.classList.toggle('yfx-map-touch-locked',!!enabled);
      var c=map&&map.getContainer?map.getContainer():null;
      if(c){
        // 锁定时地图只显示，不接收触摸；双指手势交给 Safari 页面层。
        c.style.pointerEvents=enabled?'none':'';
        c.style.touchAction=enabled?'auto':'';

        try{ if(map&&map.invalidateSize)map.invalidateSize(false); }catch(e){}
      }

    function placeHelpDialog(){
      var dlg=document.getElementById('dialog');
      if(!dlg)return;
      var r=dlg.getBoundingClientRect();
      var w=r.width||620,h=r.height||360;
      var left,top;
      if(helpDialogLastPos&&isFinite(helpDialogLastPos.left)&&isFinite(helpDialogLastPos.top)){
        left=helpDialogLastPos.left;top=helpDialogLastPos.top;
      }else{
        left=(window.innerWidth-w)/2;
        top=(window.innerHeight-h)/2;
      }
      left=Math.max(8,Math.min(left,window.innerWidth-w-8));
      top=Math.max(8,Math.min(top,window.innerHeight-h-36));
      dlg.style.left=Math.round(left)+'px';
      dlg.style.top=Math.round(top)+'px';
      helpDialogLastPos={left:Math.round(left),top:Math.round(top)};

    function enableHelpDialogDrag(){
      var dlg=document.getElementById('dialog');
      var header=document.getElementById('helpDialogTitle');
      if(!dlg||!header)return;
      header.style.cursor='move';
      var dragging=false,startX=0,startY=0,startLeft=0,startTop=0;
      header.onmousedown=function(e){
        if(e.button!==0)return;
        e.preventDefault();
        dragging=true;
        startX=e.clientX;startY=e.clientY;
        var r=dlg.getBoundingClientRect();
        startLeft=r.left;startTop=r.top;
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp,{once:true});
      };
      function onMove(e){
        if(!dragging)return;
        var r=dlg.getBoundingClientRect();
        var left=startLeft+(e.clientX-startX);
        var top=startTop+(e.clientY-startY);
        left=Math.max(0,Math.min(left,window.innerWidth-r.width));
        top=Math.max(0,Math.min(top,window.innerHeight-r.height));
        dlg.style.left=Math.round(left)+'px';
        dlg.style.top=Math.round(top)+'px';
      }
      function onUp(){
        dragging=false;
        var r=dlg.getBoundingClientRect();
        helpDialogLastPos={left:Math.round(r.left),top:Math.round(r.top)};
        document.removeEventListener('mousemove',onMove);
      }
    }

    function showDonate(){finishAndExitTrackMode(true);if(dlgLineTarget)closeLineInfoDialog();var m=document.getElementById('donateMask');document.getElementById('qrImg').src=_ensureDonateQr();m.style.display='flex';}
    function closeDonate(){document.getElementById('donateMask').style.display='none';}

    // -- map events --
    map.on('mousemove',function(e){setCoordStatus(e.latlng);checkSpiderfyCollapse(e);});
    map.on('zoomend',function(){setZoomStatus();updateAllMarkerLabels();scheduleWorkspaceAutosave();});
    map.on('moveend resize',function(){setScaleStatus();updateAllMarkerLabels();scheduleWorkspaceAutosave();});
    setScaleStatus();
    map.on('click',function(e){
      closeMarkerNavMenu();
      // 点击轨迹线时，Leaflet 有时仍会触发 map.click。这里识别轨迹线点击标记，避免清掉高亮。
      if(e&&e.originalEvent&&e.originalEvent._yfxLineClicked)return;
      if(mode==='track'){
        L.DomEvent.preventDefault(e.originalEvent);
        if(clickTimer)clearTimeout(clickTimer);
        clickTimer=setTimeout(function(){clickTimer=null;if(drawingLine.length===0)pushHistory();var dp=mapLatLngToData(e.latlng);drawingLine.push({lat:dp.lat,lng:dp.lng});redrawDrawingLine();},280);
        return;
      }
      deselectLine();
    });
    map.on('dblclick',function(e){if(mode==='track'){if(e&&e.originalEvent){L.DomEvent.preventDefault(e.originalEvent);L.DomEvent.stopPropagation(e.originalEvent);}if(clickTimer){clearTimeout(clickTimer);clickTimer=null;}return;}});

    // 构造节点弹窗。

    //   1. 轨迹采样点已经在 description/comment 中有经纬度/海拔/时间时，不再重复显示顶部坐标、海拔、时间；
    //   2. 已用耗时和总耗时合并到一行，便于阅读；

    function updatePopup(o){

          }
          if(dtTotal>0)timeParts.push(tr('totalDuration')+'：'+fmtDuration(dtTotal));

    function enableMarkerInfoDialogDrag(){

    function buildPointInfoLine(o,p){
      var parsed=parseDescriptionInfo(o.comment || o.description || '');
      var lng=(parsed.lng!=null && isFinite(parsed.lng)) ? parsed.lng : p.lng;
      var lat=(parsed.lat!=null && isFinite(parsed.lat)) ? parsed.lat : p.lat;
      var alt=(parsed.alt!=null && isFinite(parsed.alt)) ? parsed.alt : o.alt;
      var time=(parsed.time!=null && isFinite(parsed.time)) ? parsed.time : o.time;
      var parts=[];
      parts.push('经度：'+fmtCoordDisplay(lng));
      parts.push('纬度：'+fmtCoordDisplay(lat));
      if(alt!=null && isFinite(Number(alt)))parts.push('海拔：'+formatAltitudeText(alt));
      if(time!=null && isFinite(Number(time)))parts.push('时间：'+formatPopupTime(time));
      return escapeHtml(parts.join(' '));

    function formatAltitudeText(v){
      var n=Number(v);
      if(!isFinite(n))return '';

      return Math.round(n)+' m';

    function formatPopupTime(t){
      var d=new Date(Number(t));

    function resizeActiveLineInfoDialog(){
      if(!dlgLineTarget)return;
      applyLineInfoLayout();
      placeLineInfoDialog(dlgLineTarget,true);
      drawElevationChart(dlgLineTarget);
    }

    function clampLineInfoPos(left,top,dlgW,dlgH){
      var vw=window.innerWidth||document.documentElement.clientWidth||800;
      var vh=window.innerHeight||document.documentElement.clientHeight||600;
      var margin=10;
      return {
        left:Math.round(Math.max(margin,Math.min(left,vw-dlgW-margin))),
        top:Math.round(Math.max(margin,Math.min(top,vh-dlgH-36)))
      };
    }

    function defaultLineInfoPos(dlgW,dlgH){
      var vw=window.innerWidth||document.documentElement.clientWidth||800;
      var vh=window.innerHeight||document.documentElement.clientHeight||600;
      var margin=10,gap=8;
      var left=vw-dlgW-margin;
      var layer=document.getElementById('layerBox');
      var top;
      if(layer){
        var lr=layer.getBoundingClientRect();
        // V8：默认让轨迹信息框下边沿尽量贴近右下角地图切换框上边沿。
        top=lr.top-dlgH-gap;
      }else{
        top=Math.round((vh-dlgH)/2);
      }
      // 如果窗口太矮导致放不下，再回退到右侧中部。
      if(top<margin)top=Math.round((vh-dlgH)/2);
      return clampLineInfoPos(left,top,dlgW,dlgH);
    }

    function placeLineInfoDialog(line,keepLastPos){
      var dlg=document.getElementById('dialog');
      if(!dlg||!line)return;
      var layout=applyLineInfoLayout();
      var rect=dlg.getBoundingClientRect();
      var dlgW=rect.width||layout.width||520;
      var dlgH=Math.min(rect.height||layout.maxHeight||300, layout.maxHeight||300);
      var pos;
      if((lineInfoDialogUserMoved||keepLastPos)&&lineInfoDialogLastPos&&isFinite(lineInfoDialogLastPos.left)&&isFinite(lineInfoDialogLastPos.top)){
        pos=clampLineInfoPos(lineInfoDialogLastPos.left,lineInfoDialogLastPos.top,dlgW,dlgH);
      }else{
        pos=defaultLineInfoPos(dlgW,dlgH);
      }
      dlg.style.left=pos.left+'px';
      dlg.style.top=pos.top+'px';
      lineInfoDialogLastPos={left:pos.left,top:pos.top};
    }

    function enableLineInfoDialogDrag(){
      var dlg=document.getElementById('dialog');
      var header=document.getElementById('lineInfoTitle');
      if(!dlg||!header)return;
      header.style.cursor='move';
      header.style.touchAction='none';
      header.style.userSelect='none';
      header.style.webkitUserSelect='none';
      var dragging=false,startX=0,startY=0,startLeft=0,startTop=0;
      function pointFromEvent(e){
        if(e&&e.touches&&e.touches.length)return {x:e.touches[0].clientX,y:e.touches[0].clientY};
        if(e&&e.changedTouches&&e.changedTouches.length)return {x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
        return {x:e.clientX,y:e.clientY};
      }
      function beginDrag(e){
        if(e&&e.type==='mousedown'&&e.button!==0)return;
        if(e&&e.preventDefault)e.preventDefault();
        dragging=true;
        var p=pointFromEvent(e);
        startX=p.x;startY=p.y;
        var r=dlg.getBoundingClientRect();
        startLeft=r.left;startTop=r.top;
        document.addEventListener('mousemove',onMove);
        document.addEventListener('mouseup',onUp,{once:true});
        document.addEventListener('touchmove',onMove,{passive:false});
        document.addEventListener('touchend',onUp,{once:true});
        document.addEventListener('touchcancel',onUp,{once:true});
      }
      function onMove(e){
        if(!dragging)return;
        if(e&&e.preventDefault)e.preventDefault();
        var p=pointFromEvent(e);
        var r=dlg.getBoundingClientRect();
        var left=startLeft+(p.x-startX);
        var top=startTop+(p.y-startY);
        left=Math.max(0,Math.min(left,window.innerWidth-r.width));
        top=Math.max(0,Math.min(top,window.innerHeight-r.height));
        dlg.style.left=Math.round(left)+'px';
        dlg.style.top=Math.round(top)+'px';
      }
      function onUp(e){
        if(!dragging)return;
        dragging=false;
        var r=dlg.getBoundingClientRect();
        lineInfoDialogLastPos={left:Math.round(r.left),top:Math.round(r.top)};
        lineInfoDialogUserMoved=true;
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('touchmove',onMove);
      }
      header.onmousedown=beginDrag;
      header.ontouchstart=beginDrag;
    }

    function altitudeRangeSummary(line){
      if(!line||!line.points)return '';
      var minAlt=null,maxAlt=null;
      for(var i=0;i<line.points.length;i++){
        var a=line.points[i].alt;
        if(a==null)continue;
        a=+a;
        if(!isFinite(a))continue;
        if(minAlt===null||a<minAlt)minAlt=a;
        if(maxAlt===null||a>maxAlt)maxAlt=a;
      }
      if(minAlt===null||maxAlt===null)return '';
      if(Math.round(minAlt)===Math.round(maxAlt))return Math.round(minAlt)+' m';
      return Math.round(minAlt)+'-'+Math.round(maxAlt)+' m';
    }

    function stopRunner(){
      if(runnerAnimFrame){
        cancelAnimationFrame(runnerAnimFrame);
        runnerAnimFrame=0;
      }
      if(runnerMarker){
        try{ map.removeLayer(runnerMarker); }catch(e){}
        runnerMarker=null;
      }
      runnerActiveLine=null;
      runnerStartTime=0;
      runnerFollowMap=false;
      runnerLastPanTime=0;
      runnerSpeedMps=1000;
    }

    
    function runnerIcon(label){
      var text = label || '🏃';
      var size = text.length > 2 ? [38, 28] : [28, 28];
      return L.divIcon({
        className: '',
        iconSize: size,
        iconAnchor: [Math.round(size[0] / 2), 24],
        html: '<div class="runner-icon">' + escapeHtml(text) + '</div>'
      });
    }


    function hideElevationHoverMarker(){
      if(elevationHoverMarker){
        try{ map.removeLayer(elevationHoverMarker); }catch(e){}
        elevationHoverMarker=null;
      }
      elevationHoverLine=null;
      elevationHoverRawIdx=null;
    }

    function pointOnLineIndex(line,rawIdx){
      if(!line||!line.points||!line.points.length)return null;
      rawIdx=Number(rawIdx);
      if(!isFinite(rawIdx))return null;
      var pts=line.points;
      if(rawIdx<=1)return L.latLng(Number(pts[0].lat),Number(pts[0].lng));
      if(rawIdx>=pts.length)return L.latLng(Number(pts[pts.length-1].lat),Number(pts[pts.length-1].lng));
      var zero=rawIdx-1;
      var i0=Math.floor(zero),i1=Math.ceil(zero);
      if(i0<0)i0=0;
      if(i1>=pts.length)i1=pts.length-1;
      var a=pts[i0],b=pts[i1];
      if(!a||!b)return null;
      var alat=Number(a.lat),alng=Number(a.lng),blat=Number(b.lat),blng=Number(b.lng);
      if(!isFinite(alat)||!isFinite(alng))return null;
      if(!isFinite(blat)||!isFinite(blng))return L.latLng(alat,alng);
      var t=i1===i0?0:(zero-i0)/(i1-i0);
      return L.latLng(alat+(blat-alat)*t,alng+(blng-alng)*t);
    }

    function showElevationHoverMarker(line,hover){
      if(!map||!line||!hover||!isFinite(Number(hover.idx))){hideElevationHoverMarker();return;}
      var pos=pointOnLineIndex(line,hover.idx);
      if(!pos){hideElevationHoverMarker();return;}
      var displayPos=dataLatLngToMap(pos);
      if(!elevationHoverMarker){
        elevationHoverMarker=L.marker(displayPos,{icon:runnerIcon('🚶'),interactive:false,zIndexOffset:1350,opacity:.96}).addTo(map);
      }else{
        elevationHoverMarker.setLatLng(displayPos);
      }
      elevationHoverLine=line;
      elevationHoverRawIdx=Number(hover.idx);
    }

    function refreshElevationHoverMarkerDisplay(){
      if(elevationHoverMarker&&elevationHoverLine&&elevationHoverRawIdx!=null){
        showElevationHoverMarker(elevationHoverLine,{idx:elevationHoverRawIdx});
      }
    }

    function buildLineDistanceTable(line){
      var pts=[];
      if(!line||!line.points)return pts;
      var total=0;
      for(var i=0;i<line.points.length;i++){
        var p=line.points[i];
        if(!p||!isFinite(Number(p.lat))||!isFinite(Number(p.lng)))continue;
        var item={lat:Number(p.lat),lng:Number(p.lng),dist:total};
        if(pts.length){
          var prev=pts[pts.length-1];
          total+=distanceMeters(prev.lat,prev.lng,item.lat,item.lng);
          item.dist=total;
        }
        pts.push(item);
      }
      return pts;
    }

    function pointOnDistanceTable(pts,targetDist){
      if(!pts.length)return null;
      if(pts.length===1)return L.latLng(pts[0].lat,pts[0].lng);
      if(targetDist<=0)return L.latLng(pts[0].lat,pts[0].lng);
      var total=pts[pts.length-1].dist;
      if(targetDist>=total)return L.latLng(pts[pts.length-1].lat,pts[pts.length-1].lng);
      for(var i=1;i<pts.length;i++){
        if(pts[i].dist>=targetDist){
          var a=pts[i-1],b=pts[i];
          var span=b.dist-a.dist;
          var t=span>0?(targetDist-a.dist)/span:0;
          return L.latLng(a.lat+(b.lat-a.lat)*t,a.lng+(b.lng-a.lng)*t);
        }
      }
      return L.latLng(pts[pts.length-1].lat,pts[pts.length-1].lng);
    }

    function toggleRunnerForActiveLine(speedMps,label){
      if(!dlgLineTarget)return;
      speedMps=Number(speedMps)||1000;
      if(runnerActiveLine===dlgLineTarget&&runnerMarker&&Math.round(runnerSpeedMps)===Math.round(speedMps)){
        stopRunner();
        return;
      }
      playRunnerOnLine(dlgLineTarget,speedMps,label||'🏃');
    }

    function calcRunnerDurationMs(totalMeters,speedMps){
      var total=Number(totalMeters)||0;
      var speed=Number(speedMps)||1000;
      if(total<=0)return 1000;
      if(speed<=0)speed=1000;
      // 固定速度播放：单人 1 km/s，双人 2 km/s；任何线路至少播放 1 秒。
      var ms=total/speed*1000;
      if(ms<1000)ms=1000;
      return Math.round(ms);
    }

    function getDistanceTableBounds(pts){
      if(!pts||!pts.length)return null;
      var arr=[];
      for(var i=0;i<pts.length;i++){var mp=dataLatLngToMap(pts[i]);arr.push([mp.lat,mp.lng]);}
      try{return L.latLngBounds(arr);}catch(e){return null;}
    }

    function shouldRunnerFollowLine(pts){
      if(!map||!pts||pts.length<2)return false;
      var b=getDistanceTableBounds(pts);
      if(!b||!b.isValid||!b.isValid())return false;
      try{
        // 只判断当前地图实际可视经纬度范围，不改变缩放比例。
        // 轨迹已经完整显示时，小人只移动；轨迹没有完整显示时，地图跟随小人平移。
        return !map.getBounds().contains(b);
      }catch(e){
        return false;
      }
    }

    function followRunnerPosition(pos,force){
      if(!runnerFollowMap||!pos||!map)return;
      var now=Date.now();
      if(!force&&runnerLastPanTime&&now-runnerLastPanTime<90)return;
      runnerLastPanTime=now;
      try{
        map.panTo(pos,{animate:false,noMoveStart:true});
      }catch(e){
        try{map.setView(pos,map.getZoom(),{animate:false});}catch(_e){}
      }
    }

    function playRunnerOnLine(line,speedMps,label){
      stopRunner();
      var pts=buildLineDistanceTable(line);
      if(pts.length<2){
        toast(lang==='en'?'Not enough track points':'轨迹点不足，无法播放');
        return;
      }
      var total=pts[pts.length-1].dist;
      if(total<=0){
        toast(lang==='en'?'Track distance is too short':'轨迹距离太短，无法播放');
        return;
      }
      runnerSpeedMps=Number(speedMps)||1000;
      runnerDurationMs=calcRunnerDurationMs(total,runnerSpeedMps);
      runnerActiveLine=line;
      runnerFollowMap=shouldRunnerFollowLine(pts);
      runnerLastPanTime=0;
      var runnerStartDisplay=dataLatLngToMap({lat:pts[0].lat,lng:pts[0].lng});
      runnerMarker=L.marker(runnerStartDisplay,{icon:runnerIcon(label||'🏃'),interactive:false,zIndexOffset:1200}).addTo(map);
      runnerStartTime=performance&&performance.now?performance.now():Date.now();
      if(runnerFollowMap)followRunnerPosition(runnerStartDisplay,true);
      function step(now){
        if(runnerActiveLine!==line||!runnerMarker)return;
        now=now||(performance&&performance.now?performance.now():Date.now());
        var ratio=(now-runnerStartTime)/runnerDurationMs;
        if(ratio<0)ratio=0;
        if(ratio>1)ratio=1;
        var pos=pointOnDistanceTable(pts,total*ratio);
        if(pos){
          var displayPos=dataLatLngToMap(pos);
          runnerMarker.setLatLng(displayPos);
          followRunnerPosition(displayPos,ratio>=1);
        }
        if(ratio<1){
          runnerAnimFrame=requestAnimationFrame(step);
        }else{
          runnerAnimFrame=0;
          setTimeout(function(){
            if(runnerActiveLine===line)stopRunner();
          },450);
        }
      }
      runnerAnimFrame=requestAnimationFrame(step);
    }

    function setupElevationCanvasInteraction(canvas){
      if(!canvas||canvas._elevationInteractionBound)return;
      canvas._elevationInteractionBound=true;
      canvas.style.cursor='crosshair';
      canvas.style.touchAction='none';
      function pointX(e){
        var r=canvas.getBoundingClientRect();
        var clientX=null;
        if(e&&e.touches&&e.touches.length)clientX=e.touches[0].clientX;
        else if(e&&e.changedTouches&&e.changedTouches.length)clientX=e.changedTouches[0].clientX;
        else clientX=e.clientX;
        if(clientX==null)return null;
        var scaleX=canvas.width/(r.width||canvas.width||1);
        return (clientX-r.left)*scaleX;
      }
      function update(e){
        if(e&&e.cancelable)e.preventDefault();
        var x=pointX(e);
        renderElevationChart(canvas,x);
      }
      function clear(){renderElevationChart(canvas,null);}
      canvas.addEventListener('mousemove',update);
      canvas.addEventListener('mousedown',update);
      canvas.addEventListener('mouseleave',clear);
      canvas.addEventListener('touchstart',update,{passive:false});
      canvas.addEventListener('touchmove',update,{passive:false});
      canvas.addEventListener('touchend',clear,{passive:false});
      canvas.addEventListener('touchcancel',clear,{passive:false});
    }

    function interpolateElevationAtX(chart,x){
      if(!chart||!chart.pts||!chart.pts.length)return null;
      var left=chart.left,right=chart.right,w=chart.w;
      var minX=left,maxX=w-right;
      if(x==null||!isFinite(x))return null;
      x=Math.max(minX,Math.min(maxX,x));
      var rawIdx=chart.minIdx+(x-left)/(w-left-right)*(chart.maxIdx-chart.minIdx||1);
      var pts=chart.pts;
      var prev=pts[0],next=pts[pts.length-1];
      if(rawIdx<=pts[0].idx){prev=next=pts[0];}
      else if(rawIdx>=pts[pts.length-1].idx){prev=next=pts[pts.length-1];}
      else{
        for(var i=1;i<pts.length;i++){
          if(pts[i].idx>=rawIdx){prev=pts[i-1];next=pts[i];break;}
        }
      }
      var alt=prev.alt;
      if(next!==prev){
        var span=next.idx-prev.idx;
        var t=span>0?(rawIdx-prev.idx)/span:0;
        alt=prev.alt+(next.alt-prev.alt)*t;
      }
      return {x:x,idx:rawIdx,alt:alt};
    }

    function renderElevationChart(canvas,hoverX){
      if(!canvas||!canvas._elevationChart)return;
      var chart=canvas._elevationChart;
      var ctx=canvas.getContext('2d');
      var w=chart.w,h=chart.h,left=chart.left,right=chart.right,top=chart.top,bottom=chart.bottom;
      var pts=chart.pts,minAlt=chart.minAlt,maxAlt=chart.maxAlt,minIdx=chart.minIdx,maxIdx=chart.maxIdx;
      function xOf(idx){return left+(idx-minIdx)/(maxIdx-minIdx||1)*(w-left-right);}
      function yOf(alt){return top+(maxAlt-alt)/(maxAlt-minAlt)*(h-top-bottom);}

      ctx.clearRect(0,0,w,h);
      ctx.fillStyle='#101820';
      ctx.fillRect(0,0,w,h);

      ctx.strokeStyle='rgba(255,255,255,.18)';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(left,top);ctx.lineTo(left,h-bottom);ctx.lineTo(w-right,h-bottom);ctx.stroke();

      ctx.fillStyle='#9aa8b5';
      ctx.font='11px Consolas, Microsoft YaHei, sans-serif';
      for(var gy=0;gy<=4;gy++){
        var alt=minAlt+(maxAlt-minAlt)*gy/4;
        var y=yOf(alt);
        ctx.strokeStyle='rgba(255,255,255,.08)';
        ctx.beginPath();ctx.moveTo(left,y);ctx.lineTo(w-right,y);ctx.stroke();
        ctx.fillText(Math.round(alt)+'m',6,y+4);
      }
      for(var gx=0;gx<=4;gx++){
        var idx=Math.round(minIdx+(maxIdx-minIdx)*gx/4);
        var x=xOf(idx);
        ctx.strokeStyle='rgba(255,255,255,.06)';
        ctx.beginPath();ctx.moveTo(x,top);ctx.lineTo(x,h-bottom);ctx.stroke();
        ctx.fillText(String(idx),x-10,h-12);
      }

      ctx.strokeStyle='#ffd23f';
      ctx.lineWidth=2;
      ctx.beginPath();
      for(var k=0;k<pts.length;k++){
        var px=xOf(pts[k].idx),py=yOf(pts[k].alt);
        if(k===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.stroke();

      var hover=interpolateElevationAtX(chart,hoverX);
      if(hover){
        var hx=hover.x,hy=yOf(hover.alt),altText=Math.round(hover.alt)+' m';
        ctx.save();
        ctx.strokeStyle='rgba(74,163,255,.95)';
        ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(hx,top);ctx.lineTo(hx,h-bottom);ctx.stroke();
        ctx.fillStyle='#4aa3ff';
        ctx.beginPath();ctx.arc(hx,hy,3,0,Math.PI*2);ctx.fill();

        ctx.font='12px Consolas, Microsoft YaHei, sans-serif';
        var textW=ctx.measureText(altText).width;
        var boxW=textW+12,boxH=20;
        var bx=hx+8,by=hy-26;
        if(bx+boxW>w-right)bx=hx-boxW-8;
        if(by<top)by=top+4;
        if(by+boxH>h-bottom)by=h-bottom-boxH-4;
        ctx.fillStyle='rgba(10,15,20,.92)';
        ctx.strokeStyle='rgba(74,163,255,.85)';
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.rect(bx,by,boxW,boxH);
        ctx.fill();ctx.stroke();
        ctx.fillStyle='#fff';
        ctx.fillText(altText,bx+6,by+14);
        ctx.restore();
      }

      ctx.fillStyle='#c9d3dc';
      ctx.font='11px Consolas, Microsoft YaHei, sans-serif';
      ctx.fillText('X: '+tr('linePts')+' / Y: '+tr('altitude'),left,12);
      var hint=document.getElementById('elevationHint');
      if(hint)hint.textContent=hover?Math.round(hover.alt)+' m':'';
      if(hover)showElevationHoverMarker(chart.line,hover);else hideElevationHoverMarker();
    }

    function drawElevationChart(line){
      var canvas=document.getElementById('elevationCanvas');
      var hint=document.getElementById('elevationHint');
      if(!canvas)return;
      var ctx=canvas.getContext('2d');
      var w=canvas.width,h=canvas.height;
      ctx.clearRect(0,0,w,h);
      ctx.fillStyle='#101820';
      ctx.fillRect(0,0,w,h);

      var pts=[];
      for(var i=0;i<line.points.length;i++){
        var a=line.points[i].alt;
        if(a==null)continue;
        a=+a;
        if(isFinite(a))pts.push({idx:i+1,alt:a});
      }
      if(pts.length<2){
        canvas._elevationChart=null;
        ctx.fillStyle='#9aa8b5';
        ctx.font='14px Consolas, Microsoft YaHei, sans-serif';
        ctx.fillText(tr('notEnoughAltitude'),24,42);
        if(hint)hint.textContent='';
        hideElevationHoverMarker();
        return;
      }

      var left=54,right=16,top=18,bottom=36;
      var minAlt=pts[0].alt,maxAlt=pts[0].alt;
      for(var j=1;j<pts.length;j++){if(pts[j].alt<minAlt)minAlt=pts[j].alt;if(pts[j].alt>maxAlt)maxAlt=pts[j].alt;}
      if(maxAlt===minAlt){maxAlt+=1;minAlt-=1;}
      var pad=(maxAlt-minAlt)*0.08;
      minAlt-=pad;maxAlt+=pad;
      var minIdx=1,maxIdx=line.points.length;
      canvas._elevationChart={line:line,pts:pts,w:w,h:h,left:left,right:right,top:top,bottom:bottom,minAlt:minAlt,maxAlt:maxAlt,minIdx:minIdx,maxIdx:maxIdx};

    var CLASSIC_KML_BASE_URL='https://swordll80.github.io/outdoors/kml/';
    var CLASSIC_KML_LIST_URL=CLASSIC_KML_BASE_URL+'list.txt';
    var classicKmlCache=null;
    function classicKmlDisplayName(item){
      if(!item)return '';
      var text=(lang==='en'&&item.en)?item.en:(item.zh||item.name||item.file||'KML');
      text=String(text||'');

    function normalizeClassicKmlEntry(line){
      line=(line||'').trim();
      if(!line||line.charAt(0)==='#'||line.indexOf('//')===0)return null;
      var parts=line.split('|').map(function(s){return s.trim();});
      var file=parts[0]||'';
      if(!file)return null;
      if(!/\.kml$/i.test(file))file+='.kml';
      return{file:file,name:parts[1]||file,zh:parts[1]||file,en:parts[2]||''};
    }
    function parseClassicKmlList(text){
      var arr=[];
      var linesText=String(text||'').replace(/^\uFEFF/,'').split(/\r?\n/);
      for(var i=0;i<linesText.length;i++){
        var item=normalizeClassicKmlEntry(linesText[i]);
        if(item)arr.push(item);

      return arr;

    function classicKmlUrl(file){
      // list.txt 只把第一列当作文件名/相对路径处理，禁止受当前 HTML 路径影响。
      // 例如本地 file:///C:/xxx/YFxGeoStudio.html 运行时，仍下载：
      // https://swordll80.github.io/outdoors/kml/ + list.txt 中的文件名。
      var raw=String(file||'').trim().replace(/^\/+/, '');
      raw=raw.replace(/^https?:\/\/[^\/]+\/outdoors\/kml\//i,'');
      var parts=raw.split('/');
      for(var i=0;i<parts.length;i++)parts[i]=encodeURIComponent(parts[i]);
      return CLASSIC_KML_BASE_URL+parts.join('/');
    }
    function ensureClassicKmlList(cb){

        .then(function(resp){if(!resp.ok)throw new Error('HTTP '+resp.status);return resp.text();})

        var raw=String(item.file||'').replace(/\\/g,'/').replace(/^\/+/, '');
        var parts=raw.split('/').filter(function(x){return x!=='';});
        if(!parts.length)continue;
        var node=root;
        for(var j=0;j<parts.length-1;j++){
          var dir=parts[j];
          if(!node.dirs[dir])node.dirs[dir]={dirs:{},files:[]};
          node=node.dirs[dir];

        node.files.push({idx:(item&&item.__classicIndex!=null?item.__classicIndex:i),item:item,fileName:parts[parts.length-1]});

      return root;

function buildClassicLazyNode(node, label, level, forceLoad){
  var details = document.createElement('details');

  // v0.71 fix: root is hidden, visible first-level folders are treated as forest roots.
  // In normal lazy mode they remain closed; children are created only after opening.
  if(forceLoad){
    details.open = true;
  }

  var summary = document.createElement('summary');
  summary.textContent = '📁 ' + classicKmlDirName(label || '未命名');
  details.appendChild(summary);

  function loadChildren(){
    if(node._loaded) return;
    node._loaded = true;

    var dirs = Object.keys(node.dirs || {}).sort(function(a,b){
      return a.localeCompare(b,'zh-Hans-CN');
    });

    var frag = document.createDocumentFragment();

    for(var i=0;i<dirs.length;i++){
      frag.appendChild(buildClassicLazyNode(node.dirs[dirs[i]], dirs[i], level+1, !!forceLoad));
    }

    if(node.files && node.files.length){
      node.files.sort(function(a,b){
        return classicKmlDisplayName(a.item).localeCompare(classicKmlDisplayName(b.item),'zh-Hans-CN');
      });

      for(var j=0;j<node.files.length;j++){
        var f = node.files[j];
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'classic-file';
        btn.textContent = '🛤️ ' + classicKmlDisplayName(f.item);
        btn.title = f.item.file;
        btn.onclick = (function(idx){
          return function(){ downloadClassicKml(idx); };
        })(f.idx);
        frag.appendChild(btn);
      }
    }

    details.appendChild(frag);
  }

  summary.addEventListener('click', function(e){
    e.stopPropagation();
    loadChildren();
  });

  if(forceLoad){
    loadChildren();
  }

  return details;
}

function appendClassicRootFiles(container, root){
  if(!container || !root || !root.files || !root.files.length) return;

  root.files.sort(function(a,b){

  });

  for(var j=0;j<root.files.length;j++){
    var f = root.files[j];
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'classic-file';
    btn.textContent = '🛤️ ' + classicKmlDisplayName(f.item);
    btn.title = f.item.file;
    btn.onclick = (function(idx){
      return function(){ downloadClassicKml(idx); };
    })(f.idx);
    container.appendChild(btn);
  }
}

function renderClassicKmlRoot(root, forceLoad){
  var container = document.getElementById('classicKmlTree');
  if(!container) return;
  container.innerHTML = '';

  var dirNames = Object.keys((root && root.dirs) || {}).sort(function(a,b){
    return a.localeCompare(b,'zh-Hans-CN');
  });

  if((!root || (!dirNames.length && (!root.files || !root.files.length)))){
    setClassicKmlTreeHtml('<div class="classic-empty">'+escapeHtml(tr('classicKmlNoKml'))+'</div>');
    return;
  }

  // Hidden virtual root: first-level folders are displayed directly as multiple tree roots.
  for(var i=0;i<dirNames.length;i++){
    var nodeName = dirNames[i];
    container.appendChild(buildClassicLazyNode(root.dirs[nodeName], nodeName, 0, !!forceLoad));
  }

  appendClassicRootFiles(container, root);
}

function classicKmlSearchText(item){
  if(!item) return '';
  return (classicKmlDisplayName(item) + ' ' + (item.file || '')).toLowerCase();
}

function renderClassicKmlSearchTree(list, keyword){
  keyword = String(keyword || '').trim().toLowerCase();

  if(!keyword){
    renderClassicKmlTree(list);
    return;
  }

  if(!list || !list.length){
    setClassicKmlTreeHtml('<div class="classic-empty">'+escapeHtml(tr('classicKmlEmpty'))+'</div>');
    return;
  }

  var filtered = [];
  for(var i=0;i<list.length;i++){
    var item = list[i];
    if(classicKmlSearchText(item).indexOf(keyword) >= 0){
      var copy = {};
      for(var k in item){
        if(Object.prototype.hasOwnProperty.call(item,k)) copy[k] = item[k];
      }
      copy.__classicIndex = i;
      filtered.push(copy);
    }
  }

  if(!filtered.length){
    setClassicKmlTreeHtml('<div class="classic-empty">没有匹配的经典轨迹</div>');
    return;
  }

  var root = buildClassicKmlTree(filtered);
  // Search mode must materialize matching branches, otherwise lazy unloaded nodes cannot be filtered.
  renderClassicKmlRoot(root, true);
}

    function isKmlFile(f){return !!(f&&f.name&&/\.kml$/i.test(f.name));}
