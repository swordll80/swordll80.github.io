<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="户外笔记 · swordll80">
  <title>户外 · swordll80</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    :root {
      --panel: rgba(255, 255, 255, 0.88);
      --shadow: 0 18px 50px rgba(40, 56, 85, 0.11);
    }
    body {
      background:
        radial-gradient(circle at 8% 12%, #dce8ff 0, transparent 28rem),
        radial-gradient(circle at 95% 90%, #e4f6ef 0, transparent 30rem),
        var(--bg);
    }
    .site-header {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 clamp(22px, 5vw, 72px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.8);
      background: rgba(255, 255, 255, 0.58);
      backdrop-filter: blur(16px);
    }
    .layout {
      width: 100%;
      min-height: calc(100vh - 96px);
      margin: 0;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      overflow: hidden;
      border-top: 1px solid rgba(255, 255, 255, .9);
      border-bottom: 1px solid rgba(255, 255, 255, .9);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }
    .sidebar {
      padding: 20px 12px;
      border-right: 1px solid var(--line);
      background: rgba(248, 250, 253, .74);
      display: flex;
      flex-direction: column;
    }
    .sidebar-title {
      margin: 0 10px 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
    }
    .tree, .tree ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .tree ul {
      position: relative;
      margin-left: 16px;
      padding-left: 12px;
    }
    .tree ul::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 0;
      bottom: 12px;
      width: 1px;
      background: var(--line);
    }
    .tree-button {
      width: 100%;
      margin: 2px 0;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 0;
      border-radius: 10px;
      color: #344054;
      background: transparent;
      font: inherit;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
      transition: .18s ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-button:hover { color: var(--accent); background: #f0f4fb; }
    .tree-button.active {
      color: var(--accent);
      font-weight: 650;
      background: var(--accent-soft, #eaf0ff);
    }
    .tree-button .arrow {
      font-size: 10px;
      color: var(--muted);
      transition: transform .2s;
      min-width: 14px;
      text-align: center;
      flex-shrink: 0;
    }
    .tree-button .arrow.open { transform: rotate(90deg); }
    .tree-button .name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
    .tree-button .count { color: var(--muted); font-size: 12px; flex-shrink: 0; }
    .content {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .content-header {
      padding: 16px 28px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.6);
      flex-shrink: 0;
    }
    .content-title { font-weight: 650; font-size: 15px; }
    .content-title .open-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      margin-left: 8px;
    }
    .content-title .open-link:hover { color: var(--accent); }
    .iframe-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
      background: #fff;
    }
    .iframe-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 8px;
    }
    .welcome .icon { font-size: 52px; opacity: .3; }
    .welcome p { font-size: 15px; }
    @media (max-width: 768px) {
      .layout {
        width: 100%;
        grid-template-columns: 1fr;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: calc(100vh - 96px);
      }
      .sidebar {
        padding: 12px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        max-height: 260px;
      }
      .sidebar-nav { max-height: 140px; }
      .content-header { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="../index.html" class="back">← 返回主页</a>
    <span style="color:var(--muted);font-size:14px;">户外</span>
  </header>

  <main class="layout">
    <nav class="sidebar" aria-label="户外导航">
      <p class="sidebar-title">Outdoors</p>
      <div class="sidebar-nav">
        <ul class="tree" id="tree">
          <li>
            <button class="tree-button" data-toggle="cat-hiking">
              <span class="arrow">▶</span><span class="name">徒步</span><span class="count">0</span>
            </button>
            <ul id="cat-hiking" hidden></ul>
          </li>
          <li>
            <button class="tree-button" data-toggle="cat-travel">
              <span class="arrow">▶</span><span class="name">旅行</span><span class="count">0</span>
            </button>
            <ul id="cat-travel" hidden></ul>
          </li>
          <li>
            <button class="tree-button" data-toggle="cat-routes">
              <span class="arrow">▶</span><span class="name">路线</span><span class="count">1</span>
            </button>
            <ul id="cat-routes" hidden>
              <li>
                <button class="tree-button" data-tool data-url="YFxGeoStudio/YFxGeoStudio.html" data-title="KML轨迹文件合并编辑工具">
                  <span class="name">KML轨迹文件合并编辑工具</span>
                </button>
              </li>
            </ul>
          </li>
        </ul>
      </div>
    </nav>

    <section class="content">
      <div class="content-header">
        <span class="content-title" id="contentTitle">← 从左侧选择一个条目</span>
        <a class="open-link" id="openLink" href="#" target="_blank" rel="noopener noreferrer" hidden>在新窗口打开 ↗</a>
      </div>
      <div class="iframe-wrap" id="iframeWrap">
        <div class="welcome" id="welcome">
          <span class="icon">🏔️</span>
          <p>从左侧树中选择一个条目，将在此处打开</p>
        </div>
        <iframe id="toolFrame" hidden sandbox="allow-scripts allow-same-origin allow-forms allow-popups" loading="lazy"></iframe>
      </div>
    </section>
  </main>

  <script>
    const tree = document.getElementById('tree');
    const toolFrame = document.getElementById('toolFrame');
    const welcome = document.getElementById('welcome');
    const contentTitle = document.getElementById('contentTitle');
    const openLink = document.getElementById('openLink');
    let currentToolBtn = null;

    function setTool(url, title, btn) {
      contentTitle.innerHTML = title;
      openLink.href = url;
      openLink.hidden = false;
      welcome.hidden = true;
      toolFrame.hidden = false;
      toolFrame.src = url;
      if (currentToolBtn) currentToolBtn.classList.remove('active');
      currentToolBtn = btn;
      if (btn) btn.classList.add('active');
    }

    tree.addEventListener('click', (e) => {
      const toggleBtn = e.target.closest('[data-toggle]');
      const toolBtn = e.target.closest('[data-tool]');
      if (toolBtn) {
        setTool(toolBtn.dataset.url, toolBtn.dataset.title, toolBtn);
        return;
      }
      if (toggleBtn) {
        const id = toggleBtn.dataset.toggle;
        const ul = document.getElementById(id);
        const arrow = toggleBtn.querySelector('.arrow');
        const open = ul.hidden;
        ul.hidden = !open;
        if (arrow) arrow.classList.toggle('open', open);
      }
    });
  </script>
</body>
</html>
