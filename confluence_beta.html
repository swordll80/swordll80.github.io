<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confluence · 手册编辑器</title>
  <style>
    :root {
      --bg: #f6f8fb; --panel: #fff; --text: #1f2937; --muted: #667085;
      --line: #e5eaf1; --accent: #2f6fed; --accent-soft: #eaf1ff;
      --danger: #d92d20; --code-bg: #1e1e2e; --code-text: #cdd6f4;
      --radius: 10px; --header-h: 52px; --tree-w: 260px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* === Topbar === */
    .topbar {
      height: var(--header-h); display: flex; align-items: center; gap: 12px;
      padding: 0 16px; border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.92); backdrop-filter: blur(12px);
      z-index: 10; flex-shrink: 0;
    }
    .topbar .brand { font-weight: 700; color: var(--accent); text-decoration: none; font-size: 15px; white-space: nowrap; }
    .topbar .brand span { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 6px; }
    .topbar .spacer { flex: 1; }
    .topbar .btn {
      height: 32px; padding: 0 14px; border: 1px solid var(--line); border-radius: 6px;
      background: var(--panel); cursor: pointer; font-size: 13px; color: var(--text);
      display: inline-flex; align-items: center; gap: 6px; transition: all .15s;
    }
    .topbar .btn:hover { background: var(--accent-soft); border-color: var(--accent); }
    .topbar .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .topbar .btn.primary:hover { opacity: .9; }
    .topbar .btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .topbar .file-indicator { font-size: 12px; color: var(--muted); background: var(--bg); padding: 3px 10px; border-radius: 4px; }

    /* === Main Layout === */
    .app { display: flex; flex: 1; min-height: 0; }

    /* === Tree Panel === */
    .tree-pane {
      width: var(--tree-w); flex-shrink: 0; border-right: 1px solid var(--line);
      background: var(--panel); display: flex; flex-direction: column; overflow: hidden;
    }
    .tree-pane-head {
      padding: 10px 14px; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .tree-pane-head strong { font-size: 13px; }
    .tree-actions { display: flex; gap: 4px; }
    .tree-actions .btn {
      width: 28px; height: 28px; border: 1px solid var(--line); border-radius: 6px;
      background: var(--panel); cursor: pointer; font-size: 14px; display: grid; place-items: center;
      color: var(--muted); transition: all .12s;
    }
    .tree-actions .btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
    .tree-actions .btn.danger:hover { background: #fef2f2; color: var(--danger); border-color: var(--danger); }
    .tree-scroll { flex: 1; overflow-y: auto; padding: 6px 0; }
    .tree-node { }
    .tree-row {
      display: flex; align-items: center; gap: 6px; padding: 6px 14px;
      cursor: pointer; font-size: 13px; border: 0; width: 100%; text-align: left;
      background: none; color: inherit; transition: background .1s;
    }
    .tree-row:hover { background: #f0f3fa; }
    .tree-row.active { background: #e8ecf9; color: var(--accent); font-weight: 600; }
    .tree-row .twisty { width: 16px; font-size: 10px; color: var(--muted); flex-shrink: 0; text-align: center; }
    .tree-row .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-row .file-tag { font-size: 10px; color: var(--muted); background: var(--bg); padding: 1px 6px; border-radius: 3px; }
    .tree-children { margin-left: 16px; }

    /* === Editor Panel === */
    .editor-pane {
      flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden;
    }
    .editor-toolbar {
      display: flex; align-items: center; gap: 8px; padding: 8px 14px;
      border-bottom: 1px solid var(--line); background: var(--panel); flex-shrink: 0;
    }
    .editor-toolbar .mode-tabs { display: flex; gap: 0; }
    .editor-toolbar .mode-tab {
      padding: 4px 14px; border: 1px solid var(--line); cursor: pointer; font-size: 12px;
      background: var(--panel); color: var(--muted); transition: all .12s;
    }
    .editor-toolbar .mode-tab:first-child { border-radius: 5px 0 0 5px; }
    .editor-toolbar .mode-tab:last-child { border-radius: 0 5px 5px 0; }
    .editor-toolbar .mode-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .editor-toolbar .spacer { flex: 1; }
    .editor-body {
      flex: 1; display: flex; min-height: 0; overflow: hidden;
    }

    /* === Markdown Editor === */
    .md-editor-wrap {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    .md-editor-wrap.split { flex: none; width: 50%; }
    .md-editor {
      flex: 1; border: 0; resize: none; padding: 20px; font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
      font-size: 14px; line-height: 1.75; color: var(--text); background: #fafbfc;
      outline: none; tab-size: 2; width: 100%;
    }
    .md-preview {
      flex: 1; overflow-y: auto; padding: 20px 24px; background: var(--panel);
      border-left: 1px solid var(--line); display: none;
    }
    .md-preview.show { display: block; }
    .split .md-preview { display: block; }

    /* Preview styling */
    .md-preview h1 { font-size: 22px; margin: 0 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--line); color: var(--accent); }
    .md-preview h2 { font-size: 16px; margin: 20px 0 8px; color: var(--text); }
    .md-preview p { margin: 6px 0; line-height: 1.8; }
    .md-preview code { font-family: "Cascadia Code", Consolas, monospace; font-size: 13px; background: #f0f0f5; padding: 1px 5px; border-radius: 4px; }
    .md-preview pre {
      background: var(--code-bg); color: var(--code-text); padding: 14px 16px; border-radius: var(--radius);
      overflow-x: auto; margin: 8px 0; font-size: 13px; line-height: 1.65;
    }
    .md-preview pre code { background: none; padding: 0; color: inherit; }
    .md-preview ul, .md-preview ol { margin: 6px 0; padding-left: 22px; }
    .md-preview li { margin: 3px 0; }
    .md-preview blockquote {
      border-left: 3px solid var(--accent); padding: 6px 14px; margin: 8px 0;
      background: var(--accent-soft); border-radius: 0 6px 6px 0; color: #344054;
    }
    .md-preview hr { border: 0; border-top: 1px solid var(--line); margin: 16px 0; }
    .md-preview a { color: var(--accent); }
    .md-preview table { border-collapse: collapse; width: 100%; margin: 10px 0; }
    .md-preview th, .md-preview td { border: 1px solid var(--line); padding: 6px 10px; font-size: 13px; }
    .md-preview th { background: #f2f4f7; }
    .md-preview .card-ver { font-size: 11px; color: var(--accent); background: var(--accent-soft); padding: 1px 7px; border-radius: 5px; margin-left: 8px; }

    /* === Status bar === */
    .status-bar {
      height: 28px; display: flex; align-items: center; gap: 12px;
      padding: 0 14px; border-top: 1px solid var(--line); background: var(--panel);
      font-size: 11px; color: var(--muted); flex-shrink: 0;
    }
    .status-bar .dirty-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
    .status-bar .dirty-dot.dirty { background: var(--danger); }

    /* === Mobile === */
    @media (max-width: 768px) {
      .tree-pane { position: fixed; top: var(--header-h); left: 0; bottom: 0; z-index: 20;
        transform: translateX(-100%); transition: transform .25s; box-shadow: 4px 0 20px rgba(0,0,0,.1); }
      .tree-pane.open { transform: translateX(0); }
      .tree-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 15; }
      .tree-overlay.show { display: block; }
      .md-editor-wrap.split { width: 100%; }
      .editor-body { flex-direction: column; }
    }

    /* === Help tip === */
    .help-tip {
      padding: 12px 16px; font-size: 12px; color: var(--muted); background: #fafbfc;
      border-bottom: 1px solid var(--line); line-height: 1.7;
    }
    .help-tip code { background: #e8ecf9; padding: 1px 5px; border-radius: 3px; font-size: 11px; }
  </style>
</head>
<body>
  <header class="topbar">
    <button class="btn" id="menuBtn" title="目录" style="display:none">☰</button>
    <a class="brand" href="index.html">Confluence<span>手册编辑器</span></a>
    <span class="file-indicator" id="currentFile">—</span>
    <span class="spacer"></span>
    <button class="btn" id="saveBtn" title="保存 Ctrl+S">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      保存
    </button>
    <a class="btn" href="confluence/read.html" target="_blank" title="在手机端查看">📱 预览</a>
  </header>

  <div class="app">
    <div class="tree-overlay" id="treeOverlay"></div>
    <aside class="tree-pane" id="treePane">
      <div class="tree-pane-head">
        <strong>📁 页面树</strong>
        <div class="tree-actions">
          <button class="btn" id="addChildBtn" title="添加子页面">+</button>
          <button class="btn" id="addRootBtn" title="添加根页面">++</button>
          <button class="btn" id="renameBtn" title="重命名">✎</button>
          <button class="btn danger" id="deleteBtn" title="删除">✕</button>
        </div>
      </div>
      <div class="tree-scroll" id="treeScroll"></div>
    </aside>

    <main class="editor-pane">
      <div class="editor-toolbar">
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="edit">编辑</button>
          <button class="mode-tab" data-mode="split">分屏</button>
          <button class="mode-tab" data-mode="preview">预览</button>
        </div>
        <span class="spacer"></span>
        <span style="font-size:12px;color:var(--muted)" id="wordCount">0 字</span>
      </div>
      <div class="help-tip" id="helpTip">
        💡 <code># 章节标题</code> 创建折叠章节 · <code>## 卡片标题 | 版本标签</code> 创建知识卡片 · <code>```c</code> 代码块 · 支持标准 Markdown 语法
      </div>
      <div class="editor-body">
        <div class="md-editor-wrap" id="mdEditorWrap">
          <textarea class="md-editor" id="mdEditor" placeholder="# 开始编写手册…

使用 # 创建章节
使用 ## 创建知识卡片
使用 ``` 插入代码块
支持标准 Markdown 语法"></textarea>
        </div>
        <div class="md-preview" id="mdPreview"></div>
      </div>
      <div class="status-bar">
        <span class="dirty-dot" id="dirtyDot"></span>
        <span id="statusText">就绪</span>
      </div>
    </main>
  </div>

  <script>
  (function() {
    'use strict';

    // ─── Mobile redirect ─────────────────────────
    if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 768) {
      window.location.replace('confluence/read.html');
      return;
    }

    // ─── State ──────────────────────────────────
    var STORAGE_KEY = 'localConfluence.tree.v1';
    var SELECTED_KEY = 'localConfluence.selectedId.v1';
    var TREE_FILE_NAME = 'tree_data.js';
    var DIR_DB_NAME = 'localConfluence.fs.v1';
    var DIR_STORE_NAME = 'handles';
    var DIR_HANDLE_KEY = 'confluence';
    var supportsDirectory = 'showDirectoryPicker' in window;

    var confluenceHandle = null;
    var tree = [];
    var selectedId = localStorage.getItem(SELECTED_KEY) || '';
    var dirty = false;
    var loadedHtml = '';
    var loadedUsesConfluenceContent = false;
    var loadedFileLastModified = 0;
    var currentMode = 'edit'; // edit | split | preview

    // ─── DOM refs ──────────────────────────────
    var treeScroll = document.getElementById('treeScroll');
    var treePane = document.getElementById('treePane');
    var treeOverlay = document.getElementById('treeOverlay');
    var mdEditor = document.getElementById('mdEditor');
    var mdPreview = document.getElementById('mdPreview');
    var mdEditorWrap = document.getElementById('mdEditorWrap');
    var currentFile = document.getElementById('currentFile');
    var statusText = document.getElementById('statusText');
    var dirtyDot = document.getElementById('dirtyDot');
    var wordCount = document.getElementById('wordCount');
    var helpTip = document.getElementById('helpTip');
    var menuBtn = document.getElementById('menuBtn');

    // ─── Mobile menu ───────────────────────────
    if (window.innerWidth <= 768) menuBtn.style.display = 'flex';
    menuBtn.addEventListener('click', function() {
      treePane.classList.toggle('open');
      treeOverlay.classList.toggle('show');
    });
    treeOverlay.addEventListener('click', function() {
      treePane.classList.remove('open');
      treeOverlay.classList.remove('show');
    });

    // ─── Utilities ─────────────────────────────
    function uid() { return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
    function slugify(text) {
      return (text || 'page').trim().toLowerCase()
        .replace(/\.html?$/i, '').replace(/[^\w\u4e00-\u9fa5-]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'page';
    }
    function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function uniqueFileName(base) {
      var slug = slugify(base);
      var used = new Set();
      walk(tree, function(n) { used.add((n.file||'').toLowerCase()); });
      var name = slug + '.html';
      var i = 2;
      while (used.has(name.toLowerCase())) { name = slug + '-' + (i++) + '.html'; }
      return name;
    }

    function walk(nodes, fn) {
      (nodes||[]).forEach(function(n) { fn(n); walk(n.children||[], fn); });
    }

    function findNodeById(nodes, id) {
      for (var i = 0; i < (nodes||[]).length; i++) {
        if (nodes[i].id === id) return nodes[i];
        var c = findNodeById(nodes[i].children||[], id);
        if (c) return c;
      }
      return null;
    }

    function current() {
      var n = findNodeById(tree, selectedId);
      if (!n && tree.length) { n = tree[0]; selectedId = n.id; }
      return n;
    }

    function setDirty(v) { dirty = !!v; dirtyDot.classList.toggle('dirty', dirty); }
    function setStatus(s) { statusText.textContent = s; }

    // ─── Tree render ───────────────────────────
    function renderTree() {
      treeScroll.innerHTML = '';
      function renderNode(node, depth) {
        var wrap = document.createElement('div');
        wrap.className = 'tree-node';
        var row = document.createElement('button');
        row.type = 'button';
        row.className = 'tree-row' + (node.id === selectedId ? ' active' : '');
        row.style.paddingLeft = (14 + depth * 16) + 'px';
        var hasKids = node.children && node.children.length > 0;
        row.innerHTML = '<span class="twisty">' + (hasKids ? '▾' : '') + '</span>'
          + '<span class="label">' + escapeHtml(node.title||'未命名') + '</span>'
          + '<span class="file-tag">' + escapeHtml(node.file||'') + '</span>';
        row.addEventListener('click', function() { selectNode(node.id); });
        wrap.appendChild(row);
        if (hasKids) {
          var kids = document.createElement('div');
          kids.className = 'tree-children';
          node.children.forEach(function(c) { kids.appendChild(renderNode(c, depth+1)); });
          wrap.appendChild(kids);
        }
        return wrap;
      }
      tree.forEach(function(n) { treeScroll.appendChild(renderNode(n, 0)); });
    }

    // ─── IndexedDB (directory handle persistence) ───
    function openHandleDb() {
      return new Promise(function(res, rej) {
        var r = indexedDB.open(DIR_DB_NAME, 1);
        r.onupgradeneeded = function() { r.result.createObjectStore(DIR_STORE_NAME); };
        r.onsuccess = function() { res(r.result); };
        r.onerror = function() { rej(r.error); };
      });
    }

    async function saveStoredDirectoryHandle(h) {
      if (!indexedDB) return;
      var db = await openHandleDb();
      await new Promise(function(res, rej) {
        var tx = db.transaction(DIR_STORE_NAME, 'readwrite');
        tx.objectStore(DIR_STORE_NAME).put(h, DIR_HANDLE_KEY);
        tx.oncomplete = res; tx.onerror = function() { rej(tx.error); };
      });
      db.close();
    }

    async function loadStoredDirectoryHandle() {
      if (!indexedDB || !supportsDirectory) return null;
      try {
        var db = await openHandleDb();
        var h = await new Promise(function(res, rej) {
          var tx = db.transaction(DIR_STORE_NAME, 'readonly');
          var r = tx.objectStore(DIR_STORE_NAME).get(DIR_HANDLE_KEY);
          r.onsuccess = function() { res(r.result||null); };
          r.onerror = function() { rej(r.error); };
        });
        db.close();
        if (!h) return null;
        var perm = await h.queryPermission({mode:'readwrite'});
        if (perm !== 'granted') perm = await h.requestPermission({mode:'readwrite'});
        return perm === 'granted' ? h : null;
      } catch(e) { return null; }
    }

    // ─── File I/O ──────────────────────────────
    async function getFileText(fileName) {
      if (confluenceHandle && supportsDirectory) {
        try {
          var h = await confluenceHandle.getFileHandle(fileName);
          var f = await h.getFile();
          return { text: await f.text(), lastModified: f.lastModified||Date.now() };
        } catch(e) {}
      }
      // Skip fetch for file:// protocol (will fail or return stale data)
      if (window.location.protocol === 'file:') return null;
      try {
        var res = await fetch('confluence/' + encodeURIComponent(fileName).replace(/%2F/g,'/') + '?v=' + Date.now(), {cache:'no-store'});
        if (res.ok) {
          var t = await res.text();
          var lm = res.headers.get('Last-Modified');
          return { text: t, lastModified: lm ? new Date(lm).getTime() : Date.now() };
        }
      } catch(e2) {}
      return null;
    }

    async function loadPageFile(node) {
      var result = await getFileText(node.file);
      // Check localStorage cache for fallback
      var cachedMd = null;
      var cachedHtml = null;
      try {
        cachedMd = localStorage.getItem('localConfluence.cache.md.' + node.file);
        cachedHtml = localStorage.getItem('localConfluence.cache.html.' + node.file);
      } catch(e) {}

      if (!result) {
        // No file on disk — try cache first, then template
        if (cachedMd && cachedHtml) {
          loadedHtml = cachedHtml;
          loadedFileLastModified = 0;
          loadedUsesConfluenceContent = true;
          mdEditor.value = cachedMd;
          currentFile.textContent = node.file;
          setStatus('📦 已从缓存加载：' + node.file + '（文件尚未写入磁盘）');
        } else {
          loadedHtml = '';
          loadedUsesConfluenceContent = true;
          loadedFileLastModified = 0;
          mdEditor.value = '# ' + (node.title||'新页面') + '\n\n开始编写内容…\n';
          currentFile.textContent = node.file;
          setStatus('新文件：' + node.file);
        }
      } else {
        loadedHtml = result.text;
        loadedFileLastModified = result.lastModified||Date.now();
        // If cached version is newer than disk, prefer cache
        if (cachedHtml && (!result.lastModified || (loadedFileLastModified < Date.now() - 1000))) {
          // Disk file might be stale — check if cache has different content
          var diskMd = htmlToMarkdown(result.text);
          if (cachedMd && cachedMd !== diskMd && cachedMd !== '# ' + (node.title||'新页面') + '\n\n开始编写内容…\n') {
            // Cache has different (non-template) content — use cache
            loadedHtml = cachedHtml;
            loadedFileLastModified = Date.now();
            mdEditor.value = cachedMd;
            currentFile.textContent = node.file;
            setStatus('📦 已从缓存加载：' + node.file + '（磁盘文件可能过期）');
            setDirty(false);
            updateWordCount();
            renderPreview();
            return;
          }
        }
        var md = htmlToMarkdown(result.text);
        mdEditor.value = md;
        currentFile.textContent = node.file;
        setStatus('已读取：' + node.file);
      }
      setDirty(false);
      updateWordCount();
      renderPreview();
    }

    async function selectNode(id) {
      if (selectedId && selectedId !== id && dirty) {
        // Auto-save on switch (download fallback if no dir handle)
        if (confluenceHandle && supportsDirectory) {
          await saveCurrentPage();
        } else {
          // Download current file before switching
          downloadCurrentAsHtml();
        }
      }
      selectedId = id;
      localStorage.setItem(SELECTED_KEY, selectedId);
      var node = current();
      if (!node) return;
      renderTree();
      await loadPageFile(node);
      // Close mobile tree
      treePane.classList.remove('open');
      treeOverlay.classList.remove('show');
    }

    // ─── Markdown ↔ HTML conversion ────────────

    // Parse Markdown to HTML for the preview pane
    function parseMarkdown(md) {
      var lines = md.split('\n');
      var html = '';
      var inCode = false, codeLang = '', codeBuf = [];
      var inList = false, listType = '';

      function flushList() {
        if (inList) { html += '</' + listType + '>\n'; inList = false; listType = ''; }
      }

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];

        // Code fence
        var fm = line.match(/^```(\w*)/);
        if (fm) {
          flushList();
          if (!inCode) {
            inCode = true; codeLang = fm[1] || ''; codeBuf = [];
          } else {
            html += '<pre><code' + (codeLang?' class="language-'+codeLang+'"':'') + '>' + escapeHtml(codeBuf.join('\n')) + '</code></pre>\n';
            inCode = false; codeLang = '';
          }
          continue;
        }

        if (inCode) { codeBuf.push(line); continue; }

        // H1: # Title
        var h1m = line.match(/^# (.+)/);
        if (h1m) { flushList(); html += '<h1>' + inlineMd(h1m[1]) + '</h1>\n'; continue; }

        // H2: ## Title | Version
        var h2m = line.match(/^## (.+)/);
        if (h2m) {
          flushList();
          var parts = h2m[1].split('|');
          var title = inlineMd(parts[0].trim());
          var ver = parts[1] ? ' <span class="card-ver">' + escapeHtml(parts[1].trim()) + '</span>' : '';
          html += '<h2>' + title + ver + '</h2>\n';
          continue;
        }

        // H3
        var h3m = line.match(/^### (.+)/);
        if (h3m) { flushList(); html += '<h3>' + inlineMd(h3m[1]) + '</h3>\n'; continue; }

        // HR
        if (/^(-{3,}|\*{3,})$/.test(line.trim())) { flushList(); html += '<hr>\n'; continue; }

        // Blockquote
        var bqm = line.match(/^> ?(.*)/);
        if (bqm) { flushList(); html += '<blockquote><p>' + inlineMd(bqm[1]) + '</p></blockquote>\n'; continue; }

        // UL
        var ulm = line.match(/^(\s*)[-*] (.+)/);
        if (ulm) {
          if (!inList || listType !== 'ul') { flushList(); html += '<ul>\n'; inList = true; listType = 'ul'; }
          html += '<li>' + inlineMd(ulm[2]) + '</li>\n';
          continue;
        }

        // OL
        var olm = line.match(/^(\s*)\d+\. (.+)/);
        if (olm) {
          if (!inList || listType !== 'ol') { flushList(); html += '<ol>\n'; inList = true; listType = 'ol'; }
          html += '<li>' + inlineMd(olm[2]) + '</li>\n';
          continue;
        }

        // Empty line
        if (/^\s*$/.test(line)) { flushList(); html += '<p></p>\n'; continue; }

        // Regular paragraph
        flushList();
        html += '<p>' + inlineMd(line) + '</p>\n';
      }
      flushList();
      if (inCode) {
        html += '<pre><code' + (codeLang?' class="language-'+codeLang+'"':'') + '>' + escapeHtml(codeBuf.join('\n')) + '</code></pre>\n';
      }
      return html;
    }

    function inlineMd(text) {
      return text
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/~~(.+?)~~/g, '<del>$1</del>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">');
    }

    // Convert loaded HTML back to Markdown
    function htmlToMarkdown(html) {
      var md = '';
      try {
        var doc = new DOMParser().parseFromString(html, 'text/html');
        // Try to extract title
        var titleEl = doc.querySelector('title');
        if (titleEl) {
          var t = titleEl.textContent.trim();
          // Only add as heading if it's not already in content
        }

        // Check for c.html style: sections with cards
        var sections = doc.querySelectorAll('.section');
        if (sections.length > 0) {
          sections.forEach(function(sec) {
            var head = sec.querySelector('.section-head .title');
            if (head) md += '# ' + head.textContent.trim() + '\n\n';
            var cards = sec.querySelectorAll('.card');
            cards.forEach(function(card) {
              var ct = card.querySelector('.card-title');
              var cv = card.querySelector('.card-ver');
              var cc = card.querySelector('.card-code');
              var title = ct ? ct.textContent.trim() : '';
              var ver = cv ? cv.textContent.trim() : '';
              md += '## ' + title + (ver ? ' | ' + ver : '') + '\n';
              if (cc) {
                md += '```\n' + cc.textContent + '\n```\n';
              }
              md += '\n';
            });
          });
          return md.trim() || mdEditor.value;
        }

        // Check for data-confluence-content wrapper
        var content = doc.querySelector('[data-confluence-content]');
        if (content) {
          return htmlBodyToMarkdown(content);
        }

        // Fallback: try body > .container
        var container = doc.querySelector('body .container');
        if (container) {
          return htmlBodyToMarkdown(container);
        }

        // Last resort: body content
        if (doc.body) {
          return htmlBodyToMarkdown(doc.body);
        }
      } catch(e) {}
      return mdEditor.value;
    }

    function htmlBodyToMarkdown(el) {
      var md = '';
      var children = el.childNodes;
      for (var i = 0; i < children.length; i++) {
        var node = children[i];
        if (node.nodeType === 3) {
          var t = node.textContent.trim();
          if (t) md += t + '\n\n';
        } else if (node.nodeType === 1) {
          var tag = node.tagName.toLowerCase();
          if (tag === 'h1') {
            md += '# ' + node.textContent.trim() + '\n\n';
          } else if (tag === 'h2') {
            md += '## ' + node.textContent.trim() + '\n\n';
          } else if (tag === 'h3') {
            md += '### ' + node.textContent.trim() + '\n\n';
          } else if (tag === 'p') {
            var t = node.textContent.trim();
            if (t) md += t + '\n\n';
          } else if (tag === 'pre') {
            var code = node.querySelector('code');
            md += '```\n' + (code?code.textContent:node.textContent) + '\n```\n\n';
          } else if (tag === 'ul' || tag === 'ol') {
            var items = node.querySelectorAll('li');
            items.forEach(function(li, idx) {
              md += (tag==='ol' ? (idx+1)+'. ' : '- ') + li.textContent.trim() + '\n';
            });
            md += '\n';
          } else if (tag === 'blockquote') {
            md += '> ' + node.textContent.trim() + '\n\n';
          } else if (tag === 'hr') {
            md += '---\n\n';
          } else {
            // Recurse into divs, sections etc.
            md += htmlBodyToMarkdown(node);
          }
        }
      }
      return md.trim();
    }

    // ─── Generate final HTML from Markdown ─────
    function markdownToFinalHtml(md, title, originalHtml) {
      // Parse markdown to get structure
      var lines = md.split('\n');
      var sections = []; // [{title, cards:[{title,ver,code,body}]}]
      var currentSection = null;
      var currentCard = null;
      var inCode = false, codeBuf = [], codeLang = '';
      var bodyLines = [];

      function flushCard() {
        if (currentCard && currentSection) {
          if (codeBuf.length) currentCard.code = codeBuf.join('\n');

          currentSection.cards.push(currentCard);
        }
        currentCard = null; codeBuf = []; bodyLines = []; inCode = false;

      function flushSection() {
        flushCard();
        if (currentSection && currentSection.cards.length > 0) sections.push(currentSection);

      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];

        // Code fence

          else { flushCard(); inCode = false; }

        if (inCode) { codeBuf.push(line); continue; }

        // H1: new section

      flushSection();

      // If no sections parsed, treat whole thing as single section

        // Parse body as plain paragraphs

        }).join('\n');
        return '<div class="section" id="' + secId + '"><button class="section-head" onclick="this.parentElement.classList.toggle(\'open\')"><span class="icon">' + (si+1) + '</span><span class="title">' + escapeHtml(sec.title) + '</span><span class="count">' + sec.cards.length + ' 条</span><span class="arrow">▼</span></button><div class="section-body">' + cardsHtml + '</div></div>';
      }).join('\n');

      // If original had a .container, preserve its structure
      if (hasContainer && originalHtml) {

        var titleEl = doc.querySelector('title');
        if (titleEl) titleEl.textContent = title;

        if (container) {
          container.innerHTML = bodyHtml;

          return '<!doctype html>\n' + doc.documentElement.outerHTML + '\n';
        }
      }

      if (usesConfluenceWrapper && originalHtml) {

        }

      // Generate standalone page with card style (c.html compatible)
      var totalCards = cardIndex;
      return '<!doctype html>\n<html lang="zh-CN">\n<head>\n  <meta charset="utf-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1">\n  <title>' + escapeHtml(title) + '</title>\n  <style>\n    :root { --bg:#f5f6fa; --card:#fff; --accent:#356ae6; --muted:#7d8599; --line:#e2e5ee; --text:#1a1a2e; --radius:12px; }\n    * { margin:0; padding:0; box-sizing:border-box; }\n    body { font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); line-height:1.7; min-height:100vh; }\n    .topbar { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.92); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border-bottom:1px solid var(--line); padding:10px 16px; display:flex; align-items:center; gap:10px; }\n    .topbar h1 { font-size:17px; white-space:nowrap; background:linear-gradient(135deg,#356ae6,#5a4de0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }\n    .search-wrap { flex:1; position:relative; max-width:400px; }\n    .search-wrap input { width:100%; height:36px; padding:0 36px 0 14px; border:1px solid var(--line); border-radius:20px; font-size:14px; background:var(--bg); outline:none; transition:border-color .2s,box-shadow .2s; }\n    .search-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(53,106,230,.12); }\n    .search-clear { position:absolute; right:8px; top:50%; transform:translateY(-50%); width:26px; height:26px; border-radius:50%; border:0; background:transparent; font-size:16px; color:var(--muted); cursor:pointer; display:none; align-items:center; justify-content:center; }\n    .search-clear.visible { display:flex; }\n    .search-clear:hover { background:var(--line); color:var(--text); }\n    .result-count { font-size:13px; color:var(--muted); white-space:nowrap; }\n    .container { max-width:900px; margin:0 auto; padding:14px; }\n    .section { margin-bottom:14px; border-radius:var(--radius); backgr flow-x:auto; color:#2d3436; }\n    .card-code span { color:#8b3fc7; }\n    .card-title mark, .card-code mark { background:#fef08a; color:inherit; border-radius:2px; padding:0 1px; }\n    .back-top { position:fixed; bottom:20px; right:20px; width:42px; height:42px; border-radius:50%; background:var(--accent); color:#fff; border:0; font-size:18px; cursor:pointer; box-shadow:0 4px 16px rgba(53,106,230,.35); display:none; align-items:center; justify-content:center; z-index:10; transition:transform .2s; }\n    .back-top.visible { display:flex; }\n    .back-top:active { transform:scale(.92); }\n    .no-result { text-align:center; padding:40px 20px; color:var(--muted); font-size:15px; }\n    @media (max-width:600px) { .topbar { padding:8px 10px; gap:6px; flex-wrap:wrap; } .topbar h1 { font-size:15px; } .search-wrap { max-width:none; flex:1 1 160px; } .search-wrap input { height:32px; font-size:13px; } .result-count { font-size:11px; } .container { padding:8px; } .section { margin-bottom:10px; border-radius:10px; } .section-head { padding:10px 12px; } .section-head .icon { width:28px; height:28px; font-size:14px; border-radius:7px; } .section-head .title { font-size:13px; } .card { padding:10px 12px; } .card-title { font-size:13px; } .card-code { padding:8px 10px; font-size:11px; border-radius:6px; } .back-top { bottom:14px; right:14px; width:36px; height:36px; font-size:16px; } }\n  </style>\n</head>\n<body>\n<div class="topbar"><h1>' + escapeHtml(title) + '</h1><div class="search-wrap"><input type="text" id="searchInput" placeholder="搜索知识点..."><button class="search-clear" id="searchClear" title="清除">✕</button></div><span class="result-count" id="resultCount">' + totalCards + ' 条</span></div>\n<div class="container" id="cardContainer">\n' + bodyHtml + '\n</div>\n<button class="back-top" id="backTop" title="回到顶部">↑</button>\n<script>\n(function(){var q=document.getElementById("searchInput"),c=document.getElementById("searchClear"),r=document.getElementById("resultCount"),cards=document.querySelectorAll(".card"),sections=document.querySelectorAll(".section"),back=document.getElementById("backTop");function search(){var v=q.value.trim().toLowerCase(),count=0;cards.forEach(function(card){if(!v){card.classList.remove("hidden");count++;return;}var kw=(card.getAttribute("data-keywords")||"").toLowerCase();var ok=kw.indexOf(v)>=0;card.classList.toggle("hidden",!ok);if(ok)count++;});r.textContent=(v?count+"/":"")+cards.length+" 条";c.classList.toggle("visible",!!v);sections.forEach(function(s){var vis=s.querySelectorAll(".card:not(.hidden)");if(v)s.classList.add("open");else s.classList.remove("open");});}q.addEventListener("input",search);c.addEventListener("click",function(){q.value="";search();q.focus();});window.addEventListener("scroll",function(){back.classList.toggle("visible",window.scrollY>300);});back.addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"});});sections.forEach(function(s){var btn=s.querySelector(".section-head");if(btn)btn.addEventListener("click",function(){s.classList.toggle("open");});});var first=sections[0];if(first&&!q.value)first.classList.add("open");})();\n</'+'script>\n</body>\n</html>\n';

    // Simple keyword-based code highlighting
    function highlightCode(code) {
      // C-style keywords
      var kw = /\b(include|int|char|float|double|void|return|if|else|for|while|do|switch|case|break|continue|struct|enum|union|typedef|sizeof|static|extern|const|volatile|auto|register|unsigned|signed|short|long|goto|default|define|ifndef|ifdef|endif|pragma|error|include|NULL|true|false|bool|class|public|private|protected|virtual|template|typename|namespace|using|new|delete|try|catch|throw|import|from|def|lambda|yield|async|await|let|var|function|console|require|module|exports)\b/g;
      // Strings
      code = code.replace(/(["'`])(?:(?!\1)[^\\]|\\.)*\1/g, '<span>$&</span>');
      // Comments
      code = code.replace(/(\/\/.*)/g, '<span>$1</span>');
      // Keywords
      code = code.replace(kw, '<span>$&</span>');
      // Numbers
      code = code.replace(/\b(\d+\.?\d*[fFLlUu]*)\b/g, '<span>$1</span>');
      return code;
    }

    function escapeAttr(s) { return escapeHtml(s).replace(/'/g,'&#39;'); }

    // ─── Preview ───────────────────────────────
    function renderPreview() {
      var md = mdEditor.value;
      mdPreview.innerHTML = parseMarkdown(md);
    }

    // ─── Save ──────────────────────────────────
    function downloadCurrentAsHtml() {
      var node = current();
      if (!node) return;
      var title = node.title || '未命名';
      var md = mdEditor.value;
      var html = markdownToFinalHtml(md, title, loadedHtml);
      var blob = new Blob([html], {type:'text/html;charset=utf-8'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = node.file; document.body.appendChild(a);
      a.click(); a.remove(); URL.revokeObjectURL(url);
      setDirty(false);
      loadedFileLastModified = Date.now();
      loadedHtml = html;
      // Persist MD + HTML to localStorage as fallback cache
      try {
        localStorage.setItem('localConfluence.cache.md.' + node.file, md);
        localStorage.setItem('localConfluence.cache.html.' + node.file, html);
      } catch(e) {}
      setStatus('⬇ 已下载：' + node.file + ' — 请将文件放入 confluence/ 目录');
      // Flash status for attention
      statusText.style.color = '#d92d20';
      statusText.style.fontWeight = '700';
      setTimeout(function() { statusText.style.color = ''; statusText.style.fontWeight = ''; }, 4000);
    }

    async function saveCurrentPage() {
      var node = current();
      if (!node) return false;
      var title = node.title || '未命名';
      var md = mdEditor.value;
      var html = markdownToFinalHtml(md, title, loadedHtml);

      if (!confluenceHandle || !supportsDirectory) {
        // Ensure tree is persisted to localStorage before download
        node.file = node.file || uniqueFileName(title);
        await writeTreeFile();
        downloadCurrentAsHtml();
        return true;
      }

      try {
        // Update tree
        node.file = node.file || uniqueFileName(title);
        await writeTreeFile();

        // Write HTML
        var fh = await confluenceHandle.getFileHandle(node.file, {create:true});
        var w = await fh.createWritable();
        await w.write(html);
        await w.close();

        loadedHtml = html;
        loadedFileLastModified = Date.now();
        setDirty(false);
        // Persist to localStorage cache
        try {
          localStorage.setItem('localConfluence.cache.md.' + node.file, md);
          localStorage.setItem('localConfluence.cache.html.' + node.file, html);
        } catch(e) {}
        setStatus('✅ 已保存：confluence/' + node.file);
        currentFile.textContent = node.file;
        return true;
      } catch(e) {
        console.error('saveCurrentPage error:', e);
        setStatus('❌ 目录写入失败，已触发下载：' + node.file + ' (' + (e.message||e) + ')');
        downloadCurrentAsHtml();
        return false;
      }
    }

    async function writeTreeFile() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tree));
      if (!confluenceHandle || !supportsDirectory) return;
      var h = await confluenceHandle.getFileHandle(TREE_FILE_NAME, {create:true});
      var w = await h.createWritable();
      await w.write('window.__TREE_DATA__=' + JSON.stringify(tree) + ';\n');
      await w.close();
    }

    function defaultTree() {
      return [{id:'home',title:'首页',file:'index.html',children:[]}];
    }

    function parseTreeDataJs(text) {
      // Extract JSON from 'window.__TREE_DATA__=...;'
      var m = text.match(/window\.__TREE_DATA__\s*=\s*(\[[\s\S]*\])\s*;?\s*$/);
      if (m) return JSON.parse(m[1]);
      // Fallback: try raw JSON (for old tree.json format)
      return JSON.parse(text);
    }



    // ─── Tree CRUD ─────────────────────────────
    async function addNode(parent) {
      var title = prompt('页面标题：', '新页面');
      if (!title) return;
      var node = {id:uid(), title:title.trim(), file:uniqueFileName(title), children:[]};
      if (parent) { parent.children = parent.children||[]; parent.children.push(node); }
      else { tree.push(node); }
      await writeTreeFile();
      renderTree();
      await selectNode(node.id);
      setDirty(true);
    }

    async function renameNode() {
      var node = current();
      if (!node) return;
      var title = prompt('新名称：', node.title||'');
      if (!title) return;
      node.title = title.trim();
      await writeTreeFile();
      renderTree();
      setDirty(true);
    }

    async function deleteNode() {
      var node = current();
      if (!node) return;
      if (!confirm('删除节点 "' + (node.title||'') + '"？不会删除磁盘文件。')) return;
      function remove(arr) {
        for (var i=0;i<arr.length;i++) {
          if (arr[i].id===node.id) { arr.splice(i,1); return true; }
          if (remove(arr[i].children||[])) return true;
        }
        return false;
      }
      remove(tree);
      selectedId = tree[0]&&tree[0].id||'';
      await writeTreeFile();
      renderTree();
      if (selectedId) selectNode(selectedId);
      else { mdEditor.value = ''; currentFile.textContent = '—'; setStatus('树为空。'); }
    }

    // ─── Directory picker ──────────────────────
    async function chooseRoot() {
      if (!supportsDirectory) {
        setStatus('浏览器不支持目录选择，请用 Chrome/Edge。保存时会下载文件。');
        return;
      }
      try {
        var picked = await showDirectoryPicker({mode:'readwrite'});
        if (picked.name && picked.name !== 'confluence') {
          setStatus('请选择 confluence 文件夹。当前：' + picked.name);
          return;
        }
        confluenceHandle = picked;
        await saveStoredDirectoryHandle(confluenceHandle);
        setStatus('已授权 confluence/ 目录。');
        // Load tree from disk
        try {
          var tr = await getFileText(TREE_FILE_NAME);
          if (tr && tr.text) {
            var p = parseTreeDataJs(tr.text);
            if (Array.isArray(p) && p.length) {
              tree = p;
              selectedId = selectedId || (tree[0]&&tree[0].id);
              localStorage.setItem(STORAGE_KEY, JSON.stringify(tree));
            }
          } else {
            tree = defaultTree();
            await writeTreeFile();
          }
        } catch(e) { tree = defaultTree(); }
        renderTree();
        var node = current();
        if (node) loadPageFile(node);
      } catch(e) {
        if (e.name !== 'AbortError') setStatus('选择目录失败：' + (e.message||e));
      }
    }

    // ─── Event handlers ────────────────────────
    // Mode tabs
    document.querySelectorAll('.mode-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.mode-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
        currentMode = tab.dataset.mode;
        mdEditorWrap.classList.toggle('split', currentMode === 'split');
        mdPreview.classList.toggle('show', currentMode === 'preview' || currentMode === 'split');
        if (currentMode === 'preview' || currentMode === 'split') renderPreview();
        mdEditor.focus();
      });
    });

    // Editor input
    mdEditor.addEventListener('input', function() {
      setDirty(true);
      updateWordCount();
      if (currentMode === 'split') renderPreview();
    });

    function updateWordCount() {
      var text = mdEditor.value;
      var zh = (text.match(/[\u4e00-\u9fff]/g)||[]).length;
      var en = (text.replace(/[\u4e00-\u9fff]/g,' ').match(/[A-Za-z0-9_]+/g)||[]).length;
      wordCount.textContent = (zh+en) + ' 词 · ' + text.replace(/\s/g,'').length + ' 字符';
    }

    // Save button
    document.getElementById('saveBtn').addEventListener('click', function() { saveCurrentPage(); });

    // Ctrl+S
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey||e.metaKey) && e.key === 's') { e.preventDefault(); saveCurrentPage(); }
    });

    // Tree buttons
    document.getElementById('addRootBtn').addEventListener('click', function() { addNode(null); });
    document.getElementById('addChildBtn').addEventListener('click', function() {
      var node = current();
      if (node) addNode(node);
      else setStatus('请先选择一个节点。');
    });
    document.getElementById('renameBtn').addEventListener('click', renameNode);
    document.getElementById('deleteBtn').addEventListener('click', deleteNode);

    // ─── Init ──────────────────────────────────
    async function init() {
      tree = (function() {
        try { var p = JSON.parse(localStorage.getItem(STORAGE_KEY)||'null');
          if (Array.isArray(p) && p.length) return p; } catch(e) {}
        return defaultTree();
      })();

      confluenceHandle = await loadStoredDirectoryHandle();
      if (confluenceHandle) {
        try {
          var tr = await getFileText(TREE_FILE_NAME);
          if (tr && tr.text) {
            var p = parseTreeDataJs(tr.text);
            if (Array.isArray(p) && p.length) {
              tree = p;
              localStorage.setItem(STORAGE_KEY, JSON.stringify(tree));
            }
          }
        } catch(e) {}
      }

      if (!selectedId || !findNodeById(tree, selectedId)) {
        selectedId = tree[0] && tree[0].id;
      }

      renderTree();
      var node = current();
      if (node) {
        await loadPageFile(node);
        if (!confluenceHandle && !supportsDirectory) {
          setStatus('💾 离线模式：修改内容会缓存到浏览器，请定期手动下载文件放入 confluence/ 目录');
        } else if (!confluenceHandle && supportsDirectory) {
          setStatus('点击授权按钮或按 Ctrl+S 开始。未授权时保存会下载文件。');
        }
      } else {
        mdEditor.value = '# 欢迎使用手册编辑器\n\n点击左侧 + 按钮创建第一个页面。\n';
      }

      // Setup auth prompt
      if (!confluenceHandle && supportsDirectory) {
        var authDiv = document.createElement('div');
        authDiv.style.cssText = 'padding:12px 16px;background:#eaf1ff;border-bottom:1px solid var(--line);font-size:13px;display:flex;align-items:center;gap:10px;';
        authDiv.innerHTML = '<span>💡 授权 confluence 文件夹后可自动保存</span><button class="btn primary" id="authBtn" style="font-size:12px;height:28px;">授权文件夹</button>';
        helpTip.parentNode.insertBefore(authDiv, helpTip);
        document.getElementById('authBtn').addEventListener('click', chooseRoot);
      }

      updateWordCount();
    }

    init();
  })();
  </script>
</body>
</html>
