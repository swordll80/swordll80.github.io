<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confluence · 本地网站编辑器</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-soft: #f9fbfe;
      --text: #1f2937;
      --muted: #667085;
      --line: #e5eaf1;
      --accent: #2f6fed;
      --accent-soft: #eaf1ff;
      --danger: #d92d20;
      --shadow: 0 18px 45px rgba(31, 41, 55, .08);
      --header-height: 68px;
      --tree-width: 300px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; color: var(--text); background: var(--bg); font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
    body {
      background:
        radial-gradient(circle at 10% 8%, rgba(47,111,237,.10) 0, transparent 30rem),
        radial-gradient(circle at 95% 95%, rgba(16,185,129,.08) 0, transparent 28rem),
        var(--bg);
    }
    a { color: inherit; }
    button, input, select { font: inherit; }
    .topbar {
      min-height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px clamp(14px, 3vw, 36px);
      border-bottom: 1px solid rgba(229,234,241,.9);
      background: rgba(255,255,255,.84);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; text-decoration: none; }
    .brand-mark { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; color: #fff; background: var(--accent); font-weight: 800; }
    .brand strong { display: block; line-height: 1.1; }
    .brand em { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; font-style: normal; }
    .top-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .btn {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: #344054;
      text-decoration: none;
      font-size: 13px;
      font-weight: 650;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(31,41,55,.05);
    }
    .btn:hover { color: var(--accent); border-color: rgba(47,111,237,.28); background: var(--panel-soft); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { color: #fff; background: #245fd0; }
    .btn.danger { color: var(--danger); }
    .btn.icon { width: 38px; padding: 0; font-size: 16px; }
    .app { display: grid; grid-template-columns: var(--tree-width) minmax(0, 1fr); min-height: calc(100vh - var(--header-height)); }
    .tree-pane {
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(12px);
      padding: 18px 12px;
      overflow: auto;
    }
    .pane-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 0 8px 12px; }
    .pane-head strong { font-size: 16px; }
    .tree-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 0 8px 12px; }
    .tree-actions .btn { min-height: 34px; padding: 6px 9px; }
    .tree { display: grid; gap: 2px; }
    .tree-children { display: grid; gap: 2px; margin-left: 18px; padding-left: 8px; border-left: 1px solid var(--line); }
    .tree-node { display: grid; gap: 2px; }
    .tree-row {
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #344054;
      padding: 7px 8px;
      text-align: left;
      cursor: pointer;
    }
    .tree-row:hover { background: var(--panel-soft); color: var(--accent); }
    .tree-row.active { color: var(--accent); background: var(--accent-soft); font-weight: 700; }
    .tree-row .twisty { width: 14px; color: var(--muted); font-size: 10px; }
    .tree-row .title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-row .file { color: var(--muted); font-size: 11px; }
    .main {
      min-width: 0;
      padding: clamp(20px, 4vw, 42px);
      overflow: auto;
    }
    .workspace { max-width: 1180px; margin: 0 auto; display: grid; gap: 14px; }
    .title-row { display: grid; gap: 8px; }
    .eyebrow { margin: 0; color: var(--accent); font-weight: 700; font-size: 13px; letter-spacing: .12em; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(30px, 4vw, 46px); line-height: 1.1; letter-spacing: -.03em; }
    p { margin: 0; color: var(--muted); line-height: 1.75; }
    .status {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.78);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .dirty-dot { width: 8px; height: 8px; border-radius: 999px; background: #f79009; display: none; flex: 0 0 auto; }
    .dirty .dirty-dot { display: block; }
    .editor-shell {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,.88);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .page-meta {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(160px, 260px);
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .field { display: grid; gap: 6px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 650; }
    .field input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 0 11px;
      outline: none;
    }
    .field input:focus { border-color: rgba(47,111,237,.45); box-shadow: 0 0 0 4px rgba(47,111,237,.10); }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      position: sticky;
      top: var(--header-height);
      z-index: 3;
    }
    .toolbar .btn { min-height: 34px; border-radius: 10px; padding: 6px 10px; box-shadow: none; }
    .toolbar .sep { width: 1px; height: 24px; background: var(--line); margin: 0 3px; }
    .editor-wrap { background: #f4f7fb; padding: clamp(14px, 3vw, 30px); }
    .editor {
      min-height: 68vh;
      max-width: 900px;
      margin: 0 auto;
      padding: clamp(24px, 5vw, 54px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #111827;
      outline: none;
      box-shadow: 0 18px 45px rgba(31,41,55,.10);
      line-height: 1.75;
    }
    .editor:empty::before { content: "在这里像编辑 Word 一样输入内容..."; color: #98a2b3; }
    .editor h1, .editor h2, .editor h3, .editor p, .editor ul, .editor ol, .editor blockquote { margin-top: 0; }
    .editor h1 { font-size: 34px; letter-spacing: 0; }
    .editor h2 { font-size: 26px; }
    .editor h3 { font-size: 20px; }
    .editor blockquote { border-left: 4px solid var(--accent); margin-left: 0; padding: 8px 14px; background: var(--accent-soft); color: #344054; }
    .editor img { max-width: 100%; height: auto; }

    .status-spacer { flex: 1 1 auto; }
    #editorCount { white-space: nowrap; color: #98a2b3; }
    .toolbar.ribbon { align-items: stretch; gap: 8px; }
    .tool-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 2px 0; }
    .tool-label { align-self: center; color: var(--muted); font-size: 11px; font-weight: 750; letter-spacing: .06em; }
    .toolbar select {
      height: 34px;
      max-width: 180px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #344054;
      padding: 0 8px;
      outline: none;
      box-shadow: none;
    }
    .toolbar select:focus { border-color: rgba(47,111,237,.45); box-shadow: 0 0 0 3px rgba(47,111,237,.10); }
    .toolbar .btn.active { color: var(--accent); background: var(--accent-soft); border-color: rgba(47,111,237,.32); }
    .color-btn {
      width: 38px;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #344054;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
    }
    .color-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .source-editor {
      display: none;
      width: min(100%, 900px);
      min-height: 68vh;
      margin: 0 auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f172a;
      color: #e5e7eb;
      outline: none;
      font: 13px/1.65 Consolas, "Courier New", monospace;
      resize: vertical;
      box-shadow: 0 18px 45px rgba(31,41,55,.10);
    }
    .source-mode .editor { display: none; }
    .source-mode .source-editor { display: block; }
    .editor table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    .editor th, .editor td { border: 1px solid #d0d5dd; padding: 8px 10px; vertical-align: top; min-width: 48px; }
    .editor th { background: #f2f4f7; font-weight: 750; }
    .editor tr:nth-child(even) td { background: #fbfcfe; }
    .editor hr { border: 0; border-top: 1px solid #d0d5dd; margin: 24px 0; }
    .editor pre { background: #111827; color: #f9fafb; padding: 14px 16px; border-radius: 10px; overflow: auto; line-height: 1.55; }
    .editor code { font-family: Consolas, "Courier New", monospace; }
    .editor .callout { border: 1px solid rgba(47,111,237,.24); border-left: 5px solid var(--accent); border-radius: 12px; background: #f5f8ff; padding: 12px 14px; margin: 14px 0; }
    .editor .task-line { display: flex; align-items: flex-start; gap: 8px; margin: 6px 0; }
    .editor .task-box { flex: 0 0 auto; width: 18px; height: 18px; margin-top: 4px; border: 1px solid #98a2b3; border-radius: 5px; display: inline-grid; place-items: center; color: var(--accent); font-size: 13px; line-height: 1; }
    .editor .task-line.done .task-box::before { content: "✓"; }
    .editor .task-line.done .task-text { color: #98a2b3; text-decoration: line-through; }
    .editor .find-hit { background: #ffe066; color: inherit; padding: 0 1px; }
    .editor .find-hit.current { outline: 2px solid #f79009; }

    .support-note {
      border: 1px solid rgba(247,144,9,.25);
      background: rgba(255,250,235,.88);
      color: #7a4a00;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
    }
    .auth-gate {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(246,248,251,.86);
      backdrop-filter: blur(12px);
    }
    .auth-gate.show { display: flex; }
    .auth-box {
      width: min(440px, calc(100vw - 36px));
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      gap: 14px;
    }
    .auth-box h2 { margin: 0; font-size: 22px; }
    .auth-box p { margin: 0; }
    .auth-box .btn { width: 100%; min-height: 44px; }
    @media (max-width: 900px) {
      :root { --header-height: 64px; --tree-width: 100%; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .top-actions { justify-content: flex-start; }
      .app { grid-template-columns: 1fr; }
      .tree-pane { border-right: 0; border-bottom: 1px solid var(--line); }
      .page-meta { grid-template-columns: 1fr; }
      .toolbar { top: 0; }
      .editor, .source-editor { min-height: 58vh; }
      .toolbar.ribbon { max-height: none; }
      .tool-group { width: 100%; }
      .toolbar select { max-width: 100%; flex: 1 1 120px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-mark" aria-hidden="true">C</span>
      <span>
        <strong>Confluence</strong>
        <em>本地网站可视化编辑器</em>
      </span>
    </a>
    <div class="top-actions">
      <button class="btn primary" id="saveBtn" type="button">保存页面</button>
      <a class="btn" id="homeBtn" href="index.html">返回主页</a>
    </div>
  </header>

  <div class="app">
    <aside class="tree-pane">
      <div class="pane-head">
        <strong>页面树</strong>
        <small id="rootState">confluence/</small>
      </div>
      <div class="tree-actions">
        <button class="btn" id="addChildBtn" type="button">添加子节点</button>
        <button class="btn" id="addRootBtn" type="button">添加根节点</button>
        <button class="btn" id="renameBtn" type="button">重命名</button>
        <button class="btn danger" id="deleteBtn" type="button">删除节点</button>
      </div>
      <div class="tree" id="tree"></div>
    </aside>

    <main class="main">
      <div class="workspace">
        <div class="title-row">
          <p class="eyebrow">WYSIWYG</p>
          <h1>像 Word 一样编辑 HTML 页面</h1>
          <p>左侧每个节点对应 confluence/ 目录下的一个 HTML 文件。授权 confluence/ 后，点击“保存页面”会直接写入该节点的 HTML 文件。</p>
        </div>

        <div class="support-note" id="supportNote"></div>
        <div class="status" id="status"><span class="dirty-dot"></span><span id="statusText">等待选择或创建页面。</span><span class="status-spacer"></span><span id="editorCount">0 字 / 0 词</span></div>

        <section class="editor-shell">
          <div class="page-meta">
            <div class="field">
              <label for="pageTitle">页面标题</label>
              <input id="pageTitle" placeholder="页面标题">
            </div>
            <div class="field">
              <label for="pageFile">HTML 文件名</label>
              <input id="pageFile" placeholder="example.html">
            </div>
          </div>

          <div class="toolbar ribbon" aria-label="编辑工具栏">
            <div class="tool-group">
              <span class="tool-label">样式</span>
              <select id="formatSelect" title="段落样式">
                <option value="p">正文</option>
                <option value="h1">标题 1</option>
                <option value="h2">标题 2</option>
                <option value="h3">标题 3</option>
                <option value="blockquote">引用</option>
                <option value="pre">代码块</option>
              </select>
              <select id="fontFamilySelect" title="字体">
                <option value='"Microsoft YaHei", Arial, sans-serif'>微软雅黑</option>
                <option value='SimSun, serif'>宋体</option>
                <option value='KaiTi, serif'>楷体</option>
                <option value='Arial, sans-serif'>Arial</option>
                <option value='Georgia, serif'>Georgia</option>
                <option value='Consolas, "Courier New", monospace'>Consolas</option>
              </select>
              <select id="fontSizeSelect" title="字号">
                <option value="12px">12</option>
                <option value="14px">14</option>
                <option value="16px" selected>16</option>
                <option value="18px">18</option>
                <option value="22px">22</option>
                <option value="26px">26</option>
                <option value="32px">32</option>
                <option value="40px">40</option>
              </select>
            </div>
            <span class="sep"></span>
            <div class="tool-group">
              <span class="tool-label">文字</span>
              <button class="btn icon" type="button" data-cmd="bold" title="加粗 Ctrl+B"><strong>B</strong></button>
              <button class="btn icon" type="button" data-cmd="italic" title="斜体 Ctrl+I"><em>I</em></button>
              <button class="btn icon" type="button" data-cmd="underline" title="下划线 Ctrl+U"><u>U</u></button>
              <button class="btn icon" type="button" data-cmd="strikeThrough" title="删除线"><s>S</s></button>
              <button class="btn icon" type="button" data-cmd="subscript" title="下标">x₂</button>
              <button class="btn icon" type="button" data-cmd="superscript" title="上标">x²</button>
              <label class="color-btn" title="文字颜色"><span>A</span><input id="foreColorInput" type="color" value="#111827"></label>
              <label class="color-btn" title="高亮颜色"><span>▉</span><input id="backColorInput" type="color" value="#fff3bf"></label>
              <button class="btn" type="button" id="clearFormatBtn">清除格式</button>
            </div>
            <span class="sep"></span>
            <div class="tool-group">
              <span class="tool-label">段落</span>
              <button class="btn icon" type="button" data-cmd="justifyLeft" title="左对齐">☰</button>
              <button class="btn icon" type="button" data-cmd="justifyCenter" title="居中">≡</button>
              <button class="btn icon" type="button" data-cmd="justifyRight" title="右对齐">☷</button>
              <button class="btn icon" type="button" data-cmd="justifyFull" title="两端对齐">▤</button>
              <button class="btn icon" type="button" data-cmd="insertUnorderedList" title="项目符号列表">•</button>
              <button class="btn icon" type="button" data-cmd="insertOrderedList" title="编号列表">1.</button>
              <button class="btn icon" type="button" data-cmd="outdent" title="减少缩进">←</button>
              <button class="btn icon" type="button" data-cmd="indent" title="增加缩进">→</button>
              <select id="lineHeightSelect" title="行距">
                <option value="1.2">1.2</option>
                <option value="1.5">1.5</option>
                <option value="1.75" selected>1.75</option>
                <option value="2">2.0</option>
              </select>
            </div>
            <span class="sep"></span>
            <div class="tool-group">
              <span class="tool-label">插入</span>
              <button class="btn" type="button" id="linkBtn">链接</button>
              <button class="btn" type="button" id="unlinkBtn">取消链接</button>
              <button class="btn" type="button" id="imageBtn">网络图片</button>
              <button class="btn" type="button" id="imageFileBtn">本地图片</button>
              <button class="btn" type="button" id="hrBtn">分隔线</button>
              <button class="btn" type="button" id="calloutBtn">提示框</button>
              <button class="btn" type="button" id="taskBtn">待办</button>
              <input id="imageFileInput" type="file" accept="image/*" hidden>
            </div>
            <span class="sep"></span>
            <div class="tool-group">
              <span class="tool-label">表格</span>
              <button class="btn" type="button" id="tableBtn">插入表格</button>
              <button class="btn" type="button" data-table="rowBefore">上方行</button>
              <button class="btn" type="button" data-table="rowAfter">下方行</button>
              <button class="btn" type="button" data-table="colBefore">左侧列</button>
              <button class="btn" type="button" data-table="colAfter">右侧列</button>
              <button class="btn danger" type="button" data-table="deleteRow">删行</button>
              <button class="btn danger" type="button" data-table="deleteCol">删列</button>
              <button class="btn danger" type="button" data-table="deleteTable">删表</button>
            </div>
            <span class="sep"></span>
            <div class="tool-group">
              <span class="tool-label">编辑</span>
              <button class="btn" type="button" data-cmd="undo">撤销</button>
              <button class="btn" type="button" data-cmd="redo">重做</button>
              <button class="btn" type="button" id="findBtn">查找</button>
              <button class="btn" type="button" id="replaceBtn">替换</button>
              <button class="btn" type="button" id="sourceBtn">源码</button>
            </div>
          </div>

          <div class="editor-wrap">
            <article class="editor" id="editor" contenteditable="true" spellcheck="true"></article>
            <textarea class="source-editor" id="sourceEditor" spellcheck="false" aria-label="HTML 源码编辑器"></textarea>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div class="auth-gate" id="authGate" role="dialog" aria-modal="true" aria-labelledby="authTitle">
    <div class="auth-box">
      <h2 id="authTitle">授权 confluence 目录</h2>
      <p>为了直接保存 HTML 页面，需要授权 confluence.html 同级的 confluence 文件夹。浏览器保存授权后，下次打开会自动恢复。</p>
      <button class="btn primary" id="authGateBtn" type="button">授权 confluence 目录</button>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      var STORAGE_KEY = 'localConfluence.tree.v1';
      var SELECTED_KEY = 'localConfluence.selectedId.v1';
      var TREE_FILE_NAME = 'tree.json';
      var TREE_URL = 'confluence/tree.json';
      var DIR_DB_NAME = 'localConfluence.fs.v1';
      var DIR_STORE_NAME = 'handles';
      var DIR_HANDLE_KEY = 'confluence';
      var supportsDirectory = 'showDirectoryPicker' in window;
      var confluenceHandle = null;
      var tree = [];
      var selectedId = localStorage.getItem(SELECTED_KEY) || '';
      var dirty = false;
      var loadedHtml = '';
      var loadedUsesConfluenceContent = false;
      var sourceMode = false;
      var savedRange = null;
      var findHits = [];
      var findHitIndex = -1;

      var treeEl = document.getElementById('tree');
      var editor = document.getElementById('editor');
      var sourceEditor = document.getElementById('sourceEditor');
      var editorWrap = document.querySelector('.editor-wrap');
      var editorCount = document.getElementById('editorCount');
      var pageTitle = document.getElementById('pageTitle');
      var pageFile = document.getElementById('pageFile');
      var statusBox = document.getElementById('status');
      var statusText = document.getElementById('statusText');
      var rootState = document.getElementById('rootState');
      var supportNote = document.getElementById('supportNote');
      var authGate = document.getElementById('authGate');
      var authGateBtn = document.getElementById('authGateBtn');

      function uid() {
        return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      }

      function slugify(text) {
        return (text || 'page')
          .trim()
          .toLowerCase()
          .replace(/\.html?$/i, '')
          .replace(/[^\w\u4e00-\u9fa5-]+/g, '-')
          .replace(/^-+|-+$/g, '') || 'page';
      }

      function uniqueFileName(base) {
        var slug = slugify(base);
        var used = new Set();
        walk(tree, function (node) { used.add((node.file || '').toLowerCase()); });
        var name = slug + '.html';
        var index = 2;
        while (used.has(name.toLowerCase())) {
          name = slug + '-' + index + '.html';
          index++;
        }
        return name;
      }

      function openHandleDb() {
        return new Promise(function (resolve, reject) {
          var req = indexedDB.open(DIR_DB_NAME, 1);
          req.onupgradeneeded = function () {
            req.result.createObjectStore(DIR_STORE_NAME);
          };
          req.onsuccess = function () { resolve(req.result); };
          req.onerror = function () { reject(req.error); };
        });
      }

      async function saveStoredDirectoryHandle(handle) {
        if (!window.indexedDB) return;
        var db = await openHandleDb();
        await new Promise(function (resolve, reject) {
          var tx = db.transaction(DIR_STORE_NAME, 'readwrite');
          tx.objectStore(DIR_STORE_NAME).put(handle, DIR_HANDLE_KEY);
          tx.oncomplete = resolve;
          tx.onerror = function () { reject(tx.error); };
        });
        db.close();
      }

      async function loadStoredDirectoryHandle() {
        if (!window.indexedDB || !supportsDirectory) return null;
        try {
          var db = await openHandleDb();
          var handle = await new Promise(function (resolve, reject) {
            var tx = db.transaction(DIR_STORE_NAME, 'readonly');
            var req = tx.objectStore(DIR_STORE_NAME).get(DIR_HANDLE_KEY);
            req.onsuccess = function () { resolve(req.result || null); };
            req.onerror = function () { reject(req.error); };
          });
          db.close();
          if (!handle) return null;
          var perm = await handle.queryPermission({ mode: 'readwrite' });
          if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
          return perm === 'granted' ? handle : null;
        } catch (e) {
          return null;
        }
      }

      function defaultTree() {
        return [{
          id: 'home',
          title: '首页',
          file: 'index.html',
          children: []
        }];

      function loadStoredTree() {
        try {
          var parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
          if (Array.isArray(parsed) && parsed.length) return parsed;
        } catch (e) {}
        return defaultTree();
      }

      function saveTree() {

      async function loadPublishedTree() {
        try {
          var res = await fetch(TREE_URL + '?v=' + Date.now(), { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          var parsed = await res.json();
          if (Array.isArray(parsed) && parsed.length) return parsed;
        } catch (e) {}
        return null;
      }

      async function writeTreeFile() {
        saveTree();
        if (!confluenceHandle || !supportsDirectory) return false;
        var handle = await confluenceHandle.getFileHandle(TREE_FILE_NAME, { create: true });
        var writable = await handle.createWritable();
        await writable.write(JSON.stringify(tree, null, 2) + '\n');
        await writable.close();
        return true;
      }

      function walk(nodes, fn, parent, level) {
        (nodes || []).forEach(function (node) {
          fn(node, parent || null, level || 0);
          walk(node.children || [], fn, node, (level || 0) + 1);
        });
      }

      function findNode(id) {
        var found = null;
        walk(tree, function (node, parent, level) {
          if (node.id === id) found = { node: node, parent: parent, level: level };
        });
        return found;
      }

      function pathToNode(id) {
        var path = [];
        function visit(nodes) {
          for (var i = 0; i < (nodes || []).length; i++) {
            var node = nodes[i];
            path.push(node);
            if (node.id === id) return true;
            if (visit(node.children || [])) return true;
            path.pop();
          }
          return false;
        }
        return visit(tree) ? path.slice() : [];
      }

      function current() {
        return findNode(selectedId) || findNode(tree[0] && tree[0].id);
      }

      function setStatus(text) {
        statusText.textContent = text;

      function renderTree() {
        treeEl.innerHTML = '';
        function renderNode(node) {
          var row = document.createElement('button');
          row.type = 'button';
          row.className = 'tree-row' + (node.id === selectedId ? ' active' : '');
          row.innerHTML = '<span class="twisty">' + ((node.children || []).length ? '▾' : '') + '</span><span class="title"></span><span class="file"></span>';
          row.querySelector('.title').textContent = node.title || '未命名';
          row.querySelector('.file').textContent = node.file || '';
          row.addEventListener('click', function () {
            selectNode(node.id);
          });
          var wrap = document.createElement('div');
          wrap.className = 'tree-node';
          wrap.appendChild(row);
          if (node.children && node.children.length) {
            var children = document.createElement('div');
            children.className = 'tree-children';
            node.children.forEach(function (child) {
              children.appendChild(renderNode(child));
            });
            wrap.appendChild(children);
          }
          return wrap;
        }
        tree.forEach(function (node) {
          treeEl.appendChild(renderNode(node));
        });
      }

      async function selectNode(id) {
        if (selectedId && selectedId !== id) {
          var saved = await saveCurrentPage({ silent: true, requireWritable: true });
          if (!saved) return false;
        }
        selectedId = id;
        localStorage.setItem(SELECTED_KEY, selectedId);
        var hit = current();
        if (!hit) return false;
        pageTitle.value = hit.node.title || '';

        await loadPageFile(hit.node);
        return true;
      }

      function setEditorHtml(html) {
        editor.innerHTML = sanitizeHtml(html || '');

        updateEditorCount();

      function extractEditableHtml(fullHtml) {
        try {
          var doc = new DOMParser().parseFromString(fullHtml || '', 'text/html');
          var content = doc.querySelector('[data-confluence-content]');
          loadedUsesConfluenceContent = !!content;
          if (content) return content.innerHTML;
          return doc.body ? doc.body.innerHTML : fullHtml;
        } catch (e) {
          loadedUsesConfluenceContent = false;
          return fullHtml || '';
        }
      }

      async function getFileText(fileName) {
        if (confluenceHandle && supportsDirectory) {
          try {
            var handle = await confluenceHandle.getFileHandle(fileName);
            var file = await handle.getFile();
            return await file.text();
          } catch (e) {}
        }
        try {
          var res = await fetch('confluence/' + encodeURIComponent(fileName).replace(/%2F/g, '/') + '?v=' + Date.now(), { cache: 'no-store' });
          if (res.ok) return await res.text();
        } catch (e2) {
        }
        return null;
      }

      async function loadPageFile(node) {
        var text = await getFileText(node.file);
        if (text == null) {
          loadedHtml = '';
          loadedUsesConfluenceContent = true;
          setEditorHtml('<h1>' + escapeHtml(node.title || '新页面') + '</h1><p></p>');
          setStatus('正在编辑：' + node.file + '。未读取到现有文件，保存时会创建。');
        } else {
          loadedHtml = text;
          setEditorHtml(extractEditableHtml(text));
          setStatus('已读取：' + node.file);
        }
      }

      function escapeHtml(text) {
        return String(text || '').replace(/[&<>"]/g, function (ch) {
          return ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : '&quot;';
        });
      }


      function escapeAttr(text) {
        return escapeHtml(text).replace(/'/g, '&#39;');
      }

      function sanitizeUrl(url) {
        url = String(url || '').trim();
        if (!url) return '';
        if (/^(javascript|vbscript|data:text\/html)/i.test(url)) return '';
        return url;
      }

      function cleanStyle(styleText) {
        var out = [];
        String(styleText || '').split(';').forEach(function (part) {
          var bits = part.split(':');
          if (bits.length < 2) return;
          var key = bits.shift().trim().toLowerCase();
          var val = bits.join(':').trim();
          if (!key || !val || /^mso-/i.test(key) || /expression\s*\(/i.test(val)) return;
          if ([
            'color', 'background-color', 'font-size', 'font-family', 'font-weight', 'font-style',
            'text-decoration', 'text-align', 'line-height', 'width', 'height', 'max-width',
            'border', 'border-collapse', 'padding', 'margin', 'vertical-align'
          ].indexOf(key) >= 0) out.push(key + ': ' + val);
        });
        return out.join('; ');
      }

      function sanitizeHtml(html) {
        var box = document.createElement('div');
        box.innerHTML = String(html || '');
        var banned = box.querySelectorAll('script, style, iframe, object, embed, link, meta, base, form, input, button, textarea, select');
        Array.prototype.forEach.call(banned, function (el) { el.remove(); });
        var nodes = box.querySelectorAll('*');
        Array.prototype.forEach.call(nodes, function (el) {
          Array.prototype.slice.call(el.attributes).forEach(function (attr) {
            var name = attr.name.toLowerCase();
            var value = attr.value;
            if (name.indexOf('on') === 0 || name === 'id') {
              el.removeAttribute(attr.name);
              return;
            }
            if (name === 'class') {
              var allowedClasses = String(value || '').split(/\s+/).filter(function (cls) {
                return ['callout', 'task-line', 'task-box', 'task-text', 'done'].indexOf(cls) >= 0;
              });
              if (allowedClasses.length) el.setAttribute('class', allowedClasses.join(' '));
              else el.removeAttribute(attr.name);
              return;
            }
            if ((name === 'href' || name === 'src') && !sanitizeUrl(value)) {
              el.removeAttribute(attr.name);
              return;
            }
            if (name === 'style') {
              var clean = cleanStyle(value);
              if (clean) el.setAttribute('style', clean);
              else el.removeAttribute('style');
              return;
            }
            if (['href', 'src', 'alt', 'title', 'target', 'rel', 'colspan', 'rowspan', 'style'].indexOf(name) < 0) {
              el.removeAttribute(attr.name);
            }
          });
          if (el.tagName === 'A') {
            el.setAttribute('rel', 'noopener noreferrer');
            if (el.getAttribute('href') && /^https?:\/\//i.test(el.getAttribute('href'))) el.setAttribute('target', '_blank');
          }
        });
        return box.innerHTML;
      }

      function prettyHtml(html) {
        return String(html || '')
          .replace(/></g, '>\n<')
          .replace(/\n{3,}/g, '\n\n')
          .trim();
      }

      function getCurrentBodyHtml() {
        if (sourceMode) applySourceToEditor(false);
        var clone = document.createElement('div');
        clone.innerHTML = editor.innerHTML;
        Array.prototype.forEach.call(clone.querySelectorAll('mark.find-hit'), function (mark) {
          mark.replaceWith(document.createTextNode(mark.textContent));
        });
        return sanitizeHtml(clone.innerHTML);
      }

      function updateEditorCount() {
        if (!editorCount) return;
        var text = sourceMode ? sourceEditor.value : editor.innerText || '';
        var zh = (text.match(/[\u4e00-\u9fff]/g) || []).length;
        var words = (text.replace(/[\u4e00-\u9fff]/g, ' ').match(/[A-Za-z0-9_]+/g) || []).length;
        var chars = text.replace(/\s/g, '').length;
        editorCount.textContent = chars + ' 字符 / ' + (zh + words) + ' 词';
      }

      function saveSelection() {
        var sel = window.getSelection && window.getSelection();
        if (!sel || !sel.rangeCount) return;
        var range = sel.getRangeAt(0);
        if (editor.contains(range.commonAncestorContainer)) savedRange = range.cloneRange();
      }

      function restoreSelection() {
        if (!savedRange) return false;
        var sel = window.getSelection && window.getSelection();
        if (!sel) return false;
        sel.removeAllRanges();
        sel.addRange(savedRange);
        return true;
      }

      function insertHtmlAtCaret(html) {
        if (sourceMode) applySourceToEditor(false);
        editor.focus();
        restoreSelection();
        try {
          document.execCommand('insertHTML', false, html);
        } catch (e) {
          var range = window.getSelection().getRangeAt(0);
          var temp = document.createElement('div');
          temp.innerHTML = html;
          var frag = document.createDocumentFragment();
          while (temp.firstChild) frag.appendChild(temp.firstChild);
          range.deleteContents();
          range.insertNode(frag);
        }
        setDirty(true);
        updateEditorCount();
      }

      function closestElement(node, selector) {
        var el = node && (node.nodeType === 1 ? node : node.parentElement);
        while (el && el !== editor) {
          if (el.matches && el.matches(selector)) return el;
          el = el.parentElement;
        }
        return null;
      }

      function selectedElement(selector) {
        var sel = window.getSelection && window.getSelection();
        if (!sel || !sel.rangeCount) return null;
        return closestElement(sel.getRangeAt(0).commonAncestorContainer, selector);
      }

      function selectedBlocks() {
        var sel = window.getSelection && window.getSelection();
        if (!sel || !sel.rangeCount) return [];
        var range = sel.getRangeAt(0);
        var selector = 'p,h1,h2,h3,h4,h5,h6,li,blockquote,pre,div';
        var rootBlock = closestElement(range.commonAncestorContainer, selector);
        var blocks = [];
        if (range.collapsed && rootBlock) return [rootBlock];
        Array.prototype.forEach.call(editor.querySelectorAll(selector), function (el) {
          try {
            if (range.intersectsNode(el)) blocks.push(el);
          } catch (e) {}
        });
        return blocks.length ? blocks : (rootBlock ? [rootBlock] : []);
      }

      function applyBlockStyle(prop, value) {
        if (sourceMode) return;
        restoreSelection();
        selectedBlocks().forEach(function (el) { el.style[prop] = value; });
        setDirty(true);
      }

      function replaceFontTags(prop, value) {
        Array.prototype.forEach.call(editor.querySelectorAll('font'), function (font) {
          var span = document.createElement('span');
          span.innerHTML = font.innerHTML;
          if (prop === 'fontSize') span.style.fontSize = value;
          if (prop === 'fontFamily') span.style.fontFamily = value;
          if (font.getAttribute('color')) span.style.color = font.getAttribute('color');
          font.parentNode.replaceChild(span, font);
        });
      }

      function setFormatBlock(value) {
        if (value === 'pre') {
          var text = (window.getSelection && window.getSelection().toString()) || 'code';
          insertHtmlAtCaret('<pre><code>' + escapeHtml(text) + '</code></pre><p></p>');
        } else {
          runCommand('formatBlock', value);
        }
      }

      function applyFontSize(value) {
        runCommand('fontSize', '7');
        replaceFontTags('fontSize', value);
        setDirty(true);

      function applyFontFamily(value) {

      function toggleSourceMode() {
        var sourceBtn = document.getElementById('sourceBtn');
        if (!sourceMode) {
          clearFindHighlights();
          sourceEditor.value = prettyHtml(editor.innerHTML);
          sourceMode = true;
          editorWrap.classList.add('source-mode');

          sourceMode = false;

      function applySourceToEditor(markDirty) {
        if (!sourceEditor) return;
        editor.innerHTML = sanitizeHtml(sourceEditor.value);
        if (markDirty) setDirty(true);
        updateEditorCount();
      }

      function clearFindHighlights() {
        findHits = [];
        findHitIndex = -1;
        Array.prototype.forEach.call(editor.querySelectorAll('mark.find-hit'), function (mark) {
          mark.replaceWith(document.createTextNode(mark.textContent));
        });
        editor.normalize();
      }

      function markFindText(term) {
        clearFindHighlights();
        term = String(term || '');
        if (!term) return 0;
        var walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, {
          acceptNode: function (node) {
            if (!node.nodeValue || node.nodeValue.indexOf(term) < 0) return NodeFilter.FILTER_REJECT;
            if (closestElement(node, 'script,style,mark')) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });
        var textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(function (node) {
          var parts = node.nodeValue.split(term);
          var frag = document.createDocumentFragment();
          parts.forEach(function (part, i) {
            if (part) frag.appendChild(document.createTextNode(part));
            if (i < parts.length - 1) {
              var mark = document.createElement('mark');
              mark.className = 'find-hit';
              mark.textContent = term;
              frag.appendChild(mark);
            }
          });
          node.parentNode.replaceChild(frag, node);
        });
        findHits = Array.prototype.slice.call(editor.querySelectorAll('mark.find-hit'));
        if (findHits.length) {
          findHitIndex = 0;
          findHits[0].classList.add('current');
          findHits[0].scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
        return findHits.length;
      }

      function replaceText(findText, replaceText) {
        if (!findText) return 0;
        clearFindHighlights();
        var count = 0;
        var walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, null);
        var nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(function (node) {
          if (node.nodeValue.indexOf(findText) >= 0) {
            count += node.nodeValue.split(findText).length - 1;
            node.nodeValue = node.nodeValue.split(findText).join(replaceText);
          }
        });
        if (count) setDirty(true);
        updateEditorCount();
        return count;
      }

      function buildTable(rows, cols) {
        rows = Math.max(1, Math.min(30, parseInt(rows, 10) || 3));
        cols = Math.max(1, Math.min(12, parseInt(cols, 10) || 3));
        var html = '<table><tbody>';
        for (var r = 0; r < rows; r++) {
          html += '<tr>';
          for (var c = 0; c < cols; c++) {
            html += (r === 0 ? '<th>标题</th>' : '<td><br></td>');
          }
          html += '</tr>';
        }
        html += '</tbody></table><p></p>';
        return html;
      }

      function activeCell() {
        return selectedElement('td,th');
      }

      function tableAction(action) {
        var cell = activeCell();
        if (!cell) { setStatus('请先把光标放到表格单元格中。'); return; }
        var row = cell.parentElement;
        var table = closestElement(cell, 'table');
        var cellIndex = Array.prototype.indexOf.call(row.children, cell);
        if (action === 'rowBefore' || action === 'rowAfter') {
          var newRow = row.cloneNode(true);
          Array.prototype.forEach.call(newRow.children, function (td) { td.innerHTML = '<br>'; });
          if (action === 'rowBefore') row.parentNode.insertBefore(newRow, row);
          else row.parentNode.insertBefore(newRow, row.nextSibling);
        } else if (action === 'colBefore' || action === 'colAfter') {
          Array.prototype.forEach.call(table.rows, function (tr) {
            var ref = tr.children[cellIndex];
            var newCell = ref.cloneNode(false);
            newCell.innerHTML = '<br>';
            if (action === 'colBefore') tr.insertBefore(newCell, ref);
            else tr.insertBefore(newCell, ref ? ref.nextSibling : null);
          });
        } else if (action === 'deleteRow') {
          if (table.rows.length <= 1) table.remove();
          else row.remove();
        } else if (action === 'deleteCol') {
          Array.prototype.forEach.call(table.rows, function (tr) {
            if (tr.children[cellIndex]) tr.children[cellIndex].remove();
          });
          if (table.rows[0] && table.rows[0].children.length === 0) table.remove();
        } else if (action === 'deleteTable') {
          table.remove();
        }
        setDirty(true);
        updateEditorCount();
      }

      function insertLocalImage(file) {

        if (!/^image\//i.test(file.type || '')) { setStatus('请选择图片文件。'); return; }

        reader.onload = function () {

        reader.onerror = function () { setStatus('读取图片失败。'); };
        reader.readAsDataURL(file);
      }

          + body.trim() + '\n'
          + '  </main>\n'
          + '</body>\n'
          + '</html>\n';
      }

      function parentPageBody(node) {
        var childLinks = (node.children || []).map(function (child) {
          return '<li><a href="' + encodeURIComponent(child.file).replace(/%2F/g, '/') + '">' + escapeHtml(child.title || child.file) + '</a></li>';
        }).join('\n');
        return '<h1>' + escapeHtml(node.title || '未命名') + '</h1>\n'
          + (childLinks ? '<h2>子页面</h2>\n<ul>\n' + childLinks + '\n</ul>' : '<p></p>');
      }

      function mergeIntoLoadedHtml(title, body) {
        if (!loadedHtml) return pageTemplate(title, body);
        try {
          var doc = new DOMParser().parseFromString(loadedHtml, 'text/html');
          var titleEl = doc.querySelector('title');
          if (titleEl) titleEl.textContent = title;
          if (loadedUsesConfluenceContent) {
            var content = doc.querySelector('[data-confluence-content]');
            if (content) {
              content.innerHTML = body;
              return '<!doctype html>\n' + doc.documentElement.outerHTML + '\n';
            }
          }
          if (doc.body) {
            doc.body.innerHTML = body;
            return '<!doctype html>\n' + doc.documentElement.outerHTML + '\n';
          }
        } catch (e) {}
        return pageTemplate(title, body);
      }

      async function saveCurrentPage(options) {
        options = options || {};
        var hit = current();
        if (!hit) return false;
        hit.node.title = pageTitle.value.trim() || '未命名';
        hit.node.file = normalizeFileName(pageFile.value || hit.node.title);
        pageFile.value = hit.node.file;
        await writeTreeFile();
        renderTree();
        var html = mergeIntoLoadedHtml(hit.node.title, getCurrentBodyHtml());
        if (!confluenceHandle || !supportsDirectory) {
          if (!options.requireWritable) {
            downloadFile(hit.node.file, html);
            setDirty(false);
          }
          showAuthGate(options.requireWritable ? '需要授权 confluence/ 目录后才能自动保存。' : '尚未授权 confluence/ 目录，已下载：' + hit.node.file);
          return false;
        }
        try {
          await saveMissingAncestorPages(hit.node.id);
          var fileHandle = await confluenceHandle.getFileHandle(hit.node.file, { create: true });
          var writable = await fileHandle.createWritable();
          await writable.write(html);
          await writable.close();
          setDirty(false);
          if (!options.silent) setStatus('已保存到 confluence/' + hit.node.file);
          return true;
        } catch (err) {
          setStatus('保存失败：' + (err && err.message ? err.message : err));
          return false;
        }
      }

      async function saveMissingAncestorPages(nodeId) {
        var chain = pathToNode(nodeId);
        if (chain.length <= 1 || !confluenceHandle || !supportsDirectory) return;
        for (var i = 0; i < chain.length - 1; i++) {
          var node = chain[i];
          node.file = normalizeFileName(node.file || node.title);
          var existing = await getFileText(node.file);
          if (existing != null) continue;
          var html = pageTemplate(node.title || '未命名', parentPageBody(node));
          var fileHandle = await confluenceHandle.getFileHandle(node.file, { create: true });
          var writable = await fileHandle.createWritable();
          await writable.write(html);
          await writable.close();
        }
      }

      async function saveAllMissingTreePages() {
        if (!confluenceHandle || !supportsDirectory) return false;
        var nodes = [];
        walk(tree, function (node) { nodes.push(node); });
        for (var i = 0; i < nodes.length; i++) {
          var node = nodes[i];
          node.file = normalizeFileName(node.file || node.title);
          var existing = await getFileText(node.file);
          if (existing != null) continue;
          var body = (node.children && node.children.length)
            ? parentPageBody(node)
            : '<h1>' + escapeHtml(node.title || '未命名') + '</h1>\n<p></p>';
          var html = pageTemplate(node.title || '未命名', body);
          var fileHandle = await confluenceHandle.getFileHandle(node.file, { create: true });
          var writable = await fileHandle.createWritable();
          await writable.write(html);
          await writable.close();
        }
        return true;
      }

      async function saveEverythingBeforeLeave() {
        if (!confluenceHandle || !supportsDirectory) {
          showAuthGate('需要授权 confluence/ 目录后才能自动保存并返回主页。');
          return false;
        }
        var saved = await saveCurrentPage({ silent: true, requireWritable: true });
        if (!saved) return false;
        await saveAllMissingTreePages();
        await writeTreeFile();
        setStatus('已保存所有 confluence 页面。');
        return true;
      }

      function normalizeFileName(value) {
        var name = slugify(value);
        return /\.html?$/i.test(name) ? name : name + '.html';
      }

      function downloadFile(name, text) {
        var blob = new Blob([text], { type: 'text/html;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = name;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      async function addNode(parent) {
        var title = prompt('新页面标题：', '新页面');
        if (!title) return;
        var node = { id: uid(), title: title.trim(), file: uniqueFileName(title), children: [] };
        if (parent) {
          parent.children = parent.children || [];
          parent.children.push(node);
        } else {
          tree.push(node);
        }
        await writeTreeFile();
        renderTree();
        var selected = await selectNode(node.id);
        if (selected) setDirty(true);
      }

      async function renameNode() {
        var hit = current();
        if (!hit) return;
        var title = prompt('节点名称：', hit.node.title || '');
        if (!title) return;
        hit.node.title = title.trim();
        pageTitle.value = hit.node.title;
        await writeTreeFile();
        renderTree();
        setDirty(true);
      }

      async function deleteNode() {
        var hit = current();
        if (!hit) return;
        if (!confirm('删除树节点？不会自动删除已经保存到磁盘的 HTML 文件。')) return;
        var list = hit.parent ? hit.parent.children : tree;
        list.splice(list.indexOf(hit.node), 1);
        selectedId = tree[0] && tree[0].id;
        await writeTreeFile();
        renderTree();
        if (selectedId) selectNode(selectedId);
        else {
          pageTitle.value = '';
          pageFile.value = '';
          editor.innerHTML = '';
          setStatus('页面树为空，请添加根节点。');
        }
      }

      async function chooseRoot() {
        if (!supportsDirectory) {
          setStatus('当前浏览器不支持选择目录。请用最新版 Chrome 或 Edge 打开本页面。');
          return;
        }
        try {
          var picked = await window.showDirectoryPicker({ mode: 'readwrite' });
          if (picked && picked.name && picked.name !== 'confluence') {
            setStatus('请选择 confluence.html 所在目录旁边的 confluence 文件夹。当前选择的是：' + picked.name);
            return;
          }
          confluenceHandle = picked;
          await saveStoredDirectoryHandle(confluenceHandle);
          rootState.textContent = 'confluence/';
          hideAuthGate();
          setStatus('已授权 confluence/ 目录。之后保存会直接写入该目录。');
          try {
            var treeText = await getFileText(TREE_FILE_NAME);
            if (treeText) {
              var parsed = JSON.parse(treeText);
              if (Array.isArray(parsed) && parsed.length) {
                tree = parsed;
                selectedId = selectedId || (tree[0] && tree[0].id);
                saveTree();
                renderTree();
              }
            } else {
              await writeTreeFile();
            }
          } catch (e) {}
          var hit = current();
          if (hit) loadPageFile(hit.node);
        } catch (err) {
          if (err && err.name !== 'AbortError') setStatus('选择目录失败：' + (err.message || err));
        }
      }

      function runCommand(cmd, value) {
        if (sourceMode && cmd !== 'undo' && cmd !== 'redo') return;
        editor.focus();
        restoreSelection();
        try {
          if (cmd === 'formatBlock') document.execCommand(cmd, false, '<' + value + '>');
          else document.execCommand(cmd, false, value || null);
        } catch (e) {
          setStatus('当前浏览器不支持此编辑命令：' + cmd);
        }
        setDirty(true);
        updateEditorCount();
        setTimeout(updateToolbarState, 0);
      }

      function updateToolbarState() {
        ['bold', 'italic', 'underline', 'strikeThrough', 'insertUnorderedList', 'insertOrderedList'].forEach(function (cmd) {
          Array.prototype.forEach.call(document.querySelectorAll('[data-cmd="' + cmd + '"]'), function (btn) {
            try { btn.classList.toggle('active', document.queryCommandState(cmd)); } catch (e) {}
          });
        });
      }

      function initEvents() {
        authGateBtn.addEventListener('click', chooseRoot);
        document.getElementById('saveBtn').addEventListener('click', saveCurrentPage);
        document.getElementById('homeBtn').addEventListener('click', async function (event) {
          event.preventDefault();
          var ok = await saveEverythingBeforeLeave();
          if (ok) {
            alert('confluence 页面已保存。\n\n请手动运行 confluence\\git.bat 提交并推送 confluence 目录变更。');
            window.location.href = 'index.html';
          }
        });
        document.getElementById('addChildBtn').addEventListener('click', function () {
          var hit = current();
          addNode(hit && hit.node);
        });
        document.getElementById('addRootBtn').addEventListener('click', function () { addNode(null); });
        document.getElementById('renameBtn').addEventListener('click', renameNode);
        document.getElementById('deleteBtn').addEventListener('click', deleteNode);

        Array.prototype.forEach.call(document.querySelectorAll('[data-cmd]'), function (button) {
          button.addEventListener('click', function () {
            runCommand(button.getAttribute('data-cmd'));
          });
        });

        document.getElementById('formatSelect').addEventListener('change', function () { setFormatBlock(this.value); });
        document.getElementById('fontFamilySelect').addEventListener('change', function () { applyFontFamily(this.value); });
        document.getElementById('fontSizeSelect').addEventListener('change', function () { applyFontSize(this.value); });
        document.getElementById('lineHeightSelect').addEventListener('change', function () { applyBlockStyle('lineHeight', this.value); });
        document.getElementById('foreColorInput').addEventListener('input', function () { runCommand('foreColor', this.value); });
        document.getElementById('backColorInput').addEventListener('input', function () { runCommand('hiliteColor', this.value); });
        document.getElementById('clearFormatBtn').addEventListener('click', function () { runCommand('removeFormat'); });

        document.getElementById('linkBtn').addEventListener('click', function () {
          var existing = selectedElement('a');
          var url = prompt('链接地址：', existing ? existing.getAttribute('href') : 'https://');
          url = sanitizeUrl(url);
          if (url) runCommand('createLink', url);
        });
        document.getElementById('unlinkBtn').addEventListener('click', function () { runCommand('unlink'); });
        document.getElementById('imageBtn').addEventListener('click', function () {
          var url = sanitizeUrl(prompt('图片地址或相对路径：', ''));
          if (url) insertHtmlAtCaret('<p><img src="' + escapeAttr(url) + '" alt=""></p>');
        });
        document.getElementById('imageFileBtn').addEventListener('click', function () { document.getElementById('imageFileInput').click(); });
        document.getElementById('imageFileInput').addEventListener('change', function () {
          insertLocalImage(this.files && this.files[0]);
          this.value = '';
        });
        document.getElementById('hrBtn').addEventListener('click', function () { insertHtmlAtCaret('<hr><p></p>'); });
        document.getElementById('calloutBtn').addEventListener('click', function () {
          insertHtmlAtCaret('<div class="callout"><strong>提示</strong><p>在这里输入提示内容。</p></div><p></p>');
        });
        document.getElementById('taskBtn').addEventListener('click', function () {
          insertHtmlAtCaret('<div class="task-line"><span class="task-box"></span><span class="task-text">待办事项</span></div>');
        });
        document.getElementById('tableBtn').addEventListener('click', insertTableDialog);
        Array.prototype.forEach.call(document.querySelectorAll('[data-table]'), function (button) {
          button.addEventListener('click', function () { tableAction(button.getAttribute('data-table')); });
        });
        document.getElementById('findBtn').addEventListener('click', function () {
          var term = prompt('查找内容：', '');
          if (term == null) return;
          var count = markFindText(term);
          setStatus(count ? ('找到 ' + count + ' 处：' + term) : ('未找到：' + term));
        });
        document.getElementById('replaceBtn').addEventListener('click', function () {
          var from = prompt('查找内容：', '');
          if (!from) return;
          var to = prompt('替换为：', '');
          if (to == null) return;
          var count = replaceText(from, to);
          setStatus('已替换 ' + count + ' 处。');
        });
        document.getElementById('sourceBtn').addEventListener('click', toggleSourceMode);

        editor.addEventListener('input', function () { setDirty(true); updateEditorCount(); });
        editor.addEventListener('mouseup', function () { saveSelection(); updateToolbarState(); });
        editor.addEventListener('keyup', function () { saveSelection(); updateToolbarState(); updateEditorCount(); });
        editor.addEventListener('focus', saveSelection);
        editor.addEventListener('click', function (event) { toggleTaskLine(event.target); });
        editor.addEventListener('paste', function (event) {
          event.preventDefault();
          var data = event.clipboardData || window.clipboardData;
          var html = data && data.getData('text/html');
          var text = data && data.getData('text/plain');
          if (html) insertHtmlAtCaret(sanitizeHtml(html));
          else if (text) insertHtmlAtCaret('<p>' + escapeHtml(text).replace(/\n{2,}/g, '</p><p>').replace(/\n/g, '<br>') + '</p>');
        });
        sourceEditor.addEventListener('input', function () { setDirty(true); updateEditorCount(); });
        pageTitle.addEventListener('input', function () { setDirty(true); });
        pageFile.addEventListener('input', function () { setDirty(true); });
        document.addEventListener('keydown', function (event) {
          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
            event.preventDefault();
            saveCurrentPage();
          }
          if (!sourceMode && event.key === 'Tab' && document.activeElement === editor) {
            event.preventDefault();
            runCommand(event.shiftKey ? 'outdent' : 'indent');
          }
          if (event.key === 'Escape') clearFindHighlights();
        });
        window.addEventListener('beforeunload', function (event) {
          if (!dirty) return;
          event.preventDefault();
          event.returnValue = '';
        });
      }

      async function init() {
        supportNote.textContent = supportsDirectory
          ? '固定页面库：confluence/。如果浏览器还没有保存授权，页面会自动要求授权 confluence 文件夹；授权后会自动复用。'
          : '当前浏览器不支持直接保存到本地目录。请用最新版 Chrome 或 Edge 打开本页面。';
        initEvents();
        confluenceHandle = await loadStoredDirectoryHandle();
        var publishedTree = await loadPublishedTree();
        tree = publishedTree || loadStoredTree() || defaultTree();
        selectedId = localStorage.getItem(SELECTED_KEY) || (tree[0] && tree[0].id);
        saveTree();
        renderTree();
        if (confluenceHandle) {
          rootState.textContent = 'confluence/';
          setStatus('已恢复 confluence/ 目录授权。');
          hideAuthGate();
          try {
            var treeText = await getFileText(TREE_FILE_NAME);
            if (treeText) {
              var parsed = JSON.parse(treeText);
              if (Array.isArray(parsed) && parsed.length) {
                tree = parsed;
                selectedId = localStorage.getItem(SELECTED_KEY) || (tree[0] && tree[0].id);
                saveTree();
                renderTree();
              }
            } else {
              await writeTreeFile();
            }
          } catch (e) {}
        } else if (supportsDirectory) {
          showAuthGate('需要授权 confluence/ 目录后才能直接保存。');
        }
        if (selectedId) selectNode(selectedId);
      }

      window.__confluenceEditorTest = {
        insertTable: function (rows, cols) { insertHtmlAtCaret(buildTable(rows || 2, cols || 2)); },
        toggleSource: toggleSourceMode,
        getBodyHtml: getCurrentBodyHtml,
        sanitizeHtml: sanitizeHtml,
        replaceText: replaceText
      };

      init();
    })();
  </script>
</body>
</html>
