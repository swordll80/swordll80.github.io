      function closeConflictDialog() {
        document.getElementById('conflictOverlay').classList.remove('show');
        if (conflictState) {
          var st = conflictState;
          conflictState = null;
          st.reject(new Error('Conflict dialog closed by user'));
        }
      }

      // --- Diff comparison for conflict editors ---
      var conflictDiffRanges = [];
      var conflictDiffIndex = -1;

      // Compute text diffs between two strings at word granularity.
      // Returns array of { leftStart, leftEnd, rightStart, rightEnd, leftText, rightText } for differing segments.
      // Positions are character offsets in the ORIGINAL strings, suitable for TreeWalker seek.
      function computeTextDiffs(textA, textB) {
        var result = [];
        // Split original strings into word+whitespace tokens, preserving original positions
        var tokensA = tokenizeWithPositions(textA);
        var tokensB = tokenizeWithPositions(textB);

        var i = 0, j = 0;
        var lastMatchEndA = 0, lastMatchEndB = 0;

        while (i < tokensA.length || j < tokensB.length) {
          // Try to match current tokens (case-sensitive, exact word match)
          if (i < tokensA.length && j < tokensB.length && tokensA[i].text === tokensB[j].text) {
            // Match: advance both
            lastMatchEndA = tokensA[i].end;
            lastMatchEndB = tokensB[j].end;
            i++; j++;
          } else {
            // We have a difference. Find how far until the next match.
            // Look ahead up to 30 tokens for a resync point.
            var bestSkipA = -1, bestSkipB = -1, bestScore = Infinity;
            for (var lookA = 1; lookA <= 30 && (i + lookA) <= tokensA.length; lookA++) {
              for (var lookB = 1; lookB <= 30 && (j + lookB) <= tokensB.length; lookB++) {
                if (tokensA[i + lookA - 1].text === tokensB[j + lookB - 1].text) {
                  var score = lookA + lookB; // prefer fewer skipped tokens
                  if (score < bestScore) {
                    bestScore = score;
                    bestSkipA = lookA;
                    bestSkipB = lookB;
                  }
                  break;
                }
              }
            }

            if (bestSkipA > 0 && bestSkipB > 0) {
              // Found a resync point: the diff spans [lastMatchEnd, resyncStart)
              var diffEndA = tokensA[i + bestSkipA - 1].start; // start of the matched token
              var diffEndB = tokensB[j + bestSkipB - 1].start;
              result.push({
                leftStart: lastMatchEndA, leftEnd: diffEndA,
                rightStart: lastMatchEndB, rightEnd: diffEndB,
                leftText: textA.substring(lastMatchEndA, diffEndA),
                rightText: textB.substring(lastMatchEndB, diffEndB)
              });
              // Advance to the matched token
              i += bestSkipA;
              j += bestSkipB;
              lastMatchEndA = tokensA[i - 1].end;
              lastMatchEndB = tokensB[j - 1].end;
            } else {
              // No resync found: everything remaining is different
              var tailEndA = i < tokensA.length ? tokensA[tokensA.length - 1].end : lastMatchEndA;
              var tailEndB = j < tokensB.length ? tokensB[tokensB.length - 1].end : lastMatchEndB;
              if (tailEndA > lastMatchEndA || tailEndB > lastMatchEndB) {
                result.push({
                  leftStart: lastMatchEndA, leftEnd: tailEndA,
                  rightStart: lastMatchEndB, rightEnd: tailEndB,
                  leftText: textA.substring(lastMatchEndA, tailEndA),
                  rightText: textB.substring(lastMatchEndB, tailEndB)
                });
              }
              break;
            }
          }
        }
        return result;
      }

      // Tokenize a string into { text, start, end } chunks (words and whitespace separately)
      function tokenizeWithPositions(str) {
        var tokens = [];
        var re = /(\S+|\s+)/g;
        var m;
        while ((m = re.exec(str))) {
          tokens.push({ text: m[1], start: m.index, end: m.index + m[1].length });
        }
        return tokens;
      }

      // Find the text node at a given character offset within an element's textContent
      function findTextNodeAtOffset(root, offset) {
        var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
        var currentOffset = 0;
        var node;
        while ((node = walker.nextNode())) {
          var len = node.textContent.length;
          if (currentOffset + len > offset) {
            return { node: node, offset: offset - currentOffset };
          }
          currentOffset += len;
        }
        // Fallback: return last text node
        return { node: node, offset: node ? node.textContent.length : 0 };
      }

      // Clear all existing diff highlights in both editors
      function clearDiffHighlights() {
        var leftEditor = document.getElementById('conflictLeftEditor');
        var rightEditor = document.getElementById('conflictRightEditor');
        [leftEditor, rightEditor].forEach(function (editor) {
          if (!editor) return;
          var marks = editor.querySelectorAll('mark.conflict-diff-mark');
          for (var m = 0; m < marks.length; m++) {
            var parent = marks[m].parentNode;
            while (marks[m].firstChild) {
              parent.insertBefore(marks[m].firstChild, marks[m]);
            }
            parent.removeChild(marks[m]);
            parent.normalize();
          }
        });
      }

      // Highlight the diff at given index in both editors, scroll into view
      function highlightDiff(index) {
        if (index < 0 || index >= conflictDiffRanges.length) return;

        clearDiffHighlights();
        var diff = conflictDiffRanges[index];
        var leftEditor = document.getElementById('conflictLeftEditor');
        var rightEditor = document.getElementById('conflictRightEditor');

        // Highlight left side
        if (leftEditor && diff.leftStart < diff.leftEnd) {
          var leftInfo = findTextNodeAtOffset(leftEditor, diff.leftStart);
          var leftEndInfo = findTextNodeAtOffset(leftEditor, diff.leftEnd);
          if (leftInfo.node && leftEndInfo.node) {
            try {
              var leftRange = document.createRange();
              leftRange.setStart(leftInfo.node, leftInfo.offset);
              leftRange.setEnd(leftEndInfo.node, leftEndInfo.offset);
              var leftMark = document.createElement('mark');
              leftMark.className = 'conflict-diff-mark current';
              leftRange.surroundContents(leftMark);
              leftMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } catch (e) { /* ignore range errors */ }
          }
        }

        // Highlight right side
        if (rightEditor && diff.rightStart < diff.rightEnd) {
          var rightInfo = findTextNodeAtOffset(rightEditor, diff.rightStart);
          var rightEndInfo = findTextNodeAtOffset(rightEditor, diff.rightEnd);
          if (rightInfo.node && rightEndInfo.node) {
            try {
              var rightRange = document.createRange();
              rightRange.setStart(rightInfo.node, rightInfo.offset);
              rightRange.setEnd(rightEndInfo.node, rightEndInfo.offset);
              var rightMark = document.createElement('mark');
              rightMark.className = 'conflict-diff-mark current';
              rightRange.surroundContents(rightMark);
              rightMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } catch (e) { /* ignore range errors */ }
          }
        }

        // Update counter display
        document.getElementById('conflictDiffCounter').textContent = (index + 1) + '/' + conflictDiffRanges.length;
      }

      // Initialize diff comparison for the current conflict
      function initConflictDiff() {
        conflictDiffRanges = [];
        conflictDiffIndex = -1;
        var leftEditor = document.getElementById('conflictLeftEditor');
        var rightEditor = document.getElementById('conflictRightEditor');
        var diffCol = document.getElementById('conflictDiffCol');
        var conflictBody = document.querySelector('.conflict-body');
        if (!leftEditor || !rightEditor || !diffCol) return;

        var leftText = (leftEditor.textContent || '').trim();
        var rightText = (rightEditor.textContent || '').trim();
        if (!leftText && !rightText) { diffCol.style.display = 'none'; return; }
        if (leftText === rightText) { diffCol.style.display = 'none'; return; }

        conflictDiffRanges = computeTextDiffs(leftText, rightText);
        if (conflictDiffRanges.length === 0) { diffCol.style.display = 'none'; return; }

        // Switch to three-column layout for diff navigation
        if (conflictBody) conflictBody.style.gridTemplateColumns = '1fr auto 1fr';
        conflictDiffIndex = 0;
        diffCol.style.display = 'flex';
        document.getElementById('conflictDiffCounter').textContent = '1/' + conflictDiffRanges.length;
        highlightDiff(0);
      }

      // Navigate to previous/next diff
      function navigateDiff(delta) {
        if (conflictDiffRanges.length === 0) return;
        var newIndex = conflictDiffIndex + delta;
        if (newIndex < 0) newIndex = conflictDiffRanges.length - 1;
        if (newIndex >= conflictDiffRanges.length) newIndex = 0;
        conflictDiffIndex = newIndex;
        highlightDiff(newIndex);
      }

      // Returns a promise: resolves with { html, title } object, or rejects if user cancels
      function resolveConflict(fileName, title, myHtml, diskHtml, diskTime, myTime, titleConflict, deleted) {
        return new Promise(function (resolve, reject) {
          conflictState = {
            resolve: resolve, reject: reject,
            file: fileName, title: title,
            myHtml: myHtml, diskHtml: diskHtml,
            titleConflict: titleConflict || null,
            resolvedTitle: titleConflict ? titleConflict.myTitle : title,
            deleted: deleted || false
          };
          showConflictDialog(fileName, title, myHtml, diskHtml, diskTime, myTime, titleConflict, deleted);
        });
      }

      // Check for conflict and return { conflict: bool, diskText, diskTime, deleted: bool }
      async function detectConflict(fileName) {
        if (!confluenceHandle || !supportsDirectory || loadedFileLastModified <= 0) {
          return { conflict: false, diskText: null, diskTime: 0, deleted: false };
        }
        try {
          var result = await getFileText(fileName);
          if (result && result.lastModified && result.lastModified > loadedFileLastModified) {
            return { conflict: true, diskText: result.text, diskTime: result.lastModified, deleted: false };
          }
        } catch (e) {
          // File may have been deleted externally
          if (e && (e.name === 'NotFoundError' || String(e).indexOf('NotFound') >= 0 || String(e).indexOf('not found') >= 0)) {
            return { conflict: true, diskText: null, diskTime: Date.now(), deleted: true };
          }
        }
        return { conflict: false, diskText: null, diskTime: 0, deleted: false };
      }

      // Check for tree.json title conflict and return { conflict: bool, diskTitle, diskTime }
      async function detectTreeConflict(nodeId) {
        if (!confluenceHandle || !supportsDirectory || loadedTreeLastModified <= 0) {
          return { conflict: false, diskTitle: null, diskTime: 0 };
        }
        try {
          var result = await getFileText(TREE_FILE_NAME);
          if (result && result.lastModified && result.lastModified > loadedTreeLastModified) {
            var parsed = JSON.parse(result.text);
            var diskNode = findNodeById(parsed, nodeId);
            if (diskNode) {
              return { conflict: true, diskTitle: diskNode.title || '', diskTime: result.lastModified };
            }
          }
        } catch (e) {}
        return { conflict: false, diskTitle: null, diskTime: 0 };
      }

      async function saveCurrentPage(options) {
        options = options || {};
        var hit = current();
        if (!hit) return false;
        var myTitle = pageTitle.value.trim() || '未命名';
        var myFile = normalizeFileName(pageFile.value || myTitle);
        pageFile.value = myFile;

        // Build my HTML before any disk writes
        var myHtml = mergeIntoLoadedHtml(myTitle, getCurrentBodyHtml());
        if (!confluenceHandle || !supportsDirectory) {
          if (!options.requireWritable) {
            downloadFile(myFile, myHtml);
            setDirty(false);
          }
          showAuthGate(options.requireWritable ? '需要授权 confluence/ 目录后才能自动保存。' : '尚未授权 confluence/ 目录，已下载：' + myFile);
          return false;
        }
        try {
          await saveMissingAncestorPages(hit.node.id);

          // --- Step 1: Detect tree.json title conflict ---
          var treeConflict = await detectTreeConflict(hit.node.id);
          var titleConflict = null;
          if (treeConflict.conflict && treeConflict.diskTitle !== myTitle) {
            titleConflict = { myTitle: myTitle, diskTitle: treeConflict.diskTitle, diskTime: treeConflict.diskTime };
          }

          // --- Step 2: Detect HTML file content conflict ---
          var htmlConflict = await detectConflict(myFile);
          var hasHtmlConflict = htmlConflict.conflict;

          // --- Step 3: If any conflict exists, show resolution dialog ---
          if (hasHtmlConflict || titleConflict) {
            var diskHtml = htmlConflict.diskText || myHtml;
            var diskTime = htmlConflict.diskTime || (titleConflict ? titleConflict.diskTime : Date.now());
            try {
              var result = await resolveConflict(myFile, myTitle, myHtml, diskHtml, diskTime, loadedFileLastModified, titleConflict, htmlConflict.deleted);
              if (result != null) {
                console.log('[CONFLICT] 保存路径收到结果: title=' + result.title + ' htmlLen=' + (result.html ? result.html.length : 0) + ' htmlEmpty=' + (!result.html));
                // Resolve title conflict: update node title and write tree.json
                var resolvedTitle = result.title || myTitle;
                console.log('[CONFLICT] 保存路径写入tree: nodeId=' + hit.node.id + ' oldTitle=' + hit.node.title + ' newTitle=' + resolvedTitle);
                hit.node.title = resolvedTitle;
                hit.node.file = myFile;
                await writeTreeFile();
                console.log('[CONFLICT] 保存路径tree写入完成, 验证title=' + hit.node.title);
                loadedTreeLastModified = Date.now();
                renderTree();

                // Merge the resolved title into the HTML
                var extractedBody = extractEditableHtml(result.html);
                console.log('[CONFLICT] 提取body长度=' + (extractedBody ? extractedBody.length : 0) + ' loadedUsesConfluenceContent=' + loadedUsesConfluenceContent);
                var finalHtml = mergeIntoLoadedHtml(resolvedTitle, extractedBody);
                console.log('[CONFLICT] 最终HTML长度=' + (finalHtml ? finalHtml.length : 0));

                // Write the HTML file
                var fileHandle = await confluenceHandle.getFileHandle(myFile, { create: true });
                var writable = await fileHandle.createWritable();
                await writable.write(finalHtml);
                await writable.close();
                loadedFileLastModified = Date.now();
                // Reload editor from the saved result
                loadedHtml = finalHtml;
                setEditorHtml(extractEditableHtml(finalHtml));
                pageTitle.value = resolvedTitle;
                pageFile.value = myFile;
                setDirty(false);
                if (!options.silent) setStatus('已解决冲突并保存到 confluence/' + myFile);
                return true;
              }
            } catch (err) {
              if (err && err.message === 'Conflict dialog closed by user') {
                setStatus('冲突解决已取消。');
              } else {
                setStatus('冲突解决失败：' + (err && err.message ? err.message : err));
              }
              return false;
            }
            return false;
          }

          // --- No conflict: write tree.json then HTML ---
          hit.node.title = myTitle;
          hit.node.file = myFile;
          await writeTreeFile();
          loadedTreeLastModified = Date.now();
          renderTree();

          var fileHandle = await confluenceHandle.getFileHandle(myFile, { create: true });
          var writable = await fileHandle.createWritable();
          await writable.write(myHtml);
          await writable.close();
          loadedFileLastModified = Date.now();
          setDirty(false);
          if (!options.silent) setStatus('已保存到 confluence/' + myFile);
          return true;
        } catch (err) {
          setStatus('保存失败：' + (err && err.message ? err.message : err));
          return false;
        }
      }

      async function saveMissingAncestorPages(nodeId) {
        var chain = pathToNode(nodeId);
        if (chain.length <= 1 || !confluenceHandle || !supportsDirectory) return;
        for (var i = 0; i < chain.length - 1; i++) {
          var node = chain[i];
          node.file = normalizeFileName(node.file || node.title);
          var existing = await getFileText(node.file);
          if (existing != null && existing.text != null) continue;
          var html = pageTemplate(node.title || '未命名', parentPageBody(node));
          var fileHandle = await confluenceHandle.getFileHandle(node.file, { create: true });
          var writable = await fileHandle.createWritable();
          await writable.write(html);
          await writable.close();
        }
      }

      async function saveAllMissingTreePages() {
        if (!confluenceHandle || !supportsDirectory) return false;
        var nodes = [];
        walk(tree, function (node) { nodes.push(node); });
        for (var i = 0; i < nodes.length; i++) {
          var node = nodes[i];
          node.file = normalizeFileName(node.file || node.title);
          var existing = await getFileText(node.file);
          if (existing != null && existing.text != null) continue;
          var body = (node.children && node.children.length)
            ? parentPageBody(node)
            : '<h1>' + escapeHtml(node.title || '未命名') + '</h1>\n<p></p>';
          var html = pageTemplate(node.title || '未命名', body);
          var fileHandle = await confluenceHandle.getFileHandle(node.file, { create: true });
          var writable = await fileHandle.createWritable();
          await writable.write(html);
          await writable.close();
        }
        return true;
      }

      async function saveEverythingBeforeLeave() {
        if (!confluenceHandle || !supportsDirectory) {
          showAuthGate('需要授权 confluence/ 目录后才能自动保存并返回主页。');
          return false;
        }
        var saved = await saveCurrentPage({ silent: true, requireWritable: true });
        if (!saved) return false;
        await saveAllMissingTreePages();
        await writeTreeFile();
        setStatus('已保存所有 confluence 页面。');
        return true;
      }

      function parseTreeDataJs(text) {
        var m = text.match(/window\.__TREE_DATA__\s*=\s*(\[[\s\S]*\])\s*;?\s*$/);
        if (m) return JSON.parse(m[1]);
        return JSON.parse(text);
      }

      function normalizeFileName(value) {
        var name = slugify(value);
        return /\.html?$/i.test(name) ? name : name + '.html';
      }

      function downloadFile(name, text) {
        var blob = new Blob([text], { type: 'text/html;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = name;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      async function addNode(parent) {
        var title = prompt('新页面标题：', '新页面');
        if (!title) return;
        var node = { id: uid(), title: title.trim(), file: uniqueFileName(title), children: [] };
        if (parent) {
          parent.children = parent.children || [];
          parent.children.push(node);
        } else {
          tree.push(node);
        }
        await writeTreeFile();
        renderTree();
        var selected = await selectNode(node.id);
        if (selected) setDirty(true);
      }

      async function renameNode() {
        var hit = current();
        if (!hit) return;
        var title = prompt('节点名称：', hit.node.title || '');
        if (!title) return;
        hit.node.title = title.trim();
        pageTitle.value = hit.node.title;
        await writeTreeFile();
        renderTree();
        setDirty(true);
      }

      async function deleteNode() {
        var hit = current();
        if (!hit) return;
        if (!confirm('删除树节点？不会自动删除已经保存到磁盘的 HTML 文件。')) return;
        var list = hit.parent ? hit.parent.children : tree;
        list.splice(list.indexOf(hit.node), 1);
        selectedId = tree[0] && tree[0].id;
        await writeTreeFile();
        renderTree();
        if (selectedId) selectNode(selectedId);
        else {
          pageTitle.value = '';
          pageFile.value = '';
          editor.innerHTML = '';
          setStatus('页面树为空，请添加根节点。');
        }
      }

      async function chooseRoot() {
        if (!supportsDirectory) {
          setStatus('当前浏览器不支持选择目录。请用最新版 Chrome 或 Edge 打开本页面。');
          return;
        }
        try {
          var picked = await window.showDirectoryPicker({ mode: 'readwrite' });
          if (picked && picked.name && picked.name !== 'confluence') {
            setStatus('请选择 confluence.html 所在目录旁边的 confluence 文件夹。当前选择的是：' + picked.name);
            return;
          }
          confluenceHandle = picked;
          await saveStoredDirectoryHandle(confluenceHandle);
          rootState.textContent = 'confluence/';
          hideAuthGate();
          setStatus('已授权 confluence/ 目录。之后保存会直接写入该目录。');
          try {
            var treeResult = await getFileText(TREE_FILE_NAME);
            if (treeResult && treeResult.text) {
              var parsed = parseTreeDataJs(treeResult.text);
              if (Array.isArray(parsed) && parsed.length) {
                tree = parsed;
                selectedId = selectedId || (tree[0] && tree[0].id);
                loadedTreeLastModified = treeResult.lastModified || Date.now();
                saveTree();
                renderTree();
              }
            } else {
              await writeTreeFile();
              loadedTreeLastModified = Date.now();
            }
          } catch (e) {}
          var hit = current();
          if (hit) loadPageFile(hit.node);
        } catch (err) {
          if (err && err.name !== 'AbortError') setStatus('选择目录失败：' + (err.message || err));
        }
      }

      function runCommand(cmd, value) {
        if (sourceMode && cmd !== 'undo' && cmd !== 'redo') return;
        editor.focus();
        restoreSelection();
        try {
          if (cmd === 'formatBlock') document.execCommand(cmd, false, '<' + value + '>');
          else document.execCommand(cmd, false, value || null);
        } catch (e) {
          setStatus('当前浏览器不支持此编辑命令：' + cmd);
        }
        setDirty(true);
        updateEditorCount();
        setTimeout(updateToolbarState, 0);
      }

      function updateToolbarState() {
        ['bold', 'italic', 'underline', 'strikeThrough', 'insertUnorderedList', 'insertOrderedList'].forEach(function (cmd) {
          Array.prototype.forEach.call(document.querySelectorAll('[data-cmd="' + cmd + '"]'), function (btn) {
            try { btn.classList.toggle('active', document.queryCommandState(cmd)); } catch (e) {}
          });
        });

        // Update font family dropdown based on current selection
        var fontSelect = document.getElementById('fontFamilySelect');
        if (fontSelect) {
          try {
            var sel = window.getSelection();
            if (sel && sel.rangeCount > 0) {
              var range = sel.getRangeAt(0);
              var node = range.startContainer;
              // Walk up to find the nearest element with an inline font-family style
              var el = (node.nodeType === 3) ? node.parentElement : node;
              while (el && el !== editor && !(el instanceof Element)) { el = el.parentElement; }
              if (el && el !== editor) {
                var ff = window.getComputedStyle(el).fontFamily;
                if (ff) {
                  // Try to match to a known option value
                  var normalized = ff.replace(/['"]/g, '').split(',')[0].trim().toLowerCase();
                  var matched = false;
                  for (var i = 0; i < fontSelect.options.length; i++) {
                    var optVal = fontSelect.options[i].value.replace(/['"]/g, '').split(',')[0].trim().toLowerCase();
                    if (optVal === normalized) {
                      fontSelect.value = fontSelect.options[i].value;
                      matched = true;
                      break;
                    }
                  }
                  if (!matched) fontSelect.value = '';
                }
              }
            }
          } catch (e) {}
        }

        // Update font size dropdown based on current selection
        var sizeSelect = document.getElementById('fontSizeSelect');
        if (sizeSelect) {
          try {
            var sel2 = window.getSelection();
            if (sel2 && sel2.rangeCount > 0) {
              var range2 = sel2.getRangeAt(0);
              var node2 = range2.startContainer;
              var el2 = (node2.nodeType === 3) ? node2.parentElement : node2;
              while (el2 && el2 !== editor && !(el2 instanceof Element)) { el2 = el2.parentElement; }
              if (el2 && el2 !== editor) {
                var fs = window.getComputedStyle(el2).fontSize;
                if (fs) {
                  var matched = false;
                  for (var j = 0; j < sizeSelect.options.length; j++) {
                    if (sizeSelect.options[j].value === fs) {
                      sizeSelect.value = fs;
                      matched = true;
                      break;
                    }
                  }
                  if (!matched) sizeSelect.value = '';
                }
              }
            }
          } catch (e) {}
        }
      }

      function initEvents() {
        authGateBtn.addEventListener('click', chooseRoot);

        // Mobile: completely disable editing — set editor to read-only
        var isMobile = window.matchMedia('(max-width: 900px)').matches;
        if (isMobile) {
          editor.contentEditable = 'false';
          sourceEditor.disabled = true;
        }

        // Mobile toolbar toggle
        document.getElementById('toolbarToggleBtn').addEventListener('click', function () {
          document.body.classList.toggle('toolbar-visible');
        });

        // Mobile TOC
        var mobileTocBtn = document.getElementById('mobileTocBtn');
        var mobileTocOverlay = document.getElementById('mobileTocOverlay');
        var mobileTocCloseBtn = document.getElementById('mobileTocCloseBtn');
        var mobileTocList = document.getElementById('mobileTocList');

        function closeMobileToc() {
          document.body.classList.remove('toc-open');
        }
        function openMobileToc() {
          buildMobileTOC();
          document.body.classList.add('toc-open');
        }
        mobileTocBtn.addEventListener('click', openMobileToc);
        mobileTocCloseBtn.addEventListener('click', closeMobileToc);
        mobileTocOverlay.addEventListener('click', closeMobileToc);

        function buildMobileTOC() {
          var items = [];

          // Strategy 1: h1-h6 headings
          var headings = editor.querySelectorAll('h1, h2, h3, h4, h5, h6');
          if (headings.length > 0) {
            headings.forEach(function (h, idx) {
              var id = h.id || ('toc-h-' + idx);
              if (!h.id) h.id = id;
              items.push({ id: id, text: h.textContent.trim() || '(空标题)', level: h.tagName.toLowerCase() });
            });
          }

          // Strategy 2: c.html style .section-head .title
          if (items.length === 0) {
            var sections = editor.querySelectorAll('.section-head .title');
            sections.forEach(function (titleEl, idx) {
              var section = titleEl.closest('.section');
              var id = section ? section.id : null;
              if (!id) {
                id = 'sect-' + idx;
                if (section) section.id = id;
              }
              items.push({ id: id, text: titleEl.textContent.trim() || '(空标题)', level: 'h2' });
            });
          }

          // Strategy 3: .card-head .card-title inside sections
          if (items.length === 0) {
            var cardTitles = editor.querySelectorAll('.card-head .card-title');
            cardTitles.forEach(function (titleEl, idx) {
              var card = titleEl.closest('.card');
              var id = card ? card.id : null;
              if (!id) {
                id = 'card-' + idx;
                if (card) card.id = id;
              }
              items.push({ id: id, text: titleEl.textContent.trim() || '(空标题)', level: 'h3' });
            });
          }

          mobileTocList.innerHTML = '';
          if (items.length === 0) {
            mobileTocList.innerHTML = '<div class="mobile-toc-empty">当前页面无标题</div>';
            return;
          }
          items.forEach(function (item) {
            var btn = document.createElement('button');
            btn.className = 'mobile-toc-item toc-' + item.level;
            btn.textContent = item.text;
            btn.addEventListener('click', function () {
              var target = document.getElementById(item.id);
              if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
              }
              closeMobileToc();
            });
            mobileTocList.appendChild(btn);
          });
        }

        // Conflict modal events
        document.getElementById('conflictCloseBtn').addEventListener('click', closeConflictDialog);
        document.getElementById('conflictShowHtml').addEventListener('change', updateConflictView);
        document.getElementById('conflictDiffPrev').addEventListener('click', function () { navigateDiff(-1); });
        document.getElementById('conflictDiffNext').addEventListener('click', function () { navigateDiff(1); });
        // Helper: extract <title> text from a full HTML string
        function extractTitleFromHtml(html) {
          try {
            var m = html.match(/<title[^>]*>([\s\S]*?)<\/title>/i);
            return m ? m[1].trim() : '';
          } catch (e) { return ''; }
        }

        // Helper: merge an edited body (from contenteditable) back into a full HTML template.
        // The template (fullHtml) provides <!doctype>, <html>, <head> structure.
        // The editedBody is the new innerHTML for the body (or [data-confluence-content] element).
        function mergeEditedBodyIntoHtml(fullHtml, editedBody) {
          try {
            var doc = new DOMParser().parseFromString(fullHtml, 'text/html');
            var content = doc.querySelector('[data-confluence-content]');
            if (content) {
              content.innerHTML = editedBody;
            } else if (doc.body) {
              doc.body.innerHTML = editedBody;
            }
            return '<!doctype html>\n' + doc.documentElement.outerHTML + '\n';
          } catch (e) {
            // Fallback: return edited body as-is (caller will handle via extractEditableHtml)
            return fullHtml;
          }
        }

        // Left button: use disk version (user can edit disk title and left content)
        document.getElementById('conflictUseLeftBtn').addEventListener('click', function () {
          if (conflictState) {
            // Read current editor content (user may have edited the left pane)
            var leftEditor = document.getElementById('conflictLeftEditor');
            var editedBody = leftEditor.innerHTML;
            // Merge edited body into the disk HTML template
            var html = mergeEditedBodyIntoHtml(conflictState.diskHtml, editedBody);
            // Read title from the editable input (user may have modified it)
            var diskTitle = document.getElementById('conflictDiskTitleVal').value.trim();
            if (!diskTitle) diskTitle = conflictState.title;
            console.log('[CONFLICT] 使用磁盘版本: title=' + diskTitle + ' htmlLen=' + (html ? html.length : 0) + ' titleConflict=' + !!conflictState.titleConflict);
            conflictState.resolve({ html: html, title: diskTitle });
            conflictState = null;
            document.getElementById('conflictOverlay').classList.remove('show');
          }
        });
        // Right button: use editing version (user can edit my title and right content)
        document.getElementById('conflictUseRightBtn').addEventListener('click', function () {
          if (conflictState) {
            // Read current editor content (user may have edited the right pane)
            var rightEditor = document.getElementById('conflictRightEditor');
            var editedBody = rightEditor.innerHTML;
            // Merge edited body into the editing HTML template
            var html = mergeEditedBodyIntoHtml(conflictState.myHtml, editedBody);
            // Read title from the editable input (user may have modified it)
            var myTitle = document.getElementById('conflictMyTitleVal').value.trim();
            if (!myTitle) myTitle = conflictState.title;
            console.log('[CONFLICT] 使用编辑版本: title=' + myTitle + ' htmlLen=' + (html ? html.length : 0) + ' titleConflict=' + !!conflictState.titleConflict);
            conflictState.resolve({ html: html, title: myTitle });
            conflictState = null;
            document.getElementById('conflictOverlay').classList.remove('show');
          }
        });


        // Allow keyboard shortcut: Ctrl+S inside conflict dialog saves custom
        document.getElementById('conflictOverlay').addEventListener('keydown', function (e) {
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
            e.preventDefault();
            document.getElementById('conflictUseRightBtn').click();
          }
          if (e.key === 'Escape') {
            e.preventDefault();
            closeConflictDialog();
          }
        });

        document.getElementById('saveBtn').addEventListener('click', function () {
          saveCurrentPage({ force: true });
        });
        document.getElementById('homeBtn').addEventListener('click', async function (event) {
          event.preventDefault();
          var ok = await saveEverythingBeforeLeave();
          if (ok) {
            alert('confluence 页面已保存。\n\n请手动运行 confluence\\git.bat 提交并推送 confluence 目录变更。');
            window.location.href = 'index.html';
          }
        });
        document.getElementById('addChildBtn').addEventListener('click', function () {
          var hit = current();
          addNode(hit && hit.node);
        });
        document.getElementById('addRootBtn').addEventListener('click', function () { addNode(null); });
        document.getElementById('renameBtn').addEventListener('click', renameNode);
        document.getElementById('deleteBtn').addEventListener('click', deleteNode);

        Array.prototype.forEach.call(document.querySelectorAll('[data-cmd]'), function (button) {
          button.addEventListener('click', function () {
            runCommand(button.getAttribute('data-cmd'));
          });
        });

        document.getElementById('formatSelect').addEventListener('change', function () { setFormatBlock(this.value); });

        // Font family: on focus, save old value; on change, apply.
        // Use a flag to track whether the user actually interacted with the dropdown options.
        (function () {
          var fontSelect = document.getElementById('fontFamilySelect');
          var fontFocusVal = '';
          fontSelect.addEventListener('focus', function () { fontFocusVal = this.value; });
          fontSelect.addEventListener('change', function () { applyFontFamily(this.value); });
          // When a dropdown option is clicked (even same value), the select's list
          // will fire a 'mouseup' on the option before 'blur'. We detect interaction
          // via tracking whether the select lost focus because of an option click.
          fontSelect.addEventListener('mousedown', function (e) {
            // Mark that user is interacting with the dropdown
            fontSelect.setAttribute('data-interacted', '1');
          });
          fontSelect.addEventListener('blur', function () {
            var interacted = fontSelect.getAttribute('data-interacted');
            fontSelect.removeAttribute('data-interacted');
            if (interacted === '1' && this.value === fontFocusVal && fontFocusVal) {
              // User opened dropdown and clicked an option that matches current;
              // force re-apply because the selection may contain mixed fonts.
              applyFontFamily(this.value);
            }
          });
        })();

        // Font size: same pattern
        (function () {
          var sizeSelect = document.getElementById('fontSizeSelect');
          var sizeFocusVal = '';
          sizeSelect.addEventListener('focus', function () { sizeFocusVal = this.value; });
          sizeSelect.addEventListener('change', function () { applyFontSize(this.value); });
          sizeSelect.addEventListener('mousedown', function (e) {
            sizeSelect.setAttribute('data-interacted', '1');
          });
          sizeSelect.addEventListener('blur', function () {
            var interacted = sizeSelect.getAttribute('data-interacted');
            sizeSelect.removeAttribute('data-interacted');
            if (interacted === '1' && this.value === sizeFocusVal && sizeFocusVal) {
              applyFontSize(this.value);
            }
          });
        })();
        document.getElementById('lineHeightSelect').addEventListener('change', function () { applyBlockStyle('lineHeight', this.value); });
        document.getElementById('foreColorInput').addEventListener('input', function () { runCommand('foreColor', this.value); });
        document.getElementById('backColorInput').addEventListener('input', function () { runCommand('hiliteColor', this.value); });
        document.getElementById('clearFormatBtn').addEventListener('click', clearFormatting);
        document.getElementById('formatPainterBtn').addEventListener('click', function () {
          if (sourceMode) return;
          editor.focus();
          restoreSelection();
          var sel = window.getSelection && window.getSelection();
          if (!sel || !sel.rangeCount) return;
          var range = sel.getRangeAt(0);
          if (!editor.contains(range.commonAncestorContainer)) return;

          if (formatPainterActive) {
            // Second click: apply the stored format to current selection
            applyFormatPainter();
            formatPainterActive = false;
            formatPainterBtn.classList.remove('active');
            editor.classList.remove('format-painter-active');
          } else {
            // First click: capture the format at cursor/selection
            captureFormatPainter();
            formatPainterActive = true;
            formatPainterBtn.classList.add('active');
            editor.classList.add('format-painter-active');
          }
        });
        // Cancel format painter on Esc
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape' && formatPainterActive) {
            formatPainterActive = false;
            formatPainterStyles = null;
            var fpBtn = document.getElementById('formatPainterBtn');
            if (fpBtn) fpBtn.classList.remove('active');
            editor.classList.remove('format-painter-active');
          }
        });

        document.getElementById('linkBtn').addEventListener('click', function () {
          var existing = selectedElement('a');
          if (existing) {
            // 修改已有链接
            var newUrl = prompt('修改链接地址：', existing.getAttribute('href') || 'https://');
            newUrl = sanitizeUrl(newUrl);
            if (newUrl) {
              existing.setAttribute('href', newUrl);
              if (/^https?:\/\//i.test(newUrl)) existing.setAttribute('target', '_blank');
              else existing.removeAttribute('target');
              existing.setAttribute('rel', 'noopener noreferrer');
              setDirty(true);
              updateEditorCount();
            }
          } else {
            // 创建新链接
            var sel = window.getSelection && window.getSelection();
            var hasSelection = sel && !sel.isCollapsed;
            if (!hasSelection) {
              var text = prompt('链接文本：', '');
              if (!text) return;
              insertHtmlAtCaret(text);
            }
            var url = prompt('链接地址：', 'https://');
            url = sanitizeUrl(url);
            if (url) runCommand('createLink', url);
          }
        });
        document.getElementById('unlinkBtn').addEventListener('click', function () { runCommand('unlink'); });
        document.getElementById('imageBtn').addEventListener('click', function () {
          var url = sanitizeUrl(prompt('图片地址或相对路径：', ''));
          if (url) insertHtmlAtCaret('<p><img src="' + escapeAttr(url) + '" alt=""></p>');
        });
        document.getElementById('imageFileBtn').addEventListener('click', function () { document.getElementById('imageFileInput').click(); });
        document.getElementById('imageFileInput').addEventListener('change', function () {
          insertLocalImage(this.files && this.files[0]);
          this.value = '';
        });
        document.getElementById('hrBtn').addEventListener('click', function () { insertHtmlAtCaret('<hr><p></p>'); });
        document.getElementById('calloutBtn').addEventListener('click', function () {
          insertHtmlAtCaret('<div class="callout"><strong>提示</strong><p>在这里输入提示内容。</p></div><p></p>');
        });
        document.getElementById('taskBtn').addEventListener('click', function () {
          insertHtmlAtCaret('<div class="task-line"><span class="task-box"></span><span class="task-text">待办事项</span></div>');
        });
        document.getElementById('tableBtn').addEventListener('click', insertTableDialog);
        Array.prototype.forEach.call(document.querySelectorAll('[data-table]'), function (button) {
          button.addEventListener('click', function () { tableAction(button.getAttribute('data-table')); });
        });
        document.getElementById('findBtn').addEventListener('click', function () {
          var term = prompt('查找内容：', '');
          if (term == null) return;
          var count = markFindText(term);
          setStatus(count ? ('找到 ' + count + ' 处：' + term) : ('未找到：' + term));
        });
        document.getElementById('replaceBtn').addEventListener('click', function () {
          var from = prompt('查找内容：', '');
          if (!from) return;
          var to = prompt('替换为：', '');
          if (to == null) return;
          var count = replaceText(from, to);
          setStatus('已替换 ' + count + ' 处。');
        });
        document.getElementById('sourceBtn').addEventListener('click', toggleSourceMode);

        editor.addEventListener('input', function () { setDirty(true); updateEditorCount(); });
        editor.addEventListener('mouseup', function () { saveSelection(); updateToolbarState(); });
        editor.addEventListener('keyup', function () { saveSelection(); updateToolbarState(); updateEditorCount(); });
        editor.addEventListener('focus', saveSelection);
        editor.addEventListener('click', function (event) {
          toggleTaskLine(event.target);
          // Toggle c.html style .section open/close on .section-head click
          var sectionHead = event.target.closest('.section-head');
          if (sectionHead) {
            var section = sectionHead.closest('.section');
            if (section) {
              section.classList.toggle('open');
              setDirty(true);
            }
          }
        });
        editor.addEventListener('paste', function (event) {
          event.preventDefault();
          var data = event.clipboardData || window.clipboardData;
          var html = data && data.getData('text/html');
          var text = data && data.getData('text/plain');
          if (html) {
            insertHtmlAtCaret(sanitizeHtml(html));
          } else if (text) {
            insertHtmlAtCaret('<p style="font-family:KaiTi;font-size:26px">' + escapeHtml(text).replace(/\n{2,}/g, '</p><p style="font-family:KaiTi;font-size:26px">').replace(/\n/g, '<br>') + '</p>');
          }
        });
        sourceEditor.addEventListener('input', function () { setDirty(true); updateEditorCount(); });
        pageTitle.addEventListener('input', function () { setDirty(true); });
        pageFile.addEventListener('input', function () { setDirty(true); });
        document.addEventListener('keydown', function (event) {
          if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 's') {
            event.preventDefault();
            saveCurrentPage({ force: true });
          }
          if (!sourceMode && event.key === 'Tab' && document.activeElement === editor) {
            event.preventDefault();
            runCommand(event.shiftKey ? 'outdent' : 'indent');
          }
          if (event.key === 'Escape') clearFindHighlights();
        });
        // Wake-up conflict detection: when the page becomes visible again, check if
        // the on-disk file was modified externally (e.g. by another tab or process).
        document.addEventListener('visibilitychange', async function () {
          if (document.hidden) return;
          if (conflictState) return; // already showing a conflict dialog
          if (!confluenceHandle || !supportsDirectory) return;
          var hit = current();
          if (!hit || !hit.node || !hit.node.file) return;
          var fileName = hit.node.file;
          var myTitle = pageTitle.value.trim() || hit.node.title || '未命名';
          var myHtml = mergeIntoLoadedHtml(myTitle, getCurrentBodyHtml());

          // Check HTML file conflict (or deletion)
          var htmlConflict = { conflict: false, diskText: null, diskTime: 0, deleted: false };
          if (loadedFileLastModified > 0) {
            try {
              var result = await getFileText(fileName);
              if (result && result.lastModified && result.lastModified > loadedFileLastModified) {
                htmlConflict = { conflict: true, diskText: result.text, diskTime: result.lastModified, deleted: false };
              }
            } catch (e) {
              if (e && (e.name === 'NotFoundError' || String(e).indexOf('NotFound') >= 0 || String(e).indexOf('not found') >= 0)) {
                htmlConflict = { conflict: true, diskText: null, diskTime: Date.now(), deleted: true };
              }
            }
          }

          // Check tree.json title conflict
          var treeConflict = null;
          if (loadedTreeLastModified > 0) {
            try {
              var treeResult = await getFileText(TREE_FILE_NAME);
              if (treeResult && treeResult.lastModified && treeResult.lastModified > loadedTreeLastModified) {
                var parsed = parseTreeDataJs(treeResult.text);
                var diskNode = findNodeById(parsed, hit.node.id);
                if (diskNode && diskNode.title !== myTitle) {
                  treeConflict = { myTitle: myTitle, diskTitle: diskNode.title || '', diskTime: treeResult.lastModified };
                }
              }
            } catch (e) {}
          }

          var hasHtmlConflict = htmlConflict.conflict;
          var hasTitleConflict = (treeConflict !== null);

          // If no conflict at all, nothing to do
          if (!hasHtmlConflict && !hasTitleConflict) return;

          // Build diskHtml: if only title conflict, use myHtml as diskHtml placeholder
          var diskHtml = htmlConflict.diskText || myHtml;
          var diskTime = htmlConflict.diskTime || (treeConflict ? treeConflict.diskTime : Date.now());

          try {
            var resolved = await resolveConflict(fileName, myTitle, myHtml, diskHtml, diskTime, loadedFileLastModified, treeConflict, htmlConflict.deleted);
            if (resolved != null) {
              console.log('[CONFLICT] 唤醒路径收到结果: title=' + resolved.title + ' htmlLen=' + (resolved.html ? resolved.html.length : 0) + ' htmlEmpty=' + (!resolved.html));
              var resolvedTitle = resolved.title || myTitle;
              console.log('[CONFLICT] 唤醒路径写入tree: nodeId=' + hit.node.id + ' oldTitle=' + hit.node.title + ' newTitle=' + resolvedTitle);
              hit.node.title = resolvedTitle;
              hit.node.file = fileName;
              await writeTreeFile();
              console.log('[CONFLICT] 唤醒路径tree写入完成, 验证title=' + hit.node.title);
              loadedTreeLastModified = Date.now();
              renderTree();
              var extractedBody = extractEditableHtml(resolved.html);
              console.log('[CONFLICT] 唤醒提取body长度=' + (extractedBody ? extractedBody.length : 0) + ' loadedUsesConfluenceContent=' + loadedUsesConfluenceContent);
              var finalHtml = mergeIntoLoadedHtml(resolvedTitle, extractedBody);
              console.log('[CONFLICT] 唤醒最终HTML长度=' + (finalHtml ? finalHtml.length : 0));

              // Write the resolved HTML back to disk
              var fileHandle = await confluenceHandle.getFileHandle(fileName, { create: true });
              var writable = await fileHandle.createWritable();
              await writable.write(finalHtml);
              await writable.close();

              loadedHtml = finalHtml;
              setEditorHtml(extractEditableHtml(finalHtml));
              pageTitle.value = resolvedTitle;
              pageFile.value = fileName;
              loadedFileLastModified = Date.now();
              setDirty(false);
              setStatus('已解决唤醒时冲突：' + fileName);
            }
          } catch (err) {
            if (err && err.message === 'Conflict dialog closed by user') {
              setStatus('磁盘文件已被外部修改，当前编辑可能覆盖外部更改。');
            }
          }
        });

        window.addEventListener('beforeunload', function (event) {
          if (!dirty) return;
          event.preventDefault();
          event.returnValue = '';
        });
      }

      async function init() {
        supportNote.textContent = supportsDirectory
          ? '固定页面库：confluence/。如果浏览器还没有保存授权，页面会自动要求授权 confluence 文件夹；授权后会自动复用。'
          : '当前浏览器不支持直接保存到本地目录。请用最新版 Chrome 或 Edge 打开本页面。';
        initEvents();
        confluenceHandle = await loadStoredDirectoryHandle();
        var publishedTree = await loadPublishedTree();
        tree = publishedTree || loadStoredTree() || defaultTree();
        selectedId = localStorage.getItem(SELECTED_KEY) || (tree[0] && tree[0].id);
        saveTree();
        renderTree();
        if (confluenceHandle) {
          rootState.textContent = 'confluence/';
          setStatus('已恢复 confluence/ 目录授权。');
          hideAuthGate();
          try {
            var treeResult = await getFileText(TREE_FILE_NAME);
            if (treeResult && treeResult.text) {
              var parsed = parseTreeDataJs(treeResult.text);
              if (Array.isArray(parsed) && parsed.length) {
                tree = parsed;
                selectedId = localStorage.getItem(SELECTED_KEY) || (tree[0] && tree[0].id);
                loadedTreeLastModified = treeResult.lastModified || Date.now();
                saveTree();
                renderTree();
              }
            } else {
              await writeTreeFile();
              loadedTreeLastModified = Date.now();
            }
          } catch (e) {}
        } else if (supportsDirectory) {
          showAuthGate('需要授权 confluence/ 目录后才能直接保存。');
        }
        if (selectedId) selectNode(selectedId);
      }

      window.__confluenceEditorTest = {
        insertTable: function (rows, cols) { insertHtmlAtCaret(buildTable(rows || 2, cols || 2)); },
        toggleSource: toggleSourceMode,
        getBodyHtml: getCurrentBodyHtml,
        sanitizeHtml: sanitizeHtml,
        replaceText: replaceText,
        showConflictDialog: showConflictDialog,
        closeConflictDialog: closeConflictDialog,
        detectConflict: detectConflict,
        detectTreeConflict: detectTreeConflict
      };

      init();
    })();
  </script>
</body>
