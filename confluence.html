<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Confluence · 本地网站编辑器</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-soft: #f9fbfe;
      --text: #1f2937;
      --muted: #667085;
      --line: #e5eaf1;
      --accent: #2f6fed;
      --accent-soft: #eaf1ff;
      --danger: #d92d20;
      --shadow: 0 18px 45px rgba(31, 41, 55, .08);
      --header-height: 68px;
      --tree-width: 300px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; color: var(--text); background: var(--bg); font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; }
    body {
      background:
        radial-gradient(circle at 10% 8%, rgba(47,111,237,.10) 0, transparent 30rem),
        radial-gradient(circle at 95% 95%, rgba(16,185,129,.08) 0, transparent 28rem),
        var(--bg);
    }
    a { color: inherit; }
    button, input, select { font: inherit; }
    .topbar {
      min-height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px clamp(14px, 3vw, 36px);
      border-bottom: 1px solid rgba(229,234,241,.9);
      background: rgba(255,255,255,.84);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; text-decoration: none; }
    .brand-mark { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; color: #fff; background: var(--accent); font-weight: 800; }
    .brand strong { display: block; line-height: 1.1; }
    .brand em { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; font-style: normal; }
    .top-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
    .btn {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: #344054;
      text-decoration: none;
      font-size: 13px;
      font-weight: 650;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(31,41,55,.05);
    }
    .btn:hover { color: var(--accent); border-color: rgba(47,111,237,.28); background: var(--panel-soft); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { color: #fff; background: #245fd0; }
    .btn.danger { color: var(--danger); }
    .btn.icon { width: 38px; padding: 0; font-size: 16px; display: inline-flex; align-items: center; justify-content: center; }
    .btn svg { width: 18px; height: 18px; flex: 0 0 auto; pointer-events: none; }
    .btn.icon svg { width: 16px; height: 16px; }
    .app { display: grid; grid-template-columns: var(--tree-width) minmax(0, 1fr); min-height: calc(100vh - var(--header-height)); }
    .tree-pane {
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(12px);
      padding: 18px 12px;
      overflow: auto;
    }
    .pane-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 0 8px 12px; }
    .pane-head strong { font-size: 16px; }
    .tree-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 0 8px 12px; }
    .tree-actions .btn { min-height: 34px; padding: 6px 0; justify-content: center; }
    .tree { display: grid; gap: 2px; }
    .tree-children { display: grid; gap: 2px; margin-left: 18px; padding-left: 8px; border-left: 1px solid var(--line); }
    .tree-node { display: grid; gap: 2px; }
    .tree-row {
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #344054;
      padding: 7px 8px;
      text-align: left;
      cursor: pointer;
    }
    .tree-row:hover { background: var(--panel-soft); color: var(--accent); }
    .tree-row.active { color: var(--accent); background: var(--accent-soft); font-weight: 700; }
    .tree-row .twisty { width: 14px; color: var(--muted); font-size: 10px; }
    .tree-row .title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tree-row .file { color: var(--muted); font-size: 11px; }
    .main {
      min-width: 0;
      padding: 0;
      overflow-y: auto;
      max-height: calc(100vh - var(--header-height));
    }
    .workspace { max-width: 1180px; margin: 0 auto; display: grid; gap: 0; }
    .title-row { display: grid; gap: 8px; }
    .eyebrow { margin: 0; color: var(--accent); font-weight: 700; font-size: 13px; letter-spacing: .12em; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(30px, 4vw, 46px); line-height: 1.1; letter-spacing: -.03em; }
    p { margin: 0; color: var(--muted); line-height: 1.75; }
    .status {
      min-height: 42px;
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,.78);
      padding: 10px 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .dirty-dot { width: 8px; height: 8px; border-radius: 999px; background: #f79009; display: none; flex: 0 0 auto; }
    .dirty .dirty-dot { display: block; }
    .editor-shell {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255,255,255,.88);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .page-meta {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(160px, 260px);
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .field { display: grid; gap: 6px; }
    .field label { color: var(--muted); font-size: 12px; font-weight: 650; }
    .field input {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 0 11px;
      outline: none;
    }
    .field input:focus { border-color: rgba(47,111,237,.45); box-shadow: 0 0 0 4px rgba(47,111,237,.10); }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 12px;
      border: 0;
      border-radius: 0;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(12px);
      position: sticky;
      top: var(--header-height);
      z-index: 5;
      box-shadow: 0 4px 20px rgba(31,41,55,.06);
    }
    .toolbar .btn { min-height: 34px; border-radius: 10px; padding: 6px 10px; box-shadow: none; }
    .toolbar .btn.icon { width: 36px; padding: 0; }
    .toolbar .btn.icon svg { width: 17px; height: 17px; }
    .toolbar .sep { width: 1px; height: 24px; background: var(--line); margin: 0 3px; }
    .editor-wrap { background: #f4f7fb; padding: 0; }
    .editor {
      min-height: 68vh;
      max-width: none;
      margin: 0;
      padding: clamp(20px, 4vw, 42px);
      border: 0;
      border-radius: 0;
      background: #fff;
      color: #111827;
      outline: none;
      box-shadow: none;
      line-height: 1.75;
    }
    .editor:empty::before { content: "在这里像编辑 Word 一样输入内容..."; color: #98a2b3; }
    .editor.format-painter-active { cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%232f6fed" stroke-width="2"><path d="M15 2 L5 12 L5 17 L10 17 L20 7 Z"/><path d="M5 17 L2 20"/></svg>') 2 22, auto; }
    .editor h1, .editor h2, .editor h3, .editor p, .editor ul, .editor ol, .editor blockquote { margin-top: 0; }
    .editor h1 { font-size: 34px; letter-spacing: 0; }
    .editor h2 { font-size: 26px; }
    .editor h3 { font-size: 20px; }
    .editor blockquote { border-left: 4px solid var(--accent); margin-left: 0; padding: 8px 14px; background: var(--accent-soft); color: #344054; }
    .editor img { max-width: 100%; height: auto; }
    .editor a { color: #2f6fed; text-decoration: underline; text-underline-offset: 2px; }
    .editor a:hover { color: #1d4ed8; }

    /* --- c.html reference-style sections & cards (embedded in editor) --- */
    .editor .section { margin-bottom: 14px; border-radius: 12px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.04); overflow: hidden; }
    .editor .section-head { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; user-select: none; border: 0; width: 100%; text-align: left; font: inherit; color: inherit; background: none; }
    .editor .section-head:hover { background: #f8f9fd; }
    .editor .section-head .icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; background: linear-gradient(135deg,#356ae6,#5a4de0); color: #fff; font-weight: 700; }
    .editor .section-head .title { flex: 1; font-size: 15px; font-weight: 700; }
    .editor .section-head .count { font-size: 12px; color: #7d8599; background: #f5f6fa; padding: 2px 10px; border-radius: 10px; }
    .editor .section-head .arrow { font-size: 12px; color: #7d8599; transition: transform .25s; }
    .editor .section.open .section-head .arrow { transform: rotate(180deg); }
    .editor .section-body { border-top: 1px solid #e2e5ee; }
    .editor .section:not(.open) .section-body { display: none; }
    .editor .card { padding: 12px 16px; border-bottom: 1px solid #e2e5ee; transition: background .15s; }
    .editor .card:last-child { border-bottom: 0; }
    .editor .card.hidden { display: none; }
    .editor .card-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 5px; }
    .editor .card-num { font-size: 11px; color: #7d8599; font-weight: 700; min-width: 26px; text-align: right; padding-top: 2px; }
    .editor .card-title { flex: 1; font-weight: 700; font-size: 14px; }
    .editor .card-ver { font-size: 10px; color: #356ae6; background: rgba(53,106,230,.08); padding: 1px 7px; border-radius: 5px; white-space: nowrap; }
    .editor .card-code { margin-top: 6px; background: #f8f9fc; border: 1px solid #e2e5ee; border-radius: 8px; padding: 10px 13px; font-family: "Cascadia Code","Fira Code","Consolas","Courier New",monospace; font-size: 12px; line-height: 1.65; white-space: pre-wrap; word-break: break-all; overflow-x: auto; color: #2d3436; }
    .editor .card-code span { color: #8b3fc7; }
    .editor .card-title mark, .editor .card-code mark { background: #fef08a; color: inherit; border-radius: 2px; padding: 0 1px; }
    /* kw/cm/st/nu/fn syntax highlighting spans */
    .editor .kw { color: #0550ae; font-weight: 600; }
    .editor .cm { color: #6e7781; font-style: italic; }
    .editor .st { color: #0a3069; }
    .editor .nu { color: #0550ae; }
    .editor .fn { color: #8250df; }

    .status-spacer { flex: 1 1 auto; }
    #editorCount { white-space: nowrap; color: #98a2b3; }
    .toolbar.ribbon { align-items: stretch; gap: 8px; }
    .tool-group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 2px 0; }
    .tool-label { align-self: center; color: var(--muted); font-size: 11px; font-weight: 750; letter-spacing: .06em; }
    .toolbar select {
      height: 34px;
      max-width: 180px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #344054;
      padding: 0 8px;
      outline: none;
      box-shadow: none;
    }
    .toolbar select:focus { border-color: rgba(47,111,237,.45); box-shadow: 0 0 0 3px rgba(47,111,237,.10); }
    .toolbar .btn.active { color: var(--accent); background: var(--accent-soft); border-color: rgba(47,111,237,.32); }
    .color-btn {
      width: 38px;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #344054;
      cursor: pointer;
      font-size: 13px;
      font-weight: 800;
    }
    .color-btn svg { width: 16px; height: 16px; }
    .color-btn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .source-editor {
      display: none;
      width: min(100%, 900px);
      min-height: 68vh;
      margin: 0 auto;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f172a;
      color: #e5e7eb;
      outline: none;
      font: 13px/1.65 Consolas, "Courier New", monospace;
      resize: vertical;
      box-shadow: 0 18px 45px rgba(31,41,55,.10);
    }
    .source-mode .editor { display: none; }
    .source-mode .source-editor { display: block; }
    .editor table { width: 100%; border-collapse: collapse; margin: 16px 0; }
    .editor th, .editor td { border: 1px solid #d0d5dd; padding: 8px 10px; vertical-align: top; min-width: 48px; }
    .editor th { background: #f2f4f7; font-weight: 750; }
    .editor tr:nth-child(even) td { background: #fbfcfe; }
    .editor hr { border: 0; border-top: 1px solid #d0d5dd; margin: 24px 0; }
    .editor pre { background: #111827; color: #f9fafb; padding: 14px 16px; border-radius: 10px; overflow: auto; line-height: 1.55; }
    .editor code { font-family: Consolas, "Courier New", monospace; }
    .editor .callout { border: 1px solid rgba(47,111,237,.24); border-left: 5px solid var(--accent); border-radius: 12px; background: #f5f8ff; padding: 12px 14px; margin: 14px 0; }
    .editor .task-line { display: flex; align-items: flex-start; gap: 8px; margin: 6px 0; }
    .editor .task-box { flex: 0 0 auto; width: 18px; height: 18px; margin-top: 4px; border: 1px solid #98a2b3; border-radius: 5px; display: inline-grid; place-items: center; color: var(--accent); font-size: 13px; line-height: 1; }
    .editor .task-line.done .task-box::before { content: "✓"; }
    .editor .task-line.done .task-text { color: #98a2b3; text-decoration: line-through; }
    .editor .find-hit { background: #ffe066; color: inherit; padding: 0 1px; }
    .editor .find-hit.current { outline: 2px solid #f79009; }

    .support-note {
      border: 1px solid rgba(247,144,9,.25);
      background: rgba(255,250,235,.88);
      color: #7a4a00;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
    }
    .auth-gate {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(246,248,251,.86);
      backdrop-filter: blur(12px);
    }
    .auth-gate.show { display: flex; }
    .auth-box {
      width: min(440px, calc(100vw - 36px));
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: var(--shadow);
      padding: 22px;
      display: grid;
      gap: 14px;
    }
    .auth-box h2 { margin: 0; font-size: 22px; }
    .auth-box p { margin: 0; }
    .auth-box .btn { width: 100%; min-height: 44px; }
    /* Conflict resolution modal */
    .conflict-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15,23,42,.65);
      backdrop-filter: blur(8px);
    }
    .conflict-overlay.show { display: flex; }
    .conflict-box {
      width: min(1300px, calc(100vw - 36px));
      max-height: calc(100vh - 72px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 24px 64px rgba(15,23,42,.24);
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }
    .conflict-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: #fffbeb;
    }
    .conflict-head h3 { margin: 0; font-size: 17px; color: #92400e; display: flex; align-items: center; gap: 8px; }
    .conflict-head .badge { font-size: 12px; font-weight: 650; color: #b45309; background: #fef3c7; border: 1px solid #fcd34d; border-radius: 6px; padding: 2px 8px; }
    .conflict-head .btn-close {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--line); border-radius: 8px;
      background: #fff; color: var(--muted); cursor: pointer; font-size: 18px;
    }
    .conflict-title-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid #fed7aa;
      background: #fff7ed;
    }
    .conflict-title-cell {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      font-size: 13px;
    }
    .conflict-title-cell:first-child {
      border-right: 1px solid #fed7aa;
    }
    .conflict-title-label {
      font-weight: 700;
      color: #92400e;
      flex-shrink: 0;
    }
    .conflict-title-input {
      flex: 1;
      min-width: 0;
      border: 1px solid #fed7aa;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      font-weight: 600;
      color: #b45309;
      background: #fff;
      outline: none;
    }
    .conflict-title-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(47,111,237,.12);
    }
    .conflict-pane-actions {
      padding: 10px 14px;
      border-top: 1px solid var(--line);
      background: var(--panel-soft);
      display: flex;
      justify-content: center;
    }
    .conflict-pane-actions .btn {
      min-height: 34px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 650;
    }
    .conflict-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      overflow: hidden;
      min-height: 0;
    }
    .conflict-pane {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      min-height: 0;
    }
    .conflict-pane:first-child { border-right: 1px solid var(--line); }
    .conflict-pane-head {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .conflict-pane-head .label { font-size: 13px; font-weight: 700; color: #344054; }
    .conflict-pane-head .tag {
      font-size: 11px; font-weight: 650;
      border-radius: 6px; padding: 3px 8px;
    }
    .tag-older { background: #fee2e2; color: #991b1b; }
    .tag-newer { background: #dcfce7; color: #166534; }
    .conflict-editor-wrap {
      overflow: auto;
      height: 360px;
      background: #f4f7fb;
      padding: 12px;
    }
    .conflict-editor {
      min-height: 100%;
      padding: clamp(14px, 3vw, 28px);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: #111827;
      outline: none;
      line-height: 1.75;
      font-size: 14px;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      box-shadow: 0 4px 12px rgba(31,41,55,.06);
    }
    .conflict-editor:focus { box-shadow: 0 0 0 3px rgba(47,111,237,.12); border-color: rgba(47,111,237,.4); }
    .conflict-editor:empty::before { content: "（空）"; color: #98a2b3; }
    .conflict-editor h1, .conflict-editor h2, .conflict-editor h3 { margin-top: 0; line-height: 1.25; }
    .conflict-editor h1 { font-size: 28px; }
    .conflict-editor h2 { font-size: 22px; }
    .conflict-editor h3 { font-size: 18px; }
    .conflict-editor p { margin: 0 0 8px; }
    .conflict-editor blockquote { border-left: 4px solid var(--accent); margin-left: 0; padding: 6px 12px; background: var(--accent-soft); color: #344054; }
    .conflict-editor img { max-width: 100%; height: auto; }
    .conflict-editor table { width: 100%; border-collapse: collapse; margin: 8px 0; }
    .conflict-editor th, .conflict-editor td { border: 1px solid #d0d5dd; padding: 6px 8px; }
    .conflict-editor th { background: #f2f4f7; }
    .conflict-source-editor {
      display: none;
      width: 100%;
      height: 100%;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0f172a;
      color: #e5e7eb;
      outline: none;
      font: 13px/1.65 Consolas, "Courier New", monospace;
      resize: none;
      box-shadow: 0 4px 12px rgba(31,41,55,.06);
    }
    .conflict-pane.source-view .conflict-editor { display: none; }
    .conflict-pane.source-view .conflict-source-editor { display: block; }
    .conflict-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 14px 20px;
      border-top: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .conflict-diff-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 0 10px;
      background: var(--panel-soft);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      min-width: 56px;
    }
    .diff-nav-btn {
      width: 32px; height: 32px;
      padding: 0;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: #fff;
      color: #344054;
      cursor: pointer;
    }
    .diff-nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
    .diff-nav-btn:disabled { opacity: .35; cursor: default; }
    .diff-nav-btn:disabled:hover { border-color: var(--line); color: #344054; background: #fff; }
    .diff-nav-btn svg { width: 16px; height: 16px; }
    .diff-nav-counter {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      min-width: 48px;
      text-align: center;
      font-variant-numeric: tabular-nums;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    /* Diff highlight markers inside conflict editors */
    .conflict-editor mark.conflict-diff-mark {
      background: #fde68a;
      color: inherit;
      border-radius: 3px;
      padding: 1px 2px;
    }
    .conflict-editor mark.conflict-diff-mark.current {
      background: #f59e0b;
      color: #fff;
      outline: 2px solid #d97706;
      outline-offset: 1px;
    }
    .conflict-actions .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .conflict-actions .btn { min-height: 38px; padding: 8px 16px; font-size: 13px; font-weight: 650; }
    .conflict-actions .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .conflict-actions .btn.primary:hover { background: #245fd0; }
    .conflict-actions .btn.outline { background: #fff; border: 1px solid var(--line); color: #344054; }
    .conflict-actions .btn.outline:hover { border-color: var(--accent); color: var(--accent); }
    .conflict-actions .toggle-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
    .conflict-actions .toggle-label input { cursor: pointer; }
    @media (max-width: 900px) {
      .conflict-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr 1fr; }
      .conflict-pane:first-child { border-right: 0; border-bottom: 1px solid var(--line); }
      .conflict-diff-col { flex-direction: row; padding: 8px 10px; border-left: 0; border-right: 0; border-bottom: 1px solid var(--line); min-width: auto; }
    }

    .toolbar-toggle-btn {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      font-size: 13px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 4px;
      cursor: pointer;
    }
    .toolbar-toggle-btn svg { width: 16px; height: 16px; }
    .toolbar-toggle-btn:hover { color: var(--fg); border-color: var(--accent); }

    @media (max-width: 900px) {
      :root { --header-height: 64px; --tree-width: 100%; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .top-actions { justify-content: flex-start; }
      .app { grid-template-columns: 1fr; }
      .tree-pane { border-right: 0; border-bottom: 1px solid var(--line); }
      .page-meta { grid-template-columns: 1fr; }
      .main { max-height: none; position: static; }
      .toolbar { top: 0; position: static; }
      .editor, .source-editor { min-height: 58vh; }
      .toolbar.ribbon { max-height: none; display: none; }
      .tool-group { width: 100%; }
      .toolbar select { max-width: 100%; flex: 1 1 120px; }

      /* Mobile: hide pane head and tree action buttons by default */
      .pane-head { display: none; }
      .tree-actions { display: none; }

      /* Mobile: completely disable editing — hide all edit tools */
      .toolbar-toggle-btn { display: none !important; }

      /* When toolbar is toggled visible on mobile */
      body.toolbar-visible .toolbar.ribbon { display: flex; }
      body.toolbar-visible .tree-actions { display: grid; }

      /* Hide page title and filename inputs on mobile */
      .page-meta { display: none; }

      /* Hide save button on mobile */
      #saveBtn { display: none !important; }

      /* Return home & online: icon only, no text on mobile */
      #homeBtn, .top-actions > a.btn { font-size: 0; gap: 0; }
      #homeBtn svg, .top-actions > a.btn svg { width: 20px; height: 20px; }

      /* Hide tree node file names on mobile */
      .tree-row .file { display: none; }

      /* Hide status bar ("已读取..." etc.) on mobile */
      .status { display: none; }

      /* Hide browser support note on mobile */
      .support-note { display: none; }

      /* Mobile: strip all borders, shadows, and padding from editor area */
      .main { padding: 0; }
      .editor-shell { border: 0; border-radius: 0; box-shadow: none; }
      .editor-wrap { background: #fff; padding: 0; }
      .editor { padding: 14px; min-height: auto; }
      .toolbar.ribbon { border: 0; border-radius: 0; }
      .page-meta { border: 0; }
    }

    /* ---- Mobile TOC Panel ---- */
    .mobile-toc-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 20;
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }
    .mobile-toc-panel {
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      max-width: 85vw;
      background: #fff;
      z-index: 21;
      transform: translateX(-100%);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
      box-shadow: 4px 0 24px rgba(0,0,0,.12);
      overflow: hidden;
    }
    .mobile-toc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .mobile-toc-head strong { font-size: 16px; }
    .mobile-toc-close {
      width: 32px; height: 32px;
      border: 0; background: transparent;
      font-size: 18px; color: var(--muted);
      cursor: pointer; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .mobile-toc-close:hover { background: var(--bg); color: var(--text); }
    .mobile-toc-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
    }
    .mobile-toc-item {
      display: block;
      width: 100%;
      text-align: left;
      border: 0;
      background: transparent;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      line-height: 1.4;
      word-break: break-word;
    }
    .mobile-toc-item:hover { background: var(--accent-soft); color: var(--accent); }
    .mobile-toc-item.toc-h1 { font-weight: 700; font-size: 15px; padding-left: 12px; }
    .mobile-toc-item.toc-h2 { font-weight: 650; padding-left: 24px; }
    .mobile-toc-item.toc-h3 { padding-left: 36px; color: var(--muted); }
    .mobile-toc-item.toc-h4, .mobile-toc-item.toc-h5, .mobile-toc-item.toc-h6 { padding-left: 48px; font-size: 13px; color: var(--muted); }
    .mobile-toc-empty {
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }
    .mobile-toc-btn { display: none; }

    /* Show panel when body has toc-open class */
    body.toc-open .mobile-toc-overlay { display: block; }
    body.toc-open .mobile-toc-panel { transform: translateX(0); }

    @media (max-width: 900px) {
      .mobile-toc-btn { display: inline-flex; }
    }
  </style>
</head>

  <div class="auth-gate" id="authGate" role="dialog" aria-modal="true" aria-labelledby="authTitle">
    <div class="auth-box">
      <h2 id="authTitle">授权 confluence 目录</h2>
      <p>为了直接保存 HTML 页面，需要授权 confluence.html 同级的 confluence 文件夹。浏览器保存授权后，下次打开会自动恢复。</p>
      <button class="btn primary" id="authGateBtn" type="button">授权 confluence 目录</button>
    </div>

  <script>
    (function () {
      'use strict';

      var STORAGE_KEY = 'localConfluence.tree.v1';
      var SELECTED_KEY = 'localConfluence.selectedId.v1';
      var TREE_FILE_NAME = 'tree_data.js';
      var TREE_URL = 'confluence/tree_data.js';
      var DIR_DB_NAME = 'localConfluence.fs.v1';
      var DIR_STORE_NAME = 'handles';
      var DIR_HANDLE_KEY = 'confluence';
      var supportsDirectory = 'showDirectoryPicker' in window;
      var confluenceHandle = null;
      var tree = [];
      var selectedId = localStorage.getItem(SELECTED_KEY) || '';
      var dirty = false;
      var loadedHtml = '';
      var loadedUsesConfluenceContent = false;
      var loadedFileLastModified = 0;
      var loadedTreeLastModified = 0;
      var sourceMode = false;
      var savedRange = null;
      var formatPainterActive = false;
      var formatPainterStyles = null;
      var findHits = [];
      var findHitIndex = -1;

      var treeEl = document.getElementById('tree');
      var editor = document.getElementById('editor');
      var sourceEditor = document.getElementById('sourceEditor');
      var editorWrap = document.querySelector('.editor-wrap');
      var editorCount = document.getElementById('editorCount');
      var pageTitle = document.getElementById('pageTitle');
      var pageFile = document.getElementById('pageFile');
      var statusBox = document.getElementById('status');
      var statusText = document.getElementById('statusText');
      var rootState = document.getElementById('rootState');
      var supportNote = document.getElementById('supportNote');
      var authGate = document.getElementById('authGate');
      var authGateBtn = document.getElementById('authGateBtn');

      function uid() {
        return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      }

      function slugify(text) {
        return (text || 'page')
          .trim()
          .toLowerCase()
          .replace(/\.html?$/i, '')
          .replace(/[^\w\u4e00-\u9fa5-]+/g, '-')
          .replace(/^-+|-+$/g, '') || 'page';
      }

      function uniqueFileName(base) {
        var slug = slugify(base);
        var used = new Set();
        walk(tree, function (node) { used.add((node.file || '').toLowerCase()); });
        var name = slug + '.html';
        var index = 2;
        while (used.has(name.toLowerCase())) {
          name = slug + '-' + index + '.html';
          index++;
        }
        return name;
      }

      function openHandleDb() {
        return new Promise(function (resolve, reject) {
          var req = indexedDB.open(DIR_DB_NAME, 1);
          req.onupgradeneeded = function () {
            req.result.createObjectStore(DIR_STORE_NAME);
          };
          req.onsuccess = function () { resolve(req.result); };
          req.onerror = function () { reject(req.error); };
        });
      }

      async function saveStoredDirectoryHandle(handle) {
        if (!window.indexedDB) return;
        var db = await openHandleDb();
        await new Promise(function (resolve, reject) {
          var tx = db.transaction(DIR_STORE_NAME, 'readwrite');
          tx.objectStore(DIR_STORE_NAME).put(handle, DIR_HANDLE_KEY);
          tx.oncomplete = resolve;
          tx.onerror = function () { reject(tx.error); };
        });
        db.close();
      }

      async function loadStoredDirectoryHandle() {
        if (!window.indexedDB || !supportsDirectory) return null;
        try {
          var db = await openHandleDb();
          var handle = await new Promise(function (resolve, reject) {
            var tx = db.transaction(DIR_STORE_NAME, 'readonly');
            var req = tx.objectStore(DIR_STORE_NAME).get(DIR_HANDLE_KEY);
            req.onsuccess = function () { resolve(req.result || null); };
            req.onerror = function () { reject(req.error); };
          });
          db.close();
          if (!handle) return null;
          var perm = await handle.queryPermission({ mode: 'readwrite' });
          if (perm !== 'granted') perm = await handle.requestPermission({ mode: 'readwrite' });
          return perm === 'granted' ? handle : null;
        } catch (e) {
          return null;
        }
      }

      function defaultTree() {
        return [{
          id: 'home',
          title: '首页',
          file: 'index.html',
          children: []
        }];
      }

      function loadStoredTree() {
        try {
          var parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
          if (Array.isArray(parsed) && parsed.length) return parsed;
        } catch (e) {}
        return defaultTree();
      }

      function saveTree() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tree));
      }

      async function loadPublishedTree() {
        try {
          var res = await fetch(TREE_URL + '?v=' + Date.now(), { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          var text = await res.text();
          var parsed = parseTreeDataJs(text);
          if (Array.isArray(parsed) && parsed.length) return parsed;
        } catch (e) {}
        return null;
      }

      async function writeTreeFile() {
        saveTree();
        if (!confluenceHandle || !supportsDirectory) return false;
        var handle = await confluenceHandle.getFileHandle(TREE_FILE_NAME, { create: true });
        var writable = await handle.createWritable();
        await writable.write('window.__TREE_DATA__=' + JSON.stringify(tree) + ';\n');
        await writable.close();
        return true;
      }

      function walk(nodes, fn, parent, level) {
        (nodes || []).forEach(function (node) {
          fn(node, parent || null, level || 0);
          walk(node.children || [], fn, node, (level || 0) + 1);
        });
      }

      function findNode(id) {
        var found = null;
        walk(tree, function (node, parent, level) {
          if (node.id === id) found = { node: node, parent: parent, level: level };
        });
        return found;
      }

      function findNodeById(nodes, id) {
        for (var i = 0; i < (nodes || []).length; i++) {
          if (nodes[i].id === id) return nodes[i];
          var child = findNodeById(nodes[i].children || [], id);
          if (child) return child;
        }
        return null;
      }

      function pathToNode(id) {
        var path = [];
        function visit(nodes) {
          for (var i = 0; i < (nodes || []).length; i++) {
            var node = nodes[i];
            path.push(node);
            if (node.id === id) return true;
            if (visit(node.children || [])) return true;
            path.pop();
          }
          return false;
        }
        return visit(tree) ? path.slice() : [];
      }

      function current() {
        return findNode(selectedId) || findNode(tree[0] && tree[0].id);
      }

      function setStatus(text) {
        statusText.textContent = text;
      }

      function setDirty(value) {
        dirty = !!value;
        statusBox.classList.toggle('dirty', dirty);
      }

      function showAuthGate(message) {
        if (message) setStatus(message);
        if (authGate) authGate.classList.add('show');
        if (authGateBtn) {
          setTimeout(function () { authGateBtn.focus(); }, 0);
        }
      }

      function hideAuthGate() {
        if (authGate) authGate.classList.remove('show');
      }

      function renderTree() {
        treeEl.innerHTML = '';
        function renderNode(node) {
          var row = document.createElement('button');
          row.type = 'button';
          row.className = 'tree-row' + (node.id === selectedId ? ' active' : '');
          row.innerHTML = '<span class="twisty">' + ((node.children || []).length ? '▾' : '') + '</span><span class="title"></span><span class="file"></span>';
          row.querySelector('.title').textContent = node.title || '未命名';
          row.querySelector('.file').textContent = node.file || '';
          row.addEventListener('click', function () {
            selectNode(node.id);
          });
          var wrap = document.createElement('div');
          wrap.className = 'tree-node';
          wrap.appendChild(row);
          if (node.children && node.children.length) {
            var children = document.createElement('div');
            children.className = 'tree-children';
            node.children.forEach(function (child) {
              children.appendChild(renderNode(child));
            });
            wrap.appendChild(children);
          }
          return wrap;
        }
        tree.forEach(function (node) {
          treeEl.appendChild(renderNode(node));
        });
      }

      async function selectNode(id) {
        if (selectedId && selectedId !== id) {
          // On mobile (no directory handle), skip save silently instead of showing auth gate.
          // Auth gate should only appear when user explicitly saves.
          if (confluenceHandle && supportsDirectory) {
            var saved = await saveCurrentPage({ silent: true, requireWritable: true });
            if (!saved) return false;
          }
        }
        selectedId = id;
        localStorage.setItem(SELECTED_KEY, selectedId);
        var hit = current();
        if (!hit) return false;
        pageTitle.value = hit.node.title || '';
        pageFile.value = hit.node.file || '';
        renderTree();
        await loadPageFile(hit.node);
        return true;
      }

      function setEditorHtml(html) {
        editor.innerHTML = sanitizeHtml(html || '');
        if (sourceEditor) sourceEditor.value = prettyHtml(editor.innerHTML);
        setDirty(false);
        updateEditorCount();
      }

      function extractEditableHtml(fullHtml) {
        try {
          var doc = new DOMParser().parseFromString(fullHtml || '', 'text/html');
          var content = doc.querySelector('[data-confluence-content]');
          loadedUsesConfluenceContent = !!content;
          if (content) return content.innerHTML;
          // For standalone pages (e.g., c.html), only extract the main .container content
          // so the editor doesn't show the page's own topbar/scripts
          if (doc.body) {
            var container = doc.body.querySelector('.container');
            if (container) {
              // Ensure first section is open by default (c.html script normally does this)
              var firstSection = container.querySelector('.section');
              if (firstSection && !firstSection.classList.contains('open')) {
                firstSection.classList.add('open');
              }
              return container.innerHTML;
            }
            return doc.body.innerHTML;
          }
          return fullHtml;
        } catch (e) {
          loadedUsesConfluenceContent = false;
          return fullHtml || '';
        }
      }

      async function getFileText(fileName) {
        if (confluenceHandle && supportsDirectory) {
          try {
            var handle = await confluenceHandle.getFileHandle(fileName);
            var file = await handle.getFile();
            var text = await file.text();
            return { text: text, lastModified: file.lastModified || Date.now() };
          } catch (e) {}
        }
        try {
          var res = await fetch('confluence/' + encodeURIComponent(fileName).replace(/%2F/g, '/') + '?v=' + Date.now(), { cache: 'no-store' });
          if (res.ok) {
            var text = await res.text();
            var lm = res.headers.get('Last-Modified');
            var ts = lm ? new Date(lm).getTime() : Date.now();
            return { text: text, lastModified: ts };
          }
        } catch (e2) {
        }
        return null;
      }

      async function loadPageFile(node) {
        var result = await getFileText(node.file);
        if (result == null) {
          loadedHtml = '';
          loadedUsesConfluenceContent = true;
          loadedFileLastModified = 0;
          setEditorHtml('<h1>' + escapeHtml(node.title || '新页面') + '</h1><p></p>');
          setStatus('正在编辑：' + node.file + '。未读取到现有文件，保存时会创建。');
        } else {
          loadedHtml = result.text;
          loadedFileLastModified = result.lastModified || Date.now();
          setEditorHtml(extractEditableHtml(result.text));
          setStatus('已读取：' + node.file);
        }
      }

      function escapeHtml(text) {
        return String(text || '').replace(/[&<>"]/g, function (ch) {
          return ch === '&' ? '&amp;' : ch === '<' ? '&lt;' : ch === '>' ? '&gt;' : '&quot;';
        });
      }


      function escapeAttr(text) {
        return escapeHtml(text).replace(/'/g, '&#39;');
      }

      function sanitizeUrl(url) {
        url = String(url || '').trim();
        if (!url) return '';
        if (/^(javascript|vbscript|data:text\/html)/i.test(url)) return '';

              // Clean up: remove leading/trailing semicolons, collapse multiple semicolons
              style = style.replace(/^[\s;]+/, '').replace(/[\s;]+$/, '').replace(/;\s*;/g, ';').trim();
              if (style) el.setAttribute('style', style);
              else el.removeAttribute('style');
            }
          } catch (e) {}
        });

        // Merge adjacent text nodes
        editor.normalize();

        // Restore selection: find the selected text in the cleaned DOM
        sel.removeAllRanges();
        var restoreRange = document.createRange();

        if (selectedText && selectedText.length > 0) {
          var found = findTextRangeInEditor(selectedText);
          if (found) {
            restoreRange.setStart(found.startNode, found.startOffset);
            restoreRange.setEnd(found.endNode, found.endOffset);
            sel.addRange(restoreRange);
          }
        }

        if (sel.rangeCount === 0 && editor.firstChild) {
          restoreRange.setStart(editor.firstChild, 0);
          restoreRange.collapse(true);
          sel.addRange(restoreRange);
        }

        savedRange = sel.getRangeAt(0).cloneRange();

        // Apply default font (楷体) and font size (26px) after clearing
        wrapSelectionWithFontFamily('KaiTi');
        wrapSelectionWithFontSize('26px');

        // Ensure bold is off after wrapping (wrapping inside residual <b> tags can re-inherit bold)
        document.execCommand('bold', false, null);

        setDirty(true);
        setTimeout(updateToolbarState, 0);
      }

      // Find a text string within the editor and return its Range boundary nodes/offsets
      function findTextRangeInEditor(searchText) {
        if (!searchText) return null;
        var textNodes = [];
        var walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, null);
        var node;
        var totalOffset = 0;
        while ((node = walker.nextNode())) {
          var len = node.length;
          textNodes.push({ node: node, globalStart: totalOffset, globalEnd: totalOffset + len });
          totalOffset += len;
        }
        // Concatenate all text
        var fullText = textNodes.map(function (n) { return n.node.textContent; }).join('');
        var idx = fullText.indexOf(searchText);
        if (idx < 0) return null;

        // Find which text nodes contain the start and end positions
        var endIdx = idx + searchText.length;
        var startNode = null, startOffset = 0, endNode = null, endOffset = 0;
        for (var i = 0; i < textNodes.length; i++) {
          var tn = textNodes[i];
          if (!startNode && idx >= tn.globalStart && idx < tn.globalEnd) {
            startNode = tn.node;
            startOffset = idx - tn.globalStart;
          }
          if (!endNode && endIdx > tn.globalStart && endIdx <= tn.globalEnd) {
            endNode = tn.node;
            endOffset = endIdx - tn.globalStart;
            break;
          }
        }
        if (startNode && endNode) {
          return { startNode: startNode, startOffset: startOffset, endNode: endNode, endOffset: endOffset };
        }
        return null;
      }

      function toggleSourceMode() {
        var sourceBtn = document.getElementById('sourceBtn');
        if (!sourceMode) {
          clearFindHighlights();
          sourceEditor.value = prettyHtml(editor.innerHTML);
          sourceMode = true;
          editorWrap.classList.add('source-mode');
          sourceBtn.classList.add('active');
          sourceEditor.focus();
        } else {
          applySourceToEditor(true);
          sourceMode = false;
          editorWrap.classList.remove('source-mode');
          sourceBtn.classList.remove('active');

      }

      function applySourceToEditor(markDirty) {
        if (!sourceEditor) return;
        editor.innerHTML = sanitizeHtml(sourceEditor.value);
        if (markDirty) setDirty(true);

      function clearFindHighlights() {
        findHits = [];
        findHitIndex = -1;
        Array.prototype.forEach.call(editor.querySelectorAll('mark.find-hit'), function (mark) {
          mark.replaceWith(document.createTextNode(mark.textContent));
        });
        editor.normalize();
      }

      function markFindText(term) {
        clearFindHighlights();
        term = String(term || '');
        if (!term) return 0;
        var walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, {
          acceptNode: function (node) {
            if (!node.nodeValue || node.nodeValue.indexOf(term) < 0) return NodeFilter.FILTER_REJECT;
            if (closestElement(node, 'script,style,mark')) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });
        var textNodes = [];
        while (walker.nextNode()) textNodes.push(walker.currentNode);
        textNodes.forEach(function (node) {
          var parts = node.nodeValue.split(term);
          var frag = document.createDocumentFragment();
          parts.forEach(function (part, i) {
            if (part) frag.appendChild(document.createTextNode(part));
            if (i < parts.length - 1) {
              var mark = document.createElement('mark');
              mark.className = 'find-hit';
              mark.textContent = term;
              frag.appendChild(mark);
            }
          });
          node.parentNode.replaceChild(frag, node);
        });
        findHits = Array.prototype.slice.call(editor.querySelectorAll('mark.find-hit'));
        if (findHits.length) {
          findHitIndex = 0;
          findHits[0].classList.add('current');
          findHits[0].scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
        return findHits.length;
      }

      function replaceText(findText, replaceText) {
        if (!findText) return 0;
        clearFindHighlights();
        var count = 0;
        var walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, null);
        var nodes = [];
        while (walker.nextNode()) nodes.push(walker.currentNode);
        nodes.forEach(function (node) {
          if (node.nodeValue.indexOf(findText) >= 0) {
            count += node.nodeValue.split(findText).length - 1;
            node.nodeValue = node.nodeValue.split(findText).join(replaceText);
          }
        });
        if (count) setDirty(true);
        updateEditorCount();
        return count;
      }

      function buildTable(rows, cols) {
        rows = Math.max(1, Math.min(30, parseInt(rows, 10) || 3));
        cols = Math.max(1, Math.min(12, parseInt(cols, 10) || 3));
        var html = '<table><tbody>';
        for (var r = 0; r < rows; r++) {
          html += '<tr>';
          for (var c = 0; c < cols; c++) {
            html += (r === 0 ? '<th>标题</th>' : '<td><br></td>');
          }
          html += '</tr>';
        }
        html += '</tbody></table><p></p>';
        return html;
      }

      function insertTableDialog() {
        var rows = prompt('表格行数：', '3');
        if (rows == null) return;
        var cols = prompt('表格列数：', '3');
        if (cols == null) return;
        insertHtmlAtCaret(buildTable(rows, cols));
      }

      function activeCell() {
        return selectedElement('td,th');
      }

      function replaceTableHtml(table, newHtml) {
        // Replace table using execCommand so the undo stack captures it.
        var range = document.createRange();
        range.selectNode(table);
        var sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        document.execCommand('insertHTML', false, newHtml);
      }

      function tableAction(action) {
        editor.focus();
        var cell = activeCell();
        var table = closestElement(cell, 'table') || selectedElement('table');
        if (!table && action !== 'deleteTable') table = editor.querySelector('table');
        if (action === 'deleteTable') {
          if (!table) { setStatus('未找到表格。'); return; }
          replaceTableHtml(table, '<p></p>');
          setDirty(true);
          updateEditorCount();
          return;
        }
        if (!cell) { setStatus('请先把光标放到表格单元格中。'); return; }
        table = closestElement(cell, 'table');
        var row = cell.parentElement;
        var cellIndex = Array.prototype.indexOf.call(row.children, cell);
        if (action === 'rowBefore' || action === 'rowAfter') {
          var newRow = row.cloneNode(true);
          Array.prototype.forEach.call(newRow.children, function (td) { td.innerHTML = '<br>'; });
          if (action === 'rowBefore') row.parentNode.insertBefore(newRow, row);
          else row.parentNode.insertBefore(newRow, row.nextSibling);
        } else if (action === 'colBefore' || action === 'colAfter') {
          Array.prototype.forEach.call(table.rows, function (tr) {
            var ref = tr.children[cellIndex];
            var newCell = ref.cloneNode(false);
            newCell.innerHTML = '<br>';
            if (action === 'colBefore') tr.insertBefore(newCell, ref);
            else tr.insertBefore(newCell, ref ? ref.nextSibling : null);
          });
        } else if (action === 'deleteRow') {
          if (table.rows.length <= 1) { replaceTableHtml(table, '<p></p>'); setDirty(true); updateEditorCount(); return; }
          else row.remove();
        } else if (action === 'deleteCol') {
          if (table.rows[0] && table.rows[0].children.length <= 1) { replaceTableHtml(table, '<p></p>'); setDirty(true); updateEditorCount(); return; }
          Array.prototype.forEach.call(table.rows, function (tr) {
            if (tr.children[cellIndex]) tr.children[cellIndex].remove();
          });
        }
        // After DOM mutation, re-select and replace so undo works
        if (table && table.parentNode) {
          replaceTableHtml(table, table.outerHTML);
        }
        setDirty(true);
        updateEditorCount();
      }

      function insertLocalImage(file) {
        if (!file) return;
        if (!/^image\//i.test(file.type || '')) { setStatus('请选择图片文件。'); return; }

        reader.onload = function () {

        };
        reader.onerror = function () { setStatus('读取图片失败。'); };
        reader.readAsDataURL(file);
      }

          + '    .task-line { display: flex; gap: 8px; margin: 6px 0; }\n'

          + '    .task-line.done .task-box::before { content: "✓"; }\n'

      function parentPageBody(node) {
        var childLinks = (node.children || []).map(function (child) {
          return '<li><a href="' + encodeURIComponent(child.file).replace(/%2F/g, '/') + '">' + escapeHtml(child.title || child.file) + '</a></li>';
        }).join('\n');
        return '<h1>' + escapeHtml(node.title || '未命名') + '</h1>\n'
          + (childLinks ? '<h2>子页面</h2>\n<ul>\n' + childLinks + '\n</ul>' : '<p></p>');
      }

      function mergeIntoLoadedHtml(title, body) {
        if (!loadedHtml) return pageTemplate(title, body);
        try {
          var doc = new DOMParser().parseFromString(loadedHtml, 'text/html');
          var titleEl = doc.querySelector('title');
          if (titleEl) titleEl.textContent = title;
          if (loadedUsesConfluenceContent) {
            var content = doc.querySelector('[data-confluence-content]');
            if (content) {
              content.innerHTML = body;
              return '<!doctype html>\n' + doc.documentElement.outerHTML + '\n';
            }
          }
          if (doc.body) {
            // For standalone pages (e.g., c.html), try to only replace the main content area
            // preserving the page's own header (topbar), scripts, and other structural elements.
            var container = doc.body.querySelector('.container');
            if (container) {
              // Replace only the .container content while keeping topbar + scripts intact
              container.innerHTML = body;
              return '<!doctype html>\n' + doc.documentElement.outerHTML + '\n';
            }
            // Fallback: no .container found, replace whole body
            doc.body.innerHTML = body;
            return '<!doctype html>\n' + doc.documentElement.outerHTML + '\n';
          }
        } catch (e) {}
        return pageTemplate(title, body);
      }

      // --- Conflict Resolution ---
      // conflictState: { resolve, reject, file, title, myHtml, diskHtml, titleConflict, myTitle, diskTitle, resolvedTitle }
      var conflictState = null;

      function stripHtml(html) {
        var div = document.createElement('div');
        div.innerHTML = html;
        return div.textContent || div.innerText || '';
      }

      function showConflictDialog(fileName, title, myHtml, diskHtml, diskTime, myTime, titleConflict, deleted) {
        var overlay = document.getElementById('conflictOverlay');
        var leftEditor = document.getElementById('conflictLeftEditor');
        var rightEditor = document.getElementById('conflictRightEditor');
        var leftSourceEditor = document.getElementById('conflictLeftSourceEditor');
        var rightSourceEditor = document.getElementById('conflictRightSourceEditor');
        var showHtmlCb = document.getElementById('conflictShowHtml');
        var fileSpan = document.getElementById('conflictFile');
        var leftTag = document.getElementById('conflictLeftTag');
        var rightTag = document.getElementById('conflictRightTag');
        var leftPane = document.getElementById('conflictLeftPane');
        var rightPane = document.getElementById('conflictRightPane');
        var leftHead = document.getElementById('conflictLeftHead');
        var titleH3 = document.getElementById('conflictTitle');
        var diskTitleVal = document.getElementById('conflictDiskTitleVal');
        var myTitleVal = document.getElementById('conflictMyTitleVal');

        // --- Build conflict type description ---
        var titleConflictExists = !!(titleConflict && titleConflict.diskTitle !== titleConflict.myTitle);
        // Compare body content: extract editable body from both full HTML docs
        var diskBody = extractEditableHtml(diskHtml || '');
        var myBody = extractEditableHtml(myHtml);
        var bodyConflictExists = (diskBody !== myBody);
        // Determine title text with colored HTML spans
        var conflictDescHtml;
        if (deleted) {
          conflictDescHtml = '<span style="color:var(--danger)">磁盘文件已被删除</span>';
        } else if (!titleConflictExists && !bodyConflictExists) {
          conflictDescHtml = '<span style="color:var(--primary)">完全相同（无冲突）</span>';
        } else {
          var parts = [];
          parts.push('<span style="color:' + (titleConflictExists ? 'var(--danger)' : 'var(--primary)') + '">' + (titleConflictExists ? '标题冲突' : '标题一致') + '</span>');
          parts.push('<span style="color:' + (bodyConflictExists ? 'var(--danger)' : 'var(--primary)') + '">' + (bodyConflictExists ? '内容冲突' : '内容一致') + '</span>');
          conflictDescHtml = parts.join('，');
        }
        titleH3.innerHTML = '⚠ 同步冲突 — ' + conflictDescHtml;

        // Title row: left = disk title, right = editing title (both editable)
        var diskTitle = (titleConflict && titleConflict.diskTitle) ? titleConflict.diskTitle : title;
        var myTitleShow = (titleConflict && titleConflict.myTitle) ? titleConflict.myTitle : title;
        diskTitleVal.value = diskTitle;
        myTitleVal.value = myTitleShow;

        // Left = disk version, Right = editing version
        leftEditor.setAttribute('data-html', diskHtml || '');
        rightEditor.setAttribute('data-html', myHtml);

        if (deleted) {
          leftEditor.innerHTML = '<p style="color:var(--danger);font-style:italic;padding:16px;">磁盘上的文件已被删除。</p>';
          leftSourceEditor.value = '';
        } else {
          leftEditor.innerHTML = diskBody;
          leftSourceEditor.value = prettyHtml(diskHtml);
        }
        rightEditor.innerHTML = myBody;
        rightSourceEditor.value = prettyHtml(myHtml);

        fileSpan.textContent = fileName;
        showHtmlCb.checked = false;
        leftPane.classList.remove('source-view');
        rightPane.classList.remove('source-view');

        overlay.classList.add('show');
        rightEditor.focus();

        // Tag display
        if (deleted) {
          leftTag.textContent = '已删除';
          rightTag.textContent = '本地编辑';
          leftHead.style.display = 'flex';
        } else {
          var isDiskNewer = diskTime > myTime;
          leftTag.textContent = '磁盘 · ' + new Date(diskTime).toLocaleTimeString() + (isDiskNewer ? ' (新)' : ' (旧)');
          rightTag.textContent = '本地 · ' + new Date(myTime).toLocaleTimeString() + (isDiskNewer ? ' (旧)' : ' (新)');
        }

        // Initialize diff comparison after editors are populated
        setTimeout(initConflictDiff, 100);
      }

      function updateConflictView() {
        var showHtml = document.getElementById('conflictShowHtml').checked;
        var leftEditor = document.getElementById('conflictLeftEditor');
        var rightEditor = document.getElementById('conflictRightEditor');
        var leftSourceEditor = document.getElementById('conflictLeftSourceEditor');
        var rightSourceEditor = document.getElementById('conflictRightSourceEditor');
        var leftPane = document.getElementById('conflictLeftPane');
        var rightPane = document.getElementById('conflictRightPane');

        if (showHtml) {
          // Switching TO source view: save current WYSIWYG HTML to source textareas
          leftSourceEditor.value = prettyHtml(leftEditor.innerHTML);
          rightSourceEditor.value = prettyHtml(rightEditor.innerHTML);
        } else {
          // Switching TO WYSIWYG view: apply source edits back to contenteditable
          leftEditor.innerHTML = leftSourceEditor.value;
          rightEditor.innerHTML = rightSourceEditor.value;
        }
        leftPane.classList.toggle('source-view', showHtml);
        rightPane.classList.toggle('source-view', showHtml);
