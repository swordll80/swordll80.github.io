<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>手册速查</title>
  <style>
    :root {
      --bg:#f5f6fa; --card:#fff; --accent:#356ae6; --muted:#7d8599;
      --line:#e2e5ee; --text:#1a1a2e; --radius:12px;
      --tree-w:280px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      background:var(--bg); color:var(--text); line-height:1.7;
      min-height:100vh; display:flex; flex-direction:column;
    }

    /* topbar */
    .topbar {
      position:sticky; top:0; z-index:10; background:var(--card);
      border-bottom:1px solid var(--line); padding:10px 18px;
      display:flex; align-items:center; gap:12px;
      box-shadow:0 1px 6px rgba(0,0,0,.04); min-height:48px;
    }
    .topbar .brand { font-size:18px; font-weight:700; color:var(--accent); text-decoration:none; white-space:nowrap; }
    .topbar .desc { color:var(--muted); font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .topbar .menu-btn {
      display:none; width:32px; height:32px; border:1px solid var(--line);
      border-radius:8px; background:var(--card); cursor:pointer; flex-shrink:0;
      align-items:center; justify-content:center; font-size:18px; color:var(--text);
    }

    /* main layout */
    .main { display:flex; flex:1; min-height:0; }
    .tree-panel {
      width:var(--tree-w); flex-shrink:0; border-right:1px solid var(--line);
      background:var(--card); overflow-y:auto; overflow-x:hidden;
      padding:12px 0; transition:transform .25s;
    }
    .view-panel { flex:1; min-width:0; display:flex; flex-direction:column; background:var(--bg); }
    .view-panel iframe {
      flex:1; border:0; width:100%; min-height:0;
    }
    .view-placeholder {
      flex:1; display:flex; align-items:center; justify-content:center;
      color:var(--muted); font-size:15px; user-select:none;
    }

    /* tree */
    .tree-node { user-select:none; }
    .tree-row {
      display:flex; align-items:center; gap:6px; padding:6px 16px;
      cursor:pointer; transition:background .12s; font-size:14px;
      text-decoration:none; color:inherit;
    }
    .tree-row:hover { background:#f0f3fa; }
    .tree-row.active { background:#e8ecf9; color:var(--accent); font-weight:600; }
    .tree-row .arrow {
      width:18px; height:18px; display:flex; align-items:center; justify-content:center;
      font-size:10px; color:var(--muted); flex-shrink:0; transition:transform .2s;
    }
    .tree-row .arrow.open { transform:rotate(90deg); }
    .tree-row .icon {
      width:22px; height:22px; border-radius:6px; display:flex; align-items:center;
      justify-content:center; font-size:13px; flex-shrink:0;
    }
    .tree-row .icon.folder { background:#e8ecf9; color:var(--accent); }
    .tree-row .icon.file { background:#f0f2f5; color:var(--muted); font-size:11px; }
    .tree-row .label { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tree-children { overflow:hidden; transition:max-height .3s; }
    .tree-children.collapsed { max-height:0; }
    .tree-children .tree-row { padding-left:38px; }

    /* mobile overlay */
    .tree-overlay {
      display:none; position:fixed; inset:0; z-index:20; background:rgba(0,0,0,.35);
    }
    .tree-overlay.show { display:block; }

    @media (max-width:768px) {
      .topbar .menu-btn { display:flex; }
      .tree-panel {
        position:fixed; top:48px; left:0; bottom:0; z-index:25;
        transform:translateX(-100%); box-shadow:4px 0 20px rgba(0,0,0,.12);
        max-width:300px;
      }
      .tree-panel.open { transform:translateX(0); }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button class="menu-btn" id="menuBtn" aria-label="目录" title="目录">&#9776;</button>
    <a class="brand" href="read.html">手册速查</a>
    <span class="desc" id="currentTitle">选择一个文件开始</span>
  </div>
  <div class="main">
    <div class="tree-overlay" id="treeOverlay"></div>
    <aside class="tree-panel" id="treePanel"></aside>
    <section class="view-panel" id="viewPanel">
      <div class="view-placeholder" id="placeholder">&#8592; 从左侧目录选择文件</div>
    </section>
  </div>

  <script>
  (function() {
    var treePanel = document.getElementById('treePanel');
    var viewPanel = document.getElementById('viewPanel');
    var placeholder = document.getElementById('placeholder');
    var currentTitle = document.getElementById('currentTitle');
    var menuBtn = document.getElementById('menuBtn');
    var treeOverlay = document.getElementById('treeOverlay');
    var activeRow = null;

    // mobile menu
    function openTree() { treePanel.classList.add('open'); treeOverlay.classList.add('show'); }
    function closeTree() { treePanel.classList.remove('open'); treeOverlay.classList.remove('show'); }
    menuBtn.addEventListener('click', function() {
      treePanel.classList.contains('open') ? closeTree() : openTree();
    });
    treeOverlay.addEventListener('click', closeTree);

    function showLoadError(msg) {
      treePanel.innerHTML = '<div style="padding:24px 16px;color:#c0392b;font-size:14px;line-height:1.8">' +
        '<strong>\u26A0 \u76EE\u5F55\u52A0\u8F7D\u5931\u8D25</strong><br><small>' +
        msg.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') +
        '</small></div>';
      console.error(msg);
    }

    // Load list.txt and build tree
    function loadTree() {
      fetch('notes/list.txt')
        .then(function(res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.text();
        })
        .then(function(text) {
          var tree = buildTreeFromList(text);
          if (tree.length === 0) {
            showLoadError('list.txt \u4E2D\u6CA1\u6709\u6587\u4EF6\u3002');
            return;
          }
          renderTree(tree, treePanel);
        })
        .catch(function(err) {
          showLoadError('\u65E0\u6CD5\u52A0\u8F7D notes/list.txt\uFF1A' + err.message);
        });
    }

    // Convert flat list into tree: {title, children: [{title, file}]}
    function buildTreeFromList(text) {
      var lines = text.split(/\r?\n/);
      var folders = {};
      lines.forEach(function(line) {
        line = line.trim();
        if (!line) return;
        // line: "folder/sub/file.html" or "folder/file.html"
        var parts = line.split('/');
        var folderName = parts[0];
        var fileName = parts.slice(1).join('/');
        var title = fileName.replace(/\.html?$/i, '');
        if (!folders[folderName]) {
          folders[folderName] = [];
        }
        folders[folderName].push({ title: title, file: 'notes/' + line });
      });

      var tree = [];
      Object.keys(folders).sort().forEach(function(folderName) {
        var files = folders[folderName];
        // Sort files by title (natural order)
        files.sort(function(a, b) {
          return a.title.localeCompare(b.title, 'zh-CN', { numeric: true });
        });
        tree.push({
          title: folderName,
          children: files
        });
      });
      return tree;
    }

    loadTree();

    function renderTree(nodes, parent) {
      nodes.forEach(function(node) {
        var wrapper = document.createElement('div');
        wrapper.className = 'tree-node';

        var row = document.createElement('div');
        row.className = 'tree-row';

        var hasChildren = node.children && node.children.length > 0;
        var hasFile = !!node.file;

        var arrow = document.createElement('span');
        arrow.className = 'arrow';
        if (hasChildren) {
          arrow.textContent = '\u25B6';
        }
        row.appendChild(arrow);

        var icon = document.createElement('span');
        icon.className = 'icon ' + (hasChildren ? 'folder' : 'file');
        icon.textContent = hasChildren ? '\uD83D\uDCC1' : '\uD83D\uDCC4';
        row.appendChild(icon);

        var label = document.createElement('span');
        label.className = 'label';
        label.textContent = node.title;
        row.appendChild(label);

        var childrenDiv = document.createElement('div');
        childrenDiv.className = 'tree-children';
        if (hasChildren) {
          childrenDiv.classList.add('collapsed');
          renderTree(node.children, childrenDiv);
        }

        if (hasChildren) {
          arrow.addEventListener('click', function(e) {
            e.stopPropagation();
            var open = !childrenDiv.classList.contains('collapsed');
            if (open) {
              childrenDiv.classList.add('collapsed');
              arrow.classList.remove('open');
            } else {
              childrenDiv.classList.remove('collapsed');
              arrow.classList.add('open');
            }
          });
        }

        row.addEventListener('click', function(e) {
          e.stopPropagation();
          if (hasFile) {
            openFile(node.file, node.title);
            if (activeRow) activeRow.classList.remove('active');
            row.classList.add('active');
            activeRow = row;
            closeTree();
          } else if (hasChildren) {
            var open = !childrenDiv.classList.contains('collapsed');
            if (open) {
              childrenDiv.classList.add('collapsed');
              arrow.classList.remove('open');
            } else {
              childrenDiv.classList.remove('collapsed');
              arrow.classList.add('open');
            }
          }
        });

        wrapper.appendChild(row);
        wrapper.appendChild(childrenDiv);
        parent.appendChild(wrapper);
      });
    }

    function openFile(file, title) {
      var old = viewPanel.querySelector('iframe');
      if (old) old.remove();
      placeholder.style.display = 'none';

      var iframe = document.createElement('iframe');
      iframe.src = file;
      iframe.title = title;
      viewPanel.appendChild(iframe);
      currentTitle.textContent = title;
      document.title = title + ' \u2014 \u624B\u518C\u901F\u67E5';
    }
  })();
  </script>
</body>
</html>
